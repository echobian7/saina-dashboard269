<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

ntent": "是的，我附上了一张照片。我第一次使用这款相机时，一切都很完美。我买它是为了拍摄排球练习，它被固定在看台上 30 英尺高的空中，很安全。而且不会掉下来。我把电池取出来，连接线也随它一起拿了出来。", "no": "733", "date": 1728437444000, "retest": ""}}, {"record_id": "recuDiVv9Hg8SE", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我知道如何从相机中取出 SD 卡。\n\n它卡住了，弹簧机构不工作，所以我无法取出 SD 卡。\n\nChris Benbow", "no": "2120", "date": 1740015926000, "retest": ""}}, {"record_id": "recuVvKaqCHTD8", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "用户体验问题", "content": "我通过经销商购买了一台Akaso v50 pro相机。在产品目录中，这款型号有一个微型HDMI输出接口。然而，我收到的相机却没有这个接口。我以为是发错货了，于是申请了换货。但我收到的还是同样没有该接口的型号。你们是取消了这个版本吗？请回复，谢谢。\n\n感谢您的回复。我当初选择你们这款产品，是因为我对HDMI接口感兴趣，想用它为一个协会的电视节目进行直播录制。这个接口能让我们把这台相机巧妙地安置在节目现场，配合其他相机一起使用。你们是否还有旧版本的相机，让我能用上HDMI接口呢？或者你们还有哪些型号带有这个接口呢？ ", "no": "4047", "date": 1756695708000, "retest": ""}}, {"record_id": "recv0dRGv81cye", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我有一台Akaso V50 pro相机。我有两块电池，都充过电了，但都不能用。这是一台全新的相机。相机插上电源时能开机，但电池无法使用。电池仓内部的金属触点似乎不见了，没有东西能与电池上的触点对齐。能帮我一下吗？", "no": "4683", "date": 1761012190000, "retest": "gift"}}, {"record_id": "recuk62lSu6Prl", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "尊敬的先生/女士。相机 v50pro 订单号 #206-9919140-2245961。当我使用相机时，我将电池充满电，第一块电池使用时间不长，只有 1 小时。然后我尝试使用第二块电池，大约使用 2 分钟后，它显示需要再次充电。我再次为电池充电，结果还是一样，一块电池比另一块使用时间长，但两块电池只能使用大约 1 小时。您能帮忙吗，因为我以为我的电池寿命会更长，因为我儿子的 Explorer one 相机至少可以使用几个小时。\n问候\nMichael Kot", "no": "23", "date": 1722418943000, "retest": ""}}, {"record_id": "recuJxnQrHMXYO", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "其中一块电池无法保持电量。它显示已完全充满电。将其从充电器上拔下，短时间后再次连接充电器时，电池指示灯变红。装在相机里时，这块电池续航时间不长，但我原以为是因为首次使用时未完全充满电。另一块电池似乎没问题。", "no": "2801", "date": 1745726347000, "retest": ""}}, {"record_id": "recv15ZDJJvCYx", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "产品问题", "content": "相机使用两次后，两块电池连接充电器时似乎都已充满电，但装入相机后拍摄时间不超过两分钟。", "no": "4765", "date": 1761812007000, "retest": ""}}, {"record_id": "recv65PFaCMaRi", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "电池无法正常工作。我们收到一条消息，显示它只能续航90分钟。我们甚至还没录完一段视频，电池就已经没电了。电池是充满电的。电池1：大约50分钟。电池2：大约60分钟。我正在用正确的充电器给电池充电，但它仍然只能续航约50分钟。", "no": "5140", "date": 1766390294000, "retest": "FKHY240515V10962    MODEL B028115350001"}}, {"record_id": "recv7jO8BL1ndn", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "产品问题", "content": "圣诞节时有人送了我一台AKASO V50 Pro相机。我想在法国比利牛斯山脉的拉蒙日滑雪场滑雪时用它。但不幸的是，每当我想在雪道上拍摄时，屏幕都会显示电量不足，相机即将关机。不过我明明已经把两块电池都充满了，即使我在雪道上最后一刻才装上满电的电池，想拍摄时它也只能录几秒钟就关机了。然而，一旦回到我们的公寓给电池充电后，我却能让相机在桌子上开着将近一个小时。在我们逗留期间，我每天都尝试，但都没有成功。我完全不明白为什么会出现这种故障。我每次都把相机放在防水盒里，以保护相机不受寒冷影响，但每次电池图标都会变成红色然后关机。您能对这个问题给我一些解释吗？", "no": "5271", "date": 1767512931000, "retest": ""}}, {"record_id": "recv8aZg1EV975", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "相机在使用11个月后停止工作。装上电池无法开机，但如果插上充电器再开机，相机就能启动。", "no": "5344", "date": 1768298727000, "retest": ""}}, {"record_id": "recuzK6rqZsu83", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "抱歉回复迟了。\n\n电池没问题。我可以用相机给它充电。\n\n但是充电器不工作。充电器上的灯也不亮。\n\n我认为充电器坏了。", "no": "1849", "date": 1736752964000, "retest": "AX-230909V1"}}, {"record_id": "recuWzx7GBsaff", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我在今年五月买了一台相机，充电器/电池刚刚过热，导致充电器部分融化。这些物品可以更换吗（我还没有对这款产品进行评价）？充电器过热相当危险。 ", "no": "4281", "date": 1757667838000, "retest": ""}}, {"record_id": "recuZdUYscyjgX", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "你好，我在2025年10月3日星期五收到了我的相机，我只用了一次，就已经有一个支架断了（有照片为证）。\n这真的不结实，我很担心后续的使用情况。 ", "no": "4565", "date": 1760096840000, "retest": ""}}, {"record_id": "recuk4C2UMjOQy", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "替换外壳上的闩锁已经像第一个外壳一样断裂了。使用时间不到一年，因此看起来外壳设计存在缺陷。保修期内可以更换吗？", "no": "6", "date": 1722397897000, "retest": ""}}, {"record_id": "recukyoFd92gIj", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我去年 12 月为女儿购买了防水 v50 pro 保护套，作为我们这次潜水旅行的圣诞礼物。我们刚刚尝试使用它，但保护套开始在水下漏水，因为镜头有裂缝，胶水从镜头和保护套的其余部分脱落。这非常令人失望，因为现在我们无法在旅行中使用相机。请您再给我们寄一个保护套。（镜头漏水）", "no": "71", "date": 1722837998000, "retest": ""}}, {"record_id": "recukytH2GC0WR", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "它不防水。我测试过它，水从按钮里渗出来。它毁了我的相机", "no": "78", "date": 1722839196000, "retest": ""}}, {"record_id": "recukJcViDrbPv", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "在仔细检查外壳是否正确关闭后，我们在水下（仅在水面以下几厘米）的防水外壳中使用相机。\n第一次使用后，我们注意到镜头上（外壳内）有几滴水。我们想知道是否是凝结。我们分别擦拭了相机及其外壳，几天后再次使用它们，仍然在相同的条件下。\n从水中出来后，我们再次注意到盒子内形成了水滴。我们将其取下并再次干燥相机。\n片刻后观看我们的影片时，屏幕显示紫色条纹，红色按钮不再起作用……我们无法再关闭相机。\n我们取出电池并将所有东西放在架子上。第二天我们无法打开相机。尽管两块电池都充满电，但从那以后我们还没有取得任何成功。\n相机按照说明书推荐的条件使用，没有受到任何震动。", "no": "134", "date": 1722997739000, "retest": ""}}, {"record_id": "recuoIyp10NFcc", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我 10 天前买了相机，今天我试着带着它去潜水。外壳应该可以潜水 40 米。我的相机只潜水了 1 米就坏了，水也进到了外壳里。相机和 SD 卡都坏了，电池和潜水外壳也坏了。", "no": "568", "date": 1726652613000, "retest": ""}}, {"record_id": "recuurbK6RszBQ", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "从第一次使用浮潜开始，尽管有防水壳，相机还是进水了。从那时起它就不再起作用了。保修如何运作，该产品于 2024 年 10 月 3 日从亚马逊购买。", "no": "1187", "date": 1731892812000, "retest": ""}}, {"record_id": "recux65d0gpskh", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "嗨，我为我的 V50 pro 买了一些额外的电池和一个新的防水外壳，我已经使用这些电池一段时间了，没有问题。但是，我第一次使用防水外壳时，它出现了漏水的迹象，我立即把它从水里拿出来擦干，检查了密封件，然后更换了相机，再次尝试，它再次漏水，现在相机无法开机。\n\n我之前使用的防水外壳没有问题。\n\n我对这个新外壳的质量以及它对我的相机造成的损坏感到非常失望。\n\n此外，我能做些什么来让被水损坏的相机恢复正常？", "no": "1480", "date": 1734329350000, "retest": ""}}, {"record_id": "recuy9rFeny4Du", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "：嗨！我们买了 V50x 并带去度假，但外壳不是完全防水的，现在显示屏无法打开。我们可以给相机通电，但显示屏上什么都没有显示。我们可以做些什么来恢复显示屏？", "no": "1649", "date": 1735295164000, "retest": ""}}, {"record_id": "recuzOwt63Rp1h", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们把相机带到了库拉索岛，因为这是送给我妹妹的礼物。我们进行了 3 次防水测试，看起来还不错。有一点冷凝，但仅此而已。我们把它放入游泳池几分钟，出来时它就湿了，现在显示屏无法打开。这真是我们旅行的一大败笔。我需要更换一个。", "no": "1859", "date": 1736818272000, "retest": ""}}, {"record_id": "recuAGo1WXp7yq", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "从美国到墨西哥度假。塑料水下外壳漏水！我将无法按计划拍摄水下视频。", "no": "1934", "date": 1737614183000, "retest": "FK231015V11239"}}, {"record_id": "recuCLLug4fA6E", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳进水后无法开机", "no": "2058", "date": 1739525920000, "retest": ""}}, {"record_id": "recuFFmcJX0Fua", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳泄露了，相机无法再使用", "no": "2379", "date": 1742179636000, "retest": " FK23101V11258"}}, {"record_id": "recuI1kXZ0e379", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我的 Akaso V50 pro 防水外壳坏了，我需要更换一个。", "no": "2619", "date": 1744336686000, "retest": ""}}, {"record_id": "recuKoLo0MzOkX", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次去浮潜，防水壳马上就漏水了，不到一分钟盐水就灌进去了。", "no": "2852", "date": 1746515103000, "retest": ""}}, {"record_id": "recuN2LQhDhfH8", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，\n\n我在亚马逊上购买了一台带有防水外壳的AKASO v50 pro相机，但在第一次水下使用时，有水透过了外壳。\n如果需要的话，我可以提供亚马逊的订单编号：403 - 2413990 - 4359542。\n提前感谢您的回复。\n\n祝您有美好的一天，\n诚挚问候。 ", "no": "3045", "date": 1748938531000, "retest": ""}}, {"record_id": "recuNdPsYFRw56", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机没问题。防水壳的圆形镜头盖区域在漏水。这是在第一次使用时就出现的问题。我们清洗并冲洗后再次尝试，问题依旧。这让我们非常失望，因为我们专门为浮潜之旅购买了这款相机，现在却根本无法使用它，也拍不到任何水下照片了。 ", "no": "3109", "date": 1749101935000, "retest": "S/N FK231015V10773"}}, {"record_id": "recuNdR1Y0tWZD", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，\n\n我为我的 V50Pro 订购了两个防水外壳。我今天收到了邮寄的货物。不幸的是，两个外壳都损坏了！一个固定外壳的夹子断了；另一个的镜头没有安装好。我计划两周后去旅行，届时至少需要一个能正常使用的外壳。\n\n希望能得到帮助，非常感谢！\n\n鲍勃·维奇\n901 - 517 - 0414 ", "no": "3113", "date": 1749102308000, "retest": ""}}, {"record_id": "recuOg9RXYa3XO", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们在水下使用了运动相机，显然它密封得不太好，因为水进入了相机，现在相机已经无法正常工作了。", "no": "3197", "date": 1750052482000, "retest": ""}}, {"record_id": "recuPXAYWN866I", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "有一次（6月22日），我把相机放进了附带的防水保护套里，结果保护套里进了水，导致它开不了机了。我想它应该还在保修期内，所以希望能换一台…… ", "no": "3325", "date": 1751610460000, "retest": ""}}, {"record_id": "recuSl2UoUSRq7", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳坏了，而且无法更换，这使得相机无法使用。", "no": "3554", "date": 1753789237000, "retest": ""}}, {"record_id": "recuSvveSMIS8d", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水保护套仅在3英尺深的水下就漏水了。水是从电源按钮处漏进来的。我需要一个新的保护套来替换。 ", "no": "3596", "date": 1753943755000, "retest": "FK230831V10221"}}, {"record_id": "recuTaqYTbEfMT", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "晚上好！\n\n经过漫长的等待，我终于收到了包裹，但保护套到货时已经损坏。我们该怎么办呢？我希望你们能给我换一个。\n\n期待你们尽快回复。\n\n祝好！\n\n我附上了照片。保护套前面的盖子损坏了，因为连接处断了。肯定是在运输过程中造成的，因为包装得不好。 ", "no": "3683", "date": 1754548566000, "retest": ""}}, {"record_id": "recuTwIhxbAlq9", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水保护套仅在水下3英尺深的地方就开始漏水了，是电源按钮处漏的水。我需要一个新的保护套来替换。\n\n我没安装相机，带着保护套去浮潜，想看看它是从哪里漏水的。几乎立刻就发现问题了，我能看到有水滴从镜头外壳周围漏进保护套里。我把保护套放在口袋里在外面待了45分钟。上岸后，发现保护套里进了三分之一的水。 ", "no": "3705", "date": 1754877770000, "retest": "FK230831V10221"}}, {"record_id": "recuTwJKrV7uDn", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "外壳进水了。\n是的，相机运行完全正常，问题在于把它放入水中时，外壳会渗水。 ", "no": "3707", "date": 1754878118000, "retest": ""}}, {"record_id": "recuTyhH2Jb1ZD", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，\n\n我于2025年7月3日订购了一台AKASO v50 pro运动相机（随函附上发票）。今天我第一次使用相机外壳在水上拍摄，不幸的是，它并不防水。镜头一侧的玻璃处有少量渗水，就好像玻璃没有粘好一样。我检查了内部密封圈，那边没有漏水。\n\n我有点恼火。您能为我找到什么解决方案呢？你们在哪里进行相机外壳的标准更换，还是说我必须把旧的寄还给您呢？\n\n期待您的回复。\n\n诚挚的，\n佩德罗·安图内斯。 ", "no": "3723", "date": 1754900986000, "retest": "FK240411V10432"}}, {"record_id": "recuTK10pyjrnE", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好！\n\n我的相机无法正常使用了。按照Akaso网站上的建议尝试后，仍然无法开机。\n\n需要说明的是，相机在一次浮潜使用后就无法工作了，原因是我购买相机时配备的潜水外壳不防水。\n\n我要求您给我补发符合标准的产品，具体如下：\n- 一个防水外壳；\n- 一台能正常工作的新相机。\n\n顺祝商祺！\n弗雷德里克·科卡尔 ", "no": "3764", "date": 1755074324000, "retest": ""}}, {"record_id": "recuUjRjs0eKHm", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我订购了一台 V50 pro 运动相机，到目前为止它表现出色，我对相机的成像质量非常满意。我发现，当我把它带到海里并使用水下保护壳拍摄时，水会漏进相机镜头部分。我确保先在保护壳内用纸巾测试过，并且将其浸入水中时并没有漏水。我也检查过橡胶密封圈，确保上面没有毛发或污垢，但似乎都无济于事。我原本打算用这台相机进行水下拍摄，但这个问题让我无法实现这个想法。 ", "no": "3865", "date": 1755603962000, "retest": "FK231015V12082"}}, {"record_id": "recuUR2UTqRSbv", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我在11月购买了这款相机，并在今年8月第一次将其放在防水盒里，带着它进行了一次潜水，最深下潜到了6米。可惜的是，当我回到水面时，我发现水已经进入了防水盒。如今相机已经无法正常使用了。 ", "no": "3936", "date": 1756094347000, "retest": "FK231120V10828"}}, {"record_id": "recuVxGTrQGlt6", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我订购了一台V50 pro运动相机，到目前为止它的表现非常出色，我对相机的成像质量非常满意。我发现，当我把它带到海里并使用水下外壳进行拍摄时，水会漏进相机镜头部分。我确保先在外壳内放了纸巾进行测试，然后将其浸入水中，当时并没有漏水。我也检查过橡胶密封圈，确保上面没有毛发或污垢，但似乎都无济于事。我原本打算用这台相机进行水下拍摄，但这个问题让我无法实现这个想法。\n\n我刚收到我的水下外壳，因为之前那个有故障。但这个新的外壳到货时就已经有裂缝了。我会附上一张照片，显示裂缝的位置，就在镜头放置的内部。\n\n请告诉我接下来该怎么做，我原本想带着这台相机在假期进行水下拍摄，但你们生产的产品并不适合水下使用。所以现在我没法用它了。 ", "no": "4066", "date": 1756724481000, "retest": "FK231015V12082"}}, {"record_id": "recuVyfchtBJcg", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我买了这款相机用于在埃及潜水。尽管它宣称能防水至30米，但大约下潜到8米时，水就开始进入相机了，不是从密封处，而是从有镜头的地方。我于2025年7月16日在亚马逊上购买了该产品，如果你们需要，我可以把发票发给你们。\n\n您好，相机能开机。问题是下潜到8米时就进水了，所以我觉得外部保护壳可能有问题。我做过防水测试，但只是在洗手池里进行的，我肯定不能只带着保护壳去做潜水测试。 ", "no": "4067", "date": 1756732656000, "retest": ""}}, {"record_id": "recuWggZ5zIEvX", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在海里用了 4 次相机，但相机外壳并非完全防水，会有一些水渗进去。所以当我把相机从外壳里取出来时，相机是湿的，我不得不把它擦干，因为它再也打不开了。外壳上的螺丝已经生锈了，这证明它们接触过水。你可以在附件照片中看到这一点。\n\n由于相机在保修期内，我要求你给我寄一个新的防水外壳，或者告诉我如何退货并获得退款。 ", "no": "4212", "date": 1757383241000, "retest": ""}}, {"record_id": "recuWmcMxGBTqa", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我可以确认相机完全没有损坏，它运行得非常正常。我注意到相机保护壳的镜头盖一侧有一条裂缝，海水正从那里灌进来。我试图购买一个替换的保护壳，但似乎哪儿都买不到。我也尝试过其他替代品，但相机放不进去，而且按钮的位置也不对。如果能买到保护壳的镜头部分就更好了，因为保护壳本身其实没问题。 ", "no": "4226", "date": 1757470897000, "retest": ""}}, {"record_id": "recuWn4mVsW1U1", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水外壳的高清摄像机无法在水中正常使用。\n\n您好，我在亚马逊购买了AKASO v50 pro摄像机，我将摄像机装在为此设计的外壳中并在水下使用，水立刻就灌进去了。我在没有装摄像机的情况下将外壳浸入水中进行测试，发现水会立刻从镜头位置灌进去。 ", "no": "4232", "date": 1757483668000, "retest": ""}}, {"record_id": "recuWxKRDHrIdu", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，在水下使用带保护套的相机时，水会进入相机。这会损坏相机，并且无法拍摄出高质量的照片或视频。", "no": "4256", "date": 1757641561000, "retest": ""}}, {"record_id": "recuXvNYabSEOM", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "最近，我收到了我订购的水下相机，我非常兴奋地想对它进行测试。不幸的是，我第一次在海里使用时，水逐渐进入了设备，而我当时并没有立刻察觉到，这不幸地导致相机损坏了。\n\n我理解这种情况可能会发生，非常希望您能指导我如何解决这个问题。可以安排换货或更换新机吗？\n\n我想确认一下，水渗入时相机确实是放在防水外壳里的。我会按照您的建议，把相机放在干燥的地方，并用大米吸潮。\n\n我还会在后天准备并给您发送一段短视频，向您展示相机的问题。 ", "no": "4403", "date": 1758528879000, "retest": ""}}, {"record_id": "recuXClKpBSo1d", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我收到的相机密封盒正在进水。它是V50 pro型号。 ", "no": "4426", "date": 1758625588000, "retest": ""}}, {"record_id": "recuXNu3rqtp3p", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我最近购买了一台Akaso V50 Pro相机以及官方防水壳，并带着它去度假了。\n不幸的是，我发现防水壳特别在镜头区域漏水。度假期间，我多次使用相机和防水壳，每次水都会渗入防水壳。结果，相机开始出现故障，在假期剩下的时间里我就不再使用它了。\n度假回来后，我仔细检查了O型圈并清洁了防水壳，然后将防水壳（不装相机）浸入水中进行测试，问题仍然存在。其他地方没有明显的裂缝或损坏，但浸入水中时，水仍然会从镜头部分进入。\n相机似乎已经恢复正常了。 ", "no": "4448", "date": 1758790107000, "retest": ""}}, {"record_id": "recv0x5MdfBoAy", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我最近从你们的亚马逊店铺购买了一台Akaso V50及配件。刚试用了水下外壳，发现它有问题——立即就进水了。水量不多，但当我们回到岸上从外壳中取出相机时，外壳内部和相机上已经能明显看到水渍。请问可以寄一个替换品吗？", "no": "4731", "date": 1761296299000, "retest": "V50 pro防水壳"}}, {"record_id": "recv1tNbSOiEmF", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水下保护壳首次使用就漏水了，相机现在坏了。我在保护壳外用相机完全没问题。我在泰国背包旅行时第一次在水下使用它，当时用了水下保护壳和漂浮手柄，但浮潜不到10分钟就进水了，等我上岸时，相机已经无法使用。", "no": "4791", "date": 1762163671000, "retest": ""}}, {"record_id": "recv2u5RwVOl1b", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "镜头安装处的外壳密封不严。能否直接寄一个替代品到犹他州凯斯维尔市南1700号东348号，邮编84037。", "no": "4874", "date": 1763084256000, "retest": ""}}, {"record_id": "recv2v6P7zGaBz", "fields": {"status": "评估中", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "太难以置信了！自从我买了这个相机，防水壳甚至没撑过四个月。我把相机装在摩托车头盔上使用，现在相机用不了了，也无法再用它来做我买它时想做的事。用来闭合外壳两部分的塑料件坏了，因为塑料质量太差。", "no": "4879",
