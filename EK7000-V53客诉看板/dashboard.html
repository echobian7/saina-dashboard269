<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>if(localStorage.getItem('saina_auth')!=='4ee13423c943d1338a1758bcedfc7dc2ac9ad06d6b02096cefd6fad053048b22')location.replace('../index.html');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EK7000-V53客诉看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding: 20px 24px 32px;
  }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: .5px; }
  .header .sub { font-size: 12px; color: #6e7681; margin-top: 4px; display: flex; align-items: center; gap: 12px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; display: inline-block; }
  .update-time { color: #8b949e; font-size: 12px; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-card {
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
    padding: 18px 22px; position: relative; overflow: hidden;
  }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.blue::before  { background: #58a6ff; }
  .kpi-card.green::before { background: #3fb950; }
  .kpi-card.yellow::before{ background: #d29922; }
  .kpi-card.red::before   { background: #f85149; }
  .kpi-label { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
  .kpi-value { font-size: 42px; font-weight: 700; line-height: 1; }
  .kpi-card.blue  .kpi-value { color: #58a6ff; }
  .kpi-card.green .kpi-value { color: #3fb950; }
  .kpi-card.yellow .kpi-value { color: #d29922; }
  .kpi-card.red   .kpi-value { color: #f85149; }
  .kpi-sub { font-size: 11px; color: #6e7681; margin-top: 6px; }
  .panel { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
  .panel-title { font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .panel-title .dot.blue   { background: #58a6ff; }
  .panel-title .dot.green  { background: #3fb950; }
  .panel-title .dot.yellow { background: #d29922; }
  .panel-title .dot.red    { background: #f85149; }
  .panel-title .dot.orange { background: #e3b341; }
  #trendChart { width: 100%; height: 280px; }
  .mid-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 14px; margin-bottom: 14px; }
  #statusChart  { width: 100%; height: 280px; }
  #categoryChart{ width: 100%; height: 280px; }
  .s-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .s-table thead tr { border-bottom: 1px solid #21262d; }
  .s-table th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .s-table td { padding: 9px 12px; color: #c9d1d9; border-bottom: 1px solid #161b22; vertical-align: middle; }
  .s-table tbody tr:hover { background: #1c2128; }
  .s-table tbody tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .snap-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .snap-table th { text-align: left; padding: 8px 14px; color: #8b949e; font-size: 11px; font-weight: 500; border-bottom: 1px solid #21262d; letter-spacing: .5px; }
  .snap-table td { padding: 9px 14px; border-bottom: 1px solid #1c2128; color: #c9d1d9; }
  .snap-table tr:last-child td { border-bottom: none; }
  .snap-table tr:hover td { background: #1c2128; }
  .snap-table .today-row td { background: #1a2535; }
  .snap-table td.num-blue   { color: #58a6ff; font-weight: 600; }
  .snap-table td.num-green  { color: #3fb950; font-weight: 600; }
  .snap-table td.num-yellow { color: #d29922; font-weight: 600; }
  .snap-table td.num-red    { color: #f85149; font-weight: 600; }
  .refresh-btn { float: right; background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all .2s; margin-top: -2px; }
  .refresh-btn:hover { background: #30363d; color: #c9d1d9; }
  .loading { opacity: .5; pointer-events: none; }
  .empty-tip { text-align: center; color: #3fb950; padding: 20px; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <h1 id="dashTitle">EK7000-V53客诉看板</h1>
  <div class="sub">
    <span><span class="live-dot"></span></span>
    <span>数据源：飞书多维表格</span>
    <span class="update-time" id="updateTime">加载中…</span>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi-card blue">
    <div class="kpi-label">总记录数</div>
    <div class="kpi-value" id="kpiTotal">—</div>
    <div class="kpi-sub" id="kpiTotalSub"></div>
  </div>
  <div class="kpi-card green">
    <div class="kpi-label">已解决</div>
    <div class="kpi-value" id="kpiDone">—</div>
    <div class="kpi-sub" id="kpiDoneSub"></div>
  </div>
  <div class="kpi-card yellow">
    <div class="kpi-label">处理中</div>
    <div class="kpi-value" id="kpiActive">—</div>
    <div class="kpi-sub" id="kpiActiveSub"></div>
  </div>
  <div class="kpi-card red">
    <div class="kpi-label" id="kpiTopLabel">最高优先级待处理</div>
    <div class="kpi-value" id="kpiTop">—</div>
    <div class="kpi-sub" id="kpiTopSub"></div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">
    <span class="dot blue"></span>客诉趋势（每日快照）
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">↻ 刷新数据</button>
  </div>
  <div id="trendChart"></div>
</div>

<div class="mid-row">
  <div class="panel">
    <div class="panel-title"><span class="dot blue"></span>状态分布（最新）</div>
    <div id="statusChart"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><span class="dot orange"></span>问题归类 TOP（最新）</div>
    <div id="categoryChart"></div>
  </div>
</div>

<div class="panel">
  <div class="panel-title"><span class="dot red"></span><span id="topTableTitle">最高优先级待处理问题</span></div>
  <table class="s-table">
    <thead>
      <tr>
        <th style="width:70px">编号</th>
        <th style="min-width:160px">问题</th>
        <th style="width:90px">状态</th>
        <th style="width:100px">归类</th>
        <th style="width:110px">严重程度</th>
        <th>最新跟进备注</th>
      </tr>
    </thead>
    <tbody id="topTableBody">
      <tr><td colspan="6" style="text-align:center;padding:20px;color:#8b949e;">加载中…</td></tr>
    </tbody>
  </table>
</div>

<div class="panel">
  <div class="panel-title"><span class="dot yellow"></span>每日快照记录</div>
  <table class="snap-table">
    <thead>
      <tr><th>日期</th><th>总量</th><th>已解决</th><th>待处理</th><th id="snapTopLabel">最高优先级待处理</th></tr>
    </thead>
    <tbody id="snapBody">
      <tr><td colspan="5" style="text-align:center;padding:20px;color:#8b949e;">加载中…</td></tr>
    </tbody>
  </table>
</div>

<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────
async function loadFromLocalData() {
  const EMBEDDED_DATA = {"updated_at": "2026-04-26 17:27:39", "title": "EK7000-V53客诉看板", "field_map": {"status": "状态", "level": "问题分级", "category": "问题归属", "severity": null, "content": "翻译", "no": "客诉id", "date": "填表时间", "retest": "供应商反馈/处理方案"}, "done_values": ["已关闭"], "top_level": "S", "records": []};
  const { records=[], field_map={}, done_values=[], top_level='S', title='' } = EMBEDDED_DATA;
  if (title) { document.title = title; document.getElementById('dashTitle').textContent = title; }
  document.getElementById('kpiTopLabel').textContent = `${top_level} 级待处理`;
  const data  = analyze(records, field_map, done_values, top_level);
  const snaps = upsertSnap(data.date, { total:data.total, done:data.done, active:data.active, top:data.top });
  renderAll(data, snaps, top_level);
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ 更新中…'; btn.classList.add('loading');
  try {
    const res = await fetch('./feishu_data_latest.json?t='+Date.now());
    if (res.ok) {
      const raw = await res.json();
      const { records=[], field_map={}, done_values=[], top_level='S', title='' } = raw;
      if (title) { document.title = title; document.getElementById('dashTitle').textContent = title; }
      const data  = analyze(records, field_map, done_values, top_level);
      const snaps = upsertSnap(data.date, { total:data.total, done:data.done, active:data.active, top:data.top });
      renderAll(data, snaps, top_level);
    }
  } catch(e) { console.warn('刷新失败', e); }
  btn.textContent = '↻ 刷新数据'; btn.classList.remove('loading');
}

initCharts();
loadFromLocalData();
</script>
</body>
</html>
