<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

content": "我的Brave 7相机无法更新固件。我可以通过WiFi将相机连接到应用程序，但当我点击更新固件时，它会下载，但之后无法更新，只是说请稍后再试。我稍后再试，但遇到了同样的问题。相机已充满电，存储卡有足够的空间，并且已格式化且可正常使用。我可以正常使用相机，但无法连接到应用程序查看任何内容。有什么方法可以下载更新并将相机连接到我的电脑吗？\n我已尝试卸载并重新安装应用程序，对相机进行恢复出厂设置，但问题仍然存在。", "no": "5917", "date": 1776068967000, "retest": ""}}, {"record_id": "recvgEYIZaXZ5Q", "fields": {"status": "", "level": "", "category": "06-电池", "content": "电池一小时后就没电了。所以给电池充满电，骑摩托车一小时内就没电了。我会问问我的伴侣他是怎么检查的", "no": "5918", "date": 1776070956000, "retest": ""}}, {"record_id": "recvgJ5p5pFMUJ", "fields": {"status": "", "level": "", "category": "12-开关机问题", "content": "设备无法开机。我尝试了故障排除，但没有任何效果。它根本没有被水浸泡过。我只把这台相机安装在我的渔船的杆子上使用。无论是使用电池还是通过USB连接，它都无法开机，而且没有任何灯亮，也没有任何声音。", "no": "5919", "date": 1776131652000, "retest": ""}}, {"record_id": "recvgJg8XKGAGo", "fields": {"status": "", "level": "", "category": "19-开机卡LOGO", "content": "AKASO EK 7000 Pro 相机最初两天使用正常。然而现在，虽然能够开机，但无法响应任何进一步的按键操作，因此也无法关机。我们尝试了第二块电池，也取出了SD卡，但相机除了能开机外仍然没有任何反应。您能建议我们采取什么步骤吗？\n\n我们已按照您的说明尝试重置相机：使用5V2A适配器，不装电池和SD卡，按住电源键3秒。但遗憾的是问题仍然存在。相机依旧没有反应，无法关机或切换到视频/拍照模式。多次尝试重置相机均未成功，仍然完全无法使用。您有什么建议吗？\n\n在A和B两种方案中，我们都取出了micro-SD卡和电池，以排除可能的故障原因。\n\n屏幕旁边的“蓝色指示灯”没有任何反应。无论是方案A还是方案B，它都没有反应。\n\n您有进一步的建议可以重新激活或修复相机吗？", "no": "5920", "date": 1776134211000, "retest": ""}}, {"record_id": "recvgJjO8D7EVI", "fields": {"status": "", "level": "", "category": "12-开关机问题", "content": "问题仅在插入SD卡时出现。没有SD卡时，设备能保持开机状态。你尝试过不同的SD卡，最后一张是Akaso U3存储卡，但也无法正常工作。视频显示，插入存储卡后设备只会不断开关机，而不插存储卡时则会显示菜单选项。", "no": "5921", "date": 1776135084000, "retest": ""}}, {"record_id": "recvgJn8iTQ6bG", "fields": {"status": "", "level": "", "category": "02-镜头", "content": "我的Akaso Brave 7无法正常工作。我可以开机，但屏幕一直是黑的。有蓝色指示灯、声音，屏幕上还有一些按钮，但我什么都做不了。支持网站上的所有解决方案都不管用。我无法进入设置来开启Wi-Fi并将其连接到应用程序以重置相机或下载固件。", "no": "5922", "date": 1776135877000, "retest": ""}}, {"record_id": "recvgJrpzCcrgr", "fields": {"status": "", "level": "", "category": "09-配件", "content": "嗨，我最近从亚马逊购买了一台Akaso EK7000。它于2026年4月6日到货，我注意到1/4英寸公头鞋型适配器在到货时/开箱时就已损坏——似乎是热塑性塑料粘合存在缺陷。相机的其他一切功能都很好！是否可以获得这个缺陷部件的替换件？序列号：ZK251101V104225", "no": "5924", "date": 1776136896000, "retest": ""}}, {"record_id": "recvgJsTa5Hqla", "fields": {"status": "待确认", "level": "", "category": "14-SD卡问题", "content": "格式化SD卡后仍然显示错误，正在发送新的存储卡。", "no": "5925", "date": 1776137248000, "retest": ""}}, {"record_id": "recvgJuni3dWb5", "fields": {"status": "", "level": "", "category": "05-按键", "content": "我最近通过亚马逊购买了一台新的AKASO EK7000相机以及一张新的AKASO 64GB microSD卡（U3，，，HD，4K UHD，MicroSD卡）。电池已充满电，我插入了电池和SD卡。我成功格式化了SD卡。但是，当我尝试测试相机时，无法让它开始录制视频。我必须按很多次快门按钮，如果它开始录制了，我又很难让它停止录制。我通常不得不按模式按钮来关闭相机。我尝试过更换电池，重新安装SD卡并重新格式化。我还应该尝试其他方法吗，还是相机或SD卡（或两者都）有问题？\n\n抱歉过了这么久才回复你，“生活”总是会妨碍（就像往常一样）。按照你的建议，我重置了相机。现在它似乎工作得更好了，当我手持相机时，双击快门按钮可以稳定地开始和停止录制。当相机放在稳固的表面上时，我只需按一次快门按钮就能开始和停止录制。\n\n我可以接受这种情况，除非你还有其他快速的方法让我尝试。\n\n我在之前的邮件中描述的情况是在没有防水壳的情况下。使用防水壳时，情况稍微更不稳定一些，但最终还是能让它开始和停止录制。", "no": "5926", "date": 1776137603000, "retest": ""}}, {"record_id": "recvgJwEn3dq7X", "fields": {"status": "", "level": "", "category": "09-配件", "content": "当我打开包装并按照视频教程组装相机零件时，一个名为“Monture A”的零件毫无缘由地在我手中彻底断裂了。", "no": "5927", "date": 1776138145000, "retest": ""}}, {"record_id": "recvgJxNU52H4x", "fields": {"status": "", "level": "", "category": "09-配件", "content": "EK7000 我少了一个防止相机拧到底座上时旋转的黑色小圆形垫片，想知道怎么再弄一个", "no": "5928", "date": 1776138420000, "retest": ""}}, {"record_id": "recvgJyN2nwKzn", "fields": {"status": "", "level": "", "category": "漏件", "content": "我们再次检查了盒子里的所有东西。里面没有带SD卡的塑料盒。", "no": "5929", "date": 1776138655000, "retest": ""}}, {"record_id": "recvgKAR8t8uzF", "fields": {"status": "", "level": "", "category": "16-机身防水", "content": "我们使用Brave 7进行了浮潜。所有盖子都完好且关闭着。然而，似乎有水进入了相机内部，导致相机无法开机。电池是满电的。我们只进行了浮潜，且深度未超过5米。相机已经晾干好几天了（至少5天），但仍然无法启动。我装上了电池（它们看起来还能用），把一块电池放进去并尝试开机——没有任何反应。我把过程录了下来并发给你视频。", "no": "5930", "date": 1776153923000, "retest": ""}}, {"record_id": "recvgKHuGABn39", "fields": {"status": "", "level": "", "category": "18-死机", "content": "我的V50在开机后约6秒持续冻结，无论是否安装电池，且没有SD卡，我认为这是主板有缺陷的已知迹象。我按照说明操作了。新的SD卡格式化为Fat32并带有固件文件。电池已充满电。不过，它一直卡在这个屏幕（FW ISP…）上。", "no": "5931", "date": 1776155505000, "retest": ""}}, {"record_id": "recvgKLXi4A9ct", "fields": {"status": "", "level": "", "category": "04-结构装配", "content": "这台相机一直被精心使用，从未用于剧烈或暴力的拍摄场景。相机的USB和HDMI接口盖在全新的时候就出现了塑料破裂的情况。我强调相机一直被非常小心地对待，很明显这是材料不当造成的裂缝，它从未受到过撞击。\n\n您可以看到一张接口盖的照片，它几乎没有被频繁使用过。这些裂缝是“自发”出现的，我认为是由于劣质塑料材料导致的。\n\n相机的保修期已经过了。我知道我无法提出任何索赔，这也不是我的意图。但我希望你们能了解这个塑料部件的缺陷。这个裂缝不是现在才出现的，而是很早就有了，在第一年仔细看就能发现，现在已经肉眼可见了。\n\n很遗憾，因为这是一款不错的入门级相机……但下次购买时，即使我喜欢这个相机，我也会慎重考虑是否再选择Akaso品牌。", "no": "5932", "date": 1776156568000, "retest": ""}}, {"record_id": "recvgKVEen55qs", "fields": {"status": "", "level": "", "category": "漏件", "content": "我在2024年买了相机。信不信由你，因为太忙了，我一直没打开它。终于有机会用它了，打开盒子却发现没有电池。我到处找了找，确实没有电池。我相信我的相机还在保修期内。你能帮我解决这个问题吗？", "no": "5933", "date": 1776158878000, "retest": ""}}, {"record_id": "recvgKY4rcCjHP", "fields": {"status": "", "level": "", "category": "16-机身防水", "content": "我于2025年12月5日购买了一台Brave 7相机，不幸的是，相机内部进水损坏，现已无法使用。我检查了电池仓和充电仓，都是干燥的，没有漏水。前屏幕部分有水分/冷凝水，所以水可能是从那里进去的？我有哪些选择？相机屏幕模糊，有线条穿过。相机能开机，但屏幕肯定是进水损坏了。我试着把它弄干，但没有成功。水温约为25摄氏度。", "no": "5934", "date": 1776159455000, "retest": ""}}, {"record_id": "recvgOTq7TI4le", "fields": {"status": "待确认", "level": "", "category": "录像及回放问题", "content": "我为最近去牙买加的旅行买了相机，相机可以拍照但不能拍摄视频。屏幕上会快速出现错误信息。我买它是为了拍摄水下运动，结果却没能拍到任何视频。", "no": "5935", "date": 1776217453000, "retest": ""}}, {"record_id": "recvgPnBR2F8h4", "fields": {"status": "", "level": "", "category": "其他问题", "content": "将Brave7用在Windows11的Camo Studio中作为网络摄像头使用时，视频会有延迟（大约1秒）", "no": "5936", "date": 1776224648000, "retest": ""}}, {"record_id": "recvgPnCcFnMoR", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "content": "4天前在亚马逊购买的120MB最新SD卡，却因“数据传输速度慢”的错误无法录制。即使对存储卡进行格式化、降低分辨率也无法解决，现在正在旅行中，因此请尽快告知应对方法。另外，因为正在旅行中没有包装盒，所以商品ID等信息不明。", "no": "5937", "date": 1776224649000, "retest": ""}}, {"record_id": "recvgQGhWufyuR", "fields": {"status": "", "level": "", "category": "05-按键", "content": "当我插上USB线时它会开机。但是模式按钮不起作用。电池已充满电。格式化了SD卡但没有用。一旦用USB线开机，它就一直开着，我无法关机……自动关机功能正常。按任何按钮都能唤醒它，但模式按钮不行。\n我已经完成了所有故障排除步骤，包括格式化SD卡、给电池充电、进行完全重置。但是模式/开机按钮还是不能用。这是通过亚马逊购买的全新产品。这里有视频。请告诉我们是否还能做些什么。", "no": "5938", "date": 1776243872000, "retest": ""}}, {"record_id": "recvgQKmAB2LQe", "fields": {"status": "", "level": "", "category": "19-开机卡LOGO", "content": "我需要用于更新我的Akaso Go Brave LE的软件，它卡在logo界面无法继续，帮帮我。", "no": "5939", "date": 1776244843000, "retest": ""}}, {"record_id": "recvgQL93Ljm0L", "fields": {"status": "", "level": "", "category": "06-电池，20-客户体验或者其他，13-WiFi问题", "content": "我刚买了这款EK7000相机，但在设置以及通过你们的应用程序将其连接到我的手机时遇到了很多问题。（1）一开始，用手机登录应用程序就遇到了问题——在我重置了4次密码后，现在总算能登录了……这简直太离谱了！（2）延长保修和50%折扣的注册功能无法使用——后来已修复。（3）当人物身后有窗户开着时，在室内无法拍出清晰的照片。照片很暗，因为没有背景光补偿……这是另一个问题。（4）最新的问题是，按照说明从应用程序启用Wi-Fi后，应用程序没有进入下一步设置……因此无法完成相机与手机的连接。你们可不是付钱让我来找bug或者修复bug的！\n\n我按照你们的指示重置了相机，然后终于按照之前遵循的相同说明将相机连接到了我的手机。根据你们的说明：相机存在逆光问题的局限性，且无法通过升级解决。然而，又出现了一个新问题（4）电池耗电很快。我刚把相机附带的两块电池都装到充电器里，会试着追踪它们的电量。我只是试着测试相机录制了很短的视频片段，拍了大约4张照片，所以这么快就没电了似乎太早了。\n\n我带着相机到户外进行录制和测试。我用一块电池不停地行走和录制了大约25分钟，或者说距离不到1英里。我把手机应用程序连接到相机上，实时观看相机正在录制的内容。问题（5）然后，正如之前提到的，大约在不到1英里的距离时，我停下来并离开相机，然后注意到我的手机没有显示相机传输的实时视频图像。相机连接断开了——我看了看相机，发现它的屏幕冻结了，显示相机正在寻找Wi-Fi连接。我立即尝试重新连接相机上的Wi-Fi，但相机上的所有按钮都不起作用，然后我尝试按照给出的说明重置手机Wi-Fi连接，但没有任何方法能恢复两者之间的连接。我唯一能操作相机的方法是取出电池，重新安装，然后重新开机。我能够让相机重新连接到手机应用程序，但大约10分钟后电池就耗尽了。连续录制时，电池应该能续航多久？\n\n今天我用第二块电池在室内使用了大约半小时。我注意到一些新情况需要澄清。问题（6）相机录制时，显示屏会在几秒钟内变黑。这很令人不安，因为我无法看到相机是否在录制以及正在录制什么。我很难相信这是正常现象。此外，这段时间我的手机并没有像其他录制时那样连接到相机。我要向你们报告多少问题，你们才会安排换货或者退款。你们漏掉了我昨天提到的第（6）个情况。这与手机应用程序是否连接到相机无关。当相机在录制时，几秒钟内相机上的显示屏就变黑了。这种情况发生了好几次。相机屏幕上没有显示正在录制的内容，也没有显示相机是否停止了录制。唯一能让显示屏显示信息的方法是点击相机侧面的上下按钮，但几秒钟后屏幕又会变黑。我再重复一遍，这段时间我没有用手机查看相机录制的内容。", "no": "5940", "date": 1776245030000, "retest": ""}}, {"record_id": "recvgVa18dbZyp", "fields": {"status": "", "level": "", "category": "11-APP问题", "content": "Brave8_20251201_v1.3.7-A\n是的，正在使用AKASO go应用。\n即使重启了手机也还是不行。\n我也试过这个方法了。应用能连接到相机，但当我点击相机图标时，它就一直转圈圈，什么都没发生。\n我还是无法让手机和相机一起正常工作。应用一直在转圈圈，屏幕上什么都不显示。我已经花了好几个小时在这上面了，而且我对电脑还挺在行的。\n看起来AKASO应用和手机就是无法完全连接或显示图像。它就一直转个不停。\n感谢你的帮助和客户服务。我不想仅仅因为这个问题就把它退回去。", "no": "5941", "date": 1776310060000, "retest": ""}}, {"record_id": "recvgVMkB2mxE3", "fields": {"status": "待确认", "level": "", "category": "12-开关机问题", "content": "起初显示的是模糊的图像，现在则无法开机。你取出了SD卡和电池，只使用USB线，但问题依旧。相机没有进水损坏。\n问题仍然存在。有时能开机，但在使用过程中会中途关机。由于我对该产品不满意，请安排退款。", "no": "5942", "date": 1776319191000, "retest": ""}}, {"record_id": "recvh0t34AKWlI", "fields": {"status": "", "level": "", "category": "录像及回放问题", "content": "你好，我需要关于我的Akaso V50X相机的帮助，相机拍摄的视频在相机上播放完全正常，但我无法在电视、电脑或社交媒体上播放它们，因为播放时会卡顿。我的固件版本是SN-AX-240822-V2.0", "no": "5944", "date": 1776388485000, "retest": ""}}, {"record_id": "recvh0wyXSFrHx", "fields": {"status": "", "level": "", "category": "12-开关机问题", "content": "你今天过得怎么样？我是你们的老顾客了，感谢你们的产品非常棒而且价格实惠。\n\n所以我的摄像头警报器出了点问题，突然就不能用了，开不了机，也没有任何反应，不是电池的问题，我不知道它到底怎么了。这让我有点退缩，没有这个好用的产品，我就没法拍摄摩托车骑行和特技视频了。\n\n所以我不知道，因为我的Prime退货窗口已经过了。我不知道保修是怎么回事。但希望你们能帮我解决，非常感谢。", "no": "5945", "date": 1776389321000, "retest": ""}}, {"record_id": "recvh0AJ1bjbr7", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "content": "您好，我订购了V50 ELITE相机，昨天中午收到的。我给电池充了电，在我的小米红米Note 13 Pro手机上下载了AKASO GO应用。当我安装PNY U3存储卡时，无法格式化，相机显示“存储卡无效”之类的信息。后来又能用了，我拍了一段测试视频，结果文件变成蓝色并显示错误信息……我反复重启后，相机能正常使用了，但无法传输到手机上，WiFi连接上后又断开。真遗憾，我非常失望，因为我之前对你们品牌抱有很大信心，它的评价也很好。所以我昨晚已经把它退回亚马逊了。不过我还是在看其他AKASO相机，希望如果我再买一台，不会遇到同样的问题。我需要用它固定在摩托车上，想要良好的防抖功能和广角，预算最多150欧元，但还是有些犹豫……", "no": "5946", "date": 1776390313000, "retest": ""}}, {"record_id": "recvh0Lm7YCNBR", "fields": {"status": "", "level": "", "category": "03-声音问题", "content": "视频文件的音频非常低，即使我将视频下载到手机上也是如此", "no": "5947", "date": 1776392848000, "retest": ""}}, {"record_id": "recvh0RRCh9eMv", "fields": {"status": "", "level": "", "category": "录像及回放问题", "content": "我发现当处于汽车模式时，它没有进行录制。然而，我能找到的所有手册都是针对2.0版本的，所以我正在尝试弄清楚如何将相机连接到应用程序，我似乎无法打开Wi-Fi，因此我想知道这个型号是否可能没有Wi-Fi功能。", "no": "5948", "date": 1776394398000, "retest": ""}}, {"record_id": "recvh1AfVqiks8", "fields": {"status": "", "level": "", "category": "发热问题", "content": "我联系您是关于我于2025年5月3日通过亚马逊购买的AKASO Brave 8 Lite相机的问题。该相机在使用过程中持续过热，以至于会自动停止录制。此问题在所有情况下都会发生：室内、室外、带或不带保护壳，甚至在水中使用时。这使得相机变得不可靠，难以按预期使用。\n\n您能否就如何解决此问题提供建议？但我想强调的是，相机达到的温度明显不正常。即使在阴凉处或水中使用，相机仅录制约5分钟后就会过热。这种情况使得相机在正常条件下无法使用。运动相机本应在户外和长时间录制会话中可靠运行。如果它这么快就过热，那就完全违背了它的用途。\n\n因此，我希望能得到一个具体的解决方案，例如更换或维修，因为这似乎是一个有缺陷的设备，而非正常运行。\n\n请查收我当前使用的microSD卡的照片，以及相机和SD卡的购买发票。该SD卡符合此相机正常使用所需的速度规格。此外，我在未插入SD卡的情况下测试了相机。虽然在这种情况下无法录制，但即使只是在室内、阴凉处、温度约为20°C的环境下开机，相机在约15分钟后仍会明显发热。这似乎表明过热问题可能与SD卡无关。", "no": "5949", "date": 1776404983000, "retest": ""}}, {"record_id": "recvh1ItelusEW", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "content": "我最近买了一台Action Ca AKASO Brave4pro型号的相机。我买了一张256GB的SanDisk SD卡，读取速度170MB/s，写入速度90MB/s。当我把它插入相机时，显示“卡速度太慢”的信息。我注意到如果把分辨率降低到1080p 30fps，问题就解决了。是的，实际上问题只出在这张我刚买的卡上。", "no": "5950", "date": 1776406937000, "retest": ""}}, {"record_id": "recvh1WpPj491Q", "fields": {"status": "", "level": "", "category": "05-按键", "content": "买来一天，7 Pro中间上方的按钮就反应不良了，该怎么办才好呢？", "no": "5951", "date": 1776410258000, "retest": ""}}, {"record_id": "recvh1WKpMAJwY", "fields": {"status": "", "level": "", "category": "05-按键", "content": "抱歉。\n很久没启动后，购买的产品的↑按钮完全没有反应。\n该怎么办呢？", "no": "5952", "date": 1776410336000, "retest": ""}}, {"record_id": "recvh22iFAOqsH", "fields": {"status": "", "level": "", "category": "08-防水壳", "content": "您好，遗憾的是相机的防水外壳在第二次使用时不再防水，因此水进入了相机，导致相机损坏。这属于保修情况（购买日期为2025年2月27日）。我请求一个相应的解决方案（例如更换新设备）。", "no": "5953", "date": 1776411661000, "retest": ""}}]};

    if (res.ok) {
      const raw = await res.json();
      const { records=[], field_map={}, done_values=[], top_level='S', title='' } = raw;
      if (title) { document.title = title; document.getElementById('dashTitle').textContent = title; }
      const data  = analyze(records, field_map, done_values, top_level);
      const snaps = upsertSnap(data.date, { total:data.total, done:data.done, active:data.active, top:data.top });
      renderAll(data, snaps, top_level);
    }
  } catch(e) { console.warn('刷新失败', e); }
  btn.textContent = '↻ 刷新数据'; btn.classList.remove('loading');
}

initCharts();
loadFromLocalData();
</script>
</body>
</html>
