<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

: "recuzaBXNyQyaH", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "我测试了拍照功能，但我无法用内置麦克风录制声音。", "no": "1799", "date": 1736228528000, "retest": ""}}, {"record_id": "recuH6LK0afVIs", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "早上好！去年 9 月左右，我买了一台相机 Brave 4 Pro，准备和女朋友一起去旅行。我们去的时候一切都很顺利，直到我回头一看，所有的镜头都没有清晰的音频！那时再处理退货已经太晚了，我还有机会退货吗？", "no": "2543", "date": 1743500816000, "retest": ""}}, {"record_id": "recuKFuQRnNJTe", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "我购买的商品发出咔咔声，请问可以通过保修进行维修或更换吗？", "no": "2869", "date": 1746762360000, "retest": ""}}, {"record_id": "recuQSMXptbZ9Y", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "使用内置麦克风或阿克索（Akaso）外接麦克风录制的音频满是静电噪音，无法使用。我将阿克索麦克风连接到我的安卓手机上进行测试，音频没有静电噪音，完全可以使用。我认为相机的音频处理电路可能存在问题。\n\n你有什么建议可以改善相机的音频效果吗？我是应该换一台相机，还是把所有东西都退掉呢？\n\n祝好！ ", "no": "3392", "date": 1752455565000, "retest": ""}}, {"record_id": "recuSjsB39tGfy", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "因为存在内置麦克风完全无法正常工作的故障，所以我希望能更换商品。", "no": "3525", "date": 1753765806000, "retest": ""}}, {"record_id": "recuWaT4SG4vu8", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "你好，我打算用这款相机拍摄赛车活动。我今天对它进行了测试，视频质量很棒。遗憾的是，无论相机是放在防水壳里还是不使用防水壳，声音都非常差。有解决办法吗？否则，我只能把相机退掉了。 ", "no": "4188", "date": 1757303662000, "retest": ""}}, {"record_id": "recuZukoY2WgEw", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "我的 Brave 4 Pro 出现了问题。\n现在所有的视频片段突然都有嗡嗡声。\n我已经尝试更换存储卡，我的相机设置为使用外部麦克风，但我并没有外接麦克风，而且音量设置为静音。\n无论是否使用防水外壳，问题都存在。值得指出的是，这个问题是从本月（10 月）才开始出现的，而我从今年 6 月就开始使用 Brave 4 Pro 了。 ", "no": "4612", "date": 1760339323000, "retest": ""}}, {"record_id": "recv1cbTQkr4rU", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "我遇到的问题是在安静的房间里，音频音量非常低。在室外有背景噪音时，音频又非常失真。播放时需要将音量调低到2/100。正常播放时音量为40/100。", "no": "4785", "date": 1761903587000, "retest": ""}}, {"record_id": "recv6n2mTRf3i6", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "你好，我录制视频时声音几乎听不见。是不是有什么设置我没注意到？我在设置里选择了“内置麦克风”，声音快门和提示音设为“是”，音量也调到了最大。\n\n不，我还没有把视频传到电脑或手机上。\n\n我只是在相机上查看，现在听不见声音。\n\n我周三回家后会试着把视频传到电脑上，然后告诉你情况。\n\n你好，我刚把视频从我的Akaso Brave 4 Pro相机传到电脑上：声音非常好。我还下载了PotPlayer应用程序试用，确实可以提高声音的音量和清晰度。", "no": "5173", "date": 1766644520000, "retest": ""}}, {"record_id": "recvgb5tqnUuwp", "fields": {"status": "", "level": "", "category": "03-声音问题", "severity": "产品问题", "content": "大约两年前我买了一台Akaso Brave 4 Pro运动相机，并用它拍摄了很多视频。现在我发现，播放视频时的音质变得非常小。刚开始的时候不是这样的。在手册中只能找到关于相机保养的说明，但没有直接提高录音音量的方法。\n\n请问您能在这种情况下帮助我吗？\n\n尊敬的先生/女士，\n\n我拍摄时没有使用防水外壳，声音在笔记本电脑上可以听到，但非常小。在Akaso相机上播放视频时，我听不到声音。但这一直都是这样的。\n\n我会尝试您的建议，如果没有改善，我会再次联系您。", "no": "5877", "date": 1775629272000, "retest": ""}}, {"record_id": "recuzOOb3X59sN", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "无法从相机中取出SD卡", "no": "1862", "date": 1736822492000, "retest": ""}}, {"record_id": "recuDHobOR9HNL", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我们从亚马逊订购了一台相机。包装已经破损，当你摇晃相机时，你可以听到相机内部零件发出的嘎嘎声。它根本就打不开。一位专家说它100%有缺陷。我们是一个儿童组织，需要在 3 月 1 日之前收到此邮件。你能寄一份替换品吗？如果我们能尽快解决问题就好了，谢谢", "no": "2165", "date": 1740377397000, "retest": ""}}, {"record_id": "recuMz5q459gWw", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "插入主机的 microSD 卡取不出来，用一字螺丝刀按压也没有“咔哒”声，卡也无法完全取出。 ", "no": "3000", "date": 1748499907000, "retest": ""}}, {"record_id": "recuOl4dppTwY5", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "几天前我买了一台Akaso Brave 4 Pro相机，由于相机不单独售卖Micro SD卡，我就另外买了一张。是San Disk（闪迪）126GB、U3级别的卡，理论上和相机是兼容的。然而，当我插入Micro SD卡时，卡插不进去，没有插入时应有的咔哒声（此外，相机寄到时，左侧的保护盖就没有，就是那个应该用来盖住充电接口和Micro SD卡槽的保护盖）。我已经和亚马逊客服沟通过了，他们可以给我退款，但说实话，我想解决这个问题，不想再买到有缺陷的相机了。\n\n致以诚挚的问候。 ", "no": "3201", "date": 1750125017000, "retest": ""}}, {"record_id": "recv39ueHM6GMM", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我刚从亚马逊购买了一台Brave 4 Pro，现在电池盖那个小盖子已经坏了，我能订购一个替换部件吗？", "no": "4921", "date": 1763695894000, "retest": ""}}, {"record_id": "recuH6LK0aEKHc", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "抱歉，我花了点时间，最近很忙，但我设法拍了一张按钮卡住的照片，希望你也能看到，有时它卡在右侧，有时在顶部，无论哪种情况，它都会发生相同的情况，我无法停止录制或继续录制，直到按钮自己弹回，如果弹回的话。\n\n我真的很沮丧，因为现在它不再可靠，我真的希望继续使用它。在我们的退货窗口关闭后不久，它就无法按预期工作，这不是一个便宜的物品。", "no": "2546", "date": 1743500816000, "retest": ""}}, {"record_id": "recuNdP3QA1fwB", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "开/关或录制按钮不再正常工作。如果你按下它来关闭相机，通常会开始录制。只有运气好的时候才能得到你想要的结果。你可以通过以下链接查看视频：https://photos.google.com/share/AF1QipO-bZ734Ax1mqNTVmW4fe9Y0_TrIN9-ApFLIP-PKl7P3dvsnTOB9kBolWsve1GMog/photo/AF1QipNukdHK-3ZJoYMg8H0RnWONvVMCFMUq1YjxZF49?key=Q1NFQk80Um1EVmJsY0lNSE9jUTZtV0IzRHhONE9B", "no": "3107", "date": 1749101838000, "retest": ""}}, {"record_id": "recuUzeigQ1LsY", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "晚上好，我购买了一台AKASO Brave 4 Pro 4K 40米防水运动相机、2000万像素WiFi版170°广角双屏摄像机。使用一段时间后，侧面带有“M”的按键就失灵了，你们能怎么帮我解决这个问题呢？", "no": "3899", "date": 1755831084000, "retest": ""}}, {"record_id": "recuXNyw8tEn47", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "带有字母“M”的按键不再起作用了。\n因此，相机无法再使用。\n这个问题是突然出现的。在此之前没有发生过如撞击或掉落等特殊情况。\n请查看随附的问题视频。\n我进行了测试，可以确认，即使相机没有在录制，问题仍然存在。 ", "no": "4449", "date": 1758791171000, "retest": ""}}, {"record_id": "recvfjNBxMjlyK", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "你好，我这台收银机出了点问题，就是开机按钮有时好像卡住了，一直处于按下的状态，这样我就无法开机或关机。请问你们能解决吗？说实话，我非常喜欢这个产品！提前谢谢了！", "no": "5821", "date": 1774841868000, "retest": ""}}, {"record_id": "recvgmCmrzsCv4", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "嗨，我这台收银机有点问题，因为开机按钮有时候好像卡住了，一直处于被按下的状态，导致我没办法开机或关机。你们能处理吗？因为说实话我真的很喜欢这个产品！提前谢谢了！", "no": "5900", "date": 1775799650000, "retest": ""}}, {"record_id": "recukIXhZZzy7e", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "电池已充电，但显示电池故障", "no": "124", "date": 1722994013000, "retest": ""}}, {"record_id": "reculo7jtdgQiD", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "电池充电时间不能超过 6 分钟", "no": "229", "date": 1723602232000, "retest": ""}}, {"record_id": "recunneXlcTc9n", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "电池20分钟左右就没有余量了。两个一起\n为什么呢?\n充电专用充电机主机,充电也这样约后20至30分钟左右,红色余量🪫。", "no": "465", "date": 1725421543000, "retest": ""}}, {"record_id": "recuKFuR0rnarF", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "产品问题", "content": "将C型接口连接到相机机身进行充电时，机身发热到无法用手触碰的程度，相机机身和电池都变形了。\n即便从电源上断开连接后，机身仍然一直发烫，让人担心它随时会爆炸。家里还有小孩子，我非常不安，希望能尽快得到处理，这对我来说至关重要。 ", "no": "2871", "date": 1746762361000, "retest": ""}}, {"record_id": "recuQwwKIiTJAk", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "早上好，我刚买了AKASO Brave 4 Pro 4K运动相机……但是电池一下就没电了，我想知道怎样才能再买一块，谢谢。\n电话", "no": "3363", "date": 1752126623000, "retest": ""}}, {"record_id": "recuVDvH9e3bib", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我电池有问题，大约录制 10 分钟后，会出现“没电了”的字样，然后设备就关机了。", "no": "4102", "date": 1756810469000, "retest": ""}}, {"record_id": "recunj2lcejRqC", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "455", "date": 1725359431000, "retest": ""}}, {"record_id": "recuoNIXtUc0gH", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "Action 保护壳的塑料已损坏，无法将相机固定到位\n它不断脱落，因为它无法夹住并固定所附图片和购买证明\n我还想请求", "no": "576", "date": 1726729011000, "retest": ""}}, {"record_id": "recuqFln3po2Uv", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "734", "date": 1728437444000, "retest": ""}}, {"record_id": "recuqRCk85T416", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "对于H mount\n防水壳可以不松动地固定。\n但是对于H mount\n即使a.d.f卡口拧紧固定螺丝，\n因为插口不足，震动照相机睡着了。\n确认的地方，关于H零件果然是连接哪个零件都松的状况。\n唯一能固定的只有防水壳。", "no": "798", "date": 1728618800000, "retest": ""}}, {"record_id": "recuwqkBAWBnbn", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，下午好，我收到了相机，我真的很喜欢它，但因为它说它是运动相机，所以我把它放在摩托车的前窗上，它持续了好几天，但昨天当我来的时候。高速公路上相机支架坏了，因此我丢失了相机。我希望你给我一些选择，因为我失去了相机，因为你使用的磁带对你的相机广告没有用处。感谢您抽出时间（H支架）", "no": "1411", "date": 1733712414000, "retest": ""}}, {"record_id": "recuxaPES88xdp", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "1492", "date": 1734399526000, "retest": ""}}, {"record_id": "recuxgJqupMKK0", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "底座配件破损，框架不匹配", "no": "1508", "date": 1734486699000, "retest": ""}}, {"record_id": "recuyqO8co56Wd", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好，我对普通黑色材料外壳有疑问...事实证明，当我插入相机时，它无法关闭/锁定...我分享一张照片，以便您可以查看示例", "no": "1673", "date": 1735551716000, "retest": ""}}, {"record_id": "recuzOvWIC1x5P", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我刚收到订单，正在给电池充电。当我打开充电盒取出充满电的电池时，盒子上固定盒子的夹子坏了。我刚收到产品，现在充电盒关不上了。可以给我换一个吗？", "no": "1858", "date": 1736818147000, "retest": ""}}, {"record_id": "recuzOOb3X8QOv", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "所附照片所示，使用用途为博客。使用下颚式相机进行拍摄。\n这次购买的附属相机外壳安装在下颚支架上，如果安装了相机，就不会牢固地卡住。坠落的可能性很大。\n也有用绑带系紧的方法，但是会不美观。", "no": "1868", "date": 1736822492000, "retest": ""}}, {"record_id": "recuA6n3I6Jw8f", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "相机的一个配件有问题。顶部有扁平挂钩的盒状夹子无法固定相机；因此，相机很容易掉落。因此，我无法正确安装相机。", "no": "1895", "date": 1737082003000, "retest": ""}}, {"record_id": "recuC6gphvkC56", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "上个月16日购买了本商品，安装在自行车上使用，但是相机透明外壳的快门按钮的弹簧部分掉了。\n可以只更换或购买透明箱吗？", "no": "1972", "date": 1738912683000, "retest": ""}}, {"record_id": "recuC6gphvvSbE", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "用产品附带的双面胶贴在冲浪板上使用。今天，从附件部分取下来不见了。可惜我只用了两次。不甘心。明明很喜欢的。可以在保修期内再次发送吗？", "no": "1976", "date": 1738912683000, "retest": ""}}, {"record_id": "recuExv6FTWdlv", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "电池充电器灯不管试多少次都不亮，充电也不开始，该怎么办呢？", "no": "2271", "date": 1741147413000, "retest": ""}}, {"record_id": "recuIAkyWaiD5p", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "嗨。我希望你能帮我。如你所见，我从你们这里买了好几台相机和配件。不管怎样，骁途 4 专业版的框架（固定相机的那个）坏了。不是塑料防水外壳，而是配套的那个。就是固定相机的塑料框架。我马上要去河边下钓线了。但在把相机安装到船上之前，我没法用这相机。没有那个固定相机的框架，我就没法安装。我一直在找地方购买，但没找到。你能给我寄一个或者卖给我一个吗？求你了。非常感谢。你也能从中受益，因为我打算把我所有的钓鱼经历都发布到 YouTube 上，尤其是下钓线和钓到 80 多磅大头鲶鱼的过程。我真的很需要这个（框架）。请告诉我怎样才能弄到一个。 ", "no": "2677", "date": 1744853761000, "retest": ""}}, {"record_id": "recuIGcMSd6Wmm", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好！\n\n自行车支架在首次使用时就坏了。\n\n亚马逊提议给我退款，这样我就可以重新订购该产品，但现在它的价格贵了很多。\n\n您能给我补发一个支架吗？\n\n感谢您，\n\n塞利娜·迪雅尔丹", "no": "2700", "date": 1744940566000, "retest": ""}}, {"record_id": "recuN9nA77eEbC", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "车把安装座损坏了。", "no": "3074", "date": 1749036184000, "retest": ""}}, {"record_id": "recuOVbjqzgxsM", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "差点弄丢了一台价值100美元的相机，因为你们这种通用的夹式保护套无法妥善固定相机，而且问题不止出在这一个保护套上。\n\n所有的保护套都存在这个问题，这是设计缺陷，上夹无法妥善固定相机。\n\n更换一个保护套也解决不了问题，这是设计缺陷。要是我真把价值100美元的相机弄丢了，我可能再也不会和akaso公司打交道了。\n\n问题还不仅限于你们的支架，整个运动相机行业的通用支架都有这个问题，但你们却不打算解决，这才是关键所在。\n\n因为解决这个问题成本太高了。\n\n不管怎样，我只是想提醒你们注意这个缺陷。\n\n斯科特/西棕榈滩 ", "no": "3234", "date": 1750658656000, "retest": ""}}, {"record_id": "recuQUCyYoPK88", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你提供的内容本身就是中文，以下是翻译为英文的结果：\nThe base accessory of the helmet doesn't stick.", "no": "3406", "date": 1752482640000, "retest": ""}}, {"record_id": "recuSvA7DvkaRO", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "尊敬的女士们、先生们：\n\n我们为女儿购买了 Brave 4 Pro 相机。今天第一次在骑马外出时使用相机，我们发现相机的夹式支架固定不牢，因为相机无法卡入支架（见图片）。\n\n是我们操作有误吗？\n\n若能提供解决方案，我们将不胜感激。\n\n[图片:image1.jpeg]\n\n致以友好的问候，\n亚历山大·克劳斯", "no": "3599", "date": 1753944916000, "retest": ""}}, {"record_id": "recuSZRh0cQTqk", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "早上好，我遇到一个问题，有个配件无法固定，夹子会滑落，有掉落的风险。我已经拍了照片和视频。感谢您的支持。 ", "no": "3669", "date": 1754392293000, "retest": ""}}, {"record_id": "recuUjLi1RBpUx", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我相机上的支架有点弯了，所以相机固定得不牢固。", "no": "3862", "date": 1755602527000, "retest": ""}}, {"record_id": "recuWi56Q4I6R8", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "Akaso Brave 4 Pro - 充电座只有一个能用，另一个没电。\n\n致以最诚挚的问候", "no": "4222", "date": 1757409964000, "retest": ""}}, {"record_id": "recuWPhv5i6pcC", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "Brave 4 Pro 的保护套坏了，我查看了你们的网站，没看到有售卖这个保护套的，你能推荐一款合适的替换保护套吗？我问这个是因为我确实有另外两个（防水）保护套，但我们要连接一个外置移动电源，而防水保护套没法使用移动电源。 ", "no": "4286", "date": 1757900535000, "retest": ""}}, {"record_id": "recuX8U2kYABkt", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，这台相机刚送给我女儿，我们还没来得及全面测试，只是在检查配件时，我发现“夹子”配件有点变形，夹不住运动相机。实际上，我试着把相机装上，但它总是掉下来……这个配件无法固定住相机，我把相机放进去它就一直掉，就好像上面的夹子太松了，无法将相机固定在适当位置……而且上面的齿不能与相机接触，相机就会晃动，不稳定，然后就掉下来了。 ", "no": "4358", "date": 1758190470000, "retest": ""}}, {"record_id": "recuY59s1vifbk", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，我在亚马逊上购买了 Akaso 漂浮手柄，用于在水中使用相机，但在水中仅使用了 3 天，用于将相机固定在杆上的螺丝就生锈了。每次使用后，配件都会用淡水冲洗。 ", "no": "4499", "date": 1759051171000, "retest": ""}}, {"record_id": "recv1tCx5QdSQQ", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我最近从亚马逊购买了一台Akaso 4 Pro相机。随相机附带的一个配件无法正常使用，它叫做夹子。相机可以滑入其中以连接其他配件。夹子顶部有一个用于固定相机的卡舌。这个卡舌已经变形，无法防止相机滑落。我联系了亚马逊，他们说我需要退还整个相机，或者直接从Akaso购买这个夹子。我已经使用过相机了，不想重新打包所有东西进行退货。这个问题是否可以通过Akaso的 warranty 来解决？尽管亚马逊提出如果我从你们那里购买这个夹子可以给我20%的折扣，但我似乎不应该为此付费。", "no": "4790", "date": 1762161131000, "retest": ""}}, {"record_id": "recv2ZgTdexnYV", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "产品本身没问题，但我对相机的配件不满意。顶部和底部有螺纹的支架无法固定相机。如果需要，我可以提供一些照片。", "no": "4908", "date": 1763544949000, "retest": ""}}, {"record_id": "recv5CPvrKK1s3", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "假期使用过这款浮力手柄后，用于将手柄固定在防水外壳上的螺丝生锈了。\n\n附件中为您提供了必要的照片/资料。\n\n这是Akaso浮力手柄。它在海水中使用过3-4次，每次最多1小时，之后用淡水冲洗并擦干。\n\n我刚刚特意检查了我的Akaso Brave 4 Pro的水下外壳是否有锈迹，结果也发现了锈迹。这些金属部件难道不是不锈钢材质的吗？\n\n能否请您寄一个新的外壳给我？", "no": "5108", "date": 1765961743000, "retest": ""}}, {"record_id": "recv6bXDGG4RuY", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我们买了这个运动相机，用了没多久，相机壳和支架就生锈了。你们能怎么处理？", "no": "5159", "date": 1766480853000, "retest": ""}}, {"record_id": "recv6JqMrExCmP", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "关于这一点，一切似乎都很顺利，我的儿子通过复制阅读，对此也很满意。不过，我们遇到了框架夹子的问题：它的边框似乎“太开”“太宽”，导致相机无法安全地固定在夹子里。夹子其中一边的挂钩无法有效地钩住相机。请看我附上的图片。也许是夹子在包装盒中的存放方式有问题，导致其边框长时间处于过于张开的位置？", "no": "5200", "date": 1766975417000, "retest": ""}}, {"record_id": "recvapf4PsUxwg", "fields": {"status": "评估中", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我附上了几张相机夹在夹子上的照片。连接件太高了，只有一小部分与相机接合。我认为您提出的使用表带的建议会有效，但不太方便，因为我希望在使用时能轻松取下相机查看录像。我相信我的部件有缺陷，因为连接件的角度向上，所以想要更换，除非它本来就是设计成这种非常松动的配合。", "no": "5522", "date": 1770341633000, "retest": ""}}, {"record_id": "recuZz3U40tRid", "fields": {"status": "", "level": "", "category": "07-副屏", "severity": "产品问题", "content": "我的Brave 4的前置屏幕无法正常工作。在相机开启的状态下，长按模式/向上键时，主屏幕会熄灭，但前置屏幕不会亮起。再次按下模式键时，主屏幕会再次显示。 ", "no": "4623", "date": 1760409272000, "retest": ""}}, {"record_id": "recuZEyaujwYMw", "fields": {"status": "", "level": "", "category": "07-副屏", "severity": "产品问题", "content": "前屏幕上出现了一条“死”黑线。", "no": "4640", "date": 1760490367000, "retest": ""}}, {"record_id": "recukF9JzSmkVW", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "确实安装了防水垫子，在冲绳旅行中使用的时候，一次相机进水了，在当地不能使用了。", "no": "103", "date": 1722937874000, "retest": ""}}, {"record_id": "recumJHkqlSxeN", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我刚刚在马耳他浮潜和潜水。相机在水箱里。里面进水了，相机都湿了。现在就打不开了。发生了什么？为什么水箱里会进水？这也是对的。但即使没有它，相机防水也应该达到10米吧？我必须做什么？", "no": "395", "date": 1724837251000, "retest": ""}}, {"record_id": "recumNQ2YrG241", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我的 akaso Brave 4 Pro 相机的防水壳进水了", "no": "398", "date": 1724898435000, "retest": ""}}, {"record_id": "recuoU6DsHdLrR", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "买了照相机，安装了防水罩，在拍摄的时候，水进了，不能拍摄了。", "no": "617", "date": 1726823312000, "retest": ""}}, {"record_id": "recur8VYyymU86", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "女士们先生们\n\n很遗憾，我还没有联系到任何人。\n\n我通过亚马逊购买了这款相机。不幸的是，我只在度假时测试过它。水仍然通过附带的防水罩进入，从那时起相机就无法正常工作。\n\n这有可能吗？\n\n我仍然感兴趣。如果可能的话，可以将有缺陷的换成新的。\n\n致以最诚挚的问候\n\nSandra Hofstetter", "no": "819", "date": 1728874682000, "retest": ""}}, {"record_id": "recuu4aT1TObzJ", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "透明壳坏了，其他都还好。我应该退回整个包裹（相机、电池和配件）还是您愿意给我寄一个新的保护壳？", "no": "1154", "date": 1731552752000, "retest": ""}}, {"record_id": "recuu4h0tjxQcQ", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "仅仅尝试了两次浮潜后，防水壳的几个地方就开始生锈了。", "no": "1157", "date": 1731554211000, "retest": ""}}, {"record_id": "recuu4qQG2Y2Yi", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "：我的防水外壳在几次浮潜后已经生锈了。", "no": "1161", "date": 1731556557000, "retest": ""}}, {"record_id": "recuv6lonxyklz", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我用过一次，昨天拿出来时发现透明外壳生锈了，其中一节电池不能用了。", "no": "1279", "date": 1732500942000, "retest": ""}}, {"record_id": "recuvj77MC9Wrg", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我去圣托马斯浮潜，相机放在随附的密封盒里，但里面装满了水，现在无法使用。希望这能得到解决。谢谢 Ralph，315-569-1448", "no": "1304", "date": 1732689634000, "retest": ""}}, {"record_id": "recuAFIv8TK2hh", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我最近购买了产品 AKASO Brave 4 Pro Action Cam 4K。当我打开包装时，我注意到透明盒子的一个侧面按钮脱落了，它从盒子里出来了。该相机从未使用过：是否有备用零件？相机没有问题。谢谢，问候。", "no": "1933", "date": 1737604285000, "retest": ""}}, {"record_id": "recuD9cc0wcLQ6", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，我通过亚马逊订购了该商品\nAKASO Brave 4 Pro Action Cam 4K 40M 运行良好，但用于在水下拍摄视频的透明外壳已损坏，有一个部件断裂，可以换一个新的外壳吗？", "no": "2107", "date": 1739872141000, "retest": ""}}, {"record_id": "recuDoRDC7xjbU", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳漏水", "no": "2135", "date": 1740103663000, "retest": ""}}, {"record_id": "recuDGLwOIjo0n", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我还没有收到答复！由于防水壳不防水，我在浮潜时无法拍摄任何照片，相机可能因此受损！\n我们能做些什么？\nBRGD C. Lüth", "no": "2150", "date": 1740368182000, "retest": ""}}, {"record_id": "recuEEarpgKmnP", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "通过亚马逊购买您的相机后（亚马逊订单号 302-2668358-3142734），我们去马尔代夫浮潜。但外壳正面似乎存在技术问题，导致水渗入防水外壳和相机。\n\n因此，我们拍的所有照片都很糟糕，因为它们不清晰，镜头上有水汽。我想退回相机并要求全额退款，因为它无法正常工作，毁了很多美好的假期回忆。\n\n此致", "no": "2286", "date": 1741245923000, "retest": ""}}, {"record_id": "recuHQ0FDOKAMi", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我在亚马逊上买了相机。潜水时，水下外壳会进水。我该如何解决？", "no": "2608", "date": 1744169309000, "retest": ""}}, {"record_id": "recuMgE3tzh0o2", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水从水下观测室的玻璃处漏了进来。", "no": "2966", "date": 1748227411000, "retest": ""}}, {"record_id": "recuMnUhWUmn4Z", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，我之前做了一个防水测试，结果显示没问题，但很遗憾，测试结果不准确。我进行了多次不超过15米深度的潜水，但大约10到15分钟后，相机就进水了。我会发送相机现状的照片。我要求更换相机。", "no": "2988", "date": 1748334714000, "retest": ""}}, {"record_id": "recuQTdy2rA7n1", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我写信是想告知你，我Brave4 Pro设备的防水壳开始漏水了。尽管我从未摔过该设备，但防水壳的镜头区域还是出现了一道裂缝。\n你能帮我解决这个问题吗？", "no": "3394", "date": 1752461902000, "retest": ""}}, {"record_id": "recuTIrbplpTqK", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "关于我购买的商品——AKASO Brave 4 Pro 4K 40M运动相机，配备64GB U3存储卡、2000万像素、WiFi功能、170°广角、双屏幕、EIS防抖、触摸屏、5倍变焦，订单号为408 - 4278998 - 4713950，我希望获得售后帮助。因为水下保护壳在使用时漏水了。幸运的是，我及时发现，运动相机没有受到损坏。我可以换一个新的水下保护壳吗？ ", "no": "3750", "date": 1755051011000, "retest": ""}}, {"record_id": "recuTPCQgs1D9k", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好！\n\n遗憾的是，水下外壳不密封！\n1. 水下使用——最大深度：仅 7（！）米——相机进水了！\n可以排除是水下外壳的密封系统操作失误导致的问题。\n我无法判断相机是否受损，目前它似乎还能正常使用——问题只是能正常使用多久……\n\n我请求您提供一个解决方案。\n\n谢谢！ ", "no": "3779", "date": 1755157223000, "retest": ""}}, {"record_id": "recuUA5Iq9hUGz", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "前几天刚买的 brave4 pro 放进防水壳后入水，结果水进去了，相机也无法正常工作了。 ", "no": "3917", "date": 1755843816000, "retest": ""}}, {"record_id": "recuUQUh1YSrGA", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，在第二次在海里使用后，水进入了设备，不幸的是，我丢失了所有现存的文件。", "no": "3931", "date": 1756092287000, "retest": ""}}, {"record_id": "recuURR6SPNj1x", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我写信是想咨询一下我的Akaso Brave 4 Pro相机的问题。很不幸，我在泳池使用这款相机时，水进入了相机内部。\n\n检查防水外壳后，我发现外壳上的一颗螺丝不见了，这似乎是导致漏水的原因。这已经是我买的第二台Brave 4 Pro相机了，我真的很喜欢你家的产品。\n\n你能给我一些建议，接下来我该怎么做吗？非常感谢你的指导。\n\n按照建议，我把相机晾了好几天。但不幸的是，相机仍然无法开机。\n\n我已经附上了展示问题的视频。\n\n为了这次假期，我临时买了另一款相机，但它不如AKASO Brave 4 Pro合适，尤其是对于我几乎每天都会进行的山地自行车骑行和摩托车旅行来说。 ", "no": "3945", "date": 1756106309000, "retest": ""}}, {"record_id": "recuV2rSDvvL6S", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机及配件现在就已经开始腐蚀了，尽管相机和配件在每次潜水后都直接进行了清洁和干燥处理。因此，该设备不适合用于频繁潜水。我请求更换一台能用于频繁潜水的设备。 ", "no": "3985", "date": 1756262836000, "retest": ""}}, {"record_id": "recuXurUS76zTS", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "产品的防水外壳损坏了，因为第一次浸水时水进入了，弄湿了摄像头，现在摄像头再也打不开了。", "no": "4390", "date": 1758508847000, "retest": ""}}, {"record_id": "recuZhkCmjAthS", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，如我之前所说，在将相机放在水中使用后，尽管它被完美地密封在保护套里，但很不幸，水还是进入了相机内部。从那以后，即使我按照你们指示的步骤操作，相机也不再工作了。\n\n随信附上一段视频，展示了即便按下开机键，相机也无法启动的情况。\n\n感谢你们的配合，期待你们的回复。\n\n祝你们有美好的一天。 ", "no": "4570", "date": 1760147282000, "retest": ""}}, {"record_id": "recuZKzf2hGKJB", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，正如之前所说，在水下使用相机后，我已将其妥善关闭在保护壳内，但不幸的是内部还是进水了。从那以后，尽管我按照你们指示的步骤操作，相机还是无法正常工作。\n\n附件中我发送了一段视频，展示了相机即使按下开机键也无法开机的情况。\n\n感谢您的帮助，期待您的回复。祝您度过愉快的一天。", "no": "4661", "date": 1760579281000, "retest": ""}}, {"record_id": "recv0llIbUguSU", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "在浮潜时，防水壳进水了0.5毫米。水进入了保护壳。我总是能用热手机把它弄干，尽管一开始它不响应操作，后来就稳定下来并能正常工作了。我担心这些海水渗漏可能已经损坏或将会损坏触点。水可能不是从密封圈进入的，而是在我拍照或切换功能时从三个按键进入的。", "no": "4698", "date": 1761122779000, "retest": ""}}, {"record_id": "recv3b2ohhM9sq", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我今年9月30日在亚马逊上买了这台相机，专门为了去浮潜时拍些好照片。现在我正在度假，使用了防水壳，但水进入了壳内，相机开始起雾，没法拍出好照片。我试着把所有东西都擦干，但每次去浮潜时都会发生这种情况。", "no": "4949", "date": 1763718812000, "retest": ""}}, {"record_id": "recvf36gQEUqun", "fields": {"status": "待确认", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在亚马逊购买了一台Akaso Brave 4 PRO，第一次使用就进水了，现在无法使用。我怎样才能退货并换一台新的，或者补差价换Brave 7？是的，当时使用了防水壳。是在海里（咸水）5米深的地方使用的。设备无法开机。在防水壳内部发现了水滴。现附上用该Akaso相机拍摄的视频，视频中可以看到水的阴影。", "no": "5807", "date": 1774595119000, "retest": ""}}, {"record_id": "recvgg54ZjM16Y", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "你好，亲爱的卖家，我使用了一次水下相机及配套的防水壳，遗憾的是相机进水了（防护是漏水的）。它是在浮潜时使用的，水深最多3米。现在相机已经湿透，无法使用（损坏），无法开机。请退还我的购买款项，因为我目前认为，即使是新的相机和防水壳也无法承受水下使用。提前感谢。顺祝商祺 B. Greifenberg", "no": "5891", "date": 1775703061000, "retest": ""}}, {"record_id": "recuv6lmKhtgHf", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我从亚马逊购买了 Akaso Pro 相机。当我使用它时，它会冻结，不允许我继续录音，必须卸下并更换电池才能重新启动。另外，支架生锈了", "no": "1272", "date": 1732500935000, "retest": ""}}, {"record_id": "recuvRosZ6v5xs", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "拍摄途中死机，不管做什么画面都不会动，电源无法关闭", "no": "1342", "date": 1733196162000, "retest": ""}}, {"record_id": "recuyq4tawZlpG", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "相机冻结，要重新开始工作，我必须取出电池并重新安装。此外，透明和氧化的外壳门销。", "no": "1662", "date": 1735540834000, "retest": ""}}, {"record_id": "recuIAHwFWdqXb", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "这台相机只用了一次，就卡了好几次，甚至都无法关机。要解锁它，我必须取出电池。我该怎么解决这个问题？谢谢。\n\n相机在录像模式下会卡住。它不再录制，但屏幕会定格。从那时起，就无法再操作按键了，只能通过取出电池来解锁（但在水下这是不可能的）。 ", "no": "2685", "date": 1744859233000, "retest": ""}}, {"record_id": "recuJlnocv9uVP", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "设备一直卡顿，应用界面没有图像显示，我不得不取出勇敢者（设备名，这里推测Brave是某款设备）的电池来重置它。是否有固件更新呢？我的设备型号是AX - 230424V1。", "no": "2779", "date": 1745548922000, "retest": ""}}, {"record_id": "recuSjsB39uw7i", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我购买的商品在使用过程中会出现死机的情况，甚至无法关机。另外，我安装了 iPhone 应用程序并连接设备，想要查看拍摄的视频，但 Wi-Fi 连接不稳定，很快就会断开，因此无法查看视频。我认为这是一件有质量问题的商品，希望能进行换货。 ", "no": "3533", "date": 1753765806000, "retest": ""}}, {"record_id": "recuVDaeHpTlGb", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "由于原始文本已经是中文，推测可能是需要翻译为英文，翻译结果为：System crash (Refurbished machine)", "no": "4092", "date": 1756805354000, "retest": ""}}, {"record_id": "recuX2rD5bNj3e", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "WiFi 有问题，当它连接到手机时，相机就会卡住，我必须强制重启才能让它重新启动。\n我换了卡，进行了重置并重新开机。屏幕上会显示“Akaso”字样，还会发出声音。但问题仍然存在。 ", "no": "4336", "date": 1758095042000, "retest": ""}}, {"record_id": "recv89t0sB7XZM", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "打开电源后屏幕就卡住了，无法操作。也无法关闭电源。", "no": "5326", "date": 1768276266000, "retest": ""}}, {"record_id": "recutSCFECXA1g", "fields": {"status": "待确认", "level": "S", "category": "18-死机，12-开关机问题", "severity": "产品问题", "content": "•SD卡无法卡在卡槽\n•拍摄时会突然死机，按任何按钮都没有反应\n•拍摄时会突然断电，拍摄的视频无法保存\n上述事件频繁发生。", "no": "1128", "date": 1731382058000, "retest": ""}}, {"record_id": "recuurCzZ1aZig", "fields": {"status": "", "level": "", "category": "18-死机，11-APP问题", "severity": "产品问题", "content": "我的 Brave 4 Pro 相机有问题。它是通过亚马逊购买的。\n\n这里存在以下问题：\n\n- 相机在操作过程中冻结，只有取出电池才有帮助\n\n- 无论 Android/ios 版本如何，通过智能手机进行的同步效果都很差\n\n你怎么能在这里给我提供支持，这个相机很难用。\n\n此致\n亚历山大·简", "no": "1205", "date": 1731899208000, "retest": ""}}, {"record_id": "recv2MXWXYcdNO", "fields": {"status": "", "level": "", "category": "11-APP问题，18-死机", "severity": "APP问题", "content": "我的Akaso相机在连接应用程序时会停止工作。我可以下载几张照片，但之后连接就中断了，相机也无法使用。我无法关机或使用任何按钮，屏幕一片漆黑，没有任何反应。几乎每次尝试连接时都会发生这种情况。我已经尝试过更新相机，卸载并重新下载应用程序，但都没有用。我该怎么办？", "no": "4898", "date": 1763363120000, "retest": ""}}, {"record_id": "recutdeEspU1g2", "fields": {"status": "待确认", "level": "S", "category": "18-死机，发热问题", "severity": "产品问题", "content": "我于 2024 年 7 月 11 日通过 Amazon.de 从您那里购买了 AKASO Brave 4 Pro Action Cam。遗憾的是，在水下使用时（在附带的保护壳内），多次出现相机过热、屏幕冻结的情况，导致相机无法使用，也无法继续拍照。只有在干燥时取出电池才能解决这个问题。\n由于在水下使用是购买的主要原因，我现在最多要求退货或更换。", "no": "1032", "date": 1730770504000, "retest": ""}}, {"record_id": "recuAuuTKImEVh", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "给附带的1350ah大容量电池充电，在相机画面的标记中，不是满充电的标记，而是看起来80%左右的标记。在手机画面上查的话，1 ~ 2秒后从100%变成60%。即使充满电，手机屏幕上也只显示60%。拍摄时间不长，很快就没电了，以前使用的1050ah可以拍摄更长时间。", "no": "1919", "date": 1737438503000, "retest": ""}}, {"record_id": "reculYNzi13Pf8", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "关于时间设定的事。\n即使设定为现在的日期，过了一段时间，不知为何就会变成2023年1月1日。\n\n我试了几次，先关掉电源，过一两个小时再开机确认，结果又回到了2023-1-1。\n\n顺便说一下，不是电池没电了。\n不知为何，只有时间设定在2023年。\n\n我试着重置主机，也试过重新格式，设定了时间，但还是回到了2023-1-1。", "no": "291", "date": 1724144251000, "retest": ""}}, {"record_id": "recutSCFECpV8H", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "在没插入电池，使用usb电源变更画质模式的过程中（1080p120，防抖关闭），将usb电源拔出了，导致再也无法变更画质模式。\n如果能更新固件的话，能给我固件和操作说明吗？", "no": "1127", "date": 1731382058000, "retest": ""}}, {"record_id": "recuyvbt00uRLa", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "配件问题", "content": "拍摄的文件不会按顺序排序，是乱序的", "no": "1689", "date": 1735616383000, "retest": ""}}, {"record_id": "recuHEZ3WK0QO6", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "你好，\n\n不幸的是，经过一段时间后，相机总会丢失日期和时间，必须重置，即使电池没有更换或已耗尽。\n\n我该怎么做才能确保相机始终保留日期和时间？", "no": "2564", "date": 1744006386000, "retest": ""}}, {"record_id": "recuTIPrHQsWgW", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "在我看来，如果在低光照环境下图像的感光度（ISO）从未自动提升到 3200 或 1600，那么你们相机的自动 ISO 功能就毫无意义。\n我们有一款便宜的谷歌应用商店的 ISO 元数据读取器。无论图像有多暗，ISO 都不会自动提升到 800、1600 或 3200。\n仔细想想，自动 ISO 功能应该在黑暗环境中自动将 ISO 提升到 1600 或 3200，你不认同吗？然而，无论光照条件如何，自动 ISO 始终保持不变。\n说实话，我希望能和你们的工程师探讨一下下次固件升级的问题。在黑暗条件下，自动 ISO 应该设置为 1600 或 3200，没有例外。在几乎漆黑的环境中，自动 ISO 没有理由一直停留在 100、200 或 400。我想说的重点是，这根本算不上自动 ISO。\nAKA 4 Pro 相机在设置为自动 ISO 模式时表现不正常。此外，固件记录的版权日期还是多年前的旧日期。\nAKA 应该开发自己的软件，向普通用户提供元数据信息。\n为了帮助技术团队诊断问题，很简单，将任何 AKA 4 Pro 相机设置为自动模式，在完全黑暗的环境中拍照，然后检查 ISO 记录。看看你们公司的元数据软件中自动 ISO 的记录是多少。你还会看到版权日期是多年前的，而不是 2025 年。 ", "no": "3755", "date": 1755056793000, "retest": ""}}, {"record_id": "recuTOdjdhJ8Qx", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "用户体验问题", "content": "我无法从 Bravo Pro 4 全选照片并下载到 iPhone 上。右上角用于进行全选操作的三个点图标不见了。\n\n我无法通过应用程序将照片从 Bravo 4 Pro 下载到 iPhone 上。右上角的“编辑”图标不见了，我只能一张一张地下载。我需要能够一次性选择多张照片。应用程序已是最新版本。 ", "no": "3775", "date": 1755136361000, "retest": ""}}, {"record_id": "recuWzDrpI9E8e", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "当然，我给您附上信息的照片。\n\n摄像头实际上是能正常使用的，它可以拍照和录制视频。不过，就像我在上一个视频中给您展示的那样，在拍摄过程中看不到正在拍摄的内容。此外，我还注意到它无法再通过 Wi-Fi 连接了。现附上相关视频。 ", "no": "4283", "date": 1757669342000, "retest": ""}}, {"record_id": "recuZuaskSJnxy", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "很抱歉总是问些琐碎的事情。关于Brave4 Pro，最近我查看数据时发现，实际录制的时间和数据显示的时间有30 - 60分钟的延迟，这是为什么呢？使用前我已经和手机进行了同步和时间校准。我把它当作摩托博客相机来使用。", "no": "4599", "date": 1760336955000, "retest": ""}}, {"record_id": "recv1zlJWa7TIV", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "你好，上周我通过亚马逊购买了Brave 4 Pro，但其前置屏幕无法正常工作。屏幕会闪烁10-20秒，然后停在错误的画面位置。由于前置屏幕的这种故障，我无法使用该相机。附件中是问题的视频。\n好的，我们重新安装了固件，目前情况良好，问题似乎已解决。如果问题再次出现，我们会再次联系您。非常感谢您的帮助。\n您好，很抱歉通知您，今天Brave 4 Pro的问题再次出现。请告知我该如何处理。", "no": "4795", "date": 1762245789000, "retest": ""}}, {"record_id": "recv2YGVUgiFaJ", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "相机不显示固件版本，而且每次日期都会重置。我恳请提供最新的固件更新和安装说明。我已经重置了相机并将其连接到手机，日期更新正确，但第二天日期又恢复到2023年1月1日。", "no": "4906", "date": 1763536380000, "retest": ""}}, {"record_id": "recvg9Zp56rtJa", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "之前我对这台相机一直很满意。最近菜单总是篡改所有设置。我已经尝试了各种方法，甚至恢复了出厂设置，但故障仍然存在。您能帮我吗？它还在保修期内。顺致友好的问候 斯特凡", "no": "5871", "date": 1775613050000, "retest": ""}}, {"record_id": "recurPtvVeM2UX", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "前几天在摩托车上用作为行车记录仪使用了。从开始后1小时左右就没有继续录制了。有接近30分钟的视频录制时报，回家的路只有1小时左右被录像，剩下的只有一片漆黑。\n电源使用的是摩托车的配件用的电源。\n我认为作为行车记录器使用时，录像不能中断。\n\n使用时的设置:\n分辨率2k/外置电源/摩托车驱动/防抖/循环录制/SD卡128GB", "no": "892", "date": 1729503281000, "retest": ""}}, {"record_id": "recuvRosZ600xg", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "现在发生了问题。\n数据几个月没有保存\nSD卡显示还有空间\n录制时也会发出声音，显示红色开始录制\n拍照时也会发出声音\n\n想把数据转移到电脑上，但是今天拍的照片没有了。\n追溯起来，几个月左右的录像、照片都没有了，这种状态是什么呢？\n它是否完好地保存在某个地方？", "no": "1345", "date": 1733196162000, "retest": ""}}, {"record_id": "recuzaBXNyAARN", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "拍摄的录像文件的顺序乱七八糟。", "no": "1800", "date": 1736228528000, "retest": ""}}, {"record_id": "recuJyQ9rR9ngi", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "最近潜水时录像功能停止工作了。\n录制过程中的屏幕显示的录制时间显示在正常录制。\n但MicroSD卡上没有记录，被记录下来的只有静止画面（一张照片）\n因为有这样的症状，所以请修理。", "no": "2811", "date": 1745747870000, "retest": ""}}, {"record_id": "recuLldUTygPDd", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "哪怕只是轻微冲击，也会导致断电，无法进行录制。", "no": "2920", "date": 1747378930000, "retest": ""}}, {"record_id": "recuZGyaFuP88v", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "我有一台你们的Brave 4 Pro，我注意到我的视频存在一个严重问题。当我外出进行摩托车旅行时，我将相机设置为拍摄长视频，但我发现更换电池后，后续的视频无法被所有类型的视频播放器识别。屏幕上会出现这样的提示：“无法打开文件。文件格式不受支持或已损坏。” 但除了更换电池外，其他任何设置都没有改变。\n\n您好，我已经尝试过用VLC和其他特定程序进行修复，但都没有成功。我会检查一下存储卡，它是一张128GB的U3卡，但这不应该解释为什么更换电池后，在没有修改任何设置的情况下，后续的视频会损坏。固件版本是SN-AX-231012V2。", "no": "4657", "date": 1760519920000, "retest": ""}}, {"record_id": "recv1KyXV4FcF0", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "昨天我收到了你们安排更换的AKASO Brave 4 Pro。感谢你们出色的服务。不幸的是，问题仍然存在！现在所有视频片段突然都有嗡嗡声。在等待更换期间，为了方便我在脸书上的日常发帖，我一直在使用我妻子的运动相机，一款SJCAM 4000 wifi。使用更换的AKASO Brave 4 Pro拍摄的视频，都是使用防水壳拍摄的，并且都设置了静音。", "no": "4810", "date": 1762411480000, "retest": ""}}, {"record_id": "recvc7zeF5XkAo", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "我的相机出了些问题：有些视频和照片损坏了。我想知道固件更新是否能修复与文件损坏相关的问题。\n\n有些图片和视频在相机上显示损坏（实际上，尝试读取这些文件时相机会死机，必须取出电池才能关机），在电脑上也是如此。这张SD卡不常使用，而且是主要品牌之一（Lexar UHS-I 64GB）。", "no": "5601", "date": 1771912728000, "retest": ""}}, {"record_id": "recuuPOkcP8JPB", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "2023年8月在亚马逊购买并使用Brave 4 Pro。使用它拍摄没有问题，我非常满意。但是即使没有更换电池，日期和时间设置也会初始化。", "no": "1259", "date": 1732256639000, "retest": ""}}, {"record_id": "recuNXSU4Z3uNX", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "无法将拍摄的内容导入到电脑中。\n即使将MacBook Air和相机连接，电脑上也什么都不显示。\n从iPhone读取文件时，一次只能读取一个文件，读取3分钟的文件就需要3分钟，因此读取1小时的文件耗时太长。 ", "no": "3175", "date": 1749782465000, "retest": ""}}, {"record_id": "recuVxj3mnXvQ8", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "我的Akaso Brave 4 Pro相机缺少一些配件。我最需要的是旋转球头。（我觉得我收到的这台相机可能是被退回过的，有些包装袋已经是打开的了。）\n\n直到今天（2025年8月31日）我才腾出时间来安装这台相机，所以现在退货已经太晚了。我也不想退货，我想能够正常使用它，但旋转球头对我来说至关重要。有办法买到这个配件吗？\n\n非常感谢您抽出时间回复我。我之前看了很多在线视频来了解所有配件，我原以为球头万向节支架是包含在内的。（我正在想办法把这台相机作为行车记录仪使用。我已经弄清楚如何用我平时给普通相机用的迷你三脚架来实现这一点了。）\n\n您下面列出的所有配件我都有，但我完全搞不清楚如何把它们组装在一起。如果退货期限还没过去，我可能就把相机退了。网上有很多视频详细介绍了如何组装其中一些配件，但看起来实在是太复杂了。我也下载了用户手册，但是……我已经筋疲力尽了！\n\n配件这么多，但要把它们正确连接起来却似乎非常复杂！\n\n关于在驾驶模式下使用相机，我有个问题：\n\n我启动汽车时，相机会开机并开始录制。（我把相机连接到了汽车的USB接口上。）当我关闭汽车时，相机仍会继续运行。我每次下车都得记得手动关闭相机或者拔掉插头。我猜这是因为即使汽车熄火了，车辆仍在供电，对吗？ ", "no": "4065", "date": 1756718798000, "retest": ""}}, {"record_id": "recuY57ul7y4O3", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "", "content": "在一次摩托车骑行过程中，相机因被碎石击中而损坏。撞击程度很轻微，但图像有些模糊。是否可以付费维修或更换相机？", "no": "4498", "date": 1759050703000, "retest": ""}}, {"record_id": "recultYunMfSIr", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "这台相机是送给我孙子的礼物，但最近才从盒子里取出进行设置。我们无法设置它 - 屏幕一片空白。故障排除无法解决问题。请用可正常工作的设备更换相机或退款。", "no": "240", "date": 1723688787000, "retest": ""}}, {"record_id": "reculSojzgZUt2", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我于2024年3月在亚马逊上买了Brave 4 pro。\n到现在为止一直没有问题地工作着，但是今天电源突然不启动了。\n电池充满电了。外部电源也不能启动。", "no": "269", "date": 1724049574000, "retest": ""}}, {"record_id": "recunj2GrNtiuz", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的 brave 4 pro 相机无法开机，我已经尝试取出 SD 卡和电池，插入电源线并保持 3 秒钟，用了 3 根不同的线。它无法开机。", "no": "456", "date": 1725359513000, "retest": ""}}, {"record_id": "recupa1kEq6cuw", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "即使放入充电的电池，电源也打不开。\n从购买初期开始就出现了电源不接通等不良情况。", "no": "649", "date": 1727058469000, "retest": ""}}, {"record_id": "recurPtvVemiOU", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "按下开机按钮也无法开机。", "no": "890", "date": 1729503281000, "retest": ""}}, {"record_id": "recuwBJLY4GP6F", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "配件问题", "content": "您好，我经常使用 Brave 4 Pro，总体来说它很棒。我很失望，因为最近我去旅行，像往常一样，带着相机记录我的潜水过程。潜水前一天，我给它充了电，用起来很好。我早上醒来，不知什么原因它无法开机。它充电正常，但无法开机。几乎就像电源按钮出问题了，但我不明白为什么，因为从我使用它到第二天早上醒来，一夜之间什么都没有改变。我注册了我的产品保修，我需要修理它，因为它似乎有缺陷。从物理上讲，它仍然完好无损，从机械上讲，其他一切都正常。它始终放在保护壳里。", "no": "1427", "date": 1733880951000, "retest": ""}}, {"record_id": "recuyHPzyRPst9", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法开机。感谢您快速帮助我解答疑问。设备出现故障令人失望，但我理解这种情况的发生。不幸的是，这是一份圣诞礼物，我们没有足够的时间退货并等待您建议的更换。因此，我们将不得不订购另一个以便快速交货，并退回有故障的设备以获得亚马逊退货退款。\n\n问候，", "no": "1721", "date": 1735803257000, "retest": ""}}, {"record_id": "recuzfPozMdm7h", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，很遗憾，运动相机无法工作，无法启动，电池已充满", "no": "1812", "date": 1736305611000, "retest": ""}}, {"record_id": "recuzOOb3XCY04", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "买了一个月后就无法开机了。两个电池都充满电试过了，但没有反应。", "no": "1866", "date": 1736822492000, "retest": ""}}, {"record_id": "recuDNUkSf0H2q", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "BRAVE 4 PRO 相机25年1月27日交货。它运行了一天作为测试。假期期间它没有开机。尝试了电池充电和直接充电。相机无法启动。我想退货因为它不能用。", "no": "2196", "date": 1740473715000, "retest": ""}}, {"record_id": "recuIuRRAPM2nS", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的相机不能用了。它再也开不了机了。电池是充满电的。\n这些都不管用。我已经试过所有方法了。", "no": "2674", "date": 1744773039000, "retest": ""}}, {"record_id": "recuIYchNm6WsZ", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法开机。", "no": "2714", "date": 1745206421000, "retest": ""}}, {"record_id": "recuJyQ9rRAwKW", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "买了半年就无法开机了。怎么办才好？", "no": "2804", "date": 1745747870000, "retest": ""}}, {"record_id": "recuNdqUhfHVjv", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我使用的运动相机“AKASO Brave 4 Pro”出问题了，它再也打不开了。我按照你们支持网站上的说明操作了，但没有用。", "no": "3106", "date": 1749096081000, "retest": ""}}, {"record_id": "recuODNwuBfvuN", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "使用Type-C电缆连接时无法开机；使用锂电池则可以开机。", "no": "3228", "date": 1750401789000, "retest": ""}}, {"record_id": "recuRPzNYamIuc", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好，我从未将它用于水下拍摄。我按照要求尝试使用了两个不同的电源，但它再也无法开机了。奇怪的是，即便使用两块都已充满电的电池，它也毫无反应。我该怎么办呢？我花了120欧元买这台相机，它的质量让我非常失望。 ", "no": "3472", "date": 1753324234000, "retest": ""}}, {"record_id": "recuUc9ywiEZN7", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "早上好，索菲。不，相机没有在水下使用过。我一到就试着开机了，但没有在水中使用。按照你们的建议，用一个5V 2A的适配器进行测试，情况没有任何改变。", "no": "3826", "date": 1755490099000, "retest": ""}}, {"record_id": "recuXC5wFRnZoU", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我这次度假是第一次使用这台相机。不幸的是，使用了两次之后它就再也打不开了。我尝试了所有办法。两块电池都充满了电，但还是毫无反应。我取出了电池和存储卡，只插着充电线尝试开机，可惜也不行。这真的很让人恼火，因为这种情况发生在潜水度假期间。 ", "no": "4425", "date": 1758621722000, "retest": ""}}, {"record_id": "recuY9vqkTJ4lt", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "无法开机启动Akaso Brave 4 Pro相机。\n即使按下设备也无法进行录制，而且系统似乎不稳定。\n仍然无法正常使用，正如视频所示，相机屏幕显示黑屏。我们可以获得新的软件吗？或者我们可以采取什么解决办法？", "no": "4504", "date": 1759115513000, "retest": ""}}, {"record_id": "recuZKDjCYnzqc", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我买的运动相机只用了3次就开不了机了，我试过更换和给电池充电，但问题仍然存在。可以退款或者更换吗？", "no": "4664", "date": 1760580252000, "retest": ""}}, {"record_id": "recv15FS1gEl5v", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的Brave 4 Pro无法开机了。我尝试在不装电池和存储卡的情况下连接相机，红色指示灯闪烁但无法开机。致敬。", "no": "4760", "date": 1761807295000, "retest": ""}}, {"record_id": "recv3aTIHkKSnE", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我最近买了这个相机，只用过一次。今天我想导出视频时，无论用哪块电池还是插上电源，相机都无法开机。它没有在水下使用过，只用过一次，装在保护壳里挂在我的外套上。我尝试了所有建议的故障排除方法，但都没有成功。", "no": "4947", "date": 1763716744000, "retest": ""}}, {"record_id": "recv4ukObCEbgH", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "关于2023年7月左右，朋友作为礼物送给我的Brave4PRO，我有一些问题想咨询。\n\n今天，我在连接电源 cable 的状态下让它处于开机状态，后来发现它已经关机了，于是我按电源键开机。\n\n之后它又关机了，所以我再次尝试按电源键开机，结果在开机时显示出AKASO的画面后，没有启动就关机了，之后就完全无法开机了。\n\n目前，连接电源 cable 时，充电的红色指示灯会亮起，但除此之外完全没有反应。\n\n以下是我尝试过的操作：\n・我也尝试长按电源键30秒左右，但无法开机\n・我怀疑是电池的问题，于是更换了充满电的电池，但还是无法开机\n・拔出并重新插入microSD卡后，按电源键也无法开机\n\n在这种情况下，是否有强制开机的方法，比如长按电源键，或者长按Menu键和电源键，或者机身的重置方法呢？\n\n另外，如果需要送修的话，是否可以提供维修费用的估算？\n\n麻烦您确认一下，谢谢。", "no": "5044", "date": 1764920084000, "retest": ""}}, {"record_id": "recv6rRnPhQYCe", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "早上好，我刚第一次使用我的Brave Pro 4。阅读完说明书后，我在家做了一些测试。不幸的是，没过多久相机就不再响应了，甚至无法关机。", "no": "5181", "date": 1766715784000, "retest": ""}}, {"record_id": "recv6sYmFSX8QE", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我已经给电池充电了，相机只开了一次机，之后就再也打不开了，我刚买的相机。", "no": "5192", "date": 1766732224000, "retest": ""}}, {"record_id": "recuuryRbZNb2c", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "早上好\n\n不幸的是，图像质量非常低，所以我不得不通过亚马逊退货。现在他们告诉我退货有问题。你能帮助我并告诉我这个问题是什么吗？", "no": "1200", "date": 1731898321000, "retest": ""}}, {"record_id": "recuzUROmckVCB", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "质量不够\n您好，这显然是有影响的，因为即使在最大分辨率下，质量也远远不能满足我开展视频项目的要求，我理想情况下希望拥有相同型号或同等型号，但没有缺陷。因为我清楚地认为它有缺陷在这一点上。\n\n几位熟人向我推荐了你们的品牌，我看到的效果明显更好，与我订购的型号的效果相当。类似的型号，甚至低于 EK7000 的型号，效果都比我收到的要好。所以我来这里我对你们的品牌没有太多怀疑，我决定给我儿子买 Brave 4 Pro，并想买几款你们品牌的其他型号来替换我的旧设备。所以我怀疑你们的产品，我儿子最终买了一份无法使用的生日礼物。\n\n\n\n真挚地", "no": "1893", "date": 1736912016000, "retest": ""}}, {"record_id": "recuCycQWOKbAp", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "它不是描述的 4K，而且无法在 iPhone 上下载视频\n附件是用相机拍摄的三张照片，您可以从亚马逊的描述中看到分辨率不如您所希望的那么好。\n我目前仍在度假，将于周五在笔记本电脑上检查图片和视频的质量，然后向您发送视频链接。", "no": "2014", "date": 1739325574000, "retest": ""}}, {"record_id": "recuKFuX5pAkey", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "感觉1080P/240P的画质会下降，这样正常吗", "no": "2881", "date": 1746762384000, "retest": ""}}, {"record_id": "recv52xhO1i19n", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "请发送最新的固件文件。视频画面抖动。", "no": "5077", "date": 1765425453000, "retest": ""}}, {"record_id": "recvgnbkbr2IUr", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "画面质量太差了，所以我想退货。", "no": "5906", "date": 1775807983000, "retest": ""}}, {"record_id": "recvdqyfQGhrTO", "fields": {"status": "", "level": "", "category": "17-图像品质，08-防水壳", "severity": "产品问题", "content": "你好，告知一下，我刚刚给你们的产品留下了负面评价：我目前正在度假，并且购买了你们的产品来拍摄。我对你们产品的质量感到极其失望，图像暗淡且质量很差。我会把产品退回去。你好，我今天重新测试了一下：相机进水了😬。我希望退款，你们简直是在虚假宣传，我无法理解你们的正面评价。无论如何，我会写一篇关于你们相机的文章，来告知消费者你们产品的质量。", "no": "5709", "date": 1773109379000, "retest": ""}}, {"record_id": "recuCycQWOCxTW", "fields": {"status": "", "level": "", "category": "20-客户体验或者其他", "severity": "产品问题", "content": "我的 Brave 4 Pro 昨天到货，显然不是新的。配件包装在 Zip Loc 三明治袋中。防水外壳上有划痕，盒子显然用某种胶带重新密封过。\n\n我希望用一台真正的新设备替换它，由于亚马逊没有给我更换（只能退货）的选项，我直接联系你，因为事情无法接受。\n\n我买这个是为了三周后去滑雪，如果能在那之前解决这个问题，我将不胜感激。我将于 3 月 1 日离开。\n\n我附上了配件包装、外壳上的划痕和用于重新密封盒子的胶带的照片。\n\n谢谢，", "no": "2011", "date": 1739325574000, "retest": ""}}, {"record_id": "recuUSQIa8dSA6", "fields": {"status": "", "level": "", "category": "20-客户体验或者其他", "severity": "用户体验问题", "content": "配件的使用说明很少，很多我都不知道是什么。", "no": "3957", "date": 1756120992000, "retest": ""}}, {"record_id": "recuWgloR7Kdgt", "fields": {"status": "", "level": "", "category": "20-客户体验或者其他", "severity": "用户体验问题", "content": "在下载我的视频时（其中一些视频时长超过20分钟），重放前2分钟左右的时候画面播放正常，但之后就变成了慢动作，而这些视频拍摄时并非慢动作。没人愿意看20分钟的越野四轮车和泥地驾驶视频都是慢动作的！ ", "no": "4213", "date": 1757384293000, "retest": ""}}, {"record_id": "recuzr92jXxIxd", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "您好，我于 2024 年 2 月 16 日购买了 akaso brave 4 pro，之后的头几个月我经常使用它，它一直存放在没有电池的情况下，安全地放在壁橱里的一个盒子里。\n\n我试图再次打开它，但它不会越过 akaso 徽标屏幕，只是停留在黑屏上。我尝试过使用不同的电池，没有电池直接将其连接到 2a usb 电源，然后按电源按钮重置它，但仍然不起作用。有和没有 SD 卡，我在电脑上试过，运行正常。\n\n序列号是：FX230619V400061\n请告诉我我可以做些什么来修复它，或者更新固件。我目前在阿根廷，但我在美国时通过亚马逊购买了它。如果需要更换，我有一个可以发货的地址。", "no": "1839", "date": 1736472832000, "retest": ""}}, {"record_id": "recuzUROgJBUT4", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "你好，\n问题是我一打开相机它就冻结了。\n这是开始屏幕，上面可以看到 AKAGO 标志，但它的作用也仅此而已。\n\n我将相机连接到 5V2A 适配器并按住开启按钮 3 秒钟。\n但什么也没发生，她仍然被冻住了。\n\n此致\n塞巴斯蒂安", "no": "1892", "date": 1736912015000, "retest": ""}}, {"record_id": "recuKiPGp6TBzS", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "早上好！我在八月份购买了这款产品，直到上周六都没有出现任何问题。然而，上周六白天使用了一整天后，晚上相机开机，显示出Akaso的标志，然后就没有任何反应了。我尝试更换电池、取出SD卡、长按开机键，但情况依旧没有改善。亚马逊客服提出给我退款，但由于我对这款相机还算满意，所以想了解一下是否有解决办法。感谢您的回复，祝您工作顺利。 ", "no": "2839", "date": 1746427469000, "retest": ""}}, {"record_id": "recuqFlmL21hHe", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "嗨，客服，\n\n今年 2024 年 2 月购买了一台 Akaso Brave 4 Pro 运动相机，除了遥控器之外，其他都运行良好。（请参阅随附的亚马逊发票/订单号和图片）。\n\n电池已换了两次新电池，但仍然无法使用。按下任一按钮都无法控制相机，甚至无法点亮按钮附近的 LED。似乎坏了。\n\n我可以换一台吗？也很乐意将坏掉的装置寄回。", "no": "732", "date": 1728437443000, "retest": ""}}, {"record_id": "recus51W1a7H0w", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我打开相机，它处于视频模式。我按下遥控器上的视频按钮。遥控器上的红色 LED 灯亮起，但相机没有任何反应！", "no": "907", "date": 1729733131000, "retest": ""}}, {"record_id": "recuWi39QSPltf", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "晚上好，我买了这台相机，现在遇到了一个问题，我无法使用遥控器拍照或录像，你们能帮帮我吗？谢谢。\n晚上好，是的，我已经按照你们建议的所有步骤都试过了，但还是不行，从视频中也能看到，当我按遥控器时，指示灯会亮，但信号传不过去。 ", "no": "4220", "date": 1757409497000, "retest": ""}}, {"record_id": "recuZt2Cr1UkLI", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我的无线腕控器不工作了。我试着按连拍照片按钮和视频录制按钮，但两个都不起作用。你们能给我寄一个适用于我的Bravo 4 Pro的替换无线腕控器吗？\n拍照按钮的灯是亮的，但视频按钮的灯不亮。 ", "no": "4583", "date": 1760320308000, "retest": ""}}, {"record_id": "recuZuasboI6v4", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "即使更换了遥控器的电池，它仍然无法正常工作。在电器店购买了适配的纽扣电池并进行更换后，遥控器还是无法正常工作。我希望能在保修范围内对遥控器进行维修，可以吗？", "no": "4598", "date": 1760336952000, "retest": ""}}, {"record_id": "recuniYnPQEVo7", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "刚才第一次使用了，但是拍不到4k视频。我使用了U3的128gb microSD卡格式化。分辨率为4k 30fps的时候和2.7K 30fps，以及1080 P 120fps和60fps的时候会出现“慢速卡”的显示。是1,080P 30fps能取得的状况。怎么做才能解决呢?", "no": "452", "date": 1725358488000, "retest": ""}}, {"record_id": "recutjbGvLCOR7", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "AKASO Brave 4 pro，SN-AX-240320V2；存储卡：AKASO micro SD 64GB。错误消息：“卡片错误，请更改您的卡片”。\n\n相机无法识别存储卡，卡没有问题。有时存储卡会被短暂识别，通常不会。卡格式化也不起作用。使用不同的存储卡（SanDisk Extreme 64 GB）进行测试时显示相同的错误。尝试聊天中的所有步骤 - 问题仍然存在！", "no": "1061", "date": 1730858455000, "retest": ""}}, {"record_id": "recuzOOb3XYJMi", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "无法识别SD卡。无法识别的SD卡可以在电脑上使用，没有问题。\n请消除故障。", "no": "1870", "date": 1736822492000, "retest": ""}}, {"record_id": "recuF6zjLkSwN3", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "显示“没有SD卡”不识别SD卡。当然也不能格式化。\n制造商和容量不同的SD卡也会发生同样的症状。\n以下是我们尝试过的卡片：\n制造商/尺寸/写入速度/格式\n卡1:s andisk / 128 gb / 40 mb / s / exfat及支持fat32\n卡2:HiDisk/ 64gb /-/FAT32\n卡3:Sandisk/ 32gb / - /FAT32\n任何卡都可以在其他制造商的行车记录仪上使用。\n怀疑相机SD卡插槽可能存在初始故障。", "no": "2334", "date": 1741665589000, "retest": ""}}, {"record_id": "recuV3qNb4kJSE", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "相机不再识别 micro SD 卡了。即使换上新的 SD 卡，相机还是提示我更换 SD 卡。现在我儿子没法用它了。请问你能帮我解决这个问题吗？\n\n我在拿到相机时就用原装的 SD 卡进行了格式化，过去 8 个月一直都能正常使用。但突然有一天，我就收到了错误提示。我买了一张新的 SD 卡，也进行了格式化，但还是收到同样的错误提示。 ", "no": "3989", "date": 1756277353000, "retest": ""}}, {"record_id": "recv3rHlWYeREm", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "相机不再接受任何存储卡。即使我按照相机要求格式化存储卡或使用其他正常工作的存储卡，相机仍显示“存储卡错误，请更换存储卡”。我已附上发票和问题的照片，请查阅。我已按照您发送的说明操作，但问题仍然存在。请查看附件中的SD卡照片（我也在电脑上格式化过，它在其他相机上仍能正常工作，并且以前在我的AKASO相机上也能用），以及我的相机版本信息。请帮忙进一步检查并协助解决。", "no": "4960", "date": 1763964995000, "retest": ""}}, {"record_id": "recv4nlJzvRvvV", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "希望你一切安好。\n\n我写信是想申请更换我的Akaso Brave 4 Pro运动相机的保修。\n\n这台相机现在无法识别任何存储卡了。即使按照相机的要求格式化存储卡，或者使用其他能正常工作的存储卡，相机仍然显示“存储卡错误，请更换存储卡”。\n\n我已附上发票和问题的照片，请您查阅。\n\n请问能否协助更换一台新机，或者告知保修服务的后续步骤？\n\n非常感谢您的帮助。\n\n期待您的回复。\n\n此致，", "no": "5035", "date": 1764816870000, "retest": ""}}, {"record_id": "recv4ut3Dg2TY4", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "我的儿子生日时收到了AKASO Brave 4 Pro相机。但总是出现“卡错误，请更换卡”的提示。使用的是相机随附的存储卡。此外，我已经在相机上和电脑上对存储卡进行了多次格式化。请尽快提供帮助。\n我在附件中向您发送了存储卡的照片。\n遗憾的是，存储卡格式化失败了。", "no": "5047", "date": 1764922049000, "retest": ""}}, {"record_id": "recvaqves692xE", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "你多次格式化存储卡，但显示格式   try {
    const res = await fetch('./feishu_data_latest.json?t='+Date.now());
    if (res.ok) {
      const raw = await res.json();
      const { records=[], field_map={}, done_values=[], top_level='S', title='' } = raw;
      if (title) { document.title = title; document.getElementById('dashTitle').textContent = title; }
      const data  = analyze(records, field_map, done_values, top_level);
      const snaps = upsertSnap(data.date, { total:data.total, done:data.done, active:data.active, top:data.top });
      renderAll(data, snaps, top_level);
    }
  } catch(e) { console.warn('刷新失败', e); }
  btn.textContent = '↻ 刷新数据'; btn.classList.remove('loading');
}

initCharts();
loadFromLocalData();
</script>
</body>
