里有水……滴水……相机漂浮了\n\n检查一下，你想要损坏的相机来检查我的 Word。我想要一个新的相机……\n\n谢谢和问候\n\nAnja Bernack\n\nBerger Strasse 43\n\n89284 Pfaffenhofen\n\n德国", "no": "2485", "date": 1742976173000, "retest": "LH240906V3C4046"}}, {"record_id": "recuGZqnR2Lc1f", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "用来潜水。最大深度是 25 米。第四次潜水后它就停止工作了", "no": "2509", "date": 1743392291000, "retest": ""}}, {"record_id": "recuGZXHzt9ekB", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，\n\n相机正在使用中，当我从水里出来时，发现相机外壳里有水。\n\n即使干燥后，相机也无法启动。还配备了新电池和新存储卡。\n\n这太愚蠢了，因为我专门为马尔代夫度假买了这个相机。\n\n我可以复制录音...", "no": "2518", "date": 1743400231000, "retest": " LH240608V3C4966"}}, {"record_id": "recuHVwDOKSj1w", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "不幸的是，潜水时用这个保护壳的相机在12米深的水下完全进水了。我想退款，因为它的防水性能不够。", "no": "2614", "date": 1744250810000, "retest": ""}}, {"record_id": "recuHVwJZ75QNq", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳没出什么问题，只是在水下的时候开始漏水。需要更换。", "no": "2615", "date": 1744250834000, "retest": ""}}, {"record_id": "recuIj2yGnSkGr", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "该相机外壳不防水，浮潜时海水进入了内部。相机无法开机，水已进入外壳。 ", "no": "2628", "date": 1744598272000, "retest": ""}}, {"record_id": "recuIj6639FxQA", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，摄像头的外壳密封不严，摄像头受潮了。它无法再充电和启动。请给我寄送一个替代品，并提供一份回寄凭证。\n此致\n赫伯特 敬上", "no": "2634", "date": 1744599116000, "retest": ""}}, {"record_id": "recuIk1dgkFLX5", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "这款相机连使用60秒都坚持不了。我使用随相机附带的潜水外壳去潜水（我已经用其他运动相机潜水超过100次了，所以我知道如何正确使用它们）。事实证明这个外壳并不防水，因为即使在不到3米的深度，也有一些水漏了进去。相机立刻就不能用了，完全报废了。\n\n我想把这个商品寄回去，要求全额退款。 ", "no": "2645", "date": 1744612727000, "retest": ""}}, {"record_id": "recuIqx0wq1p6O", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好！我订购了您的相机，但很遗憾，相机的外壳有损坏，而我现在急需使用相机。因此，我请求您为我更换相机并寄一台新的过来，这样在新相机寄到之前我还能继续使用相机。等新相机到了，我很乐意把旧的寄回去。 ", "no": "2672", "date": 1744708964000, "retest": ""}}, {"record_id": "recuIBiYGR7Ifb", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我第二次用这个设备潜水时，下潜到58英尺深，保护壳漏水了。我把相机里的电池和SIM卡取出来，晾干了24小时。相机还能正常使用。下次潜水时，我对保护壳进行了测试，没有漏水。最后一次潜水，相机下潜到62英尺深时，保护壳又漏水了。我尝试取出电池和SIM卡（此处原文Tried battery and simcard表述不全，推测意思如此）。 ", "no": "2696", "date": 1744868159000, "retest": ""}}, {"record_id": "recuIY5YIKyVXH", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "运动相机坏了。我用它潜水了两次，使用的是相机附带的保护壳。然而，水还是进入了保护壳，导致相机损坏。我要求换一个新的型号，因为我原来的那个显然不像亚马逊宣传的那样具备防水功能（搭配保护壳使用时）。 ", "no": "2706", "date": 1745204917000, "retest": ""}}, {"record_id": "recuIYchKEYhQZ", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在2024年3月只用过这个相机两次。今年我又去潜水，想用它。在船上时，它工作正常，但当我潜水（仅9米深）时，它就停止工作了（当时它放在防水盒里，电池也是刚充满电的）。从那以后，它就一直不能用了。 ", "no": "2713", "date": 1745206421000, "retest": " LH230728V16324"}}, {"record_id": "recuJ9KhZDgSEh", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好。遗憾的是，相机的塑料外壳密封不严，手臂触发装置也密封不严。此致 敬礼\n\n很遗憾，我没有水下相机外壳的照片，因为我立刻就把相机拿出来了，当时没带手机，而且水当然也已经干了。不过，可能是某个按钮密封不严，但不会有大量水进入。 ", "no": "2758", "date": 1745377065000, "retest": ""}}, {"record_id": "recuJh5YVXMn7e", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我带着相机装在防水壳里去潜水了。才在水下约15英尺的地方待了20分钟，相机就开始出故障了，我还发现防水壳里面有水渗进去了。现在触摸屏也失灵了。", "no": "2773", "date": 1745485668000, "retest": ""}}, {"record_id": "recuLdV8c63TKR", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们于 2025 年 4 月 2 日通过亚马逊购买了这台相机，订单编号为 113 - 7297443 - 2298626。是的，我们在浮潜时将相机用于水下拍摄。", "no": "2902", "date": 1747271016000, "retest": "LH240818V3C3583"}}, {"record_id": "recuLkoB4nBJD7", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "晚上好！我从亚马逊购买了你们的 EK7000 Pro 相机，用于我们的潜水之旅。我们在 10 月度蜜月时第一次潜水，我注意到潜水结束后，防水相机壳内的相机上有一点水汽，但我把它擦干了，没出现什么问题。4 月我们第二次带着这台相机潜水时，相机在水下就坏了。当我浮出水面时，相机里全是水。我试图把它弄干，但它再也打不开了，已经报废了。\n\n我们在这台相机、相机壳、配件和存储卡上花了不少钱，结果第二次潜水相机就进水坏掉了，真是太让人失望了。我猜可能是相机壳有问题，因为我看到很多好评，原本还希望自己也能有个好体验呢。 ", "no": "2915", "date": 1747366700000, "retest": ""}}, {"record_id": "recuLBr8EZDiT7", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们于2025年4月2日通过亚马逊购买了这款相机，订单编号为113 - 7297443 - 2298626。是的，我们在浮潜时将相机用于水下拍摄。 ", "no": "2931", "date": 1747618503000, "retest": ""}}, {"record_id": "recuMgFyXk8dnQ", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好！\n\n很遗憾，防水外壳在使用两三次后就不再防水了。从那以后，每次都有水进入相机。除此之外，我们对这款相机真的非常满意，只是可惜目前我们不能再带着它下水了。\n\n如果能为此找到解决方案，我们会很高兴，因为我们6月1日又要去度假了，当然希望能再次带上我们的相机。\n\n非常感谢，真诚问候\n斯特凡妮", "no": "2967", "date": 1748227771000, "retest": ""}}, {"record_id": "recuMz5q45VnFa", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我购买后进行了妥善的防水处理才使用，但还是进水了，导致无法开机。", "no": "2999", "date": 1748499907000, "retest": ""}}, {"record_id": "recuN2OnazeNUP", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我第一次使用相机时，防水外壳上的塑料卡扣就裂开了。我设法让它仍然能密封并继续使用，但它已经损坏了。我需要为相机换一个新的防水外壳。", "no": "3047", "date": 1748939134000, "retest": ""}}, {"record_id": "recuN9nzO5C1SL", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我收到的相机的固定架是坏的。相机外壳底部有两个透明的固定架凸耳，其中一个寄过来时就断了。 ", "no": "3071", "date": 1749036182000, "retest": "@苏意梅机器SN号客人有回复吗"}}, {"record_id": "recuN9tE9CWZxS", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水渗入了防水盒。", "no": "3082", "date": 1749037629000, "retest": ""}}, {"record_id": "recuN9vdZ46zkN", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "去年（2024年11月12日下单），我订购了上述提到的相机（包括额外的存储卡和潜水套装），作为圣诞礼物送给我的女朋友。她已经对该产品进行了注册，我了解到，从AKASO官网购买的所有产品均享有24个月的保修期。当然，这款有问题的产品甚至还不到一年。\n\n今天，我们第一次带着防水外壳和浮动手柄使用这款相机进行潜水。潜水结束后，我们发现相机外壳漏水了，相机也湿了。从外壳中取出相机后，相机就再也打不开了。由于这是第一次在水下使用，我怀疑背面的密封处有问题。相机和其他部件一直存放在原包装盒中，置于常温环境下，此次潜水的最大深度仅为17.7米。\n\n这可能还意味着256GB的存储卡和内置电池也因进水而损坏了。\n\n能否请您回复我，并提供关于贵司退款政策的信息，以及下一步该怎么做？我们真心希望贵司能更换有问题的产品。这真的很尴尬，因为我们特意带着这款相机去马来西亚潜水，结果在首次适应性潜水时它就坏了，真正的潜水还没开始呢。 ", "no": "3086", "date": 1749038005000, "retest": ""}}, {"record_id": "recuNdkD3R4OiO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在5月25日首次使用相机，结果O形环出现泄漏，损坏了相机。我需要更换它。", "no": "3092", "date": 1749094585000, "retest": ""}}, {"record_id": "recuNBnmKPpaPq", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我昨天首次按照使用说明书和产品描述，在潜水时使用了我的AKASO相机。在大约20米的深度时，水进入了随相机配备的密封保护壳内，相机随即关机。我们立刻返回了水面。从那以后，相机就再也无法开机，完全没有任何反应。 ", "no": "3138", "date": 1749449870000, "retest": ""}}, {"record_id": "recuNBnNihf6XM", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "容纳摄像头的透明外壳一侧破裂了。快门边缘有一块缺失。", "no": "3140", "date": 1749449973000, "retest": ""}}, {"record_id": "recuNSdSe8VDsM", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，去年 9 月我带着相机去潜水度假。到了 20 米的深度时，相机外壳开始漏水。你们给我寄了一个新的外壳，我在 2025 年 5 月的潜水度假时使用了这个新外壳。结果新外壳又漏水了。这次进了很多水，现在相机也坏了。我认为这是产品的普遍缺陷。我怀疑在 15 - 20 米的水深下，水会从相机外壳的按钮处渗入。我想强调的是，我从事水下摄影工作已经超过 25 年了。我妻子的运动相机即使在 30 米的深度也能完美工作。不管怎样，相机已经坏了，我要求退还 64.79 欧元的购买费用，也许可以通过亚马逊退款。无需附上照片，照片里能看到损坏情况。 ", "no": "3167", "date": 1749698805000, "retest": ""}}, {"record_id": "recuNSew92kWdS", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尊敬的女士们、先生们：\n\n相机的防水外壳出现了渗漏问题。在仅仅3米的深度时，水就会渗入外壳。我请求更换这个外壳。相机本身运行正常。\n\n致以友好的问候\n\n塞巴斯蒂安·曼德尔", "no": "3170", "date": 1749698958000, "retest": ""}}, {"record_id": "recuOV9zhyq1Uz", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，\n\n我联系您是因为我在去墨西哥旅行时试用了我的相机，我买它是为了在浮潜和潜水时拍摄。首先，在浮潜时，就有一点水渗进去了，但我觉得量不多，所以我当时想这没什么大不了的，因为相机还能正常使用。\n\n但当我进行体验潜水时，相机几分钟后就关机了。当我回到水面时，里面全是水……\n\n我对这款产品非常失望，因为我是为了这次旅行才买的相机，而我拍摄的所有内容都因为海水损坏了，我的SD卡坏了，相机也坏了……\n\n我想说明的是，我下潜的深度并没有超过建议深度，因为我只是进行体验潜水。而且，即使只是浮潜，就已经开始出现进水的问题了，尽管相机当时还能正常工作。\n\n我希望提出索赔，并获得退款，或者得到一台能正常使用的新相机、一张新的SD卡和一个外壳，因为这类相机的用途就是水下拍摄。如果您需要查看产品状况，我可以把产品寄回给您。\n\n提前感谢您的帮助。\n\n顺祝商祺，\n\n若尔丹·塔尔蒂埃 ", "no": "3233", "date": 1750658241000, "retest": ""}}, {"record_id": "recuPiFnmefG4z", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我们收到了你寄来的相机。相机的密封橡胶损坏了，我们希望能换一台新的。", "no": "3280", "date": 1751005677000, "retest": "KM240711V3C2777"}}, {"record_id": "recuQe29laKF4N", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "我有个小问题想问一下：我在度假期间使用运动相机在海里浮潜，之后总是用干净的自来水彻底冲洗，并尽可能地擦干。然而，现在手柄的螺丝连接处和螺纹上出现了严重的锈迹。此外，相机外壳上也有污渍，可惜无法去除（见附件中的图片）。\n\n我是不是哪里操作有误呢？我之前那台带手柄的运动相机从未出现过这个问题。 ", "no": "3329", "date": 1751853356000, "retest": ""}}, {"record_id": "recuQCti3yyqYE", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "我们第二次使用这台相机进行了一次下潜至水下15米的拍摄。这次，防水罩/防水盒出问题了，相机进了海水。相机再也无法正常工作了。按下电源按钮后，它似乎能启动，但唯一的反应就是快门按钮旁边的红灯亮起。显示屏不亮，按任何按钮都没有反应。我们认为是地中海的咸水弄坏了相机。相机也无法关机。即使长按电源按钮，它依然处于开启状态。除了红灯亮，没有其他反应。\n\n为什么防水罩会出问题，又是怎么出问题的呢？它关得很严实，我们也没发现密封处有任何问题。一切看起来都完美无缺，但水还是进去了，损坏了相机。我们第一次在水下使用这台相机是在2025年3月，当时一切都很顺利。现在这种情况有点令人不满意。我们接下来该怎么办呢？相机能维修还是会被更换呢？期待您的回复。\n\n祝好，\n斯文·麦克和伊娜·麦克 ", "no": "3373", "date": 1752214456000, "retest": "KM240823V3C0730"}}, {"record_id": "recuQURs98bH9P", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们第二次使用这台相机进行水下15米的潜水拍摄。这次，防水罩/防水盒出了问题，相机被盐水灌了进去。相机再也无法正常工作了。按下电源按钮后，它似乎启动了，但唯一的反应是快门按钮旁边的红灯亮起。显示屏不工作，按任何按钮都没有反应。我们认为是地中海的咸水弄坏了相机。相机无法关闭，即使长按电源按钮，它仍然处于开启状态。除了红灯亮起，没有其他反应。\n\n防水罩为什么会出问题，又是怎么出问题的呢？它关闭得很严实，我们也没发现密封处有任何问题。一切看起来都很完美，但水还是渗了进去，损坏了相机。我们第一次在水下使用这台相机是在2025年3月，当时一切都很顺利。现在这种情况有点令人不满意。我们接下来该怎么做呢？相机是会被维修还是更换呢？期待您的回复。\n\n祝好，", "no": "3412", "date": 1752486189000, "retest": ""}}, {"record_id": "recuSiOgaFiEig", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我买这个相机套是为了带着相机去潜水。在第二次潜水时，相机就不工作了。回到船上后，我发现相机套漏水了，进了些水。现在相机再也无法使用了。我只用了它一次，所以我非常失望，因为我买它是为了这次美妙的假期，结果只用了一次，没能拍下任何野生动物的视频。既然它还在保修期内，我能换一个新的吗？ ", "no": "3510", "date": 1753756192000, "retest": ""}}, {"record_id": "recuSTu0jLlRPP", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在潜水时使用了相机，可惜水下外壳漏水了。总有少量水渗进来。我遵守了允许的潜水深度。密封件安装正确且干净。我请求解决这个问题。非常感谢。", "no": "3634", "date": 1754298090000, "retest": "LH241112V3C7760"}}, {"record_id": "recuSXFPRqintG", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我在水深不到一米的游泳池里使用了相机，结果出现了冷凝现象。开机按钮的密封处有水。", "no": "3650", "date": 1754360015000, "retest": ""}}, {"record_id": "recuSYZr1ipIhn", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机在放入箱子浸泡后就不能用了。\n我按照你们的建议，把相机埋在大米里，但没有任何效果。我的相机还是不能用。我仍然保留着原装包装盒和所有配件。请告知我寄送的操作步骤。 ", "no": "3661", "date": 1754379462000, "retest": " LH231201V21955."}}, {"record_id": "recuTaQujg4YBu", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水进入了相机盒，损坏了相机。", "no": "3687", "date": 1754554645000, "retest": ""}}, {"record_id": "recuTOcviHYIDt", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我使用了Akaso EK7000PRO相机并搭配了水下保护壳，即便只下潜到28米的深度，保护壳就开始漏水了。相机没有损坏，但看起来这个水下保护壳并没有达到应有的防水密封效果。我又试了一次，壳里不装相机，结果它还是开始漏水，有一些水进入了保护壳，所以这个保护壳肯定存在一些问题。我们该如何解决这个问题呢？ ", "no": "3774", "date": 1755136170000, "retest": ""}}, {"record_id": "recuTOe1eIpMmT", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我刚刚发现我的Akaso EK7000 Pro防水盒子的卡扣部件不见了，盒子无法锁上。", "no": "3776", "date": 1755136531000, "retest": ""}}, {"record_id": "recuUjFwhm9UtS", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "嗨，薇薇安，感谢你的消息。\n\n这是一个空箱子的照片，但现在，就像我之前说的，它是干的。问题可能出在我在照片中用红色圈出的白色O型圈上。\n\n稍后我要去潜水，届时会带上这个空箱子。出水后我会拍张照片给你看它是怎么漏水的。你觉得这样可以吗？", "no": "3859", "date": 1755601151000, "retest": ""}}, {"record_id": "recuUnkrLNtT5r", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "你好，我买了一台运动相机，在第一次使用它进行潜水时，尽管理论上相机外壳已经完全密封好了，但还是有水流了进去。当时我只是潜到了大约 10 米的深度，出水后，由于相机进了水，就无法正常使用了。我联系了亚马逊来解决这个问题，他们指引我来到这里，之后他们会再和我联系，看看我们能找到什么解决方案。谢谢！ ", "no": "3869", "date": 1755655235000, "retest": ""}}, {"record_id": "recuUom7pYsqp6", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "你好，\n\n很遗憾，我必须告知你，这台相机在首次使用时就损坏了。我把这台相机作为结婚周年纪念礼物送给了我的丈夫，这样他就可以在我们全家潜水度假时拍照。然而，在2025年7月29日他第一次潜水后，他失望地回来了，因为相机已经不能正常工作了。那次潜水的最大深度为15米。\n\n因此，我诚恳地请求退还设备款项或更换一台新设备。\n\n非常感谢！\n纳丁·施马尔根多夫", "no": "3874", "date": 1755670410000, "retest": "LH240818V3C4104"}}, {"record_id": "recuUA5Iq9PqGm", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在8月16 - 17日去伊豆潜水时使用了该产品，但水下外壳里的O型圈似乎有问题。我是一名潜水员，试用过各种水下相机。我知道要给O型圈涂上润滑脂，薄薄地涂上硅脂以形成防水膜。然而，即使涂了这些，也没能防止水进入。 ", "no": "3912", "date": 1755843816000, "retest": ""}}, {"record_id": "recuURMV8z4lJW", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次下潜，在22米深处使用设备，相机密封不严，水灌进去了。这是什么情况？ ", "no": "3941", "date": 1756105311000, "retest": ""}}, {"record_id": "recuV2tAYAYvj1", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我买了一台运动相机，在第一次使用它进行潜水时，尽管理论上相机外壳已经完全密封好了，但水还是从某个地方渗了进去。当时我只是下潜到了大约10米的深度，浮出水面后，由于相机进了水，它就无法正常工作了。我联系了亚马逊来解决这个问题，他们把我指引到了这里，之后他们会再和我联系，看看我们能找到什么解决方案。谢谢！ ", "no": "3986", "date": 1756263245000, "retest": ""}}, {"record_id": "recuV9OFlIRYWW", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "下午好，在穿着完全密封的潜水服潜到20米深度后，摄像机就不再工作了，并且有明显的氧化迹象。考虑到该产品说明书上标明可承受最深40米的潜水深度，我想知道如何为这款产品申请保修（更换一台新机再好不过了）。非常感谢\n\n非常感谢您的友好回复。由于某些原因，亚马逊不允许我上传视频文件，所以我附上了两张照片，照片清晰显示电池接口和另一个接口都有氧化迹象。装上电池后，设备无法启动，但通过USB - C线连接时确实能开机。不过，开机后相机没有反应（有些按钮不能正常工作）。另请注意，这台相机已经处于“干燥”状态两周了。非常感谢您的帮助。 ", "no": "4015", "date": 1756371701000, "retest": "LH240425V3C2770."}}, {"record_id": "recuVwODldwjKO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机无法正常使用。\n我还购买了防水漂浮保护套。我寄修了相机三次，之后保护套就出现了漏水情况，水进入了相机内部。现在相机无法正常工作了。\n您好。我试过把相机放在大米里吸水，但相机仍然无法开机。请查看附件视频。能否请您安排提供一台新相机和一个新保护套？谢谢。 ", "no": "4057", "date": 1756711548000, "retest": ""}}, {"record_id": "recuVJ7iDc2qKn", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "在我用这台相机进行第二次潜水时，一开始相机壳内就起雾了。过了一会儿，水渗了进来，把相机泡了。我没有进行深潜，也没有做任何不寻常的事。根据你们在亚马逊产品页面上的介绍，这款相机本应能防水至40米深（“【防水相机可达40米】：AKASO EK7000 Pro水下相机配备了改进的防水外壳，潜水时可下潜至40米深度，捕捉水下冒险的所有细节。非常适合游泳、冲浪、潜水、浮潜等水上运动。”）。\n\n水渗进相机后，相机指示灯变红并一直保持这个状态。触摸屏不再工作，一直是黑屏。按键也没有反应。渗进去的水可能弄坏了我的SD卡，上面存了很多照片。我本以为一款宣称能防水至40米深的产品不会出问题，而我潜水的深度远不及这个深度。\n\n相机在我假期刚开始的时候就坏了，我为此预订并计划了很多潜水活动。所以，我再也没法拍照了，这非常遗憾，因为这款产品本应经久耐用。如我所说，我没有做任何不寻常的事。\n\n我在亚马逊买了保险。\n\n因为我是看中了你们产品宣传的潜水防水性能才特意选择了它，所以我更希望能得到退款，因为我不再信任你们的产品了。潜水时，我需要完全信赖我的装备。这台相机我才用了第二次就坏了，我对它失去了信心，所以以后不会再带着它潜水了。我不想每次潜水前后都担心之前拍的照片和视频。\n\n除了潜水，我不用运动相机。 ", "no": "4114", "date": 1756893313000, "retest": ""}}, {"record_id": "recuVSLUmdRdhM", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我于8月12日首次使用。潜水时仅仅在最大深度不足8米的地方潜了30分钟就漏水了，这是外壳（保护套）的次品问题吗？", "no": "4154", "date": 1757035979000, "retest": ""}}, {"record_id": "recuVSLUYiqkK5", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "在进行水肺潜水使用时，在水深 5 米处发生了进水情况。希望能给予退货或维修处理。 ", "no": "4159", "date": 1757035982000, "retest": ""}}, {"record_id": "recuWgmNoZVvOL", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，设备已经烘干好几天了，但没有任何变化。该设备配有保护外壳，曾在地中海进行了约5分钟的浮潜活动，最大深度为2米。在水槽进行的密封性测试中，未发现有泄漏情况。不过在我看来，这两者不可相提并论。浮潜时，设备外壳内大约有1 - 2厘米深的积水。遗憾的是，我无法创建最大10MB的视频。等我把你们要求拍摄的内容都录下来，视频大小就达到70 - 100MB了。我该怎么办呢？\n\n祝好，\n斯特凡·哈恩", "no": "4214", "date": 1757384626000, "retest": ""}}, {"record_id": "recuWxO0mlTKxx", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "你好，我今天把相机放在防水外壳里带到了水里。在浮潜的时候，这个外壳在两分钟内就完全进满了水。现在相机坏了，我完全没办法用它了。我现在也没办法再拍摄潜水行程了。我已经把相机里的所有东西都取了出来，希望它能晾干然后恢复正常，但这真的是个巨大的失望。我是因为有1.9万笔订单才买了这款相机，本以为一切都会顺利。现在却遇到了这种情况……我希望你们能帮我想想办法。 ", "no": "4257", "date": 1757642308000, "retest": ""}}, {"record_id": "recuX87wNxHlHe", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "大上周去冲绳旅行时试用了两次，感觉这个防水套好像根本不防水，水怎么都止不住地往里灌，完全没办法拍照。平时我根本没用过，所以没注意到……请问这个有保修或者换货服务吗？设备两次都被海水浸湿了，但目前还能正常使用，算是不幸中的万幸。 ", "no": "4347", "date": 1758178909000, "retest": ""}}, {"record_id": "recuXHEVEXwNAF", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "嗨，我的EK7000相机镜头盖掉了，请告知维修费用是多少？\n\n明确一下，因为我意识到我在最初的邮件里没说清楚，相机镜头是在从安装处拆卸时因撞击而掉落的。\n\n不，实际上我要澄清的是，是相机所安装的部位出了问题，而不是安装架本身。\n\n没错，安装架没问题，是相机安装的部位损坏了，防水壳破了，镜头盖也掉了。\n\n看起来新的镜头盖只需旋进卡槽里就可以吧？ ", "no": "4434", "date": 1758704042000, "retest": "SN LH240608V3C4573"}}, {"record_id": "recuYkNNNAJEXd", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在海滩上时，水进了设备的外壳里，把它擦干后就不能用了。", "no": "4523", "date": 1759282433000, "retest": ""}}, {"record_id": "recuYkNPJOEaq9", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "402 - 9180225 - 8012366，在浅水区水下拍照时，密封处出了问题，相机进水无法使用。 ", "no": "4524", "date": 1759282441000, "retest": ""}}, {"record_id": "recuZ5XwVxn0hm", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "固定箱子锁扣的金属片断了。（图片：防水壳指扣从金属卡扣中脱出）\n我儿子打开塑料箱子时，锁扣直接弹开了。我试着修理，但现在箱子无法锁住了。箱子没有掉落或受到撞击损坏。 ", "no": "4535", "date": 1759979240000, "retest": ""}}, {"record_id": "recuZhmxBpgnl1", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "这是第二台在潜水几次后就坏掉的相机了……它再也打不开了，基本上“报废”了。我要求退款……以后我再也不会买这个型号的相机了。", "no": "4572", "date": 1760147740000, "retest": ""}}, {"record_id": "recv08bRJU4Nyn", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳内相机无法使用。顶部快门按钮无法拍照。他们寄来了一个适用于不同相机的替换外壳，按钮与相机不匹配。", "no": "4675", "date": 1760928343000, "retest": ""}}, {"record_id": "recv0UEd903ZtV", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我潜到水下20英尺时，外壳开始漏水。我设法把它弄干，然后又试了一次，不幸的是又漏水了。我该怎么办？谢谢阿尔西亚·卢戈", "no": "4743", "date": 1761644360000, "retest": "LH240406V3C0212"}}, {"record_id": "recv1a9bWPZoXk", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "原因：我的EK7000 Pro防水壳内部进水了。\n我来详细说明一下我的问题。\n在水下不深处浮潜时，我开始看到有气泡从行车记录仪那里冒出。\n我立即将其从水中取出，打开并仔细擦干。\n行车记录仪是安全的，我把空的防水壳盖好后重新放入水中，确认它不再密封良好，内部会进水。\n防水壳没有破损的部分，似乎是闭合处的密封圈不再起作用了。\n希望我解释清楚了。", "no": "4781", "date": 1761873389000, "retest": ""}}, {"record_id": "recv1PimJYAwwr", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在假期第一次尝试用相机浮潜——不幸的是，在第三次浮潜时就进水了，现在无法开机！请告知我该如何处理，谢谢！相机还是无法开机——请看视频。", "no": "4814", "date": 1762481406000, "retest": ""}}, {"record_id": "recv26Ry1Y6Gr4", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们在度假时用防水壳在水下试用了相机。现在它坏了，尽管它应该是防水的。还有保修吗？", "no": "4833", "date": 1762740989000, "retest": ""}}, {"record_id": "recv2cAPJzmUPF", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，很遗憾水下 housing 的黑色支架断了，尽管我使用时非常小心。照片已附件。是否可以将相关 housing 寄给我？这样我就不需要将整个相机寄回了。\n此致，\n克里斯蒂安·赖纳特", "no": "4859", "date": 1762849311000, "retest": ""}}, {"record_id": "recv2oA0EHR4jO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "这个防水壳用了一次就坏了。", "no": "4872", "date": 1763002783000, "retest": "SZLH250819V31823"}}, {"record_id": "recv4uuyvqNuBo", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我来询问是否可以免费更换我的EK7000 Pro的防水壳，因为今天我检查它的时候，发现连接器的一个部件断裂了，现在连接附件时无法紧密贴合，还会晃动。", "no": "5053", "date": 1764922406000, "retest": ""}}, {"record_id": "recv6a8PUfG9sg", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "晚上好。收到的相机和存储卡都运行良好。但遗憾的是，本应保证防水性能的相机外壳有一处破损，因此无法在水下使用。我需要更换这个外壳。我丈夫昨天拆开礼物时发现了这个问题。", "no": "5142", "date": 1766453969000, "retest": ""}}, {"record_id": "recv6aebyRBuoF", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在九月买了一台相机，十二月试用时，它在一次浅潜中进水了。", "no": "5145", "date": 1766455244000, "retest": ""}}, {"record_id": "recv6rPKYOsk0f", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我订购了3件商品，订单号为202-7390018-7925161，其中一件的防水壳损坏了。另外两件因为是圣诞礼物，我还没和收到礼物的孩子们在一起，所以不确定它们是否完好。请问能否寄一个替换的防水壳？\n\n此致\n马特", "no": "5179", "date": 1766715396000, "retest": ""}}, {"record_id": "recv6PeiF6rwdx", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我的防水壳上的封条似乎有缺陷。", "no": "5231", "date": 1767061101000, "retest": ""}}, {"record_id": "recv6VbzanG4FU", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水盒的盖子卡扣在首次使用时断裂", "no": "5249", "date": 1767149107000, "retest": ""}}, {"record_id": "recv7izCqd60Ih", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好。该商品存在外壳缺陷的质量问题。在假期首次水下使用时，防水壳进水，导致相机内部进水，水损坏造成设备完全故障。防水壳已正确密封，问题出在密封性能不佳，未能达到满意的质量标准，正是这一点导致了进水及后续损坏。", "no": "5264", "date": 1767494696000, "retest": ""}}, {"record_id": "recv7q3vCwImgd", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "今天在15米深的潜水过程中，防水盒进水导致相机损坏。我们恳请赔偿或更换相机及防水盒。", "no": "5282", "date": 1767605255000, "retest": ""}}, {"record_id": "recv84ZY3d0I2X", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "AKASO运动相机4K30FPS 20MP的防水盖关不上。我需要一个备件或一个新外壳。我无法在水下使用相机。", "no": "5319", "date": 1768210239000, "retest": "SN LH250915V3C3364"}}, {"record_id": "recv8qUpTmGfe4", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我购买了Akaso EK7000 Pro相机，附带的防水壳不兼容。防水壳的按键与相机的开关键位置不匹配。我在2026年1月21日急需使用相机，希望在该日期前收到正确的防水壳。", "no": "5364", "date": 1768533996000, "retest": "德国稳必达返修机"}}, {"record_id": "recv8Ug1cd8Uky", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我于25年9月23日购买的运动相机，现在是第一次带着它去浮潜。不幸的是，有一些水进入了外壳。幸运的是相机还能工作，但接口是湿的，电池仓里也有一些水。因为是海水，我担心可能会出现腐蚀损坏。\n\n由于我也想带着相机去潜水，它本应防水深度达30米，所以我绝对不能再使用这个外壳了。\n\n我已经采取了上述措施。只是接口我只能从外部清洁。接口槽深处我本需要用流动的水冲洗。\n\n相机目前还能工作，但触点未来会如何变化我说不准。", "no": "5388", "date": 1768967657000, "retest": "SN:LH240906V3C2798"}}, {"record_id": "recv96Mg72vYzJ", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我于1月10日首次使用该商品。尽管产品标注防水深度可达40米，但在约10米深度时就发生了进水，导致我自己的SD卡也损坏了。希望能得到SD卡的赔偿以及替代品。损坏物品的外包装和所有部件都齐全，希望能进行确认。", "no": "5419", "date": 1769152658000, "retest": ""}}, {"record_id": "recv9yChH7r9Pa", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，收到的透明相机壳破损了。收货地址是489 E Lombardy Dr Republic MO", "no": "5462", "date": 1769564018000, "retest": ""}}, {"record_id": "recv9ABgIYr2Uc", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我带着相机潜水进入保护套，在15米深处，水进入了保护套。之后屏幕就无法显示了。\n你好！相机可以开机，但屏幕呈黄色，什么也看不见，而且没有反应。这种情况已经持续一天了，情况最好的时候也就是这样。我之前做过检查，看是不是保护套没有安装好，而且因为设备问题，潜水时间不到半小时。", "no": "5478", "date": 1769593328000, "retest": ""}}, {"record_id": "recvaI6TUiluSO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我第一次用相机潜水到12米。这款相机本应能下潜到30米。结果水进去了，现在什么都用不了。我对你们的产品非常失望。\n我忘了告诉你，潜水前我把相机浸在水里试过会不会进水，当时并没有进水！\n我把相机扔进垃圾桶了，它已经不能用了，放在背包里占地方。比起再换一个让我有过糟糕体验的相机，我更希望得到退款。", "no": "5536", "date": 1770620434000, "retest": ""}}, {"record_id": "recvbnH07VJi27", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "不幸的是，保护壳在第一次潜水时再次漏水。这是不可接受的。我希望退款。我们不再希望收到新产品，因为该产品的质量已被证明非常差。\n不幸的是，我们无法提供视频。我们在潜水前在浅水区测试了保护壳，当时一切似乎都没问题。在10米深度潜水15分钟后，保护壳开始漏水，里面的相机坏了。我们试图通过将保护壳浸入水槽中来提供视频，但保护壳保持干燥。\n您必须理解，我们无法提供视频，因为保护壳在更深的水域会漏水，而不是在水槽中。保护壳当然能承受水槽的水压，但无法承受其宣传的压力。随信附上相机水损坏的照片（请注意输入孔上的锈迹）以及相机因损坏无法开机的视频。希望这有帮助！", "no": "5577", "date": 1771234868000, "retest": ""}}, {"record_id": "recvc718OG7TYu", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "不幸的是，这款保护壳的设计不符合使用目的，无法在水下保护相机。这个“防水”壳在我第一次潜水时就漏水了，因此在剩下的旅程中我无法使用它，否则可能会导致整个相机损坏。我把相机晾干后它仍然可以使用，但没有保护壳的话，相机就失去了意义。我已附上潜水回来后拍摄的照片，清楚地显示了进水情况。", "no": "5599", "date": 1771904603000, "retest": ""}}, {"record_id": "recvc75on8jINU", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "保护壳有缺陷。已取消。Akaso EK 7000 Pro。", "no": "5600", "date": 1771905617000, "retest": ""}}, {"record_id": "recvenW6phakY9", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尽管写着防水深度可达40米，但在大约10米的地方就进水了，连我自己的SD卡都损坏了。希望能赔偿SD卡并准备替代的产品。损坏的物品包括外包装和所有零件，希望能进行确认。", "no": "5771", "date": 1773986866000, "retest": ""}}, {"record_id": "recvenWD2c1LoG", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "前几天收到的物品使用后又出现了漏水情况。", "no": "5772", "date": 1773986991000, "retest": ""}}, {"record_id": "recvflbviNURBi", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在2025年11月购买了Akaso EK7000 PRO，上周潜水时使用了它。水下 housing 漏水。我多次检查并清洁了密封圈，但问题仍然存在。我怀疑是按键处的O型圈有问题。", "no": "5827", "date": 1774862340000, "retest": ""}}, {"record_id": "recvfGIOLC8Uvo", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我还想指出，相机在使用其原装外壳时没有出现微渗漏迹象。只有在浮潜使用时，水渗透现象才反复发生。请查收所附的请求视频以支持这一说法。", "no": "5845", "date": 1775180583000, "retest": ""}}, {"record_id": "recvg4iEhjuZ0Z", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尊敬的女士们、先生们，\n\n我今天开始使用收到的相机，发现关闭外壳时会掉落塑料部件。恳请您寄送一个替换外壳以及详细的安装说明。", "no": "5861", "date": 1775528979000, "retest": ""}}, {"record_id": "recvg5vaAv2Z0C", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "去年9月，我们收到了运动相机的更换防水外壳。昨天我们第一次再次使用相机，直到那时才打开外壳包装。相机进满了水。\n附上照片。\n我们目前正在马尔代夫度过一个难得的假期。我们无法拍摄任何照片或视频，也无法购买新相机。这非常令人失望。", "no": "5867", "date": 1775546739000, "retest": ""}}, {"record_id": "recukKvo0S2hhm", "fields": {"status": "", "level": "S", "category": "08-防水壳，09-配件", "severity": "配件问题", "content": "防水壳和防水壳底座坏了", "no": "135", "date": 1723016916000, "retest": ""}}, {"record_id": "recumeMRzdtL1a", "fields": {"status": "", "level": "S", "category": "09-配件，08-防水壳", "severity": "配件问题", "content": "我于 2024 年 7 月 25 日通过亚马逊订购了上述产品作为我女儿的生日礼物 - 订单号 303-0074674-2640366。\n\n不幸的是，有两个部件有缺陷：\n- 夹子的弹簧夹没有缺陷，无法使用。\n- 防水壳漏水。在水下使用时会出现湿气。相机的损坏尚未发生，但从长远来看，这是可以预见的。\n\n我要求您更换配件并告诉我接下来会发生什么。", "no": "336", "date": 1724380504000, "retest": ""}}, {"record_id": "reculSojzgr6eC", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "EK7000pro电源键没反应", "no": "270", "date": 1724049574000, "retest": ""}}, {"record_id": "recunbl5oqKw6W", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "死机", "no": "419", "date": 1725245688000, "retest": ""}}, {"record_id": "recuniYnPQl25i", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我从亚马逊购买了Akaso EK7000pro。把电池充满电，放进相机里，30分钟后就开不了电了。将同样的电池取出一次，直接装进去就能再次开机(因此，我认为并不是不充电)。\n有什么解决方法吗?", "no": "448", "date": 1725358488000, "retest": ""}}, {"record_id": "recuEwWyqNOcNF", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "拍摄过程容易出现死机情况，连接APP会卡死", "no": "2257", "date": 1741139177000, "retest": ""}}, {"record_id": "recuFGiqRPIgoa", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "突然一下死机！然后就开不了机", "no": "2389", "date": 1742193509000, "retest": ""}}, {"record_id": "recuFLcn38wFqi", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "如果您更改相机设置，很可能会死机。", "no": "2403", "date": 1742265951000, "retest": ""}}, {"record_id": "recuIq51YOvfWV", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "很遗憾，相机无法正常使用。开机时屏幕立刻就会卡住，只能通过取出电池才能关机。 ", "no": "2669", "date": 1744702296000, "retest": ""}}, {"record_id": "recuJyQ9rRSkpQ", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "有时会死机，按电源键也无法关机", "no": "2813", "date": 1745747870000, "retest": ""}}, {"record_id": "recuJD5LJuivMD", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我们今天首次使用了该产品，相机出现故障，菜单屏幕一直卡住，无法开机，下载也无法完成。 ", "no": "2819", "date": 1745810697000, "retest": ""}}, {"record_id": "recuMz5q45N6FP", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "开启电源使用，中途暂停后再次使用时，电源无法开启。将电池取下再装回后，电源又可以开启，这种情况不断反复。请问这是产品故障吗？ ", "no": "3002", "date": 1748499907000, "retest": ""}}, {"record_id": "recuN76qZNHhyt", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我买了这台相机，在度假前试用了一下，当时一切都很顺利，所有功能都运行得非常好。\n现在我在度假，我小心翼翼地携带它，没有让它直接暴露在阳光下，并且遵守了所有的使用说明。\n当我想拍摄一段延时摄影视频时，它短暂地拍摄了一下，然后就完全停止了，现在它总是死机。\n我该怎么办呢？除此之外，我已经尝试了所有方法，比如更换电池、充电、取出并重新插入SD卡、恢复出厂设置，但都没有用。\n我想进行一次固件更新，据说这样会有帮助，但我不知道该怎么做，也不知道还有什么其他的修理方法。 ", "no": "3052", "date": 1749002544000, "retest": ""}}, {"record_id": "recuN9tbRmoQTs", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "相机加载后无法再操作。屏幕冻结。", "no": "3080", "date": 1749037520000, "retest": ""}}, {"record_id": "recuNLWei5B1NX", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "你注意到相机的屏幕开始冻结了，无论你使用的是哪种模式。于是你重启了相机，但之后按钮就无法正常工作了。你不得不取出电池并重新安装，试图让它恢复正常工作。你正在查找有关保修服务的信息。 ", "no": "3160", "date": 1749605942000, "retest": ""}}, {"record_id": "recuUA5Iq9AoqH", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "无法开机，重置后装入电池启动了，但无法通过电源按钮关机。\n另外，自动关机后，按下电源按钮也无法启动。使用 USB 供电时会自动启动。 ", "no": "3914", "date": 1755843816000, "retest": ""}}, {"record_id": "recuZEPvYgsrWT", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "相机停止工作了……它只能开机，但屏幕是冻结的", "no": "4647", "date": 1760494501000, "retest": ""}}, {"record_id": "recv64MpaOhm0f", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "WiFi连接死机，换货", "no": "5136", "date": 1766374741000, "retest": ""}}, {"record_id": "recv96MdZpQ9qe", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "关于相机故障的应对方法想请教一下。我购买的相机出现了故障，拍摄会中途中断（有时1分钟、10分钟、30分钟等各不相同），还多次发生自动关机的问题。型号是AKASO EK7000 Pro。", "no": "5411", "date": 1769152650000, "retest": ""}}, {"record_id": "recvf35JjaYHLP", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "播放录制的视频时，经常会出现卡顿的情况，每次都必须拔掉电池才行。开启防抖功能后，画面四周是防抖的，但中间部分会晃动，导致拍摄主体看起来模糊，完全无法使用。", "no": "5805", "date": 1774594990000, "retest": ""}}, {"record_id": "recuNBGx4yIusr", "fields": {"status": "", "level": "", "category": "18-死机，录像及回放问题", "severity": "产品问题", "content": "我的相机不会卡在 logo 界面。它会在录制界面崩溃。我为 TikTok 录制视频，所以我录的是短视频。在录制过程中，屏幕会崩溃，无法完成录制。红色指示灯仍然闪烁，但视频录制失败了。要让相机重新启动，我必须取出电池，而且我会丢失拍摄的素材，因为我不确定它是何时停止录制的。我已经进行了故障排查，但问题仍然存在。 ", "no": "3143", "date": 1749454438000, "retest": ""}}, {"record_id": "recuHKGn4444wH", "fields": {"status": "", "level": "", "category": "18-死机，11-APP问题", "severity": "APP问题", "content": "下载过程中会死机，关闭电源也无效", "no": "2590", "date": 1744090589000, "retest": ""}}, {"record_id": "recuLleWMOkUdf", "fields": {"status": "", "level": "", "category": "11-APP问题，18-死机", "severity": "APP问题", "content": "最初使用的时候顺利的完成了SD卡插入，连接APP，照片拍摄。但是，第二次与应用程序连接时，相机屏幕冻结，所以我尝试关机。然后电源按钮没有反应。", "no": "2922", "date": 1747379176000, "retest": ""}}, {"record_id": "recveKdDGOW2O8", "fields": {"status": "", "level": "", "category": "18-死机，发热问题", "severity": "产品问题", "content": "我最近给丈夫买了一台EK7000 Pro，他大概用了三次，当他查看视频时，有时会死机，必须断开电池再重新装上才行。我想知道它有没有保修？这个设备还会变得相当热。", "no": "5787", "date": 1774316124000, "retest": ""}}, {"record_id": "recuPAu4A106Mn", "fields": {"status": "", "level": "", "category": "充电问题", "severity": "配件问题", "content": "相机不插上电源就无法开机。我已经给它充电了，但一拔掉充电器就无法开机。", "no": "3301", "date": 1751268954000, "retest": ""}}, {"record_id": "recv4daLDMP3VD", "fields": {"status": "", "level": "", "category": "充电问题", "severity": "产品问题", "content": "除非将相机直接插入电源，否则它无法开机。即便如此，尽管电池已充满电且指示灯显示电量充足，相机还是会立即关机且无法再次启动。嗨，不幸的是，新电池也不管用，这意味着相机本身有故障 😪", "no": "5023", "date": 1764666493000, "retest": ""}}, {"record_id": "recuk5EgNDbtzy", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "当尝试使用新电池通过应用程序将图片从存储卡传输到手机时，出现错误消息“电池电量太低，无法使用 wifi”，存储卡变得无法访问，应用程序中显示“无数据”，尽管存储卡上有图片（可以在相机上观看）。已经发生过两次了。容易修复吗？", "no": "22", "date": 1722413203000, "retest": "@苏意梅确认电池电量是否充足"}}, {"record_id": "recupaT6dcuZdu", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "你好\n我八月份买了这个相机，从那时起我用了一周，有一次还下过水。塑料外壳的金属部分已经生锈了。第二个相当烦人的问题是，当我更换相机中的电池时，设置会松动，日期和时间设置也会松动。所以每次使用相机时我都必须设置相机。你有解决方案吗？应该这样吗？如果没有，我想更换。谢谢\n205-6724949-7816338", "no": "662", "date": 1727071284000, "retest": ""}}, {"record_id": "recuqRCk85ZLMe", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "因为购买了4k - ek7000 PRO初期不良而联系了。从设定画面“开启”抖动和“关闭连续拍摄1分钟”等设定内容的变更，关机的话也会重置。因为其他的人设定了之后好像维持着那样，所以请更换。", "no": "795", "date": 1728618800000, "retest": "已刷机仍然无效"}}, {"record_id": "recuxaRgLS6Z3b", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "相机使用两次后就停止工作了。它显示“硬件错误”，故障排除没有帮助。请告诉我如何退货并获得全额退款 - 非常失望。我买了它去潜水旅行，但没有拍到任何镜头。", "no": "1494", "date": 1734399910000, "retest": ""}}, {"record_id": "recuYfm5mE0Xxg", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "我最近从亚马逊购买了一台相机，现在遇到一个问题，即设备在选定的时间间隔后无法关机。我已经多次重置相机，并格式化了 SD 卡，但问题仍然存在。\n\n我怀疑这个问题可能与固件有关。然而，当我点击“关于”时，固件版本并未显示。能否请您给我发送该设备的最新固件更新文件，并提供安装说明？ ", "no": "4516", "date": 1759201946000, "retest": ""}}, {"record_id": "recuZiV2UJAohN", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "你好，我的AKASO 7000 pro相机无论选择何种分辨率，哪怕是最低分辨率，只要退出菜单，就会自动回到图像防抖关闭状态，完全没有图像防抖功能。此外，我无法重置相机，因为菜单无法正常使用。我对这次购买非常失望，因为骑自行车时如果没有图像防抖功能，我根本无法拍摄。根据人工智能的提示，这个问题似乎是已知问题，请问如何解决这个问题？谢谢回复。序列号：SN - AX - 240402V3G", "no": "4577", "date": 1760170739000, "retest": "SN-AX-240402V3G"}}, {"record_id": "recv28aBPASjcg", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "拍摄的所有照片的右端都有一条约1毫米的类似画面错误的绿色竖线。", "no": "4843", "date": 1762760307000, "retest": ""}}, {"record_id": "recuTUkZqWOWjk", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "录制了，但播放时却不显示。是没有保存吗？快门按钮附近的红灯有时会闪烁。", "no": "3799", "date": 1755226850000, "retest": ""}}, {"record_id": "recuVSRLTZwKeY", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "我购买并使用了这款商品，但存在很多问题，比如拍摄视频后设备出现故障，视频无法播放等。我想退货。", "no": "4168", "date": 1757037377000, "retest": ""}}, {"record_id": "recv2iSDb54eV7", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "这是一些展示所讨论问题的示例图片和一段视频。我已经查看并确认设置是“正常”的。正如我所说，我在第一次收到相机时确认过正常的照片，并且从未更改过设置。此外，如前所述，相机外壳漏了几滴水（但这是在拍摄绿色照片之后，且与拍摄绿色照片是分开的事情）。", "no": "4865", "date": 1762918563000, "retest": ""}}, {"record_id": "recv7pvc47UZAb", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "相机无论是否连接WiFi都会停止录制，有线连接时也一样。此外，WiFi无法保持连接。到目前为止我已经进行了三次硬重置，但问题仍然存在。设备型号是EK7000 Pro。另外，WiFi连接持续时间不超过几分钟就会断开，即使在删除iOS应用并重新添加以及对相机进行恢复出厂设置后，问题依旧如此。", "no": "5279", "date": 1767597075000, "retest": "sn-ax-240119v3g 二手"}}, {"record_id": "recv906fZCtfEv", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "我几个月前买了一台EK7000 Pro，发现在骑自行车时，即使我不触碰相机，视频也会在几分钟后停止录制。相机安装在车把上。相机序列号：AX-240402V3G。我将其设置为5分钟片段、4K30fps，但在上次骑行时，它在大约50分钟后停止（10个1.5GB的文件，其中一个小于1GB）。当我发现它停止后，我重新启动了它，相机只录了另外20分钟左右（大约5个1.5GB的文件，最后一个小于1.5GB）就又停止了。发现停止后，我又能录最后20分钟直到骑行结束。录制的视频总存储量约为28GB，尽管存储卡容量为128GB。我使用的存储卡是闪迪Ultra 128GB SDXC，A1级，10级，UHS-1。是的，我可以确认问题发生在安装在自行车上时，但我还没有在其他地方安装录制超过20分钟的视频，因为我买这台相机就是专门用于自行车的。我已经尝试过重置相机、格式化存储卡，并确保安装牢固（山地车的车把确实会像预期的那样振动，但支架并不松动）。", "no": "5397", "date": 1769053990000, "retest": ""}}, {"record_id": "recv91koZgH1IC", "fields": {"status": "", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "我刚买了一台全新的AKASO EK7000 Pro，并按照你的说明进行了设置。然而，在回放过程中，视频并不流畅：图像会跳帧，动作有卡顿。你能告诉我如何设置才能让回放流畅且没有卡顿吗？麦克风有嘶哑的声音，并且在整个视频中都能听到。我可以调节麦克风灵敏度吗？具体该如何操作？我在将MOV文件从AKASO相机（选择“大容量存储”后）复制到电脑另一个端口的另一张TF卡（514GB）时遇到了问题。", "no": "5401", "date": 1769072137000, "retest": ""}}, {"record_id": "recv64zsPfGV2k", "fields": {"status": "", "level": "", "category": "录像及回放问题，20-客户体验或者其他", "severity": "产品问题", "content": "相机最近会在几秒钟后自动关闭并中断录制。此外，在此之前图像稳定功能就已经非常糟糕了。由于是在2025年3月购买的，因此适用《德国民法典》第437条规定的法定保修。根据举证责任倒置（《德国民法典》第477条），可以推定该瑕疵在交付时就已存在。由于维修对我来说不合理/我已经对该型号的可靠性有过糟糕的体验，我请求解除买卖合同。\n\n我完全理解你们需要这个，遗憾的是，这个故障似乎是间歇性发生的。我注意到这个问题是在度假时，环境温度约为25-30度，并且之前有较长的录制时间。目前在家里，在较凉爽的环境中，这个故障很难重现。故障发生时电池也是满电的，我特别注意了这一点。\n\n所以就像我说的，我完全理解你们需要视频，因此现在它又能正常工作了，这真的很令人恼火。我希望你们能以某种方式体谅我，因为我当然只在度假时，也就是在较高温度下使用相机，然后这个故障就会发生。", "no": "5123", "date": 1766371657000, "retest": ""}}, {"record_id": "recv9tbABq5MqG", "fields": {"status": "", "level": "", "category": "录像及回放问题，14-SD卡问题", "severity": "配件问题", "content": "我的EK7000 Pro经常无法（似乎是随机地）将视频录制到SD卡中。我想尝试更新固件看看是否有帮助，你能发送最新的固件吗？抱歉我想我没说清楚；在过去这段时间里，我已经使用相机格式化过几次存储卡了，但问题仍然存在。", "no": "5456", "date": 1769483774000, "retest": "Akaso sd card"}}, {"record_id": "recuHKGn44pstP", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "想把数据传输到电脑上，但是用USB连接，也没有任何显示。。", "no": "2596", "date": 1744090589000, "retest": ""}}, {"record_id": "recuKFuX5poNgX", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "附属零件中的一个混入了虫子的尸体。\n零件的包装有两种，一种是密封包装，一种是简易的塑料袋包装，虫子尸体混在简易塑料袋包装的零件里。\n虽然只是一个零件，但心里实在膈应，希望能给我换一个，不知可以吗？ ", "no": "2876", "date": 1746762384000, "retest": ""}}, {"record_id": "recuWbuTOlbntA", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "尊敬的卖家，我认为这款手环并非设计用于水下使用，对吗？我觉得电池漏液了。我现在该怎么办？\n\n致以最诚挚的问候，\n\n卡特琳·克诺布洛赫\n\n通过我的三星手机发送 ", "no": "4191", "date": 1757312676000, "retest": ""}}, {"record_id": "recuWbA7mlChMv", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "你好。\n\n我在亚马逊上订购了AKASO EK7000 Pro运动相机自拍杆套装，该套装包含一台支持4K 30帧每秒的EK7000 Pro水下相机、一根自拍杆、两块电池、一个收纳包以及配件套装。我收到的自拍杆套装包裹完好无损，但盒子里没有相机。\n\n我已经通过亚马逊给你们发了消息，请求解决这个问题，但我想也在这里给你们留个消息。\n\n亚马逊提出给我退款，但我觉得另一种方案是你们可以再给我寄一台相机，因为套装里的其他产品我都已经收到了。 ", "no": "4195", "date": 1757313918000, "retest": ""}}, {"record_id": "recvadHKc726VP", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "配件问题", "content": "我于2025年9月1日购买了Akaso EK7000 Pro 4k相机，含保险（亚马逊订单号：028-7416490-1824319）。\n\n遗憾的是，随后在11月初的假期中，相机损坏了。\n\n损坏的经过如下：浮潜后，我清洁了相机，未加保护就放进了袋子里。不幸的是，我的伴侣没有看到袋子里的小相机，就把他湿的潜水面罩和脚蹼放进了袋子。\n\n虽然我很快发现了，但相机已经无法开机。\n\n我们给它充了好几次电，在大米里放了好几天，也彻底清洁了多次，但屏幕仍然黑屏。充电时相机确实会亮红灯，但没有任何声音，屏幕也不亮。\n\n我想要一个换货订单，但不想寄回SIM卡，因为里面有我们的度假视频。\n\n我很喜欢这款相机，不想退回以获得货币退款。而是希望相机能够维修，或者获得一个可以插入我SIM卡的替代品（当然可以寄回现在的相机，但不含SIM卡）。\n\n亚马逊表示只有你们能处理此事，因为亚马逊只能给我货币赔偿，但这不是我的目标。", "no": "5507", "date": 1770171151000, "retest": ""}}, {"record_id": "recvdqp86ITyNr", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "对于Akaso EK7000 Pro相机，它拍摄的照片不够清晰，即使在相当近的距离下也是如此。似乎它无法正确对焦。我可以更换一个吗？我通过进入设置、重置来重置了相机。但情况仍然相同，无论我如何调整相机角度（视野范围、窄角、中角或广角）或与物体的距离（近到远），都无法清晰显示电脑屏幕上的文字。见附件照片。我还有其他照片，但有10MB的限制。", "no": "5706", "date": 1773107204000, "retest": "SN-AX-251121 V3G."}}, {"record_id": "recukg7hUgBH0p", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，相机有故障。无法开机。开启后约 2 分钟后即可再次工作。", "no": "50", "date": 1722567882000, "retest": ""}}, {"record_id": "recukJ1XumdE8c", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机一直关机\n电池已充满电，刚收到，所以不是电池端子问题。尝试重置并取出 SD 卡。这是一张 AKASO SD 卡，所以如果有故障，那就太糟糕了", "no": "127", "date": 1722995126000, "retest": "LH240510V3C3097"}}, {"record_id": "recule2znbpQpE", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "这是我昨天在亚马逊上买到ek7000 pro后第一次使用。\n拍摄了2个小时左右的视频之后开机了，但是因为摄像头无法拍摄而无法使用。\n换了充电的电池也看不出来。", "no": "194", "date": 1723453338000, "retest": "V35AX+特莱斯镜头"}}, {"record_id": "reculifx7DB0XO", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "充电后打开电池,按下电源按钮3秒以上也打不开。", "no": "200", "date": 1723515533000, "retest": ""}}, {"record_id": "reculo7jtdALA5", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法开机", "no": "232", "date": 1723602232000, "retest": ""}}, {"record_id": "recum9KAAqbRLY", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "购买了相机用于浮潜旅行。之前用过一次，测试了一下，效果很好，在旅行前一天晚上充满电，但当我们去使用它时，相机无法开机，所以我们无法在整个浮潜过程中使用它。后来我尝试给它充电，但仍然无法开机，所以我换了电池，换上新电池后相机就可以正常工作了。我想要退款，因为我不再需要它了。", "no": "329", "date": 1724306080000, "retest": ""}}, {"record_id": "recunQ3KXSIw14", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "设置摄像头，在家里测试，一切正常。骑自行车时拿出来，屏幕上出现警告三角形，关机重启，无法开机。回家后插入笔记本电脑，一切正常，但无法关机，直到取出电池，然后无法重新打开！\n假设开/关开关不工作\n请尽快解决，因为买来送给 12 岁孩子的生日礼物，他非常失望", "no": "485", "date": 1725847387000, "retest": ""}}, {"record_id": "recunQbtpn8rvX", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我于 2024 年 5 月 13 日在亚马逊上购买了一台运动摄像机 EK7000 PRO。发票在附件中。\n我只用过一次，几分钟后显示屏就无法正常工作，然后运动摄像机就无法正常工作了。\n我想换一台新的运动摄像机，这样我就可以更换那台无法正常工作的运动摄像机。\n图片或视频都无济于事，因为您看不到任何损坏。运动摄像机无法启动。我无法打开它。", "no": "500", "date": 1725849226000, "retest": ""}}, {"record_id": "recuodppow0BxZ", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我发送了相机的照片，但还没有收到回复。此后相机一直没有重新开机，处于非活动状态。", "no": "557", "date": 1726192404000, "retest": "LH240406V3C1048"}}, {"record_id": "recuopeSvwDMcH", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法再打开。\n但是，充电 LED 会亮起。", "no": "564", "date": 1726367210000, "retest": ""}}, {"record_id": "recuoSKM7OArKd", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "设备无法开机。我想更换或退款\n\n我只在自行车上使用过相机（在保护套中）\n\n我无法发送影片，我将其发布在我的 Nextcloud 服务器上\nhttps://nextcloud.bonengel.de/index.php/s/aPx6zgSirnapgXH", "no": "588", "date": 1726803326000, "retest": "KM230725V104118"}}, {"record_id": "recuoTLabqTJFa", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "大概一年半前，我在亚马逊上买了7000 pro，一年没使用了，电池充了电，开机了。问题是电池还是主机?", "no": "614", "date": 1726818194000, "retest": ""}}, {"record_id": "recuph6VDu650O", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机电池没有充电。充电一整天后，即使我们按住按钮超过 30 秒，它也不会打开。", "no": "676", "date": 1727163237000, "retest": ""}}, {"record_id": "recurwzmsPh0m7", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "之前因为搬家一直没用过，现在初次开封时，使用充满电的电池或是直接连接充电线，都无法开机。", "no": "872", "date": 1729223924000, "retest": ""}}, {"record_id": "recus5e81Y3Ihr", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好 Shamir。我最近从亚马逊购买了您的 EK7000 PRO 型号。我用了几次，一切都很好，直到第二次下载视频后：当我断开 USB 端口时，相机变黑了，再也没有恢复，就像永久断电一样。\n\n我尝试更换电池（换成满电的），什么也没发生，当我尝试打开它时它没有启动。\n\n然后我取出存储卡，看看是否是问题所在，但还是一样。相机无法开机。\n\n我还能尝试什么？", "no": "919", "date": 1729736036000, "retest": ""}}, {"record_id": "recus5e8IIfLw5", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "前几天刚买的相机，充电完之后指示灯一直亮着，完全无法开机", "no": "924", "date": 1729736039000, "retest": ""}}, {"record_id": "recutpdWt5F6m8", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "运动摄像机有缺陷 - 无法打开。电池已充满电", "no": "1078", "date": 1730947651000, "retest": "LH240608V3C6153"}}, {"record_id": "recutMswfUPyyz", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "附上一段无法开机的短视频。我把它放在米饭里几个小时，取出 SD 卡和电池（试过不同的电池）并插上电源，但仍然没有反应", "no": "1106", "date": 1731290980000, "retest": ""}}, {"record_id": "recuzJ1F1To3X9", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，相机一直运行正常，直到最近图像才冻结，从那时起它就无法打开。电池充满电，即使相机连接充电线，无论是否插入存储卡，都无法开机。不幸的是，我无法检查固件版本，因为我无法再打开相机。请提供有关故障排除或更换相机的更多提示。非常感谢！并致以最诚挚的问候！", "no": "1845", "date": 1736737048000, "retest": ""}}, {"record_id": "recuzOOb3X3zvS", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "充电后也不无法使用。电池或电源有故障。", "no": "1873", "date": 1736822492000, "retest": ""}}, {"record_id": "recuBT9nRRFKiB", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的新相机无法开机，所以我要把它退回去", "no": "1938", "date": 1738718917000, "retest": ""}}, {"record_id": "recuC6fYDtZo3H", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我今天尝试使用它的时候，它没有无法开机了\n因为是保修期内，所以请免费修理或者发送代替品。", "no": "1971", "date": 1738912581000, "retest": ""}}, {"record_id": "recuCc5gqN7BTi", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我给儿子买了一台 EK7000 PRO 作为圣诞礼物，他今天才第一次打开它。\n\n他遇到了麻烦，因为相机可以开机，但只有一个空白的灰色屏幕。SD 卡是购买时提供的，之前也从未打开过。\n\n电池已充满电，我也无法通过 USB“绕过”电池让相机工作。\n\n您能给我一些指导吗？", "no": "1981", "date": 1738998686000, "retest": "LH240818V3C2860"}}, {"record_id": "recuCyy0H9FRAY", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我从亚马逊订购了相机。因为是赠送的，所以一周前才试用。不幸的是，我们发现它即使充满电后也无法开机。\n\n谢谢您的回复！不幸的是，这也不起作用。我想要求您退款，因为该相机原定于某一天使用，但那一天已经过去了，不再需要了。", "no": "2022", "date": 1739330616000, "retest": ""}}, {"record_id": "recuCDVM29gbQS", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法再开机", "no": "2033", "date": 1739410161000, "retest": ""}}, {"record_id": "recuCKmggpqeMd", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，相机无法开机，我试过两块电池。您能退款吗？", "no": "2052", "date": 1739505132000, "retest": ""}}, {"record_id": "recuD7BolyTFpp", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "购买后，进行测试的时候，很顺利，但是购买的第二天突然无法开机，更换电池也一样。", "no": "2095", "date": 1739848594000, "retest": ""}}, {"record_id": "recuEmAfOEBSd6", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，我买了一台相机，它已经到货，但无法开机。我已将电池充满电并插入随附的 SD 卡，但设备无法开机。", "no": "2246", "date": 1740986101000, "retest": ""}}, {"record_id": "recuHDYW4yEldN", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，相机在拍摄时关闭，并且无法再次打开。\n\n取出 SD 卡，按住电源按钮，给电池充电，\n\n不再有效。\n\n问候 Armin Sting", "no": "2560", "date": 1743991579000, "retest": ""}}, {"record_id": "recuIj24OOVbzL", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "第一次使用时，它运行正常。经过一段较长时间的闲置后，它短暂启动了一下，然后就再也无法启动了。与电脑连接也不行。我取出了电池和存储卡，等了一会儿。即便这样也没有成功。 ", "no": "2626", "date": 1744598158000, "retest": ""}}, {"record_id": "recuIBiY5EJenG", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "不幸的是，尽管运动相机已经充好电，但它无法再开机了，无法正常工作。", "no": "2695", "date": 1744868157000, "retest": ""}}, {"record_id": "recuIYXu127Jak", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，商品无法开启。商品有故障。请发送新的商品或者将钱退回到亚马逊账户。谢谢。", "no": "2722", "date": 1745217669000, "retest": ""}}, {"record_id": "recuNSdAhUQtii", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，我通过亚马逊购买了你们的这款产品！\n\n时隔一年，这款运动相机再也无法开机了！我先说一下，电池状态非常好！ ", "no": "3166", "date": 1749698736000, "retest": ""}}, {"record_id": "recuPQMGyMIvTT", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "摄像头故障，无法再开机。", "no": "3311", "date": 1751509815000, "retest": ""}}, {"record_id": "recuQvMUPQ90So", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "感谢你的耐心等待。我按照说明升级了固件。当我用文件启动相机时，它提示进行升级，升级完成后我重新启动了相机并完成了设置过程。\n\n我再次尝试开始录制视频，似乎还是和之前一样的问题，录制仅持续 2 秒就停止了。 ", "no": "3360", "date": 1752115699000, "retest": ""}}, {"record_id": "recuTDXSLoJCvI", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机部分情况下无法启动。\n\n显示屏部分情况下无反应。无法切换模式。\n\n无法进行拍摄 ", "no": "3743", "date": 1754984921000, "retest": ""}}, {"record_id": "recuVSHPdJre0t", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "关于购买的商品\n\n购买已经半年了，有时即使充电，也会出现无法开机的情况。\n将电池取出再重新装上后，就能恢复并开机了。\n不知道是不是接触不良，也有可能是电池没电了？\n你们这里不卖电池吧？\n是不是重新买一个比较好呢？ ", "no": "4146", "date": 1757035006000, "retest": ""}}, {"record_id": "recuWyXkD2h7AP", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我在录制视频的时候，有时会发现电源突然关掉了。", "no": "4276", "date": 1757659308000, "retest": ""}}, {"record_id": "recuXdPkSYn8Qe", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我在录制视频的时候，有时候会发现电源突然关闭了。", "no": "4370", "date": 1758263232000, "retest": ""}}, {"record_id": "recv0SH3wSpJvJ", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我需要Akaso7000 Pro的固件。我的显示屏黑屏了，WiFi连接也无法正常工作。", "no": "4734", "date": 1761615485000, "retest": ""}}, {"record_id": "recv1DM6X1P6S8", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "几天前刚拿到相机，已经给电池充过电了。我注意到有好几次相机无法开机，取出电池重新插入后就能启动了。这种情况发生了好几次，我有点担心。对了，刚拿到相机时，我发现电池仓里有一些黑色塑料碎片，把它们敲出来后，电池就能顺利装进去了。我附上了一张序列号的照片，还有一张掉出来的塑料碎片的照片，除此之外相机使用一切正常。希望这可以通过固件更新等方式解决？\n\n我把电池和SD卡都取了出来，然后用5V 2.5A的电源给相机供电，相机开机了，并显示“无卡！”，这在预料之中。电池和电池仓的连接看起来没问题，但外表有时是靠不住的。正如我之前提到的，奇怪的是我关掉相机后，过一会儿再去开机就没反应了，取出电池重新安装后又能正常工作了。", "no": "4802", "date": 1762311179000, "retest": ""}}, {"record_id": "recv2XIS6hBB7t", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我需要退回我的EK7000 PRO以进行更换，因为它已经无法使用了。相机停止工作，无法开机……给电池充电后，我尝试打开相机。它显示红灯和蓝灯，但无法开机。我尝试在建立有线连接（用充电线连接到电源插座）时开机，但相机还是无法启动。", "no": "4905", "date": 1763522067000, "retest": ""}}, {"record_id": "recv39xypWHhT7", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的AKASO运动相机无法使用，它无法开机", "no": "4922", "date": 1763696685000, "retest": ""}}, {"record_id": "recv9mUdMHxAQt", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你收到了更换的电池，测试后相机仍然随机关机。客服玛丽安娜告诉我这张闪迪存储卡是没问题的，但随产品一起收到的那张阿卡斯存储卡也出现了同样的问题。上周收到玛丽安娜发来的链接后，我更新了软件。", "no": "5425", "date": 1769390975000, "retest": ""}}, {"record_id": "recv9nVcvxVseJ", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "这台相机只使用过两次。现在它坏了。按按键没有反应。即使取出电池进行重置也没有效果。重新装入电池后，相机仍然没有反应。", "no": "5429", "date": 1769405987000, "retest": ""}}, {"record_id": "recvcLz9KpewC6", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法通过电源按钮开机。我已经尝试了所有故障排除步骤来修复该问题，但问题仍然存在。我已于3月1日联系亚马逊，他们将我转介给您以获取额外支持。按照亚马逊客服的建议，由于我在亚马逊的30天退货窗口已于2025年8月11日过期，我希望利用产品的保修服务进行更换。谢谢。", "no": "5655", "date": 1772503764000, "retest": ""}}, {"record_id": "recvcNcEiCT3RN", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机已经停止工作。", "no": "5661", "date": 1772527952000, "retest": ""}}, {"record_id": "recvcRsvN0sN0n", "fields": {"status": "", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法通过电源按钮开机。我已经尝试了所有故障排除步骤来解决这个问题，但问题仍然存在。我已于3月1日联系了亚马逊，他们让我向您寻求额外支 "recv3a1BkL01eG", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "关于产品附带的遥控器，相机开机后按一次能有反应，但之后无论按多少次都没有反应。重新开机后，同样是按一次有反应，之后就没反应了，反复尝试，录像机/相机都出现相同的情况。我不怎么使用该产品，但记得刚购买时遥控器就出现过故障，当时更换了新电池，虽然不记得测试过多次是否有反应，但确认过遥控器操作是有反应的，之后就一直没再使用。如果是电池自然放电导致的问题，我会再更换电池，但请问是否有复位按钮或机身设置等改善方法？另外，遥控器的录像机/相机按钮之间有个类似小灯的东西，即使操作有反应时也不亮。请告知可能的解决方法。", "no": "4927", "date": 1763703846000, "retest": ""}}, {"record_id": "recv96MeROqu1W", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "遥控器即使换了电池也无法工作", "no": "5413", "date": 1769152653000, "retest": ""}}, {"record_id": "recv9piqKbnymA", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "这有个问题，因为实际上，我在相机上使用单独的遥控器，但当我打猎时，我按下按钮，它有时会闪烁十几次（有时5次，有时30次），最后才会激活相机，但有时我得按30秒……这太长了。我原以为是电池的问题，但根本不是，所以你有解决方案吗？因为这真的很烦人🫤提前谢谢\n我打猎时的温度低至零下1度，但其他时候最多2、3度，湿度确实有，没有摔过。不过，如果我在家使用遥控器，相机没开机的情况下，它会亮起清晰的红灯，不需要等待时间，我不知道是不是在室外导致遥控器出故障？因为在我家就没有这个问题", "no": "5451", "date": 1769426299000, "retest": "@廖月滢可能是遥控距离过远，需要确认下遥控器和机器的距离"}}, {"record_id": "recvckaiJUamOR", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "产品问题", "content": "我无法连接遥控器。版本是AKASO型号EK7000 Pro SN-AX-240402V3G。我今天收到了你们的遥控器，但遗憾的是无法与相机建立连接。", "no": "5622", "date": 1772098878000, "retest": ""}}, {"record_id": "recvcpdhZcCpnH", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "附属遥控器，按下视频拍摄的灰色按钮会开始录像，但无论是短按还是长按都无法停止录像，照片模式也只能拍摄一张。", "no": "5632", "date": 1772173473000, "retest": ""}}, {"record_id": "recvcXmX7PZ7oP", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "您好，\n\n我为我们的假期购买了这款相机。相机本身和所有功能都非常完美。水下的图像回放效果也很棒。\n\n遗憾的是，遥控器无法使用，因此我们据此提出索赔。可能是电池本身有问题。\n\n请免费寄给我们一个能正常工作的遥控器。\n\n顺致最诚挚的问候，并感谢您的回复。", "no": "5677", "date": 1772678171000, "retest": ""}}, {"record_id": "recvdsmvu8jAuZ", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我的遥控器坏了，我换了电池，按钮的指示灯会亮，但摄像头没有反应。", "no": "5712", "date": 1773136131000, "retest": "重置相机后解决"}}, {"record_id": "recvdJ1xakj7O2", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "附带的遥控器无法操作，在视频模式下按下遥控器的灰色按钮会进入录像并拍摄一会儿，但再次按下按钮也无法停止。无论是短按还是长按都没有反应。在相机模式下按下红色按钮可以拍照，但之后就无法按下快门了。机身按钮没有问题。我不明白操作方法，请告诉我。通过AKASO PRO进行手机操作时，视频和相机都能正常使用。拜托了。", "no": "5729", "date": 1773382330000, "retest": ""}}, {"record_id": "recuqLMeM2yKe5", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "我是购买了AKASO EK7000 PRO的铃木。\n我在2023年7月买了它，但是因为计划改变，我一直没有开封。\n今天开封电池充电后使用的话会出现问题。\n以下是时间顺序。\nSD卡(32gb)用WindowsPC格式(FAT32)\n2)将SD卡插入相机，打开电源\n3)拍摄录像或照片，用相机播放→没有问题\n4)照相机电源关闭→电源ON\n5)录像拍摄→”忙碌…请稍等。”\n6)照片拍摄→显示“卡出错”信息\n用相机格式SD卡→“完成”信息被显示\n8)拍摄录像或照片，用相机播放→没有问题\n9)相机电源关闭→拔出SD卡插入Windows电脑\n→“需要格式化”。\n无论尝试多少次都是同样的流程。\n我想，如果你关掉相机，SD卡的格式就会坏掉。\n但是如果上述的使用方法有问题的话请告诉我正确的使用方法。\n关于附属遥控器也请给我建议。\n当我开始使用时，我的相机对遥控器没有反应，我用电池测试\n我确认了一下，电压是足够的，我把它放回原位，摸了几次，\n反应了一下，之后又没有反应了。\n即使重新买了电池，如果不改善就会浪费，所以想确认一下。\n在相机的一侧，或者在遥控器的一侧，遥控连接和开关\n我想没有，但是请告诉我解决方法。\n以上，请您回答。", "no": "779", "date": 1728532505000, "retest": ""}}, {"record_id": "recutdNPm6MdiS", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "新相机收到了，但Microsd卡无法识别。在原来的相机上没有问题可以使用，但是在新相机上插入使用时会出现错误。使用其他Microsd卡也同样会出现错误，无法使用。", "no": "1042", "date": 1730778888000, "retest": "SD卡（akaso）换卡无效"}}, {"record_id": "recutw5TLq0nxr", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "提示SD卡缓慢的标记，尝试过重新格式化UHS3的32gb卡片，也尝试插入其他卡片。开始时的2.3天的东西没有问题，可以正常拍摄和保存，但是上周五买了一个支架，想试一下的时候就一直出现这个提示，最初是正常的。", "no": "1088", "date": 1731049168000, "retest": "更换akasoSD卡解决"}}, {"record_id": "recuurbIXRyamL", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "您好，我已经格式化了几次SD卡，仍然出现卡错误。因此，不幸的是，SD 卡有缺陷。因此，我欢迎发送一份新的。", "no": "1185", "date": 1731892808000, "retest": ""}}, {"record_id": "recuNdQavfQjwk", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "最近我发现我的 EK7000 Pro 不再保存录制的内容了。相机处于开启状态，电量充足，并且通过红色闪烁灯和屏幕上的红色“视频”图标显示正在录制视频，但录制内容不会保存在 SD 卡上。SD 卡没有满，而且已经多次正确格式化。你能帮我解决这个问题吗？\n\n很抱歉我回复晚了。在过去的几天里，我进行了一些测试来确定问题所在，但问题仍未解决。\n\n我尝试使用了两张不同的 SD 卡，相关照片已附在后面。我使用相机对两张卡都进行了格式化，然后尝试录制视频，但即使是刚格式化完，视频文件也无法保存到 SD 卡上。\n\n相机详细信息：AKASO EK7000 PRO SN - AX - 240402V3G\n我使用的 SD 卡：雷克沙 128GB 微型 SD 卡和PNY 32GB 微型 SD 卡\n\n相机没有显示任何错误代码或错误信息。\n\n谢谢", "no": "3111", "date": 1749102102000, "retest": "FXC240520V301B12"}}, {"record_id": "recuNdW8UpUlo4", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "我在2025年4月29日拿到了相机，只用了一次，把数据复制到电脑上，然后相机就出现了“存储卡错误”。我尝试格式化存储卡，但失败了。\n\n我在电脑上格式化了存储卡，再次插入后还是不行。\n\n今天我收到了一张256GB的SD卡，插入后还是出现“存储卡错误”，我再次尝试格式化，还是失败了。所以我认为问题不是出在我的SD卡上。\n\n我现在该怎么办？ ", "no": "3121", "date": 1749103526000, "retest": ""}}, {"record_id": "recuVSQUa9m3ZD", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "附带的SD卡出现错误，格式化也失败了。因为需要在亚马逊进行退货换货，所以希望能得到相关说明。 ", "no": "4165", "date": 1757037170000, "retest": "带卡套装，akasoSD卡"}}, {"record_id": "recuX87vbfpd5X", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "我方的 EK7000 Pro 在进行 4K 拍摄时，会显示“慢速存储卡”，然后拍摄就会停止。目前使用的 microSD 卡有三种，分别是“铠侠 32GB microSD UHS - I Class10”、“金士顿 256GB microSDXC Canvas Go Plus Gen4 200MB/秒 A2 U3 V30”以及“创见高耐用 128GB microSD 卡 UHS - I U1 Class10（适用于行车记录仪和监控摄像头）”。这三种卡进行全高清录制时都没有任何问题，但在 4K 拍摄时，就会显示“慢速存储卡”，拍摄也会中途停止。\n\n另外，“金士顿 256GB microSDXC Canvas Go Plus Gen4 200MB/秒 A2 U3 V30”是 OSMO Pocket 3 的推荐存储卡，只要在 Osmo Pocket 3 上使用，在 4K 拍摄时就能够持续进行 4K 录制，直到电池耗尽。\n\n如果通过 EK7000 Pro 的固件更新等方式可以改善这一问题，烦请提供相应的固件。 ", "no": "4346", "date": 1758178903000, "retest": ""}}, {"record_id": "recuXB5Q9otQH7", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "AKASO的64G存储卡经常提示为低速卡。", "no": "4421", "date": 1758607010000, "retest": ""}}, {"record_id": "recuZKu9EDsGoN", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "我的相机出了点问题。我刚买了一张64GB容量、U3级别的SD卡，但把它插入相机时，相机显示存储卡有错误警告。我尝试过恢复出厂设置，并在相机内格式化SD卡，但当我尝试格式化时，它显示“格式化错误”。", "no": "4658", "date": 1760578068000, "retest": ""}}, {"record_id": "recv3PPZyTMsva", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "每次我把SD卡插进相机，相机都显示“无卡”。所以我无法录制视频/拍照。", "no": "5007", "date": 1764321685000, "retest": ""}}, {"record_id": "recv6ahOEolqiC", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "相机无法读取或格式化SD卡。每当我尝试更换存储卡时，它就会报错并关机，而且无法读取已正确格式化的存储卡。", "no": "5149", "date": 1766456109000, "retest": ""}}, {"record_id": "recv8l6AZhBIT7", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "Ek7000在使用已格式化的随附Akaso 256GB U3存储卡时出现存储卡速度慢错误", "no": "5358", "date": 1768448240000, "retest": ""}}, {"record_id": "recvck5KYgvU3A", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "您好，随相机一同销售的microSD卡无法正常工作。我无法记录我的外出活动，因为每次都会出现存储卡速度慢的错误信息。这是256GB的AKASO micro SD卡。", "no": "5621", "date": 1772097795000, "retest": ""}}, {"record_id": "recvdJ1w0p9Yje", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "录制时显示“慢速卡”并停止录制。我使用的是正品存储卡，即使购买并使用同一张卡也会出现相同情况。是机身故障吗？我已经进行过格式化。没有在其他设备上使用过。购买并使用了AKASO microSD卡64GB UHS-I U3 100MB/s microSDXC，但还是出现同样的错误。出现错误后即使格式化，仍然会因相同错误而停止。更换存储卡后情况依旧。", "no": "5724", "date": 1773382326000, "retest": ""}}, {"record_id": "recvdZPVjR9BQT", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "配件问题", "content": "我买了一个EK700 pro，想使用它。我按照说明书上的描述做了所有事情。不幸的是，它显示存储卡“卡错误，请更换卡”。这是什么意思？我今天本来想用相机去度假。我该怎么办！\n我已经格式化了存储卡，但设备还是无法识别存储卡。我把它放进手机里，手机也识别不了。附带的存储卡是有问题的。我现在该怎么办？我明天早上就要飞去度假了。", "no": "5745", "date": 1773630760000, "retest": ""}}, {"record_id": "reculdvM3iQjbN", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "", "no": "179", "date": 1723445522000, "retest": "@苏意梅指导顾客升级下对应的版本号固件，排除下是不是掉程序了"}}, {"record_id": "recuo3xWFPJiWu", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "虽然买了新的，但是不能连接Wi-Fi。\n如果本体有问题的话会退货。", "no": "537", "date": 1726046675000, "retest": "@皮浩宇有没有升级固件试一下--在联系尚未回复"}}, {"record_id": "recuoU6DsHAnjn", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "连接不上WiFi", "no": "615", "date": 1726823312000, "retest": ""}}, {"record_id": "recuqLGeVumx4L", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "我们无法用wifi连接AKASO相机。", "no": "769", "date": 1728531076000, "retest": ""}}, {"record_id": "recusPLhHErxfm", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "我无法让应用程序连接到我的 WiFi。我尝试了所有方法，但仍然无法连接。", "no": "987", "date": 1730423649000, "retest": "发送教程之后已解决"}}, {"record_id": "recusPLipSqsgB", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "晚上好，我的 ek7000pro 运动摄像机有问题。它不允许我将相机连接到我的智能手机，并且它卡在 WiFi 访问屏幕上，我必须取出电池才能将其关闭。我想重新安装该软件或在必要时进行更新以查看是否可以解锁。我将附上照片发送。\n问题是相机不会将连接发送到智能手机，因为一旦在相机上激活 WiFi，带有房间名称和密码的屏幕应该会出现，但它仍然保留在 WiFi 激活屏幕上。我已经尝试过重置但没有成功", "no": "994", "date": 1730423652000, "retest": "SN-AX-240119V3G，未提供手机型号"}}, {"record_id": "recuuDp2gZZm3L", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "相机无法连接到 WiFi，红灯一直亮着。无法执行任何操作（触摸屏无反应），模式按钮似乎没有任何作用。", "no": "1237", "date": 1732073296000, "retest": "SN-AX-220820V1G \n【ycw 20241125】：\n1、升级最新版app，已解决；\n2、插拔电池重启相机连接app；\n【sym 20241126】:已再次去信给客户跟进"}}, {"record_id": "recuxgUbs5x5SZ", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "Wi-Fi连接不上", "no": "1513", "date": 1734489262000, "retest": ""}}, {"record_id": "recuC6gphvHPtA", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "下载了akaso go，按照步骤进行了Wi-Fi连接手机的手续，但是连接不上。", "no": "1977", "date": 1738912683000, "retest": ""}}, {"record_id": "recuCnI0papAXm", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "手机无法连接WiFi", "no": "1988", "date": 1739170459000, "retest": ""}}, {"record_id": "recuExv6FTcofZ", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "WiFi总是连接不上。怎么办才好呢？是主机故障吗?", "no": "2276", "date": 1741147413000, "retest": ""}}, {"record_id": "recuMF5avFTo7P", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "连不上WIFI", "no": "3038", "date": 1748588505000, "retest": ""}}, {"record_id": "recuNLVXpOTAwq", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "嗨，相机提示我需要重启设备，但这个提示一直显示着。只有一次重启后相机正常工作了，但现在又不行了。我不确定问题出在哪里。", "no": "3159", "date": 1749605877000, "retest": ""}}, {"record_id": "recuSvmRxDNTgX", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "它无法连接手机/无线网络。\n我发送了一张照片。当我连接到无线网络时，我的手机应用程序会进入应用程序中的相机模式，但相机上的信息、本次聊天中的照片保持不变。 ", "no": "3594", "date": 1753941753000, "retest": ""}}, {"record_id": "recv45rzNC0pbw", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "它经常重启，当我下载照片和视频时WiFi连接会断开", "no": "5008", "date": 1764552288000, "retest": ""}}, {"record_id": "recuHK31QJ5cXt", "fields": {"status": "", "level": "", "category": "13-WiFi问题，18-死机", "severity": "APP问题", "content": "WiFi连接困难，即使连接成功画面也会死机。\n我想重新启动，但是关掉电源之后画面就不动了。", "no": "2583", "date": 1744081213000, "retest": ""}}, {"record_id": "recuoSIH9FARFw", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "Following the procedure including the iPhone suggestion to enable video file downloads I get a failed download error message every time i try to download video files to my iphone via the Akaso Go app. Help ! :-) Photo jpeg's download fine.\n\n\nFirst and foremost thank you very very much for your extremely quick response, it is very much appreciated. :-)\n\nHowever back to the issue. I have tried as many of your suggestions as I am able, although I must point out the YouTube link provided is for a different WiFi issue, not the one I have, and whilst there I looked but couldn’t locate a video referencing my issue.\n\nRest assured this will not make me return the camera as I am still very pleased with it, and in the mean time I can plug the camera directly into my phone via a USB C to USB C cable, but of course have to remove the camera from the housing to do so.\n\nOn another point if I may, your company has very kindly offered me discount codes as an apology and don’t get me wrong, they are appreciated, however as they have to be used on your site and not Amazon where I made my original purchase it makes the discounts pointless as delivery charges far out way the savings. If the discounts could be used on Amazon that could at least would make them more useful. \n\nOn another note, I notice on the Asako Facebook site, members showing free gifts provided by Asako, how does this happen?\n\nFinally, if I can help to resolve the download issue with beta software or new firmware I’m very happy to help, or in case of issues, if you could provide a test camera I wouldn’t say no.\n\nHowever, thank you again for trying to help, and if you have any other suggestions or things I could try, please don’t hesitate to let me know.\n\nAll the best,\n\nPaul", "no": "584", "date": 1726802830000, "retest": "AX-240119V3G"}}, {"record_id": "recurZiN4Ydx7k", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "我有一台 AKASO EK7000 pro，可以连接 iPhone 和三星。遗憾的是，我无法连接 iPad Air IOS 17.6.1。", "no": "899", "date": 1729648489000, "retest": ""}}, {"record_id": "recut7leAvV359", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "不幸的是，我无法在应用程序中访问 EK7000pro 相机中的       renderAll(data, snaps, top_level);
    }
  } catch(e) { console.warn('刷新失败', e); }
  btn.textContent = '↻ 刷新数据'; btn.classList.remove('loading');
}

initCharts();
loadFromLocalData();
</script>
</body>
