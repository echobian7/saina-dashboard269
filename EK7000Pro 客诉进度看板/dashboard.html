<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;

  .header { margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: .5px; }
  .header .sub { font-size: 12px; color: #6e7681; margin-top: 4px; display: flex; align-items: center; gap: 12px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; display: inline-block; }
  .update-time { color: #8b949e; font-size: 12px; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi-card {
    background: #161b22; border: 1px solid #21262d; border-radius: 10px;
    padding: 18px 22px; position: relative; overflow: hidden;

  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.blue::before  { background: #58a6ff; }
  .kpi-card.green::before { background: #3fb950; }
  .kpi-card.yellow::before{ background: #d29922; }
  .kpi-card.red::before   { background: #f85149; }
  .kpi-label { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
  .kpi-value { font-size: 42px; font-weight: 700; line-height: 1; }
  .kpi-card.blue  .kpi-value { color: #58a6ff; }
  .kpi-card.green .kpi-value { color: #3fb950; }
  .kpi-card.yellow .kpi-value { color: #d29922; }
  .kpi-card.red   .kpi-value { color: #f85149; }
  .kpi-sub { font-size: 11px; color: #6e7681; margin-top: 6px; }
  .panel { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; }
  .panel-title { font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .panel-title .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .panel-title .dot.blue   { background: #58a6ff; }
  .panel-title .dot.green  { background: #3fb950; }
  .panel-title .dot.yellow { background: #d29922; }
  .panel-title .dot.red    { background: #f85149; }
  .panel-title .dot.orange { background: #e3b341; }
  #trendChart { width: 100%; height: 280px; }
  .mid-row { display: grid; grid-template-columns: 1fr 1.5fr; gap: 14px; margin-bottom: 14px; }
  #statusChart  { width: 100%; height: 280px; }
  #categoryChart{ width: 100%; height: 280px; }
  .s-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .s-table thead tr { border-bottom: 1px solid #21262d; }
  .s-table th { text-align: left; padding: 8px 12px; color: #8b949e; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .s-table td { padding: 9px 12px; color: #c9d1d9; border-bottom: 1px solid #161b22; vertical-align: middle; }
  .s-table tbody tr:hover { background: #1c2128; }
  .s-table tbody tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .snap-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .snap-table th { text-align: left; padding: 8px 14px; color: #8b949e; font-size: 11px; font-weight: 500; border-bottom: 1px solid #21262d; letter-spacing: .5px; }
  .snap-table td { padding: 9px 14px; border-bottom: 1px solid #1c2128; color: #c9d1d9; }
  .snap-table tr:last-child td { border-bottom: none; }
  .snap-table tr:hover td { background: #1c2128; }
  .snap-table .today-row td { background: #1a2535; }
  .snap-table td.num-blue   { color: #58a6ff; font-weight: 600; }
  .snap-table td.num-green  { color: #3fb950; font-weight: 600; }
  .snap-table td.num-yellow { color: #d29922; font-weight: 600; }
  .snap-table td.num-red    { color: #f85149; font-weight: 600; }
  .refresh-btn { float: right; background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all .2s; margin-top: -2px; }
  .refresh-btn:hover { background: #30363d; color: #c9d1d9; }
  .loading { opacity: .5; pointer-events: none; }
  .empty-tip { text-align: center; color: #3fb950; padding: 20px; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <h1 id="dashTitle">EK7000Pro 客诉进度看板</h1>
  <div class="sub">
    <span><span class="live-dot"></span></span>
    <span>数据源：飞书多维表格</span>
    <span class="update-time" id="updateTime">加载中…</span>
  </div>
</div>

<div class="kpi-row">
  <div class="kpi-card blue">
    <div class="kpi-label">总记录数</div>
    <div class="kpi-value" id="kpiTotal">—</div>
    <div class="kpi-sub" id="kpiTotalSub"></div>
  </div>
  <div class="kpi-card green">

</div>

<div class="panel">
  <div class="panel-title">
    <span class="dot blue"></span>客诉趋势（每日快照）

  </div>
  <div id="trendChart"></div>
</div>

<div class="mid-row">
  <div class="panel">
    <div class="panel-title"><span class="dot blue"></span>状态分布（最新）</div>
    <div id="statusChart"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><span class="dot orange"></span>问题归类 TOP（最新）</div>
    <div id="categoryChart"></div>
  </div>
</div>

<div class="panel">
  <div class="panel-title"><span class="dot red"></span><span id="topTableTitle">最高优先级待处理问题</span></div>
  <table class="s-table">
    <thead>
      <tr>
        <th style="width:70px">编号</th>
        <th style="min-width:160px">问题</th>
        <th style="width:90px">状态</th>
        <th style="width:100px">归类</th>
        <th style="width:110px">严重程度</th>
        <th>最新跟进备注</th>
      </tr>
    </thead>
    <tbody id="topTableBody">
      <tr><td colspan="6" style="text-align:center;padding:20px;color:#8b949e;">加载中…</td></tr>
    </tbody>
  </table>
</div>

<div class="panel">
  <div class="panel-title"><span class="dot yellow"></span>每日快照记录</div>
  <table class="snap-table">
    <thead>
      <tr><th>日期</th><th>总量</th><th>已解决</th><th>待处理</th><th id="snapTopLabel">最高优先级待处理</th></tr>
    </thead>
    <tbody id="snapBody">
      <tr><td colspan="5" style="text-align:center;padding:20px;color:#8b949e;">加载中…</td></tr>
    </tbody>
  </table>
</div>

<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

no": "1669", "date": 1735548809000, "retest": ""}}, {"record_id": "recuyM9l7oK92E", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "“我希望你能帮助我或给我指明正确的方向。我丢了相机的电池盖。我该如何更换它？”", "no": "1739", "date": 1735867074000, "retest": ""}}, {"record_id": "recuBT9pl7EPaU", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "我第一次打开电池盖时，盖子上的一块塑料脱落了，无法再盖上。能否给我寄一个新的电池盖？\n 除此之外，我们对您的产品非常满意。", "no": "1942", "date": 1738718923000, "retest": ""}}, {"record_id": "recuBTw3H0m5WJ", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我去年 11 月在亚马逊上为我的孙子买了这个，昨晚屏幕掉了，我们该如何解决这个问题？", "no": "1956", "date": 1738724313000, "retest": ""}}, {"record_id": "recuCycPu46xDt", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "电池盖坏了，电池从电池仓里掉了出来——我拿了一个替换件来替换这个很小的部件。", "no": "2005", "date": 1739325568000, "retest": ""}}, {"record_id": "recuCycQWOII9K", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我们从亚马逊购买了一台 EK7000 Pro。不幸的是，从一开始，相机在拍照时就会发出破裂的声音，就好像相机里有什么东西松了一样。\n可以进行替代配送吗？然后我会将有缺陷的物品寄回。", "no": "2017", "date": 1739325574000, "retest": ""}}, {"record_id": "recuDHoc8BxZeC", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "大约一个月前我购买了 Akaso EK7000 PRO，不幸的是，当我打开电池盖时，电池损坏了。我附上了塑料损坏处的照片。现在它已经无法正常关闭，也无法再组合在一起了。可以将新门作为备件吗？提前非常感谢您，我等待信息。", "no": "2166", "date": 1740377398000, "retest": ""}}, {"record_id": "recuDS49pExISE", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "您好，我第一次尝试取下相机的塑料电池盖时，它的末端坏了，但仍然可以使用，现在电池盖的其余部分已经脱落，不再能盖住电池。我能否寄送替换部件？非常感谢", "no": "2200", "date": 1740535159000, "retest": ""}}, {"record_id": "recuECRQUALta4", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "电池盖坏了", "no": "2277", "date": 1741226716000, "retest": ""}}, {"record_id": "recuFLck60pLyD", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "将其固定在自家车上拍摄视频时，轻微振动就会发出咔嗒咔嗒的声音。\n自己拆开检查了内部，发现是因为没有固定的零件（麦克风零件？）发生了振动导致发出的声音。\n使用海绵把缝隙填满之后就不发出声音了，但我认为这应该是初期不良品吧。", "no": "2395", "date": 1742265938000, "retest": ""}}, {"record_id": "recuHVu80eFd7O", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "不，我没有在水中用过它。\n但是，我无法取出电池，也无法取出 SD 卡......我希望无论如何都可以恢复卡上的内容。", "no": "2613", "date": 1744250211000, "retest": ""}}, {"record_id": "recuIY5XQke3MB", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "装电池的小门坏了。我想知道你们有没有替换部件。如果有的话，并且更换起来花费不是太高的话，我想订购 2 个。那个部件似乎有点易碎。 ", "no": "2705", "date": 1745204914000, "retest": ""}}, {"record_id": "recuODNwuBb9BL", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "电源会自动关闭，症状有点像失调的感觉。\n电源按钮按下时会卡住。\n因此，电源会出现自动关闭、无法开启或无法关闭的情况。 ", "no": "3225", "date": 1750401789000, "retest": ""}}, {"record_id": "recuPXAYWNAj8i", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "无法取出SD卡。因为能显示拍摄张数和可录制时间，所以我想卡槽方向应该是正确的。 ", "no": "3326", "date": 1751610460000, "retest": ""}}, {"record_id": "recuSkZ8jfHtKv", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "配件问题", "content": "我的 EK7000 Pro 4K 30fps 相机的电池盖在使用一个多月后坏了。我怎样才能获得一个替换的电池盖呢？", "no": "3541", "date": 1753788337000, "retest": ""}}, {"record_id": "recv0UyeSMwWMY", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "请问你们在维罗纳及周边地区有服务中心吗？我的Akaso EK 7000的充电接口有点问题。", "no": "4741", "date": 1761642937000, "retest": ""}}, {"record_id": "recv16dYXHjuG7", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我购买了EK7000 Pro，在拍摄视频时，如果机身晃动或受到轻微振动，音频中就会出现类似敲击金属的咔嗒声噪音。使用颈挂式手机/运动相机支架时，这种噪音出现得很多，让我很困扰。请问这种症状是相机本身的故障，还是可以通过设置消除？", "no": "4776", "date": 1761815427000, "retest": ""}}, {"record_id": "recv1zasti2j2Y", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我购买了一台Akaso ek7000 pro运动相机，用于摩托车骑行安全记录。几周后，电池盖掉了，找不到了。我是否有机会获得一个电池盖替换件？因为我几乎每天都骑摩托车，没有电池盖固定电池，电池会松动，导致相机自动关机并停止录制。", "no": "4792", "date": 1762243100000, "retest": ""}}, {"record_id": "recv1zaRTOJkUi", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "从亚马逊收到时电池盖就有裂纹，尝试取下时它就完全碎了。我已经在亚马逊申请了退货，如果你有办法再寄一个（或者两个）电池盖，请告诉我——顺便说一句，这个电池盖的设计太差劲了，它有裂纹并不奇怪，而且一旦那块裂开了，我根本就不该尝试去取下它，太脆弱了。", "no": "4793", "date": 1762243198000, "retest": ""}}, {"record_id": "recvg4izWgsRxa", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "您好，我的相机出了问题，相机内部零件似乎与机身脱开了，Micro SD卡槽和USB-C接口在机身内发生了移位，因此无法使用。此外，拍出的照片也模糊不清。请进行维修、更换或退换。", "no": "5860", "date": 1775528963000, "retest": ""}}, {"record_id": "recuFnycF35a8C", "fields": {"status": "", "level": "", "category": "04-结构装配，06-电池", "severity": "产品问题", "content": "我通常在船上用电源线。插入电源线后，它就停止打开了。插入电池后它仍会打开。我认为电源端口与相机的连接已失效。我可以从亚马逊购买一台新相机，但我已经拥有所有配件，所以我不想再购买它们了。你能只卖给我相机吗？如果可以，价格是多少？", "no": "2363", "date": 1741916521000, "retest": ""}}, {"record_id": "recukg5MlokhDV", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "我于 7 月 28 日在亚马逊购买了 Akaso EK700pro (SN-AX-240119V3G)，它在短时间内没有任何问题（见随附发票）。我能够按照手册中的描述进行设置，相机正常工作了一段时间。\n\n使用两周后，电源/模式按钮突然停止工作。即使使用新装的电池，也无法通过按住电源按钮三秒钟来打开相机。即使长时间按下按钮，相机也不会启动。\n\n后来我发现，同时按下电源和“向上”按钮三秒钟，相机确实启动了，但模式按钮仍然不起作用。我无法通过按下按钮来切换模式或切换相机。\n\n此外，即使正确设置了日期，视频和图片的日期戳也是错误的。每次我按照上述步骤打开相机时，所有图片和视频的日期都是 01/01/2024 00:00。\n\n请告诉我如何让相机再次按预期工作或如何修复它。\n\n如果您有任何其他问题，请随时使用以下电子邮件地址与我联系。\n\n谢谢，并致以最诚挚的问候", "no": "49", "date": 1722567523000, "retest": ""}}, {"record_id": "recupa1kEqElgu", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "正在使用，但电源按钮没有反应。电池很充足。", "no": "644", "date": 1727058469000, "retest": ""}}, {"record_id": "recuqFsyhWceBK", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "模式按钮卡住了，请求更换", "no": "752", "date": 1728439156000, "retest": ""}}, {"record_id": "recur9ajr2Ft5r", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "10月2日我去度假时飞行，从那时起，开/关按钮就不再可靠地工作。有时它仅适用于特殊的印刷技术。按“正常”根本不起作用。", "no": "833", "date": 1728878099000, "retest": ""}}, {"record_id": "recuvLFfjppjet", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "按钮不起作用", "no": "1323", "date": 1733111503000, "retest": "HK240620V300008"}}, {"record_id": "recuy1pEg9QsmV", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "装防水壳里用完拿出来发现按键凹陷", "no": "1604", "date": 1735176475000, "retest": ""}}, {"record_id": "recuy8u4pKY77V", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "一切正常；无论是否有外部电源连接。\n电池正在运行，遥控器也正常，只是电源开关没有反应，菜单中也没有。", "no": "1640", "date": 1735280961000, "retest": ""}}, {"record_id": "recuDMEqeNxjcL", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "我于 1 月 19 日购买了这款相机，我在家测试了一下，以确保它能正常工作。当我到达海滩目的地时，产品的快门按钮不再用于拍摄。它毫无用处，非常不开心，我现在没有这款相机用于旅行", "no": "2191", "date": 1740455146000, "retest": ""}}, {"record_id": "recuE4a6aQ4X36", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "您好，我在亚马逊上购买的 Akaso EK7000 Pro 相机出现了问题。电源按钮已经两周不能用了。打开相机的唯一方法是通过 usb-c 插入。我已经与亚马逊客户服务部门进行了所有检查，但电源按钮仍然无法点火。因此，我请求您根据保修条款更换相机。谨致问候，莫里斯先生。", "no": "2222", "date": 1740713893000, "retest": ""}}, {"record_id": "recuFF9D9GGCWJ", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "产品侧面的向上箭头不再按下。相机一直在盒子里使用，没有掉落或损坏。", "no": "2367", "date": 1742176639000, "retest": ""}}, {"record_id": "recuFMpbhQOZHM", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "您好，开/关模式按钮卡住了，凸轮因此停止工作。我几乎尝试了所有方法都没有成功。凸轮只用在保护盒中，因此没有灰尘或污垢。我想要更换。", "no": "2411", "date": 1742283779000, "retest": ""}}, {"record_id": "recuIAI0ROC4dm", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "你好，我在亚马逊买了你们的一台水下相机。这台相机在我度假的第一天就坏了。快门按钮掉了，所以在我为期四个月的休假期间我都没法使用这台相机。我想把它寄回去，但是亚马逊说退货期限已经过了。我昨天才回到德国。 ", "no": "2686", "date": 1744859350000, "retest": ""}}, {"record_id": "recuNdTs6mtX4h", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "电源开关按不动了，我想更换这台设备。", "no": "3117", "date": 1749102885000, "retest": ""}}, {"record_id": "recuOUgbakuzrq", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "很遗憾，快门卡住了。因此我无法拍照或录制视频。我今天最后一次使用相机时搭配了随附的水下外壳，拍完最后一张照片后，快门就卡住了，再也弹不起来。", "no": "3231", "date": 1750645040000, "retest": ""}}, {"record_id": "recuRyTSaUXRl5", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "早上好，仅使用了一次（为了了解功能）之后，它就再也无法开机了。我认为问题出在开机按钮上。连接电源时，摄像头正常开机，但无法通过按钮关机。", "no": "3442", "date": 1753077819000, "retest": ""}}, {"record_id": "recuUQVYwYQLIs", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "我这台相机已经使用过两次了，现在侧面下方的小选择按钮坏了。它陷在里面，再也弹不起来了，因此也无法按下进行选择。我该怎么办？", "no": "3932", "date": 1756092693000, "retest": "LH241016V3C6168"}}, {"record_id": "recuZinvNpK2TB", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "按键凹陷", "no": "4573", "date": 1760162748000, "retest": ""}}, {"record_id": "recuZuLssZowq8", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "感谢您的耐心等待。我已随这封邮件附上了证明材料。自去年 12 月以来，我一直很喜欢使用这款相机进行工作。我每周会使用您的设备几次来完成工作。不幸的是，快捷按钮已经磨损了。当设备装在保护套里时，我无法使用它；即使设备不在保护套里，快捷按钮也无法使用。对我的工作而言，通过快捷按钮开启 Wi-Fi 模式，能让设备快速连接网络，从而高效地继续工作。现在我不得不把设备拿出来，通过触摸屏来开启 Wi-Fi 模式，这既耗时又让人恼火。\n\n鉴于我使用贵公司产品还不到一年，按钮就已经出现故障，我恳请您解决这个问题。\n\n希望能收到您的回复。 ", "no": "4616", "date": 1760345771000, "retest": "HK240708V3C0490"}}, {"record_id": "recv1sWYFhZ5uu", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "你好，我的EK7000 pro出了点问题。电源按钮失灵了，相机无法开机。我已经尝试了所有手册上的方法，但还是不行。我已经检查过电池，也换了第二块电池，还按照你邮件里写的方法进行了重置。但不幸的是，问题仍然没有解决。", "no": "4788", "date": 1762151229000, "retest": ""}}, {"record_id": "recv1EXTceWuSa", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "我于2024年5月13日购买了这台相机。遗憾的是，它现在无法正常工作，侧面的按钮卡住了。订单号4577910。此外，Homeet品牌的游泳圈把手的固定带也损坏了，购买日期为2024年5月18日，订单号1703528。", "no": "4806", "date": 1762328762000, "retest": ""}}, {"record_id": "recvfH3gncIcJR", "fields": {"status": "", "level": "", "category": "05-按键", "severity": "产品问题", "content": "我的EK7000 pro的电源按钮有问题。问题是电源按钮不总是能正常工作。有时候可以，有时候不行。我尝试切换模式并在视频中反复开关机。", "no": "5846", "date": 1775185456000, "retest": "https://drive.google.com/file/d/1fUwG1X9Y2gUu74dJgkcRxKYqkd_kA0Vx/view"}}, {"record_id": "recur96STd1cBi", "fields": {"status": "", "level": "S", "category": "05-按键，08-防水壳", "severity": "产品问题", "content": "我在亚马逊上购买的 Akaso EK7000 Pro 出现了问题。\n\n我在潜水时使用它，最大深度为 19 米。\n\n水下外壳密封性不佳，无法应对这种深度。即使外壳正确关闭，一些水和湿气也会渗入。由于外壳结构，水会聚集在前电源按钮处，见图片。\n\n现在最大的问题是，自从潜水以来，这个按钮不再正常工作，并且已被湿气损坏。\n\n该按钮只能使用一次来打开设备，但之后就不能使用了。因此，您无法再使用该按钮继续拍照或关闭设备。然后只能通过取出电池来关闭设备。我还尝试过多次通过触摸屏重置设备，但问题仍然存在。\n\n我对 Akaso 的质量非常失望！我想更换有缺陷的设备。我不会再戴着它潜水了。\n\n您也不应该宣传带外壳的摄像头适用于 40 米以下的深度。外壳甚至不能防水 20 米。\n\n到目前为止，我还没有写过关于摄像头的评论，因为我想等待您作为客服的回复。\n\n非常感谢，我期待您的回复。", "no": "832", "date": 1728877282000, "retest": ""}}, {"record_id": "recukyMkJbfXk9", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我最近购买了 EK7000 相机。我给充电器提供的 2 块电池充电。每块电池使用时间约为一小时，并且无法再次充电。即使相机插上电源，电池也无法充电。我应该向她咨询什么", "no": "84", "date": 1722843639000, "retest": "LH240413V3C6966"}}, {"record_id": "recukEBKWqq18Q", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "你好，我订购了一台相机，但后来其中一块电池损坏了，无法点亮相机，我相信是电池故障，请尽快回复我", "no": "101", "date": 1722929776000, "retest": "@苏意梅麻烦问下客人，电池能不能用座充冲进电"}}, {"record_id": "reculo6wKbjY5R", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "一块电池没电了，无法充电。", "no": "220", "date": 1723602045000, "retest": ""}}, {"record_id": "recum9O3hG36zr", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "您好，很遗憾，相机交付时电池有缺陷。我已经通过电子邮件告诉过你这一点。 你能帮我解决这个问题吗？", "no": "331", "date": 1724306906000, "retest": "@苏意梅麻烦让客人重组装下，可能没组装好，另外给客人补发一块新电池吧"}}, {"record_id": "recunj8QLV4H8N", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "您好，产品很棒，灵活且易于使用，但我很难设置随附的所有仪表，而且电池寿命太短。如果我整夜充电或每天充电 3-4 小时，当我外出时，每块电池都无法持续使用 1 小时。想到我的相机正在录制，后来发现它在录制过程中已经没电了，真是令人沮丧。在这种炎热的天气下骑自行车录制时确实出了问题。需要做点什么。", "no": "459", "date": 1725360982000, "retest": ""}}, {"record_id": "recup9VVvSsl2D", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "首先，很棒的产品线，我的同事使用 Brave 7 推荐了这款运动相机，但我注意到它的电池寿命很短，我打算在狩猎季节的寒冷天气中使用，我有什么办法可以退货退款或换成 Brave 7，谢谢（不能退回亚马逊，因为我把盒子扔掉了）", "no": "636", "date": 1727057181000, "retest": ""}}, {"record_id": "recuvLFg6V0hfH", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我买了一台相机，但其中一个电池坏了。ASIN：B07JR1XZ78。我需要更换电池。", "no": "1327", "date": 1733111506000, "retest": "侧边编号  JHY4G01"}}, {"record_id": "recuxccvbIQL4c", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "两块电池中有一节不能用，您能给我寄一块新电池而不退回整个产品吗？", "no": "1499", "date": 1734419747000, "retest": ""}}, {"record_id": "recuz4LNfpGAkW", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我订购了 Akaso EK7000 pro，但不幸的是，我收到的其中一块电池没有拉环。我担心如果我使用这块电池，就无法再将其取出。", "no": "1753", "date": 1736142213000, "retest": "返修机"}}, {"record_id": "recuzfLAuh7TrA", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "您好，回答您的问题 1 不，相机尚未使用，因为我们在圣诞节期间给它充电，周六我女儿回去上骑马课时就可以使用了。\n我尝试取出 SD 卡并按住电源按钮，正如周六与我交谈的助手所建议的那样。阅读此消息后，我查看了电池盒应该在哪里，却发现它是空的。我猜问题可能出在这里？\n能否尽快给我寄一块电池，这样我就能知道这是否是唯一的问题。我需要尽快解决这个问题，因为我买了这个，所以我的女儿可以为她的 PE GCSE 录制她的课程，她需要大量的镜头才能获得成绩。\n非常感谢您尽快回复我。😊\n凯瑟琳·佩里", "no": "1811", "date": 1736304703000, "retest": ""}}, {"record_id": "recuCycQWOSUuP", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "但是，从去年 10 月开始，我注意到相机只能录制很短的时间，然后反复停止。 当时，我认为这是由于电池电量不足造成的。\n\n实际上，我很少使用这款产品。\n昨天，我有一个重要的录音要做，所以我给两块电池都充满电并开始录音。 但是，当我检查时，录音只持续了很短的时间就关闭了。\n\n我对这款产品的性能非常失望，并后悔因为这个缺陷而购买它。\n当我最需要它的时候，相机无法正常工作，给我带来了很大的不便。 （录音是为管弦乐队试听的。）\n\n我想询问是否可以在产品保修期内将此产品换成其他产品。", "no": "2007", "date": 1739325574000, "retest": ""}}, {"record_id": "recuCycQWO3xH1", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "两块电池中有一节根本充不上电。我们尝试直接在相机中充电，并使用底座充电。\n\n两块电池中有一节在相机、充电底座和充电线上都运行良好。因此我们认为可以排除这些部件出现问题的可能性。未充电的电池看起来也没有损坏。", "no": "2012", "date": 1739325574000, "retest": "FXC240520V302039"}}, {"record_id": "recuDeMrdoXxGp", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "用户体验问题", "content": "电池续航时间太短了", "no": "2113", "date": 1739954661000, "retest": ""}}, {"record_id": "recuGZqJGqfL8Z", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "是的，没问题，我问过我儿子，他 15 岁，很诚实，他是否掉过它，他的回答是没有！而且它看起来不像是掉下来的，看起来好像有什么东西钩住了它，把它拉断了，但我看不到充电器内部或相机本身有任何损坏。无论如何，我相信他说的是实话，但我承认这有点奇怪，抱歉。", "no": "2511", "date": 1743392375000, "retest": "@苏意梅有机器SN号或者电池丝印吗@蒋兴国 HK241107V3C0282 "}}, {"record_id": "recuKnvctpi7RO", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "你好，尽管已经设置了最低分辨率，并且行车过程中显示屏也处于关闭状态，但电池续航连 30 分钟都达不到。尽管我试用了各种充电线，但给电池充电几乎要花一整天的时间。除此之外，我对这款相机还是满意的。您能如何帮我解决这个问题呢？\n\n感谢您的及时回复。\n\n当然，我是用相机附带的充电器进行充电的。充电时间并非说明书上所说的 2 小时，而是将近 12 个小时，也就是半天时间。电池续航达不到 30 至 40 分钟。尽管已经设置了最低分辨率，并且行车过程中显示屏也处于关闭状态。要么是电池有问题，要么是充电器有问题，要么就是相机有问题。 ", "no": "2841", "date": 1746496469000, "retest": "：BI SN-SJ4000SC"}}, {"record_id": "recuKtudNBreRk", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "晚上好，电池无法再充电了。我已经检查过相关步骤。只有直接充电测试成功了，如果我装上电池，相机就无法开机。 ", "no": "2859", "date": 1746584894000, "retest": "@苏意梅麻烦获取下电池丝印，确认下是不是超库龄电池"}}, {"record_id": "recuNdTLUC9Vpb", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我已经按照说明操作了。在日光下，视频勉强可以接受。但我原本对 4K 画质有更高的期待。\n\n不过，电池的问题仍然存在。昨天两块电池都用原装充电器充了电，但今天就已经不是满电状态了。\n\n如果可以的话，我真的很想把相机退掉。\n\n祝好！ ", "no": "3118", "date": 1749102961000, "retest": ""}}, {"record_id": "recuNLQDP7VhXT", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我有一块电池和充电器出现了问题，请问可以更换充电器和电池吗？", "no": "3158", "date": 1749604610000, "retest": ""}}, {"record_id": "recuQURy7Z5xTO", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我在亚马逊上购买了这款产品。我使用机器时，它会自动关机，只有拔掉电池再重新装上才会再次启动。只有其中一块电池会出现这种情况，另一块电池似乎没有这个问题。我认为问题出在电池上。您好，我已经按照您说的做了所有检查，但问题还是再次出现了。更换电池后，问题似乎不再出现，所以我推断是两块电池中有一块有问题。相机是首次使用，所以不存在因时间久了而产生腐蚀的问题。我觉得就是两块电池中有一块有缺陷。 ", "no": "3415", "date": 1752486212000, "retest": ""}}, {"record_id": "recuRJwJXLxydU", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "其中一块电池无法正常工作。它会在5到10分钟内电量耗尽。", "no": "3465", "date": 1753234846000, "retest": "LH250330V3C5734"}}, {"record_id": "recuXvB6hwrub5", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我在使用 EK7000 Pro 这款相机时遇到了问题。电池续航能力极差，相机一旦开启就会立刻没电，导致我根本无法拍摄视频。我想退回这款相机。 ", "no": "4401", "date": 1758525812000, "retest": ""}}, {"record_id": "recuXApen9XTks", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "保修情况。交付的两块电池中有一块无法正常使用，无法充电。我是否应该将这块电池寄回进行更换？", "no": "4409", "date": 1758596866000, "retest": "JHY4126"}}, {"record_id": "recv08ddPcHnFi", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "几天后我确认其中一块电池无法充电。指示灯一直呈红色……很抱歉", "no": "4676", "date": 1760928715000, "retest": ""}}, {"record_id": "recv0pqvawnJfV", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "昨天，我的Akaso EK7000 PRO相机（2025年7月11日从亚马逊购买）回家后无法开机。我将其连接到电脑，除了电池充电的红灯外没有任何反应。我更换了电池，但无论是否连接电脑，它仍然无法开机。\n\n整个晚上我都没给它插电。今天早上，一切正常，我还把两个视频传输到了电脑上。\n\n但后来，它又无法开机了。取出电池再重新插入，有时能让它恢复工作。\n\n需要帮助，请给出建议。\n\n开机问题似乎是间歇性的。重新安装电池似乎有帮助。\n\n我已经重置了相机，并将观察问题是否仍然发生。如果没有，我会进行其他步骤。如果问题解决了，我会告知。\n\n因为我把相机装在自行车头盔上，无法看到相机是否已经开机，所以需要它能始终如一地开机，以便捕捉视频画面。\n\n似乎用其中一块电池时工作正常，但用备用电池时就不行。保修包括电池吗？如果包括，我需要一块新的备用电池。", "no": "4699", "date": 1761183027000, "retest": "SN: LH240322V3C1066"}}, {"record_id": "recv3a1FXKqaAl", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "配备的2个电池中，有1个似乎还是有故障。即便充满电也会马上断电。请问可以只购买电池吗？", "no": "4941", "date": 1763703864000, "retest": ""}}, {"record_id": "recv8eLsnCQrF5", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我买了这个相机，本来挺高兴的，但有一块电池充不了电，另一块电池在录制10分钟后就没电了，对这个产品不满意，你能帮忙吗", "no": "5346", "date": 1768354545000, "retest": ""}}, {"record_id": "recveEwzSGESWS", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "你好，我两周前刚买的这台相机，电池充不进电。能给我寄新的吗？", "no": "5784", "date": 1774231980000, "retest": "@苏意梅这一台麻烦联系让客人把有问题的电池寄到美西"}}, {"record_id": "recuqRiKLznpDc", "fields": {"status": "", "level": "", "category": "06-电池，09-配件", "severity": "配件问题", "content": "今天刚收到我的 Akaso EK7000 Pro。请注意，支架安装得不太好（见附件），两块电池中的一块无法保持超过十分钟的电量。\n\n相机运行正常，但如有需要，希望更换零件。", "no": "784", "date": 1728614136000, "retest": "LH240608V3C2842"}}, {"record_id": "recuura2Fvl5tG", "fields": {"status": "", "level": "S", "category": "06-电池，08-防水壳", "severity": "配件问题", "content": "打不开\n\n你好，用电缆打开，但用两块电池就不行，是的，相机在水下使用了几次潜水", "no": "1177", "date": 1731892407000, "retest": ""}}, {"record_id": "recvbynL3FO1wx", "fields": {"status": "", "level": "S", "category": "08-防水壳，06-电池", "severity": "配件问题", "content": "我于2025年1月13日购买了AKASO EK7000 Pro（含128GB MicroSD卡），在使用过程中一直遇到相机意外关机的问题，即使电池已充满电。此外，随相机配备的水下防水外壳在首次使用后就损坏了。由于时间限制，我之前未能联系客服，但现在希望能获得帮助解决这些问题。请告知维修、更换或保修选项。谢谢。\n\n情况是这样的。我把相机放进去一次，那个黑色塑料部件就掉下来了。这台相机是EK7000 Pro，我花了不少钱买的。\n\n相机一直在自动重置，电池也不行了。\n\n我现在直接用电源线供电运行。", "no": "5578", "date": 1771392821000, "retest": ""}}, {"record_id": "recv5punVBnCTh", "fields": {"status": "", "level": "", "category": "06-电池，13-WiFi问题", "severity": "产品问题", "content": "感谢有机会解释我的设备出了什么问题。有两件事，电池根本撑不了多久，我感觉每隔35到45分钟就得换电池。另一件事是它无法保持与应用程序或WiFi的连接，而且当我成功连接后它又断开连接时，即使我在设置中已将其设置为自动连接，它也不会自动重新连接。\n\n我已经按照搜索到的问题解决方案进行了故障排除，比如重置设备、格式化存储卡、清洁设备。", "no": "5090", "date": 1765764616000, "retest": "@廖月滢看客人手机是不是打开了：智能选择最佳网络，打开了要关闭，不然会自动选择联网的WIFI热点"}}, {"record_id": "recukg7v7xZphE", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "帮助将摄像头安装到头盔上的部件坏了。而且我丢失了 1 年保修退款邮件。", "no": "51", "date": 1722567933000, "retest": ""}}, {"record_id": "recukxSlttfJC0", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "因此，我收到的包裹中的夹子 1 弯曲了，所以当我将相机放入时，它不会与背面齐平，而是倾斜放置，如果我尝试使用这个夹子，它就会掉出来。\n其他一切都很好，我不想因为一个零件而将整个东西寄回亚马逊。（大背夹）", "no": "63", "date": 1722830295000, "retest": " LH240413V3C8641"}}, {"record_id": "recukF9XGq0Xw4", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "承蒙关照。\n关于饰品坐骑的问题。\n正常安装mount的时候有一点浮起，是规格吗?上部看起来稍微安装甜美，头盔和自行车的安装也没有问题吧?附上图像。\n请确认!（大背夹不匹配）", "no": "116", "date": 1722937928000, "retest": ""}}, {"record_id": "recukPfJDUQnjO", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "嗨，是的，我还是遇到了这个问题。我会附上一段简短的视频和图片来演示。每当我尝试将外壳底部推到底时，顶部夹子都不会固定住，我觉得它在使用时很容易掉出来。你能提供更安全的框架外壳吗？谢谢，尼克。", "no": "140", "date": 1723087067000, "retest": ""}}, {"record_id": "reculZi1Vs2qgy", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我可以将相机放入夹子中，但底部无法正确放入夹子后部。我拍了一些照片，照片显示了底部的间隙和相机所处的角度。有没有可以发送照片的电子邮件地址？", "no": "311", "date": 1724151510000, "retest": "编号是4"}}, {"record_id": "recumeMQXL8HB8", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "334", "date": 1724380502000, "retest": "编号是4"}}, {"record_id": "recumeMRMB5e6J", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我想根据保修条款为 3 月 11 日购买的用于自行车的 Akaso EK7000 Pro 运动相机提出索赔。\n\n根据 Akaso 网站 (https://www.akasotech.com/blogs/AKASO%E2%80%99s-current-position-in-the-Action-Camera-industry) 的信息：\n\n“AKASO 运动相机设计有安装系统，可以将其牢固地固定在冲浪板、自行车甚至头盔上——几乎任何具有良好抓地力的东西上。”\n\n我的经验并非如此。\n\n7 月，我在当地骑行时，将相机安装在照片 Akaso 1 中所示的配置中。尽管车把支架仅用手指拧紧在车把上（即未使用随附的扳手拧紧夹紧螺栓），但当我经过路面颠簸时，车把支架的下部“C”形夹子裂成了两半。幸运的是，我能够用一只手抓住防水盒中的相机，以免它掉到路上。照片 Akaso 2 显示了我设法保留的车把支架的部件。\n\n我自费购买了一个新的车把支架。\n\n本周日（2024 年 8 月 18 日），在诺福克骑自行车度假期间，在骑车前往大雅茅斯时，我使用夹子将相机安装在照片 Akaso 3 中所示的配置中。\n\n直到我到达目的地（由于专注于繁忙的城市交通），我才注意到夹子分成了两部分。这导致运动相机、电池、64GB 存储卡（也是通过 Amazon.co.uk 从 Akaso Store 购买的）以及 Clip 的剩余部分全部丢失。Clip 唯一剩下的部分是黄铜涂层螺纹钢制插件，如照片 Akaso 4 所示。尽管我跑回 Great Yarmouth 大约 3 英里，但我还是找不到相机等。\n\n您会明白，在仅拥有 5 个月后，这是一个非常令人失望的损失，我认为这是由于做工不合格或产品未能达到其网站上的声明。我认为应该提供替代品或退还我为该产品花费的 74.29 英镑。", "no": "337", "date": 1724380505000, "retest": ""}}, {"record_id": "recumI3jf3R6KK", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "在另外购买的红米三脚架自拍杆上，使用ek7000 pro附带的三脚架适配器进行了安装，虽然是同一厂家，但是间距不一致，非常吃力，想要改变角度。转接器的螺丝部分裂了，不能装在自拍杆上。\n这样的话就麻烦了，能把三脚架适配器作为补偿发给我代替的东西吗?", "no": "388", "date": 1724812937000, "retest": ""}}, {"record_id": "recumVwES2uuKO", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "413", "date": 1725012024000, "retest": ""}}, {"record_id": "recunneXlcOZe8", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "用遥控器试着拍了照片和视频，但是没有反应。是遥控器出了故障吗?相机没有问题。", "no": "467", "date": 1725421543000, "retest": ""}}, {"record_id": "recunXxiI0f88t", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "521", "date": 1725957863000, "retest": ""}}, {"record_id": "recuoTria7DRkR", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "603", "date": 1726813458000, "retest": "编号是4"}}, {"record_id": "recuprktRSpgVy", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "687", "date": 1727314230000, "retest": ""}}, {"record_id": "recuqWVT6gffZv", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "刚从亚马逊买了一台 EK7000 pro\n1) 当我执行第 2 步时（用力拉动安装扣，导致柄脚断裂\n2) 我给两块电池都充电，将电池安装到相机中，多次按住电源按钮至少 3 秒钟，屏幕上没有任何活动迹象\n\n请帮忙", "no": "812", "date": 1728697345000, "retest": ""}}, {"record_id": "recureKTAZNtGF", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "自行车支架坏了", "no": "847", "date": 1728960699000, "retest": ""}}, {"record_id": "recutMhnAsa8Cx", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "1091", "date": 1731288325000, "retest": ""}}, {"record_id": "recuw8WgsBtUHM", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我第一次使用相机时，山地自行车支架在方向盘上固定时坏了。我需要更换", "no": "1391", "date": 1733455415000, "retest": ""}}, {"record_id": "recuy2qJYpNuVQ", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大家好。\n我的 Akaso EK7000 Pro 上的部分支架在包装中断裂（附图）。\n你能把这部分新的发给我吗？", "no": "1613", "date": 1735191509000, "retest": ""}}, {"record_id": "recuAzwP26TI0k", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "下午好，\n我今天下午刚收到我的新 EK7000 Pro（通过亚马逊购买，订单 702-3346138-4942606），正在尝试夹子 2，它在夹在某物上时断了。我想知道是否可以买一个新的？它停留了大约 5 分钟，然后断了。\n\n谢谢，", "no": "1927", "date": 1737512843000, "retest": ""}}, {"record_id": "recuAAtptvmmF7", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我最近通过亚马逊购买了一台 EK7000 Pro。我把它用作自行车上的行车记录仪，昨天自行车把手的附件坏了（见附图）。我可以换一台吗？", "no": "1928", "date": 1737526806000, "retest": ""}}, {"record_id": "recuCyz0hSklsX", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "防水壳底座坏了", "no": "2025", "date": 1739330853000, "retest": ""}}, {"record_id": "recuDGQbsBvfUK", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "产品问题", "content": "女士们，先生们\n\n充电盒盖子无法正常关闭。翻盖或盖子不再锁定到位。他不再被紧紧抱住。这就是盖子不断上升的原因。我想对此进行投诉并要求他们给我发送一个新的充电盒。", "no": "2161", "date": 1740369292000, "retest": ""}}, {"record_id": "recuDMFcLYtLDZ", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "电池盖的盖子无法正确关闭。", "no": "2193", "date": 1740455332000, "retest": ""}}, {"record_id": "recuEr70krqhPS", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "大背夹不合适", "no": "2249", "date": 1741053011000, "retest": ""}}, {"record_id": "recuFFdvYJPg2Y", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我购买了 akaso ek7000 pro 相机，但在骑摩托车时丢失了一条带子（见红色圆圈）。\n我决定使用车把支架，但它坏了。我可以得到替换的车把支架和带子吗？问候，", "no": "2370", "date": 1742177565000, "retest": ""}}, {"record_id": "recuGlEEJhe7KC", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "照相机框的勾爪无法完整卡入。固定勾爪的话照相机的底部部分会脱落。", "no": "2457", "date": 1742804639000, "retest": ""}}, {"record_id": "recuGlEEJhYhl4", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "安装框架的时候，就像附件照片一样，前端的一点点勾爪部分无法卡入，使我非常不安。勾爪不会完全正好卡入吗？\n没办法，现在只能使用橡皮筋辅助卡入了。", "no": "2458", "date": 1742804639000, "retest": ""}}, {"record_id": "recuGBzQcyyhvy", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，我们的Akaso Go相机在我们想把它安装在自行车支架上，结果它掉到地上后，中央夹子断了。可惜配件套装里没有这个替换部件，所有附件都需要安装在相机上的这个接口。我们在哪里可以买到这个替换部件呢？", "no": "2491", "date": 1743039912000, "retest": ""}}, {"record_id": "recuHKGn441JvH", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我在购买 EK7000Pro 时，收到了一个形状不同的镜框。\n它与相机机身完全不匹配，而且相框已损坏。", "no": "2585", "date": 1744090589000, "retest": ""}}, {"record_id": "recuIk1dOIrUoJ", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "A支架坏了", "no": "2646", "date": 1744612729000, "retest": ""}}, {"record_id": "recuIYXgsqlH2g", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，遗憾的是，相机支架上的一个塑料夹子在开箱时就已经损坏了。我不想退回相机，只想更换这个部件。请问可以吗？（这台相机是我送给女儿的生日礼物，我不想再把它拿走了。）", "no": "2721", "date": 1745217617000, "retest": ""}}, {"record_id": "recuJ9RRL7TK1V", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "早上好，昨天是我第一次使用保护套，不幸的是，它坏了，我还弄丢了相机及其SD卡和我所有的视频😭😭😭。我原本以为它在我骑自行车的时候会更耐用些。 ", "no": "2761", "date": 1745378870000, "retest": ""}}, {"record_id": "recuKnvhyOjh8N", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，我从 Akaso EK7000 Pro 相机上配备的 H 支架，在我回到自行车旁时发现它损坏了，可能是使用导致的。该物品没有受到我或其他任何人的物理损坏。请问我可以换一个零件吗？ ", "no": "2842", "date": 1746496489000, "retest": ""}}, {"record_id": "recuLDkthRoR2y", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "交付范围内的框架支架有缺陷/损坏，它无法可靠地卡住相机。对此有什么解决办法？", "no": "2942", "date": 1747646467000, "retest": ""}}, {"record_id": "recuN9sKiD2ItB", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我周六收到了相机的替换卡子。当我打开气泡包装袋时，发现它在原来破损处的对面也破了。你能给我寄一个装在盒子里的吗，这样邮局就不会把它弄坏了？ ", "no": "3079", "date": 1749037414000, "retest": ""}}, {"record_id": "recuPGwejWjN8r", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，我当时把相机安装在自行车把手上使用，其中一个固定架断了，导致相机掉到了地上。能否请你为我更换这个损坏的固定架？我不太清楚它是 C 型固定架还是 D 型固定架。没有固定架我就无法使用相机了，所以希望能尽快收到一个替换的固定架，非常感谢。\n亚历克斯", "no": "3305", "date": 1751358130000, "retest": ""}}, {"record_id": "recuQvIQR6fvcW", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "今天，我把设备安装在摩托车头盔上出门了，结果在中途休息的时候，我发现它从头盔上脱落了。我顺着来路返回去找，但没有找到。我是用附带的部件将设备安装在头盔上的，我想可能是在行驶过程中，由于风等原因导致它脱落了。\n附带的安装部件在将设备安装到摩托车头盔上时固定力度不够，存在脱落的风险。从防止事故的角度出发，我强烈要求对产品进行改进。 ", "no": "3351", "date": 1752114730000, "retest": ""}}, {"record_id": "recuRDGKesDwFC", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "这台相机此前使用过一次，并且拍摄了非常漂亮的影片。遗憾的是，在使用过程中，以下部件损坏了。是否有可能获得该部件的替代品呢？", "no": "3457", "date": 1753148573000, "retest": ""}}, {"record_id": "recuRPiLE0dP9Y", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "A 支架在拧紧螺丝后裂开了。", "no": "3466", "date": 1753320174000, "retest": ""}}, {"record_id": "recuRQGTPKD6Y6", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我的 EK7000 Pro 4K 30 帧摄像机的电池盖在使用一个多月后就坏了。我怎样才能换一个新的电池盖呢？", "no": "3478", "date": 1753340700000, "retest": ""}}, {"record_id": "recuSeGYrg1bcA", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "这部分已经折断了，而我甚至都还没用过它。", "no": "3507", "date": 1753695351000, "retest": "LH250218V3C0375"}}, {"record_id": "recuSl3NFNnZn2", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好，我一直在查看我 EK7000 Pro 相机的配件，发现里面的那个夹子（1 个）无法将相机紧紧固定住。夹子顶部的塑料片无法与相机顶部接触。我使用这款相机的目标之一是在骑踏板车时使用它，但这个夹子无法固定住相机。在此期间，我打算用防水壳把相机安装在踏板车上。 ", "no": "3555", "date": 1753789449000, "retest": ""}}, {"record_id": "recuTFQlLJlnnV", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我最近购买了一台 EK7000 Pro。我非常喜欢它，但遮盖电池仓的塑料门在我第一次拆卸时就坏了，现在无法关上。是否可以再购买一个电池门呢？\n我还想补充一点，当没有安装电池时，门很容易损坏，因为下面有空隙。 ", "no": "3748", "date": 1755012679000, "retest": ""}}, {"record_id": "recuUjSfzugPtv", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我上周收到了这个物品，我把它安装在我的自行车上使用了几次，没有出现任何问题，我对它很满意。\n\n今天早上我在通勤路上，安装支架突然断了。路面并不颠簸，我骑得也不快，所以我不知道是什么原因导致的。幸运的是，我能够及时停车并取下相机，没有让它掉到路上。\n\n我不需要退还相机，因为我对它很满意，但我不知道该如何处理这个坏掉的支架。\n\n谢谢\n斯蒂芬", "no": "3866", "date": 1755604186000, "retest": ""}}, {"record_id": "recuUWJCNHyonq", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，\n\n就在7天前，我在亚马逊购买了一台由其官方店铺销售的AKASO相机（型号7000pro）。我按照使用说明书，并仅使用包装盒内附带的原装支架，将相机安装在了我的摩托车头盔上。\n\n在我第二次使用时，支架在马略卡岛帕尔马的MA - 19高速公路上脱落了（靠近法恩马略卡购物中心的第一个入口处）。相机飞了出去，落到了中央隔离带，据国民警卫队告知，出于安全原因，无法取回相机，因为在高速公路中央行驶是违法的。我立即把车停在路边，试图寻找相机，但只捡到了一些散落在那里的破碎支架零件。\n\n我想明确指出：\n• 这台相机的使用时间还不到一周。\n• 仅使用了原装支架，并且是按照说明书正确安装的。\n• 支架脱落并非使用不当所致，而是支架在设计或制造上存在缺陷。\n• 此次事故导致相机完全丢失。\n• 亚马逊方面让我直接与你们联系，以处理解决方案。\n\n鉴于以上情况，我请求贵方授权亚马逊为我办理该设备的退款或换货事宜，因为该产品未能满足其最基本的安全功能要求。\n\n随信附上我捡到的破碎零件的照片。\n\n非常感谢您的关注，期待您的回复。\n\n谨上，\n贝伦·罗阿塔", "no": "3965", "date": 1756178407000, "retest": ""}}, {"record_id": "recuVDqqsdfm5a", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我需要另一块电池盖。", "no": "4101", "date": 1756809213000, "retest": ""}}, {"record_id": "recuX7l3yr3k5L", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "配件损坏。", "no": "4338", "date": 1758167356000, "retest": ""}}, {"record_id": "recuXGi1CmSUEr", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我刚收到我的 EK7000 Pro。我第一次打开相机底部的电池仓门时，仓门一侧就断了！我要如何更换电池仓门呢？", "no": "4428", "date": 1758683806000, "retest": ""}}, {"record_id": "recuYadoMPKLm0", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我已经用了它几次，真的很喜欢它的使用效果。不过，我遇到了一个问题。当我更换电池时，电池仓门坏了——一侧的薄片断了。现在仓门无法紧密贴合了。 ", "no": "4506", "date": 1759125993000, "retest": ""}}, {"record_id": "recuYgPKooC1kd", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我拥有一台Akaso EK7000 Pro运动相机（序列号：FXC240626V300052）。这款相机的电池盖设计很差，非常容易损坏。我试过用胶带粘，但不起作用。电池会有轻微晃动，以至于相机在晃动时就会关机。对于一款运动相机来说，这种情况非常不方便。 ", "no": "4522", "date": 1759223790000, "retest": ""}}, {"record_id": "recuZe2HbSZ4UM", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "又是新的一天，我的Akaso EK7000 Pro运动相机（序列号：FXC240626V300052）又出问题了。这次是自行车固定架坏了。塑料部分直接断裂了，这似乎令人难以置信，因为我只是用手指的力量拧紧的。\n\n我在2025年6月26日把相机安装到了自行车上，所以这个固定架只撑了三个多月几天。\n\n你能给我寄一个（或者最好能多寄几个）替换的固定架吗，这样我就能继续在自行车上使用我的相机了。除了这个问题以及电池盖的问题之外，这台相机用起来很不错！\n\n我是从一家线上商店（ComputerSalg A/S）购买的这台相机。 ", "no": "4566", "date": 1760098681000, "retest": ""}}, {"record_id": "recv16dC3wPvUA", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我今年8月在亚马逊购买了AKASO AK7000PRO，之后又在亚马逊购买了该机型专用的外接麦克风。之后我将其安装到相机机身上并切换到外接麦克风模式进行拍摄，但没有录到声音。请问怎样才能录到声音呢？麻烦您了。", "no": "4767", "date": 1761815338000, "retest": "@皮浩宇和客人确认下，相机设置外置麦开关打开没 @蒋兴国确认已开启，且没有连接其他适配器，目前已做外置麦交换处理等待反馈"}}, {"record_id": "recv28av1u82Kg", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "电池盖坏了。", "no": "4842", "date": 1762760281000, "retest": ""}}, {"record_id": "recv2joX7GNsff", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "背夹配件不贴合", "no": "4869", "date": 1762926266000, "retest": ""}}, {"record_id": "recv2vqXEPwZzC", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好\n\n我有两台AKASO EK7000 Pro 4K运动相机，两台都从配套的支架上掉下来了，这让我非常失望。\n\n请问还有保修吗？或者能做些什么？\n\n我在下面附上了照片，因为我只在路上找到了相机壳，相机不见了，当时天很黑，车也很多。你可以从连接处看到它坏了。", "no": "4883", "date": 1763104060000, "retest": ""}}, {"record_id": "recv461EwqlH4c", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "你好，我今天刚收到我的AKASO相机，我按照包装盒上的说明想把相机从固定在盒子上的支架上取下来，结果那个部件完全断裂了。我希望你能确认一下断裂的是哪个支架部件，并且由于相机是全新的，能否寄一个新的给我。我已附上照片供参考。\n\n我曾在30英尺深的潜水中使用你们的相机和水下外壳，结果水下外壳漏水了，现在相机无法开机。我刚买这台相机才两到三周，本来是计划用在这次重要的潜水旅行中的。现在，在我为期多天的旅行中的第一次潜水，相机就完全坏了。说我对质量感到失望和沮丧都太轻描淡写了。我对你们的各种相机及其质量做了大量研究，最终选定了我购买的这款。我看到的大多是好评，所以决定忽略那些差评。唉，都怪我自己，现在在潜水旅行假期中没有相机可用了。我要求立即全额退款，而且我不会给你们留下这台相机应得的差评。", "no": "5011", "date": 1764560885000, "retest": ""}}, {"record_id": "recv70GNiEQcRf", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好，\n\n包装说明书上要求轻轻抬起一个塑料挂钩以解锁相机的防水支架。\n\n不幸的是，这个挂钩断了。\n\n请问能否进行必要处理以更换该部件？\n\n顺祝商祺", "no": "5252", "date": 1767230432000, "retest": ""}}, {"record_id": "recva7Ei1GqZRD", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我为儿子圣诞节订购了这台相机，现在才打开包装，但电池仓打不开，也找不到可以拨打的支持电话。", "no": "5498", "date": 1770081668000, "retest": ""}}, {"record_id": "recvadrWmWZ1Tk", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "我刚收到我的EK7000Pro相机。相机安装在盒子内侧的黑色支架断了。我该如何获取另一个？", "no": "5505", "date": 1770167383000, "retest": "SN code SZLH251028V30302"}}, {"record_id": "recvbL2JLpB1tj", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "这条数据线（USBA转USBC）已经出现破损，我和儿子都觉得露出电线不安全。我们只用过两次，并且一直妥善保管。请问可以更换吗？", "no": "5591", "date": 1771579904000, "retest": ""}}, {"record_id": "recvc6SJ7rgep9", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好，\n\n希望您能提供帮助。\n\n去年为了度假购买了这台相机，只用过一次。几周后就要度假了，在准备东西并测试相机时，发现相机的电池盖断裂了，盖不上。我一直找不到可以替换这个部件的东西，请问您能就如何解决这个问题给出建议吗？\n\n另外需要说明的是，水下伸缩自拍杆和防水罩的部分部件已经生锈。导致自拍杆无法打开，并且从连接处断裂，对于一个设计用于水下的产品来说，这似乎不太好……需要指出的是，上次度假回家前，所有东西都彻底晾干了。请查看附件图片。\n\n非常感谢。", "no": "5595", "date": 1771902598000, "retest": ""}}, {"record_id": "recvcpdigvFmOU", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "用于将相机安装到自行车上的H型支架配件坏了。它昨天早上之前一直好好的。但是今天早上我试图安装相机时，发现支架开裂了，再也无法牢固地固定相机，所以我无法在自行车上使用它了。\n\n我在亚马逊上单独搜索过这个配件，但找不到单独出售的H型支架。\n\n请问我怎样才能获得这个配件的替代品？\n\n我还尝试通过两年保修注册/支持表单提交请求，但显示我的产品已经注册。不过，我不确定如何继续申请保修服务，也不知道应该在哪里提交请求。\n\n如果您能指导我如何使用保修并申请支持，我将不胜感激。", "no": "5633", "date": 1772173474000, "retest": ""}}, {"record_id": "recvctV7CkhixY", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "相机的自行车支架不够用。相机在骑行过程中掉落。", "no": "5638", "date": 1772243025000, "retest": ""}}, {"record_id": "recvfjQQoZFHJn", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "您好，我们购买了上述相机，第一次使用时，手柄就从相机外壳的连接处断裂了。幸运的是，相机在丢失前被及时接住了。这款相机本身非常适合拍摄动作镜头，但现在手柄和连接处损坏了，它的使用受到了限制。请查看附件照片，请问是否可以更换手柄和连接处？非常感谢。", "no": "5822", "date": 1774842640000, "retest": ""}}, {"record_id": "recvfv1aaUEfpx", "fields": {"status": "", "level": "S", "category": "09-配件", "severity": "配件问题", "content": "其中一个支架在使用第一天就坏了。附件是图片。", "no": "5837", "date": 1775007640000, "retest": ""}}, {"record_id": "recv4Wt4h5bF0a", "fields": {"status": "", "level": "S", "category": "09-配件，充电问题", "severity": "配件问题", "content": "两块电池都有这个问题。当你把电池插入相机时，一切似乎都正常。但当你关闭相机，然后试图再次打开相机时，它无法工作，除非你取出电池并重新安装。你不装电池，用USB线连接相机，这时一切似乎都正常。此外，支架上的搭扣不能将相机妥善固定到位。", "no": "5068", "date": 1765335789000, "retest": ""}}, {"record_id": "recukJ1XApYBDU", "fields": {"status": "", "level": "", "category": "09-配件，漏件", "severity": "配件问题", "content": "我收到了运动相机，上面写着会附带悬挂支架，只是我没有支架（H支架）", "no": "129", "date": 1722995127000, "retest": ""}}, {"record_id": "recukfP187ONN0", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "亲爱的阿卡苏商店团队，\n不幸的是，水下外壳的侧面按钮漏水，因此水可以在 5m 处进入。因此，我要求更换或退回相机并报销费用。\n此致\nN·达尔克", "no": "42", "date": 1722563528000, "retest": ""}}, {"record_id": "recukfP2qX0c3z", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水渗入外壳，相机无法使用", "no": "43", "date": 1722563533000, "retest": ""}}, {"record_id": "recukg9EwEFJdY", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我该如何发送漏水的照片……？\n\n我只在水下使用相机时才注意到这一点。我不想再冒着损坏它的风险了！", "no": "54", "date": 1722568446000, "retest": ""}}, {"record_id": "recukyo0uUApbw", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次进入水中时，相机的防水外壳漏水。干燥后相机和卡都没问题。外壳已干燥，没有相机，外壳已浸入有水的水槽中。水再次进入外壳。外壳开口处的接头完好无损，因此我只能假设水是通过镜头盖或按钮进入的。（图片镜头盖有水滴）", "no": "69", "date": 1722837841000, "retest": "LH240318V3C0718"}}, {"record_id": "recukyoEXBqUrd", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机外壳已损坏，我无法使用任何附件。（底部端子）", "no": "70", "date": 1722837997000, "retest": ""}}, {"record_id": "recukytviO1joz", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尽管小心操作，但在浮潜旅行/潜水开始时，外壳仍然很紧，按下按钮（触发器）几次后，外壳就会让水通过。目视密封完好，密封件和外壳上没有异物。", "no": "77", "date": 1722839151000, "retest": ""}}, {"record_id": "recukywMrZc9n0", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "提供的外壳预计防水深度为 40m，但水在 15m 处进入外壳。我们尝试了几次以排除不正确的锁定。\n相机可以工作。然而，正如所述，外壳的防水深度不可达 40 米。水仅在 16m 处进入。超过30分钟也没有使用。幸运的是，到目前为止，相机还没有损坏。由于带外壳的相机是专门为潜水购买的，这非常烦人。我们进行了泄漏测试。正如我所说，一旦你深入一点，问题就会出现。", "no": "82", "date": 1722839932000, "retest": ""}}, {"record_id": "recukyHzA9T7QH", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "专为水肺潜水而购买。防水外壳在 20 英尺处持续漏水。", "no": "83", "date": 1722842504000, "retest": "LH240504V3C0009"}}, {"record_id": "recukD7JI26RAQ", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "希望你能在这些照片中看到裂缝。裂缝很小，但会影响表壳的防水性。（按键处模印）", "no": "100", "date": 1722907845000, "retest": "LH240226V3C6253"}}, {"record_id": "recukJ1XCKh11U", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们把相机放在防水盒里，放在游泳池里，现在它根本打不开", "no": "130", "date": 1722995127000, "retest": ""}}, {"record_id": "recukJ1XOC9aLK", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我通过亚马逊购买了 Akaso EK7000 相机。相机没问题，但防水外壳损坏了。您能否寄送一个替换外壳，谢谢。", "no": "131", "date": 1722995128000, "retest": ""}}, {"record_id": "recukJ9Ka1XDFI", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水下外壳的密封性不佳，导致相机受损", "no": "132", "date": 1722996981000, "retest": ""}}, {"record_id": "recukOPjiAviiQ", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，您能帮我修理一下我的新防水壳吗？我收到的防水壳缺少一个垫圈，而且漏水了。", "no": "136", "date": 1723080772000, "retest": ""}}, {"record_id": "recukVU1mDhSJ9", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我两周前买了一台 EK7000 相机。第一次使用后，相机盒的盖子就坏了（黑色部分）。请附上图片。", "no": "147", "date": 1723185327000, "retest": ""}}, {"record_id": "reculcdJ3BOxW8", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我想抱怨一下我的相机：\n我专门为当前的潜水假期购买了这款相机 - 相机与水下外壳的工作距离可达 40m。在从最大深度 18 m 的潜水过程中，相机充满了水，我非常失望，因为质量很差，相机由于外壳内的水而不再工作，因此未能记录这些经历。\n因此我想拿回我的钱。", "no": "154", "date": 1723426444000, "retest": ""}}, {"record_id": "reculcdJ9XVLgR", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "当我第一次使用 Akaso 时，我注意到有一点水进入了使产品防水的盖子", "no": "155", "date": 1723426445000, "retest": ""}}, {"record_id": "reculifwEqo4wT", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我五月份买的，七月才第一次潜水，水从防水外壳的电源按钮处渗入。\n我担心在水里按一下按钮，水就不会进来了，所以我尝试了在水里按一下按钮，但是水还是渗进去了。\n说明中有40m防水功能，但水在最大深度23m处渗入，可能是外壳故障，请更换。", "no": "196", "date": 1723515531000, "retest": ""}}, {"record_id": "reculo6xJmhcCF", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "不幸的是，相机在第一次使用时就停止工作了。5 分钟后，水开始渗入外壳，相机变黑了。现在无法重新启动它。\n\n非常不幸，因为我不在度假，无法拍照。\n\n请告知如何退货以及下一步该怎么做。\n提前谢谢。\n\n谨致问候\nMaren Otte", "no": "221", "date": 1723602049000, "retest": ""}}, {"record_id": "reculo7jtdaZBq", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们严格按照说明操作，在经过大量研究和好评后选择了这款产品。\n然而，在水下使用 15 分钟后，塑料外壳内就进水了，腐蚀了电池和 SD 卡，因此根本无法恢复任何图像。\n\n由于我们在度假，我们不得不购买替代品和额外的 SD 卡以及数据包才能访问使用它所需的应用程序！这对我们来说确实非常昂贵。", "no": "223", "date": 1723602232000, "retest": ""}}, {"record_id": "reculo7jtdb1fO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水外壳不起作用，导致水进入外壳并引起冷凝。我尝试联系您的实时聊天并等待了一个多小时，但没有人接听电话。\n\n请分享有关如何退回此相机并购买新相机的说明。\n\n感谢您的帮助。", "no": "228", "date": 1723602232000, "retest": ""}}, {"record_id": "recultW95CoPmX", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "当我打开包装时，透明外壳破了", "no": "234", "date": 1723688229000, "retest": ""}}, {"record_id": "recumxKjXPAovf", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机在防水盒里不防水，我用它来浮潜，它进了水。我想要退货或退款。我从来没有在没有防水盒的情况下使用过它。\n\n谢谢\n\n朱莉娅", "no": "358", "date": 1724660648000, "retest": ""}}, {"record_id": "recumI3jf33nxI", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "使用后马上就被水淹没了。过了退货期限。可以更换吗?", "no": "387", "date": 1724812937000, "retest": ""}}, {"record_id": "recumIPHY745dv", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次使用这款相机时，我带着它潜入水下 35 英尺。产品规格表明其额定防水深度为 131 英尺。然而，尽管正确关闭，但仅在 35 英尺处，外壳就漏水了。这导致外壳内部出现水滴和冷凝水，影响了镜头的清晰度。", "no": "392", "date": 1724824472000, "retest": ""}}, {"record_id": "recunbAXzcaqct", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尊敬的女士，尊敬的先生，\n最近我买了一台 AKASO EK7000 PRO（2024 型号）并去潜水。\n不幸的是，外壳漏水了，水进入了相机。这种情况发生在 20 米以下，当按下侧面的一个按钮（变焦）时。我从未潜到相机的最大深度。在陆地上将相机晾干后再试，外壳又漏水了。\n每次都是这样。幸运的是，相机干燥后仍然可以使用。\n这非常令人惊讶，因为我们购买了几台类似的相机，它们的外壳都是\n防水的，使用按钮时也是如此。\n希望这只是制造失误的一个特殊案例，我恳请您\n给我寄一个不漏水的外壳。我很乐意将漏水的外壳寄回给您检查。\n谨致问候，（按键漏水）\nJulie Barillet", "no": "424", "date": 1725249471000, "retest": ""}}, {"record_id": "recunu8x9nfThW", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我今天在水下使用了相机，深度大约为 50-62 英尺。它没有漏水太多，但确实漏了一些水，这让我很紧张。这是预料之中的吗？", "no": "474", "date": 1725523447000, "retest": ""}}, {"record_id": "recunAgtRdd9X0", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "潜水至 18 m 时水渗入外壳", "no": "482", "date": 1725613998000, "retest": ""}}, {"record_id": "recunQ4rRAQCBD", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们买这款相机是为了潜水，因为前段时间我们买了一个类似的相机，令我们惊讶的是，我们第一次在密封外壳上使用它时，水进入了外壳，不幸进入了电池区域，所以它不再工作了作品。", "no": "488", "date": 1725847552000, "retest": ""}}, {"record_id": "recunQ81iavtmV", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "AKASO 的 EK7000 Pro 运动相机防水壳根本不防水！第一次使用时，水就从壳里渗进来，对我的运动相机造成了无法修复的损坏！", "no": "497", "date": 1725848404000, "retest": ""}}, {"record_id": "recunQcB5YACXj", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我已按照使用条款使用相机。水在 16 米深处进入外壳。这导致短路。电池、电子触点和存储卡氧化。我不想更换，因为在我看来，这款相机不适合运动使用。因此，我要求退还购买价格。", "no": "502", "date": 1725849494000, "retest": ""}}, {"record_id": "recunQeldioVqI", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我的 Akaso EK700pro 尽管在保护壳中正确使用，但还是被水损坏了", "no": "505", "date": 1725849910000, "retest": ""}}, {"record_id": "recunQfGlDSOij", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "产品问题", "content": "今年4月购买了贵公司的相机用于潜水，8月18日首次使用。结果,海水开始慢慢进入防水外壳,最终少量浸水到相机内部,导致电源无法接通。之后晾干1天，电源就启动了，今后也在考虑在水中使用，能帮我换一下吗？使用时的条件为深度5m ， 30分钟左右 。请多多关照。", "no": "508", "date": 1725850230000, "retest": ""}}, {"record_id": "recuo1HKzLXKSs", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我已按照使用条款使用相机。水在 16 米深处进入外壳。这导致短路。电池、电子触点和存储卡氧化。我不想更换，因为在我看来，这款相机不适合运动使用。因此，我要求退还购买价格。", "no": "527", "date": 1726019459000, "retest": ""}}, {"record_id": "recuo25c1BY28A", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我最近购买了一台 Akaso 相机，用作潜水运动相机。尽管根据亚马逊的说法，防水外壳的防水深度为 40 米，但它在更浅的深度开始漏水。虽然外壳没有完全被水淹没，但潜水结束时，进水量足以使相机无法工作。这发生在当天的第一次潜水中，只潜入了 18.7 米，这毁了我那周其余潜水拍摄镜头的机会。\n\n我对这个问题感到失望。您能否告诉我申请保修的程序？我应该通过亚马逊吗，还是应该遵循其他流程？\n\n祝一切顺利", "no": "535", "date": 1726025046000, "retest": ""}}, {"record_id": "recuo2aSuYUs65", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我忘了在上一条消息中提到保护后门中有一个类似的芯片。保护膜仍然在上面，所以我猜这不是二手的，但我不确定这些物品在运输过程中怎么会受到这样的损坏。我很乐意发送照片。", "no": "536", "date": 1726026401000, "retest": ""}}, {"record_id": "recuopeSla5bni", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "广告上说它们可以达到40米\n防水（见图）。\n现在我们已经在撒丁岛海边浮潜14天了。\n不幸的是，我发现使用控制按钮时水会进入相机外壳。\n请帮我解决问题。\n我对你们的产品充满信心，并且很高兴收到积极的反馈。", "no": "563", "date": 1726367209000, "retest": ""}}, {"record_id": "recuoTmfhxWgLp", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我于 8 月 8 日购买了这款运动相机作为送给女儿的礼物。\n昨天我们来到海边，当我们在水下（甚至不到1 m）尝试相机时，我们注意到不幸的是有些水进入了。\n我们仔细检查了防水盒是否正确关闭，发现不能有任何错误，我们按照说明正确执行了所有操作，因此水会进入某个地方。\n我们该如何解决这个问题呢？\n谢谢你的礼貌的可用性。\n此致。", "no": "602", "date": 1726812256000, "retest": ""}}, {"record_id": "recupaR5VU7lx3", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "附上有缺陷的外壳的图片。", "no": "660", "date": 1727070806000, "retest": ""}}, {"record_id": "recuqFlnt7obg9", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "在咨询了亚马逊后，我应该联系您，要求更换水下外壳。我在潜水假期期间首次在水下使用相机。我的最大潜水深度为 26 米（外壳应该防水 40 米）。我潜水了 3 次。每次潜水 30 分钟后，外壳就会起雾，潜水后外壳里会有水滴。相机没有缺陷，因为我在潜水前将防雾纸（用于运动相机）插入了外壳。外壳或其中一个按钮漏水了。\n\n注意：我已经在水下拍照 20 多年了，对水下相机和 O 形圈很熟悉。\n\n我请求您给我寄一个完整的替换外壳。", "no": "738", "date": 1728437446000, "retest": ""}}, {"record_id": "recuqRwt1xgaRb", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第三次就浸水了。\n虽然是纯潜水，最深处也只有3米左右，但海水还是进入了外壳里。关得严严实实，一点灰尘都没有。", "no": "791", "date": 1728617405000, "retest": ""}}, {"record_id": "recur9Gg9O1JJO", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机工作得很好，直到潜到30米后，我们发现防水盒里有水，防水盒一直关得很紧，直到到达酒店才取出来，不久就停止工作了。", "no": "836", "date": 1728885713000, "retest": ""}}, {"record_id": "recur9WG2BCTSu", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在潜水到 18m 时使用了相机和随附的保护套。水进入了外壳。现在相机坏了。带保护套的相机应该工作距离可达 40m，但事实并非如此。因此我想退回相机并退款。", "no": "841", "date": 1728889625000, "retest": ""}}, {"record_id": "recurexwUYV88F", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次使用防水盒后，我不幸地发现它并没有完全密封。我认为可能是机壳内部的小损坏造成的。我认为这是由于加工损坏造成的（见附图）。\n\n由于我对相机非常满意，因此请您寄给我一个完好无损的新相机包。\n\n我于 2024 年 8 月 3 日通过亚马逊购买了这款相机（请参阅随附的发票）。\n\n先感谢您！", "no": "843", "date": 1728957514000, "retest": ""}}, {"record_id": "recurrJLbHVeWo", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机效果很好。但外壳漏水了。我要求更换水下摄影相机的外壳。", "no": "863", "date": 1729152521000, "retest": "LH240608V3C0907"}}, {"record_id": "recus51VJaqfgX", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "\n今年 9 月，我通过亚马逊从他们那里购买了 Akaso EK 7000 pro。\n深度3m（跳水池）\n外壳漏水。\n\n当然，这不应该发生。\n\n我请求您立即告知我们您是如何处理该问题的。所以无论有没有退货都可以交换。", "no": "904", "date": 1729733129000, "retest": ""}}, {"record_id": "recus51VXJcRfk", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "谢谢你的回答。\n\n相机没有损坏。\n只有水下外壳。\n\n按照说明将相机装入水箱中，并密封整齐、严密。\n浮潜约10分钟后，水通过外部水壳进入。\n\n密封件或带弹簧的控制按钮可能泄漏。\n\n我们要求您更换水箱。\n\n谢谢\n\n伊内萨·施密特", "no": "906", "date": 1729733131000, "retest": "LH230 728V 19217"}}, {"record_id": "recus5e8rfxSyp", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "水进入表壳，不是在潜水时而是在浮潜时", "no": "922", "date": 1729736038000, "retest": ""}}, {"record_id": "recusc1ejPAJYX", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尽管外壳已正确关闭，但水还是渗入了。这会损坏相机、存储卡和电池。所有照片都丢失了。因此，我要求撤销购买。谢谢。", "no": "945", "date": 1729836396000, "retest": ""}}, {"record_id": "recusc2UG5KYkX", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我在潜水（20 米深）时使用了带有防水壳的 Akaso EK7000 pro。我锁定了所有东西，以便达到最佳密封效果，但尽管采取了所有这些预防措施，我的设备还是进水了，无法使用。我把所有的元件都擦干了，但存储卡却被毁了。设备打开，但屏幕上没有任何显示，并且控制按钮不再起作用。\n我希望你能解决我的问题。\n亲切的问候，", "no": "947", "date": 1729836797000, "retest": ""}}, {"record_id": "recusLrlNyXsV7", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "前几天因为防水壳不良，寄来了新的防水壳，但是放到水里测试的时候，有气泡出现，所以仔细一看是橡胶变形了，变形的橡胶似乎没有完全关闭。另外，橡胶没有固定在外壳上也是符合设计的吗？第一次购买时，防水壳的橡胶固定在外壳上。", "no": "975", "date": 1730359793000, "retest": ""}}, {"record_id": "recut7iBmabXm6", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "今天我终于第一次潜水时用上了防水壳，结果发生了这种事，我非常沮丧，它甚至不能正常工作\n我可以换一个还是再买一个？？？", "no": "999", "date": 1730682786000, "retest": "已发送替换品解决"}}, {"record_id": "recut8wK0tDkHh", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我买这款相机是为了拍摄浅水（10m）的水肺潜水。令我惊讶的是，套件中提供的防水盒根本不防水。潜水 10 分钟后，相机关闭，水损坏了相机和内部电池，使其无法使用。我想指出的是，这个装置只工作了10分钟。如何激活保修？", "no": "1024", "date": 1730700933000, "retest": "LH240425V3C3493"}}, {"record_id": "recutdcAQyJ6QK", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我们用相机潜水\n遗憾的是现在无法打开它", "no": "1030", "date": 1730770013000, "retest": ""}}, {"record_id": "recutj5NwwioR3", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "第一次询问时，相机外壳闩锁就坏了。印象不太好。", "no": "1058", "date": 1730857052000, "retest": ""}}, {"record_id": "recutj60m8i3Mz", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我最近通过亚马逊购买了 EK 7000 Pro。不幸的是，外壳的电源按钮上有一道细小的裂缝。\n由于这是一份礼物，我希望只更换外壳。\n亚马逊要求我直接联系制造商以获取替换品。\n预先感谢您的帮助。\n\n亲切的问候", "no": "1059", "date": 1730857101000, "retest": ""}}, {"record_id": "recutjhwwO3cln", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我为我丈夫买了这个，他带着它潜水，但外壳漏水，水进入了相机", "no": "1062", "date": 1730859846000, "retest": "LH240122V3C0082"}}, {"record_id": "recutoQxzmvXxu", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我是 Ilaria Fraulin\n7 月 9 日 -24 日，我通过亚马逊订购了一台 Akaso 700pro 水下相机。我在家试用了一下，它工作正常。4 天前，我开始在水下使用它，最大深度为 23 米，总共潜水 8 次。\n\n今天我注意到很多水进入了外壳。离开水后，我立即打开外壳并擦干相机，但几个小时后相机变得非常热，所以我取出电池并让它冷却下来。之后我更换了电池，但相机无法工作。\n\n可以退回相机吗？附件中是亚马逊订单的详细信息", "no": "1075", "date": 1730942073000, "retest": ""}}, {"record_id": "recutuJNQ8mnvk", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水外壳漏水，相机受损。\n漏水发生时，我已将黄色浮动手柄连接到防水外壳上。\n\n只发送相机、防水外壳和 SD 卡可以吗，还是希望套件中包含所有其他安装设备？\n\n请注意，我从亚马逊购买了单独的配件，现在它们都放在一个盒子里，所以我必须将它们分开分类。", "no": "1079", "date": 1731029126000, "retest": "LH240504V3C0485."}}, {"record_id": "recutMhBZZ8A4g", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "附带破损标签的相机配件是密封盒，用于将其固定到支架上的两个标签之一已损坏。我询问是否可以将该配件完好无损地寄给我，这样我就不必退回整个产品。\n\n我等待你的回复。一切顺利。\n\n附件发送地址：", "no": "1092", "date": 1731288386000, "retest": ""}}, {"record_id": "recutO8zNGuj75", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "今天我带着我的 Akaso 潜水镜去潜水，防水壳漏水了，相机停止工作了。这是我第一次使用这个防水壳，对此我很不满意", "no": "1122", "date": 1731315780000, "retest": "LHDL230624V21462"}}, {"record_id": "recuu3NwB7Cs5h", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳坏了", "no": "1148", "date": 1731547185000, "retest": ""}}, {"record_id": "recuu4qQYjiWIV", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我于 2024 年 9 月 3 日通过亚马逊网站购买了一台 EK7000 Pro 相机。该产品保证防水深度达40m。假期期间，我带着防水壳潜水到了18米。然而，水已渗入外壳。触摸屏不再工作，我的照片也不再存在", "no": "1163", "date": 1731556558000, "retest": ""}}, {"record_id": "recuurbK6RzTWN", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我买了这款运动相机主要用于水下录制，并在去埃及度假时随身携带它。\n不幸的是，在我第一次使用它之前，外壳上的银色释放按钮飞走了，我再也找不到它了。令人失望的是，因为在水下拍照现在已经成为过去。\n我希望有一个解决方案，或者有一个备用按钮用于外壳，或者可以更换外壳。\n因为我真的很关注这样的事情，所以这对我来说很烦人。\n\n我希望得到您的积极反馈和支持并继续下去\n此致", "no": "1189", "date": 1731892812000, "retest": ""}}, {"record_id": "recuurbK6R8wWm", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "尊敬的先生或女士，我于 2023 年 11 月 9 日通过亚马逊购买了 Akaso。不幸的是我最近才能够使用它们！不幸的是，外壳漏水，相机被损坏，现在无法使用。\n我们将用米饭尝试一下，并在 2 天后报告！然而，水下外壳正在漏水……", "no": "1192", "date": 1731892812000, "retest": ""}}, {"record_id": "recuurbK6RVYbx", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳漏水", "no": "1193", "date" d_id": "recuz4WVjPopBF", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "防水壳进水", "no": "1760", "date": 1736144865000, "retest": ""}}, {"record_id": "recuzOy4slvZdd", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "我的第二台相机外壳又进水了，可以退款吗？\n我在浴室水槽里测试了一下，似乎没问题，然后第一次潜水，大约 5 米深的水又进入了外壳。这个装置仍在工作，但它漏水了 🤷‍♂️\n这是这张照片上外壳内的水量。", "no": "1860", "date": 1736818653000, "retest": ""}}, {"record_id": "recuC65hq4vOCC", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "早上好\n\n我很生气。我 6 个月前在亚马逊上购买了一台 akaso EK 7000 相机，这是我第二次使用它。\n箱子封得非常好，潜入 20 米后，砰的一声，水就进来了，慢慢地但肯定地渗入了……\n所以它是无法使用的。\n我们买它是为了去浮潜，在水下，但现在我们不能了……\n钱浪费了。\n我们在印度尼西亚。\n\n我请求您给予赔偿，因为您将永远无法给我们发送新的箱子。\n\n我们非常失望。看上去品质不错。\n\n请给我一个解决方案或替代方案", "no": "1967", "date": 1738910032000, "retest": ""}}, {"record_id": "recuCKmeEy9iwC", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "虽然我已经专业地关闭了外壳，但相机在 6 米深处还是漏水了。我立即将其关闭，并且没有再打开。潜水后，我将它们擦干，现在想将它们退回。", "no": "2048", "date": 1739505126000, "retest": ""}}, {"record_id": "recuD1HgI0di3B", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "相机运行良好，但防水外壳黑色扣在第一次使用时破裂，需要更换外壳。", "no": "2071", "date": 1739761336000, "retest": ""}}, {"record_id": "recuDGLx60Xa9P", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "你好\n\n相机会在外壳中被弄湿，因此不要\n我想退回相机并拿回我的钱\n此致\n克里斯蒂娜·维斯科普夫\n用我的 iPhone 发送", "no": "2151", "date": 1740368184000, "retest": ""}}, {"record_id": "recuDI2obyOr5t", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "亲爱的Akaso团队，当我第一次使用相机时，防水保护盖坏了。打开和关闭盖子时更加精确。我不再确定它是否仍然防水。请让我知道下一步该如何进行。谢谢你，并致以亲切的问候", "no": "2171", "date": 1740386977000, "retest": ""}}, {"record_id": "recuDS3Db46EZh", "fields": {"status": "", "level": "S", "category": "08-防水壳", "severity": "配件问题", "content": "女士们，先生们\n\n我去年购买了指定的相机。在您第一次使用所提供的水下保护壳
