<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding: 20px 24px 32px;
  }

  /* ── Header ── */
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #e6edf3; letter-spacing: .5px; }
  .header .sub {
    font-size: 12px; color: #6e7681; margin-top: 4px;
    display: flex; align-items: center; gap: 12px;
  }
  .header .sub .dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; display: inline-block; }
  .update-time { color: #8b949e; font-size: 12px; }

  /* ── KPI Cards ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 18px 22px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .kpi-card.blue::before  { background: #58a6ff; }
  .kpi-card.green::before { background: #3fb950; }
  .kpi-card.yellow::before{ background: #d29922; }
  .kpi-card.red::before   { background: #f85149; }

  .kpi-label { font-size: 12px; color: #8b949e; margin-bottom: 10px; }
  .kpi-value { font-size: 42px; font-weight: 700; line-height: 1; }
  .kpi-card.blue  .kpi-value { color: #58a6ff; }
  .kpi-card.green .kpi-value { color: #3fb950; }
  .kpi-card.yellow .kpi-value { color: #d29922; }
  .kpi-card.red   .kpi-value { color: #f85149; }
  .kpi-sub { font-size: 11px; color: #6e7681; margin-top: 6px; }

  /* ── Charts & Table Panels ── */
  .panel {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .panel-title {
    font-size: 13px; font-weight: 600; color: #c9d1d9;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .panel-title .dot.blue   { background: #58a6ff; }
  .panel-title .dot.green  { background: #3fb950; }
  .panel-title .dot.yellow { background: #d29922; }
  .panel-title .dot.red    { background: #f85149; }
  .panel-title .dot.orange { background: #e3b341; }

  /* Trend chart full-width */
  #trendChart { width: 100%; height: 280px; }

  /* Mid row: donut + bar */
  .mid-row {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  #statusChart  { width: 100%; height: 280px; }
  #categoryChart{ width: 100%; height: 280px; }

  /* S-level table */
  .s-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .s-table thead tr {
    border-bottom: 1px solid #21262d;
  }
  .s-table th {
    text-align: left;
    padding: 8px 12px;
    color: #8b949e;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .s-table td {
    padding: 9px 12px;
    color: #c9d1d9;
    border-bottom: 1px solid #161b22;
    vertical-align: middle;
  }
  .s-table tbody tr:hover { background: #1c2128; }
  .s-table tbody tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-待确认 { background: #1f3a5f; color: #58a6ff; }
  .badge-评估中 { background: #3a2a0a; color: #d29922; }
  .badge-开发中 { background: #1a3a2a; color: #3fb950; }
  .badge-观测期 { background: #2a1a3a; color: #a371f7; }
  .badge-排期中 { background: #2a2a0a; color: #e3b341; }
  .badge-崩溃   { background: #3a0a0a; color: #f85149; }
  .badge-功能不可用 { background: #3a1a00; color: #ffa657; }
  .badge-体验   { background: #0a2a1a; color: #56d364; }

  .s-table .col-no      { width: 70px; }
  .s-table .col-content { min-width: 160px; }
  .s-table .col-status  { width: 90px; }
  .s-table .col-cat     { width: 100px; }
  .s-table .col-sev     { width: 110px; }
  .s-table .col-retest  { }

  .empty-tip {
    text-align: center;
    color: #3fb950;
    padding: 20px;
    font-size: 13px;
  }

  /* Daily snapshot table */
  .snap-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .snap-table th {
    text-align: left;
    padding: 8px 14px;
    color: #8b949e;
    font-size: 11px;
    font-weight: 500;
    border-bottom: 1px solid #21262d;
    letter-spacing: .5px;
  }
  .snap-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #1c2128;
    color: #c9d1d9;
  }
  .snap-table tr:last-child td { border-bottom: none; }
  .snap-table tr:hover td { background: #1c2128; }
  .snap-table .today-row td { background: #1a2535; }
  .snap-table td.num-blue   { color: #58a6ff; font-weight: 600; }
  .snap-table td.num-green  { color: #3fb950; font-weight: 600; }
  .snap-table td.num-yellow { color: #d29922; font-weight: 600; }
  .snap-table td.num-red    { color: #f85149; font-weight: 600; }

  .refresh-btn {
    float: right;
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    transition: all .2s;
    margin-top: -2px;
  }
  .refresh-btn:hover { background: #30363d; color: #c9d1d9; }
  .loading { opacity: .5; pointer-events: none; }
</style>

<script>
// ──────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────
const CONFIG = {
  appToken: 'UU6kb8aXUavOxVsPtzUccWfUnKe',
  tableId:  'tblgJWv4cDlQkbHS',
  viewId:   'vew5iEGcje',
  appId:    'cli_a947a56e10789bc6',
  appSecret:'WD14Ko1BXSqDZctvF4xwhciBWaePVTyq',
  // CORS proxy for browser access – replace with your own or use local server
  proxyBase: 'https://corsproxy.io/?',
  feishuBase: 'https://open.feishu.cn/open-apis'
};

// ──────────────────────────────────────────────
// SNAPSHOT STORAGE (localStorage for persistence)
// ──────────────────────────────────────────────
function loadSnapshots() {
  try { return JSON.parse(localStorage.getItem('ceo_dash_snaps') || '[]'); }
  catch(e) { return []; }
}
function saveSnapshots(snaps) {
  localStorage.setItem('ceo_dash_snaps', JSON.stringify(snaps));
}
function upsertSnapshot(date, data) {
  const snaps = loadSnapshots();
  const idx = snaps.findIndex(s => s.date === date);
  if (idx >= 0) snaps[idx] = { date, ...data };
  else snaps.push({ date, ...data });
  snaps.sort((a, b) => b.date.localeCompare(a.date));
  saveSnapshots(snaps);
  return snaps;
}

// ──────────────────────────────────────────────
// FEISHU API
// ──────────────────────────────────────────────
async function getToken() {
  const url = CONFIG.proxyBase + encodeURIComponent(
    `${CONFIG.feishuBase}/auth/v3/tenant_access_token/internal`
  );
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ app_id: CONFIG.appId, app_secret: CONFIG.appSecret })
  });
  const d = await res.json();
  if (d.code !== 0) throw new Error('Token failed: ' + JSON.stringify(d));
  return d.tenant_access_token;
}

async function fetchAllRecords(token) {
  let records = [], pageToken = null;
  while (true) {
    const params = new URLSearchParams({ page_size: 100, view_id: CONFIG.viewId });
    if (pageToken) params.set('page_token', pageToken);
    const url = CONFIG.proxyBase + encodeURIComponent(
      `${CONFIG.feishuBase}/bitable/v1/apps/${CONFIG.appToken}/tables/${CONFIG.tableId}/records?${params}`
    );
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
    const d = await res.json();
    if (d.code !== 0) throw new Error('Records failed: ' + JSON.stringify(d));
    records = records.concat(d.data.items || []);
    if (!d.data.has_more) break;
    pageToken = d.data.page_token;
  }
  return records;
}

function extractStr(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x === 'object' ? (x.text || x.name || '') : x).join('');
  if (typeof v === 'object') return v.text || v.name || v.value || '';
  return String(v);
}

function analyzeRecords(records) {
  const today = new Date().toISOString().slice(0, 10);
  let total = records.length;
  let done = 0, active = 0, sPending = 0;
  const statusMap = {}, catMap = {};
  const sPendingList = [];

  for (const r of records) {
    const f = r.fields || {};
    const status   = extractStr(f['状态']);
    const level    = extractStr(f['问题分级']);
    const cat      = extractStr(f['归类']);
    const content  = extractStr(f['问题内容']);
    const severity = extractStr(f['严重程度']);
    const retest   = extractStr(f['赛纳复测备注']);
    const no       = extractStr(f['问题编号']);

    // Status buckets
    const statusKey = status || '未填写';
    statusMap[statusKey] = (statusMap[statusKey] || 0) + 1;

    // Category
    if (cat) catMap[cat] = (catMap[cat] || 0) + 1;

    // Done vs active
    if (['已完成', '已关闭'].includes(status)) done++;
    else active++;

    // S pending
    if (level === 'S' && !['已完成', '已关闭'].includes(status)) {
      sPending++;
      sPendingList.push({ no, content: content.slice(0,50), status, cat, severity, retest: retest.slice(0,80) });
    }
  }

  // Sort category
  const catSorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);

  return { total, done, active, sPending, statusMap, catSorted, sPendingList, date: today };
}

// ──────────────────────────────────────────────
// CHART INIT
// ──────────────────────────────────────────────
const DARK_COLORS = ['#58a6ff','#d29922','#3fb950','#a371f7','#f85149','#56d364','#ffa657','#79c0ff','#e3b341','#ff7b72'];

let trendChart, statusChart, categoryChart;

function initCharts() {
  trendChart    = echarts.init(document.getElementById('trendChart'));
  statusChart   = echarts.init(document.getElementById('statusChart'));
  categoryChart = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', () => {
    trendChart.resize(); statusChart.resize(); categoryChart.resize();
  });
}

const BASE_OPTS = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e', fontFamily: "'PingFang SC','Microsoft YaHei',sans-serif" },
  tooltip: {
    backgroundColor: '#1c2128', borderColor: '#30363d', textStyle: { color: '#c9d1d9' }
  }
};

function renderTrend(snaps) {
  const dates = snaps.map(s => s.date).reverse();
  const totals   = snaps.map(s => s.total).reverse();
  const dones    = snaps.map(s => s.done).reverse();
  const actives  = snaps.map(s => s.active).reverse();
  const sPends   = snaps.map(s => s.sPending).reverse();

  trendChart.setOption({
    ...BASE_OPTS,
    legend: {
      data: ['总量','已解决','待处理','S级待处理'],
      textStyle: { color: '#8b949e', fontSize: 11 },
      itemWidth: 20, itemHeight: 3, top: 4
    },
    grid: { left: 40, right: 20, top: 40, bottom: 30 },
    xAxis: {
      type: 'category', data: dates,
      axisLine: { lineStyle: { color: '#21262d' } },
      axisTick: { lineStyle: { color: '#21262d' } },
      axisLabel: { color: '#6e7681', fontSize: 11 }
    },
    yAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: '#21262d', type: 'dashed' } },
      axisLabel: { color: '#6e7681', fontSize: 11 }
    },
    series: [
      { name:'总量',      data: totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, itemStyle:{color:'#58a6ff'}, color:'#58a6ff' },
      { name:'已解决',    data: dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, itemStyle:{color:'#3fb950'}, color:'#3fb950' },
      { name:'待处理',    data: actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, itemStyle:{color:'#d29922'}, color:'#d29922' },
      { name:'S级待处理', data: sPends,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, itemStyle:{color:'#f85149'}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const STATUS_COLOR = {
    '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7','未填写':'#6e7681',
    '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e'
  };
  const data = Object.entries(statusMap).map(([name, value]) => ({
    name, value, itemStyle: { color: STATUS_COLOR[name] || '#58a6ff' }
  }));
  statusChart.setOption({
    ...BASE_OPTS,
    legend: {
      orient: 'vertical', right: 10, top: 'center',
      data: data.map(d => d.name),
      textStyle: { color: '#8b949e', fontSize: 11 },
      itemWidth: 10, itemHeight: 10
    },
    series: [{
      type: 'pie', radius: ['48%', '72%'],
      center: ['38%', '50%'],
      data,
      label: { show: false },
      emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold', color: '#e6edf3' } }
    }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k]) => k).reverse();
  const counts = catSorted.map(([,v]) => v).reverse();
  categoryChart.setOption({
    ...BASE_OPTS,
    grid: { left: 70, right: 30, top: 10, bottom: 30 },
    xAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: '#21262d', type: 'dashed' } },
      axisLabel: { color: '#6e7681', fontSize: 11 }
    },
    yAxis: {
      type: 'category', data: cats,
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { color: '#c9d1d9', fontSize: 11 }
    },
    series: [{
      type: 'bar', data: counts,
      barMaxWidth: 18,
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0,
          [{ offset: 0, color: '#1f3a5f' }, { offset: 1, color: '#58a6ff' }])
      },
      label: { show: true, position: 'right', color: '#8b949e', fontSize: 11 }
    }]
  });
}

// ──────────────────────────────────────────────
// DOM UPDATES
// ──────────────────────────────────────────────
function updateKPIs(data) {
  document.getElementById('kpiTotal').textContent    = data.total;
  document.getElementById('kpiDone').textContent     = data.done;
  document.getElementById('kpiActive').textContent   = data.active;
  document.getElementById('kpiSpending').textContent = data.sPending;
  const pct = d => data.total ? Math.round(d / data.total * 100) + '%' : '—';
  document.getElementById('kpiTotalSub').textContent    = `主问题 ${data.total} 条`;
  document.getElementById('kpiDoneSub').textContent     = `占比 ${pct(data.done)}`;
  document.getElementById('kpiActiveSub').textContent   = `占比 ${pct(data.active)}`;
  document.getElementById('kpiSpendingSub').textContent = `S级总数 ${Object.values(data.statusMap).reduce((a,b)=>a+b,0)} 中待处理`;
}

function updateSTable(list) {
  const tbody = document.getElementById('sTableBody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-tip">暂无 S 级待处理问题 ✓</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(r => `
    <tr>
      <td><code style="color:#58a6ff;font-size:11px">#${r.no}</code></td>
      <td>${escHtml(r.content)}</td>
      <td><span class="badge badge-${r.status || '未填写'}">${r.status || '未填写'}</span></td>
      <td>${escHtml(r.cat)}</td>
      <td><span class="badge badge-${r.severity || ''}">${escHtml(r.severity)}</span></td>
      <td style="color:#8b949e;font-size:11px">${escHtml(r.retest) || '<span style="color:#3d444d">—</span>'}</td>
    </tr>
  `).join('');
}

function updateSnapTable(snaps) {
  const tbody = document.getElementById('snapBody');
  const today = new Date().toISOString().slice(0, 10);
  tbody.innerHTML = snaps.slice(0, 15).map(s => `
    <tr class="${s.date === today ? 'today-row' : ''}">
      <td>${s.date}${s.date === today ? ' <span style="color:#58a6ff;font-size:10px">(今日)</span>' : ''}</td>
      <td class="num-blue">${s.total}</td>
      <td class="num-green">${s.done}</td>
      <td class="num-yellow">${s.active}</td>
      <td class="num-red">${s.sPending}</td>
    </tr>
  `).join('');
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ──────────────────────────────────────────────
// MAIN RENDER PIPELINE
// ──────────────────────────────────────────────
function renderAll(data, snaps) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateSTable(data.sPendingList);

// REFRESH – calls Python backend script via API
// (for browser-only mode, re-embeds from data.json)
// ──────────────────────────────────────────────
async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ 更新中…';
  btn.classList.add('loading');
  try {
    // Try to fetch local data.json (works when served by local Python server)
    const res = await fetch('./feishu_data_latest.json?t=' + Date.now());
    if (res.ok) {
      const raw = await res.json();
      const records = raw.records || [];
      const data = analyzeRecords(records);
      const snaps = upsertSnapshot(data.date, {
        total: data.total, done: data.done, active: data.active, sPending: data.sPending
      });
      renderAll(data, snaps);
    }
  } catch(e) {
    console.warn('刷新失败，使用嵌入数据', e);
  }
  btn.textContent = '↻ 刷新数据';
  btn.classList.remove('loading');
}
