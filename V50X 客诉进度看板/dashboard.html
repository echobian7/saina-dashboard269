<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

{"record_id": "recuzK6rzhZp2P", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "你好，我在哥斯达黎加。我从亚马逊美国购买了一台 Akaso V50X，并将其发送到我的迈阿密邮箱，以便运送到我的国家。今天它到了，但 SD 卡插槽不起作用——它无法容纳卡，而是将其弹出。我查看了手册并按照说明操作。由于我所在的国家与购买地不同，在这种情况下我该怎么办？", "no": "1850", "date": 1736752964000, "retest": ""}}, {"record_id": "recuD1woXyAcGF", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "相机触摸屏已与主相机机身分离，只有几根电线将其连接在一起。这是自然发生的，相机仅用于浮潜，并且始终放在水下外壳中。当我将其从外壳中取出充电时，我注意到了这个问题。相机仍然可以使用，但显然这是一个问题。", "no": "2070", "date": 1739758746000, "retest": ""}}, {"record_id": "recuJ4FjthAuKk", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "电池接口掉落", "no": "2744", "date": 1745301996000, "retest": ""}}, {"record_id": "recuJmukBdt9xg", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我买了这款相机，电池仓内的金属触点在短短四周内就断了。", "no": "2791", "date": 1745565353000, "retest": ""}}, {"record_id": "recuLHhsy6npDQ", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "嗨，我们的相机内部出现了金属 rattling 的声音，并且现在录制会随机停止。我们的订单号是 204 - 9643676 - 0620367。我已经和亚马逊的客服人员沟通过了，他们告知我们的相机仍在保修期内。\n\n注：“rattling”常见释义为“格格作响的；卡嗒卡嗒响的” ，在没有更多专业背景信息下，这里直接保留英文未找到特别合适中文词汇对应，你可根据实际情况调整。 ", "no": "2944", "date": 1747704854000, "retest": ""}}, {"record_id": "recuMgJZle0Fnz", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "相机出现问题，电池连接器掉了，请看照片。由于该产品才使用了4个半月，烦请为我更换产品。顺祝安好。 ", "no": "2969", "date": 1748228825000, "retest": ""}}, {"record_id": "recuPSnqs3BsS6", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "你好，也许我没表达清楚，我想问的是如何插入和取出 SD 卡，但现在 SD 卡插入后不再卡住，一插进去就会弹出来。我已经试过了好几张 SD 卡。我尝试插入一个视频，但它提示格式不支持。希望这些照片能让你明白我的意思。 ", "no": "3323", "date": 1751533347000, "retest": ""}}, {"record_id": "recuXNCDMR2XbI", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "我们有AKASO V50 X 4K运动相机，配备64GB microSDXC U3存储卡，具备2000万像素、Wi-Fi功能，是一款可水下40米拍摄的防水相机，带有触摸屏和远程控制等多种配件。\n购买了两台AKASO V50 X相机，序列号为LH240801V2C0104的相机已收到，但电池仓有缺陷。\n问题是相机的电池需要3个连接器来连接。 ", "no": "4450", "date": 1758792153000, "retest": ""}}, {"record_id": "recv9oO1fSKfad", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "用于容纳电池的金属部件断裂。相机内有3个电池孔和2个金属触点，未受到任何撞击。", "no": "5439", "date": 1769419051000, "retest": ""}}, {"record_id": "recvfBjxaFQp57", "fields": {"status": "", "level": "", "category": "04-结构装配", "severity": "产品问题", "content": "使用电池时无法开机。我们测试了一块可用的电池，显然相机与电池的连接存在问题。相机使用USB接口时可以开机。我们还将我们的电池尝试用于朋友的同款公司相机，结果我们的电池在他们的相机上可以正常使用。那些相同的电池也能正常工作。", "no": "5841", "date": 1775100675000, "retest": ""}}, {"record_id": "recuEltpBD6Ppa", "fields": {"status": "", "level": "", "category": "04-结构装配，09-配件", "severity": "配件问题", "content": "您好，\n\n我在亚马逊加拿大购买了 akaso V50 X 作为圣诞礼物。\n\n我刚打开它，发现电池无法充电或充电盒坏了。\n\n如果我通过电缆将相机插入插座，相机可以工作，但我不明白为什么相机无法开机。\n\n我也尝试过将电池放入相机并将相机插入插座来充电，但它们无法工作。\n\n当我插入充电盒时，电池显示为红色，过了一会儿，两个灯都变成蓝色，但相机无法开机。\n\n我进行了故障排除，确保一切都干净。\n\n有什么建议吗？\n\n此致，\n\n乔希", "no": "2235", "date": 1740969694000, "retest": ""}}, {"record_id": "recupnuwOpBEWy", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "按键坏了", "no": "686", "date": 1727257520000, "retest": ""}}, {"record_id": "recus5bKtIWNwC", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "我有 2 台 Akaso V50X 相机，最近购买的那台侧面按钮太敏感了。它们甚至不需要按下就可以激活；只需用手指轻轻划过它们即可。当我将相机放在安装在冲浪板上的盒子里时，它就会连接到 Wi-Fi，这时就会出现问题。", "no": "915", "date": 1729735468000, "retest": ""}}, {"record_id": "recuGZrGx5fXNQ", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "问题不是卡住了。问题是相机不断变焦至 4 倍。此外，侧面向上按钮似乎卡住了，无法切换。https://drive.google.com/drive/folders/1-J9roPAeV_2396ienHiMsSOev1dsKjlj", "no": "2513", "date": 1743392601000, "retest": ""}}, {"record_id": "recuGZXHbJUyq7", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "您好，我是11月29号订购的运动相机。我已经在我的摩托车头盔上使用过它们四次了。现在它坏了。在视频模式下，相机始终放大到最大。即使我再次手动缩小，它也会再次放大。因此，不使用变焦就无法再进行拍摄。", "no": "2517", "date": 1743400230000, "retest": ""}}, {"record_id": "recuQTs4DQ9i2R", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "我以订单编号 111 - 9230256 - 7302619 购买了 V50X 相机。几周前，相机侧面的“向上”按钮失灵了。按下去时似乎不太正常，无法正常使用。请问能否换一台新的呢？ ", "no": "3399", "date": 1752465364000, "retest": ""}}, {"record_id": "recuXGeA19WQxI", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "配件问题", "content": "在使用随设备附带的防水保护套来放置我的V50X后，侧面的“上”按钮（用于开启Wi-Fi）一直处于按下状态。似乎是防水保护套挤压了该按钮并造成了损坏，导致按钮一直处于按下状态。Wi-Fi会持续自动开启。即使把设备从防水保护套中取出，该按钮仍然处于按下状态。 ", "no": "4427", "date": 1758682985000, "retest": ""}}, {"record_id": "recv7BN8tEmiQr", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "我购买这台相机是为了 2025 年 1 月前往伯利兹的为期 10 天的浮潜之旅。在那次旅行的大部分时间里，相机工作正常，但在旅行的最后几天，当我按下快门按钮时，相机没有拍照，而是进入了菜单模式，这在水下想要抓拍瞬间时非常令人沮丧！然后我不得不退出菜单三四次，才能让快门按钮正常拍照。这种情况很随机，但现在我每次使用相机都会出现。\n\n在 4 月的第二次太平洋之旅中，我遇到了同样的问题。现在是 2026 年 1 月，我正在进行第三次浮潜旅行，当我按下快门按钮时，相机仍然会随机进入菜单模式。此外，现在缩小变焦的侧边按钮也失灵了！它似乎一直处于按下状态。通过背面触摸屏仍然可以进行变焦操作，但在防水壳里显然无法这样操作。\n\n回想起来，我本应该更早报告这些问题，但每次旅行结束后，我就忘了这些问题，继续忙别的事了。现在我正在这次旅行的第二天，由于变焦按钮现在也不能用了，我想反馈一下我的担忧。我使用相机时很小心，每次浮潜结束后都会把它从防水壳里取出来。\n\n我知道下面描述的操作方式，但即使快速按下按钮也会弹出菜单。也许防水壳也有问题。由于我只用这台相机进行浮潜，所以我从未想过要测试这个问题。\n\n我附上了一段变焦按钮的视频。我试图展示“+”按钮仍然可以正常按下，但“-”按钮不行。你还可以看到它不像“+”按钮那样突出。也许这个问题也是由相机配备的防水壳造成的。 ", "no": "5302", "date": 1767778668000, "retest": ""}}, {"record_id": "recv95Px0EvdDH", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "当我打开相机时，它会自行放大，而且即使我尝试缩小，它还是会继续放大。感谢您的帮助。我刚刚按照您的重置说明操作了，但问题依然存在。每次打开相机时，它仍然会自动放大到最大倍数。当我点击缩小按钮时，画面又立刻跳回最大放大状态。我已附上视频。", "no": "5407", "date": 1769138662000, "retest": ""}}, {"record_id": "recvbyT0dSaJMR", "fields": {"status": "待确认", "level": "S", "category": "05-按键", "severity": "产品问题", "content": "我的AKASO V50X的电源按钮坏了，它被卡住了，在保护壳里根本无法使用。", "no": "5582", "date": 1771400268000, "retest": ""}}, {"record_id": "recv105jtmNEOq", "fields": {"status": "待确认", "level": "S", "category": "05-按键，08-防水壳", "severity": "产品问题", "content": "我冒昧联系您是因为我在亚马逊上购买了V50X相机，于九月初收到。我们在10月11日至18日这一周使用它进行水下拍摄，但开机/关机按钮工作不正常，有时能用有时不能用，防水壳的密封性也不太好，有水进入了防水壳，因此也弄到了相机上。所以我想知道是否可以采取一些措施？因为目前相机几乎无法使用了。", "no": "4756", "date": 1761724702000, "retest": ""}}, {"record_id": "recv6m4klLS0xy", "fields": {"status": "待确认", "level": "S", "category": "05-按键，录像及回放问题", "severity": "产品问题", "content": "你好，早上好，自从我买了相机后就遇到了很多问题。首先，它会随意录制和保存片段，而不是一直录制保存，很多时候我录好的内容会自己消失。另外，有一个按键坏了，无法使用。\n\n早上好，希望你一切都好。我的相机有个问题，很多时候我在录制，按下保存键却无法保存；或者在自动模式下，它只保存部分内容，其他的不保存。我用的是你们推荐的SD卡。此外，相机有一个按键从收到时起就无法使用，从来没好过。相机从未被摔过，也没进过水。\n\n是的，我已经试过3张存储卡了，都有同样的问题。我也已经格式化过了，并且按照步骤操作过。", "no": "5167", "date": 1766630211000, "retest": ""}}, {"record_id": "recuu4qQRQX7WW", "fields": {"status": "待确认", "level": "S", "category": "05-按键，12-开关机问题", "severity": "产品问题", "content": "相机无法开机。连接充电线时屏幕上会亮起红灯，但我无法开机。\n\n我已拆下并更换电池，但仍然无法使用。\n\n相机侧面的一个方向按钮也卡住了，按下后不会“重置”。\n\n它只用过 3 或 4 次。", "no": "1162", "date": 1731556557000, "retest": ""}}, {"record_id": "recuqRwt1xypvv", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "在购买的第二天连续拍摄了30分钟左右。\n拍了15分钟就停了，10分钟后又重新开始?\n(SD卡使用32gb的Class10)\n不太明白。动作不稳定?", "no": "787", "date": 1728617405000, "retest": ""}}, {"record_id": "recusQ2DFvZnrQ", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "最近从亚马逊购买了 Akaso V50 X 以及外置麦克风附件。虽然我对相机的整体工作和功能感到满意，但我想报告的是，产品附带的其中一个电池似乎有缺陷，因为它无法保留电量，这是在不使用和充满电后的情况。", "no": "998", "date": 1730427785000, "retest": ""}}, {"record_id": "recut7WdsjteDp", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "相机附带的两块电池中，有一块无法充电。\n\n相机每天都会使用，因此电池要循环使用，并且充电或放电时间不得超过 12 小时。", "no": "1020", "date": 1730692228000, "retest": ""}}, {"record_id": "recuviiHSv6wx9", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "产品问题", "content": "我刚刚在亚马逊购买了 V50 行车记录仪\n盒子里有 2 节电池，其中一节不能很好地放置在预定位置\n感谢您的帮助", "no": "1300", "date": 1732677618000, "retest": ""}}, {"record_id": "recuvMo7S5OArs", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "电池亏电用座充也充不满无法开机", "no": "1333", "date": 1733122199000, "retest": ""}}, {"record_id": "recuy8uLrTxeZL", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "谢谢。我查看了这些，但没有帮助，因为我认为这是电池的问题，而不是相机本身无法充电，因为当直接插入墙上电源时，相机就会打开。", "no": "1646", "date": 1735281126000, "retest": ""}}, {"record_id": "recuF2sRC0k8nH", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "您好，我收到相机时，充电时一块电池显示红色，另一块电池显示蓝色……但电池只能持续 10 分钟。使用，这并不实用，对于新设备来说尤其不正常。", "no": "2321", "date": 1741604945000, "retest": ""}}, {"record_id": "recuJIxnFWpyJj", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "用户体验问题", "content": "电池续航时间不适合我使用要求", "no": "2833", "date": 1745891158000, "retest": ""}}, {"record_id": "recuQwwzr76bPt", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "我的一块电池在相机里无法充电或无法正常工作。", "no": "3362", "date": 1752126580000, "retest": ""}}, {"record_id": "recuWawXfS5TMv", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "你好，X50 手机使用起来很不错。但电池只能续航 20 分钟，而且手机还会为了节能自动熄屏，这挺烦人的。我刚查看了商品信息，电池续航时间应该是 180 分钟，现在少了 140 分钟。你们能给我换块电池吗，还是我直接退货呢？ ", "no": "4182", "date": 1757298389000, "retest": ""}}, {"record_id": "recv0jQxqxCHNi", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "用户体验问题", "content": "电池续航太短不能满足需求", "no": "4696", "date": 1761100574000, "retest": ""}}, {"record_id": "recvcY84LA136K", "fields": {"status": "待确认", "level": "S", "category": "06-电池", "severity": "配件问题", "content": "akaso v50x无法开机。\n\n我买了两块新的akaso电池，并充电超过一个小时。\n\n只有连接USB线时它才能开机。\n\n我尝试了重置，不装电池或SD卡，连接到相机，按住电源按钮超过3秒。\n\n电池仓是干净的，电池与引脚贴合紧密。我甚至用力将电池按在引脚上，但还是无法启动。\n\n引脚干净且没有弯曲。这台相机自从购买后就一直放在相机盒里，从未使用过。", "no": "5682", "date": 1772689402000, "retest": ""}}, {"record_id": "reculRr2pbYiz2", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "您好，允许您将相机连接到安全带上的部件损坏了。该产品就像新的一样，因为它是 7 月 22 日为我儿子生日而送的。我们怎样才能做到呢？在 PJ 的照片。\n真挚地\n席琳·马蒂文", "no": "264", "date": 1724035447000, "retest": ""}}, {"record_id": "recuE3AgmvnbXJ", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "支架送达时被损坏", "no": "2217", "date": 1740705352000, "retest": ""}}, {"record_id": "recuIARSkVKbFe", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "感谢你的帮助，我想说你确实为我提供了我所请求的所有帮助。但我还有另一个问题，希望你能解决——相机能装进 Clip 1 中，但夹子顶部的部件无法防止相机掉落，这显然很危险。\n\n我附上了一些照片来说明我的意思，希望你能再给我寄一个能更紧地固定相机的 Clip 1。我在第一封邮件里已经把我的地址发给你了。 ", "no": "2689", "date": 1744861700000, "retest": ""}}, {"record_id": "recuPQJIfrduI6", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我需要更换相机笼，因为我试图把相机笼固定到我的自行车上之后，底部的螺纹松动了。", "no": "3310", "date": 1751509106000, "retest": ""}}, {"record_id": "recuSpSXP1Aujo", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "您好，\n\n仅仅使用两次后，GPS 支架就坏了。\n\n你们能更换这个有缺陷的部件吗？\n\n随信附上发票和照片。 ", "no": "3582", "date": 1753860748000, "retest": ""}}, {"record_id": "recuTyClosGMQ9", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "Akaso v50x 的扣具支架坏了。我尝试发送邮件至 cs@akasotech.com，但邮件被退回，显示无法送达。", "no": "3727", "date": 1754905907000, "retest": ""}}, {"record_id": "recuTPDF0ldUZ3", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "你好，我想为我的 v50x 寻求支持。我上个月购买了它。相机本身工作正常，我的问题出在配件上。骑行几次后，它们就开始损坏并散架了。", "no": "3780", "date": 1755157419000, "retest": ""}}, {"record_id": "recv66gV058oRC", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我的伴侣刚给我买了V50x作为生日礼物，但我觉得夹子1有问题，因为它无法固定住相机。夹子太松了，相机直接就掉出来了。我没法发送视频，只能附上一张照片。", "no": "5141", "date": 1766396789000, "retest": ""}}, {"record_id": "recv6Pf4Tt8yJ3", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "您好，镜头前面的塑料有一个气泡，这是制造缺陷。而且车把上的固定配件在第一次安装时就断了。", "no": "5232", "date": 1767061287000, "retest": ""}}, {"record_id": "recv7iEB44Wosf", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "你好，我已经将AKASO V50 X安装在滑雪头盔支架上；不幸的是，相机从支架上脱落，因此丢失了。也就是说，我不再拥有附件中所示的设备，显然支架不够稳定。您能为我提供一个获取替代品的报价吗？", "no": "5265", "date": 1767495882000, "retest": ""}}, {"record_id": "recv7Ho8hF2QQK", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "希望这张照片和短视频能更好地解释我的问题，相机已经完全推入支架，但根本无法卡住。也许只是这个相机有故障，我不知道。再次感谢你对我的问题感兴趣。我试图附上视频，但目前无法成功。", "no": "5307", "date": 1767861367000, "retest": ""}}, {"record_id": "recvdkCqR6fhic", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我最近购买了这个商品，但由于其中一个支架断裂，我的相机从卡车顶部掉到了采石场里。我希望能得到一个替代品。", "no": "5693", "date": 1773021716000, "retest": ""}}, {"record_id": "recuk5DHGQr5Ak", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "六月底在亚马逊购买的相机。潜水（4 米深度）时使用 1 次，防水壳允许水通过。相机不再工作了。我证明此案已正确结案，因为我已检查确定。", "no": "21", "date": 1722413068000, "retest": ""}}, {"record_id": "recukykYhdvKMG", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我从亚马逊买了一台 akaso v50x 相机，相机包的按钮坏了。我可以再买一个相机包吗？", "no": "64", "date": 1722837118000, "retest": ""}}, {"record_id": "recukyWsyWzXhV", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我为我的 v50 买了防水外壳。防水外壳可以防水至 5 米深，现在我的相机坏了。希望你们的外壳能为这种损坏投保。", "no": "97", "date": 1722846052000, "retest": ""}}, {"record_id": "reculo02AuGyVq", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我女儿把手机放在防水壳里放到海里，结果手机进水了。我不清楚这是用户操作失误还是外壳故障。我想订购一个替换相机。", "no": "213", "date": 1723600499000, "retest": ""}}, {"record_id": "reculZi1VsCFF4", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "尽管防水盒盖得很紧，但水还是进入了防水盒并淹没了相机。\n即使使用新电池，相机也无法再打开。", "no": "308", "date": 1724151510000, "retest": ""}}, {"record_id": "recunQbc8IlL4v", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "一切都很顺利，直到我和妻子决定去浮潜，想在水下拍摄视频。我们把相机放在防水盒里，用黑色的锁扣把盒子拧紧。然后我们去浮潜。在相机停止工作之前，我可能录制了一两个视频。我从水里出来，发现水已经渗入了。现在相机再也无法打开，它完全坏了。\n\n说实话，这让我很生气，毁了我的一天。", "no": "499", "date": 1725849160000, "retest": ""}}, {"record_id": "recupa2srHWUeZ", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我之所以联系您，是因为我在水下使用了 AKASO V50X 相机，使用的是随相机一起提供的防水相机外壳。我可以保证它安装和密封正确。但是，后来我注意到防水相机外壳内有水滴。我取出相机并将其擦干，因为它是湿的。然后我尝试下载我的照片。下载到一半时，相机关闭了，从那时起我就无法再次打开它。我尝试给它充电并更换电池。侧面的一个蓝灯闪烁了大约 5 秒钟，然后什么都没有了。显然，您随相机提供的防水外壳似乎有故障，并导致相机进水损坏。\n\n我对质量非常不满意，非常失望——这只是我第二次使用相机和外壳，它已经破损并进水了。这非常令人沮丧，毁了我的假期，因为我无法在旅行的剩余时间使用相机。\n\n请您修理或更换相机和防水外壳，或者给我赔偿。", "no": "651", "date": 1727058737000, "retest": ""}}, {"record_id": "recutj60ziZm27", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "防水外壳漏水", "no": "1060", "date": 1730857102000, "retest": ""}}, {"record_id": "recuuIP1RYehkM", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "几天前，我购买了 B 50 X 和配件包，昨晚试用了潜水相机的防水外壳。防水外壳漏水。在再次潜水之前，有没有办法更换防水外壳？", "no": "1251", "date": 1732153373000, "retest": ""}}, {"record_id": "recuF0vmDFoolt", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "早上好，\n\n防水外壳进水了。虽然进水量很小，但足以导致照片质量变差。\n\n清洁了封闭垫圈。\n\n也许在按钮处？\n\n谢谢", "no": "2312", "date": 1741575989000, "retest": ""}}, {"record_id": "recuHaTkXr2KrD", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我的 V50X 外壳在最近的一次潜水旅行中漏水了。我们的潜水深度不超过 20 米，但外壳里有水。谢天谢地，相机还能用，但我没有信心按照设计使用它。外壳可能有缺陷吗？没有明显的损坏，O 形圈看起来均匀且密封，我无法确定水是从哪里进入的。", "no": "2551", "date": 1743561731000, "retest": ""}}, {"record_id": "recuHPRcf5fLPn", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我于 2025 年 3 月 24 日在亚马逊上购买了 V50X 相机。昨天我第一次在潜水时尝试使用它，我按照所有说明小心地关闭了防水外壳。一开始还好，但在潜水过程中，水开始渗入外壳内部（我没有潜入超过 27 米的深度，而外壳应该防水到 40 米）。\n\n潜水后，我打开了外壳，让所有东西在一个晚上内干燥。我尝试再次打开相机，也使用另一块电池，但它无法打开。我认为水渗透到了快门周围（而不是屏幕侧）。\n\n我联系了亚马逊，他们建议联系您寻求解决方案。亚马逊将在周四再次与我们联系，以跟进并了解您提出的解决方案。\n\n提前感谢您的帮助，", "no": "2605", "date": 1744167051000, "retest": ""}}, {"record_id": "recuIASnkHMO1k", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我给您写信是因为两周前我通过亚马逊购买了一台贵公司的Akaso V50X相机。问题是，这台相机的外壳可能有缺陷，因为我戴着它去海里浮潜时，海水渗了进去，而这种情况本不应发生。我刚刚也在家里进行了测试，把相机浸在一个装有水的容器里，水渗了进去，我还看到镜头黑色部分有气泡冒出。我希望能为这台相机申请保修，并了解申请保修的具体步骤。 ", "no": "2690", "date": 1744861819000, "retest": ""}}, {"record_id": "recuJ9SsL606SI", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我买了一台 V50x 相机，但不幸的是，它在首次使用时就出现了外壳渗漏的问题。 ", "no": "2762", "date": 1745379012000, "retest": ""}}, {"record_id": "recuN2CB6REWiO", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "嗨，我使用过这款相机，对拍摄效果非常满意。\n唯一的问题是，在水下使用大约15分钟后，相机内部开始起雾，再过5分钟，里面就开始形成水滴了。\n相机保护套密封得很紧，当时我在水下大约2米处浮潜。\n当我把保护套和相机拿出来后，需要把它们擦干。相机仍然可以正常使用，因为没有水进入，只是让相机变潮湿了。\n我看不出水是从哪里来的，因为似乎不是从任何容易发现的地方渗进来的，只是冷凝水越来越多。\n所以我猜测某个地方有小渗漏。\n相机保护套可以更换吗？因为我对相机本身非常满意。 ", "no": "3042", "date": 1748936328000, "retest": ""}}, {"record_id": "recuOCBfFEC5Nq", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，相机的防水外壳不防水了。在一次潜水时，它进了水。\n相机还能正常使用，我只需要更换外壳。\n谢谢。", "no": "3219", "date": 1750384088000, "retest": ""}}, {"record_id": "recuOU8xCdRiT5", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我在打开防水盒的时候把它弄坏了。", "no": "3230", "date": 1750643219000, "retest": ""}}, {"record_id": "recuSYYqTXQ9Fr", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "尊敬的先生/女士：\n\n我丈夫在2024年12月我的生日时给我买了一台带有水下保护壳的Akaso v50相机。\n\n我用这台相机进行浮潜，一切正常。\n\n今天我第一次在马尔代夫用这台相机进行水肺潜水，潜水10分钟后，防水壳里就进了水，相机也无法开机了。\n\n现在相机完全不能用了。\n\n这台相机有一年的保修期，请问该如何解决这个问题呢？显然，这个水下保护壳不符合使用要求。\n\n期待您的回复。\n\n您忠实的\n阿曼达·摩根", "no": "3660", "date": 1754379223000, "retest": ""}}, {"record_id": "recuT3iJxB9b8I", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我购买的防水盒到货时就已经损坏了。", "no": "3671", "date": 1754443167000, "retest": ""}}, {"record_id": "recuTwYTz7y2nR", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我在不到一年前从你们这里购买了这个产品。我只用过两次，去玩喷气式滑水时，水进入了防水保护套，现在它无法开机了。请问这个产品是否还在保修期内？", "no": "3711", "date": 1754881729000, "retest": ""}}, {"record_id": "recuTJQ7odNA0D", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "最近，我在潜水时首次有机会使用这款相机。产品说明中提到，相机外壳在水下30米（100英尺）深度内具备防水功能，而我当时潜水深度仅为12米，所以我认为不会有问题。我按照用户手册的说明，仔细地扣好了相机外壳的锁扣。然而，在潜水过程中，我发现相机外壳漏水，导致相机进水。我尝试把相机弄干，但它再也无法开机，已经无法使用了。我认为我拿到的是有缺陷的防水外壳，因为此次潜水深度完全在产品规格范围内。请退还我购买产品的费用，或者给我寄来一台替换的相机和防水外壳（不需要其他配件）。谢谢。 ", "no": "3763", "date": 1755071730000, "retest": ""}}, {"record_id": "recuWbEZInndYC", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我今天收到了相机套件（从亚马逊订购的）。我打开包裹后发现，防水壳正面按钮的固定卡簧不见了，按钮也掉了出来。", "no": "4197", "date": 1757315082000, "retest": ""}}, {"record_id": "recuXAkxmCOIIG", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，\n订单编号是 406 - 6462590 - 5797942。\n是的，自防水测试后，相机就无法开机了。\n随信附上一段视频，向您展示这一情况。\n我已经严格按照您所描述的所有步骤操作了，但遗憾的是没有成功。\n请问我可以进行换货吗？\n感谢您的支持。\n诚挚问候", "no": "4408", "date": 1758595747000, "retest": ""}}, {"record_id": "recuYg1OfDzN8Z", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "你好，我于2025年7月订购了一台Akaso v50相机，并在9月6日至10日的潜水之旅中使用了它。使用1天后，相机就无法开机了。而且塑料外壳实际上还让一点水渗了进去。\n\n我已经确保电池已完全充满电，但相机就是无法开机。不过，我可以插上数据线来开启相机。 ", "no": "4518", "date": 1759211889000, "retest": ""}}, {"record_id": "recuYDJOREyHOc", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我给您发这封邮件是因为我于2025年5月在亚马逊上订购了一台AKASO V50x相机。我随信附上订单摘要。我的问题是：在使用相机及其防水盒进行了第一次潜水后，相机无法开机了。潜水后，防水盒内有雾气。\n\n最大潜水深度20米，防水盒已正确关闭。\n\n请问您能否在保修方面帮我处理一下，谢谢。此致 敬礼。 ", "no": "4530", "date": 1759562234000, "retest": ""}}, {"record_id": "recuZyRUiIfiTB", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "嗨，我在用相机的时候发现镜头周围的保护套裂开了，我给亚马逊发消息申请更换，他们让我到这里来处理。 ", "no": "4622", "date": 1760406413000, "retest": ""}}, {"record_id": "recv4d1Axtiyj7", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我十月份从亚马逊订购了这款相机，准备带去澳大利亚旅行。相机在陆地上使用正常，但一旦放入水中（装在AKASO防水壳里）就无法正常工作了——除了开关机键，其他按键都失灵。这太令人失望了，因为我本想在大堡礁用它拍照。有什么建议吗？", "no": "5022", "date": 1764664305000, "retest": ""}}, {"record_id": "recv6mU0HrXzRO", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我联系您是因为我购买的产品存在质量问题。事实上，十月底，我和儿子去环礁湖游泳，在一次2米深的潜水时，我发现相机突然关机了。回到水面查看问题时，我发现本应防水的机身内进了水。于是我取下电池，将相机放入米中一个月以使其干燥，但不幸的是，相机仍然无法使用（即使换了备用电池也不行）。不过，下水前我确实检查过机身的防水性能（密封圈处没有头发或其他异物）。这款产品本应具备10米防水功能。我们上周才回来，我拍了一段AKASO相机尝试连接电源时的视频。如您所见，相机没有任何启动迹象，并且可以看到内部电池的一个触点以及相机内部有绿色的氧化痕迹（可能是进水导致的）。", "no": "5170", "date": 1766642528000, "retest": ""}}, {"record_id": "recv6Pf86LAtD4", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我已收到商品，发现盒子损坏了。密封盒的夹子已经断裂。", "no": "5233", "date": 1767061300000, "retest": ""}}, {"record_id": "recv6UPCQCn9nq", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "您好，我订购了一款V50x相机，根据你们的说明，它配备的防水壳可在30米深的水下使用。我只用过一次，并且确保防水壳已完全关闭，当时水深不超过4米。但相机还是进水了，现在无法使用。我对这款有缺陷的产品感到非常失望。我该怎么办？", "no": "5245", "date": 1767143878000, "retest": ""}}, {"record_id": "recv8I7a4QqObj", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我女儿第一次用这个的时候，外壳就漏了，她等了又等，想看看能不能晾干，但一直没干。相机现在完全不能用了——已经生锈了。", "no": "5373", "date": 1768788231000, "retest": ""}}, {"record_id": "recvgartpjKTNr", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "一切都很好，只是防水外壳有点漏水，但漏得不多。", "no": "5873", "date": 1775619739000, "retest": ""}}, {"record_id": "recuk5mgu7HoRK", "fields": {"status": "待确认", "level": "S", "category": "18-死机", "severity": "产品问题", "content": "连接WIFI操作时常死机，无法关机", "no": "19", "date": 1722408912000, "retest": ""}}, {"record_id": "recuqSmqggR5M2", "fields": {"status": "待确认", "level": "S", "category": "18-死机", "severity": "产品问题", "content": "我换了另外一个满格电池，按了电源，没到3分钟，屏幕又黑屏了，关电源还是没反应", "no": "803", "date": 1728629787000, "retest": ""}}, {"record_id": "recuSpP1vGMLYr", "fields": {"status": "待确认", "level": "S", "category": "18-死机", "severity": "产品问题", "content": "WIFI页面卡住无法操作这句话本身就是中文，若你是想要翻译成英文，答案是：The WIFI page is frozen and cannot be operated.", "no": "3572", "date": 1753859808000, "retest": ""}}, {"record_id": "recv0ZyJjgKWvt", "fields": {"status": "待确认", "level": "S", "category": "18-死机", "severity": "产品问题", "content": "容易死机", "no": "4753", "date": 1761716936000, "retest": ""}}, {"record_id": "recvcH3q9aW3xQ", "fields": {"status": "待确认", "level": "S", "category": "18-死机", "severity": "产品问题", "content": "你好，我们第一次使用Akaso 50 X时，屏幕就像附件中显示的那样卡住了。我们购买了这款相机的防水壳。请提供如何解决此问题的帮助。我们已经给它充电了，电池装进去时会亮红灯，但屏幕是黑的，我们也把SD卡取出来了，但没有任何帮助。感谢回复。这些步骤仍然没有解决屏幕卡住的问题。开机键不起作用。只有把电池取出来再装回去，它才会开机。", "no": "5646", "date": 1772437095000, "retest": ""}}, {"record_id": "recuUdfW1aUCAP", "fields": {"status": "", "level": "", "category": "18-死机，08-防水壳", "severity": "产品问题", "content": "我的Akaso V50X相机连WiFi时会死机。\n我今天拿到了相机，当我把它连接到WiFi时，它就死机了。我了解到，死机时X键或上键会没反应。我按照你发给我的方法进行了重置，到目前为止还没有死机。昨天我带着相机放在防水壳里去划皮划艇，但防水壳起雾了，有少量水花溅到相机上，水分从镜头前部进入了相机。我该怎么做才能解决这个问题呢？ ", "no": "3832", "date": 1755506395000, "retest": ""}}, {"record_id": "recv9z6rsPOdPv", "fields": {"status": "待确认", "level": "S", "category": "18-死机，14-SD卡问题", "severity": "产品问题", "content": "视频无法保存，显示为错误文件且屏幕冻结", "no": "5468", "date": 1769571205000, "retest": ""}}, {"record_id": "recuqLGfyYUZVw", "fields": {"status": "", "level": "", "category": "18-死机，13-WiFi问题", "severity": "产品问题", "content": "将相机和应用连接到Wi-Fi\n什么都没做就进入拍摄状态不能操作。\n也无法切换到摄像机。", "no": "772", "date": 1728531078000, "retest": ""}}, {"record_id": "recuzUNR2FOe04", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "如果不插入电池，我无法打开相机电源。我有几块电池，我知道电池可以正常工作，我也尝试了几种不同的电缆。", "no": "1884", "date": 1736911073000, "retest": ""}}, {"record_id": "recuVfZZ5Jccdl", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "大约4个月前，我购买了你们的Akaso V50X相机。\n不幸的是，这台相机出了问题。它只有在插上电源插头时才能开机，一旦拔掉插头，它就会自动关机。我们试了4块充满电的电池，但相机就是无法开机。因此，我们完全无法使用这台相机，这非常令人失望。我们三周后就要开启欧洲之旅，去寻找新家，并且想记录我们的旅程。\n感谢你们提供的电池。我们已经给它们充好电并在相机上试过了。不幸的是，情况还是和以前一样。我对这台相机失去了信心，可能会换一台。其他用户使用V50X时是否也遇到过同样的问题呢？我现在有哪些解决办法？\n由于我们9月15日起要去旅行6周，期待你们尽快回复。 ", "no": "4043", "date": 1756463055000, "retest": ""}}, {"record_id": "recv6gw3UoDDPu", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "我有两台从亚马逊购买的Akaso V50X运动相机，之前也跟你聊过这个。😉👍🏻较新的那台电源接口是USB-C的，旧的那台是Micro-USB接口。我骑摩托车时总是把相机连接到电池组上使用，因为长途骑行时内置电池很快就会没电。大概在过去六个月左右，那台Micro-USB接口的相机经常会突然断开连接，显示仅使用内置电池供电。我换过不同的数据线和电池组，但结果都一样。我确定问题出在接口本身，因为只要轻轻晃动一下相机端的数据线，它就又能识别到外接电源了。说实话，我不确定这台相机是否还在保修期内，但如果过保了，你能给我一些维修建议吗？", "no": "5162", "date": 1766548162000, "retest": ""}}, {"record_id": "recuRPPehgZ7sS", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "我需要为我的 v50x 找到新的固件。", "no": "3475", "date": 1753327910000, "retest": ""}}, {"record_id": "recv4uh9I7u09Z", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "我使用AKASO V50X已经有两年半左右了，最近录制的视频里显示的时间比正确时间快了7个多小时。一开始我以为是机身内的时间设置错了，检查后发现设置的是正确时间。【时间水印】的时间显示，除了AKASO V50X的时间设置外，还有其他地方可以设置吗？", "no": "5041", "date": 1764919213000, "retest": ""}}, {"record_id": "recv5pDu23PJlg", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "当我把视频和照片传到我的电脑或手机（Pixel 8 Pro）上时，日期是正确的，但尽管文件名中显示的是拍摄照片或视频的正确时间，EXIF数据中的时间却不同，毫无规律。我已经确认相机的日期和时间设置都是正确的，但这个问题一直存在。我还想知道是否可以将固件更新到最新版本以及如何更新（OTA，或者你们给我发送文件）。", "no": "5092", "date": 1765766785000, "retest": ""}}, {"record_id": "recv8sEsHMTF8Y", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "您好，我在V50X相机上遇到的问题如下：1. 设置中没有驾驶模式，而我需要将其用作行车记录仪。2. 有时图像稳定功能会变得异常。开启相机后，尽管相机静止放在桌上，图像仍会跳动。重启可以解决此问题。请提供最新的固件。当前版本信息在附件照片中。顺祝商祺，米莎", "no": "5368", "date": 1768559746000, "retest": ""}}, {"record_id": "recux5r1Kjg9iG", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题，其他问题", "severity": "用户体验问题", "content": "没预录功能不方便", "no": "1477", "date": 1734319774000, "retest": ""}}, {"record_id": "recuprRmAvyFAp", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "循环录像的时间设定每次都回到1分钟，不能固定吗?", "no": "689", "date": 1727322068000, "retest": ""}}, {"record_id": "recuVBrWSlyGAm", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "他/她/您无法观看视频。\n\n注：“No puede”在西班牙语里，根据语境可以表示“他不能”“她不能”“您不能”等含义，这里不明确具体所指对象，所以将几种可能都列出。 ", "no": "4070", "date": 1756780023000, "retest": ""}}, {"record_id": "recuY9HGPidFAS", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "我在（设备型号）上遇到了一些问题，问题详情如下：\n每次我骑摩托车时用手机连接WiFi，按下手机上的红色录制按钮，录制计时器会启动，看起来像是在录制，但后来我将视频保存到手机时，里面只有V50x本应不进行录制时的内容，而没有本应录制时的内容。\n如果你查看就会发现，大约有一半的时间，录制按钮显示未在录制，而本该录制的时候却没有录制。 ", "no": "4505", "date": 1759118436000, "retest": ""}}, {"record_id": "recveblG40xZYz", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "我有一个在亚马逊上从你那里买的V50X相机。这东西太差劲了。音质和视场角都很糟糕。视频不能连续录制，还经常卡顿，导致视频出现跳帧。我想把这个相机和我买的麦克风一起退货。我没有使用防水壳，还试了两个外接麦克风，情况并没有好转。我用了你提供的SD卡，还有另外两张我在其他相机上能用的SD卡。用这三张卡都有同样的问题。10%的折扣不足以让我不退掉这个不能正常工作的产品。", "no": "5759", "date": 1773800868000, "retest": ""}}, {"record_id": "recuCE9XF4szha", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "需要支持无线麦克风的", "no": "2042", "date": 1739413543000, "retest": ""}}, {"record_id": "recupaeaXHS7Hb", "fields": {"status": "", "level": "", "category": "其他问题，17-图像品质", "severity": "用户体验问题", "content": "防抖效果一般", "no": "654", "date": 1727061530000, "retest": ""}}, {"record_id": "recuo1VD6Fdhuc", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "即使接通电源线，相机也无法开启", "no": "529", "date": 1726022767000, "retest": ""}}, {"record_id": "recuo3xZByL1r8", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好，我已经用了四年多的AKASO产品了。\nV50X→Brave 4 Pro→V50X。\n前两架因为我的疏忽摔坏了。\n但是这次换了电池之后，画面就不显示了。\n它能打开电源吗?它是蓝色的。\n除此之外，任何操作都不会改变。\n这个可以请您修理吗?\n这是一台性价比非常高的相机，我想继续使用它。\n等待着好的答复。\n请多关照", "no": "542", "date": 1726046686000, "retest": ""}}, {"record_id": "recuo3xZBybQSJ", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "v50x突然不开机了。\n用电池、USB连接也插不进去。\n怎样才能修好呢?", "no": "543", "date": 1726046686000, "retest": ""}}, {"record_id": "recuoSKeCUhCww", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "当我们打开相机时，屏幕一片空白。我们尝试取出电池，然后重新装上，插入电源，然后打开。相机有故障吗？", "no": "586", "date": 1726803197000, "retest": ""}}, {"record_id": "recussXQMGK9HP", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机运行正常，我使用了一整天。晚上我回去取下电池，用充电器给两块电池充电。第二天我装上一块电池，试着使用相机，但没有启动。我试了另一块电池，但还是不工作。前一天我使用相机时，它一直放在防水盒里。我刚把它从盒子里拿出来，就把电池取了出来。\n请注意，在它停止工作的最后一天，我注意到上下两个按钮不起作用。\n我试着取出 SD 卡和电池，并接上电源，但还是没用。", "no": "961", "date": 1730086788000, "retest": ""}}, {"record_id": "recuz5h4daTiaD", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我收到了 AKASO V50 作为生日礼物。给电池充电后，它无法工作。我联系了客服，收到了替换电池和充电器。给它们充电后，它仍然无法工作。此时，我假设相机本身有问题。我的亚马逊订单号是：\n114-5935054-3741845。", "no": "1766", "date": 1736149666000, "retest": ""}}, {"record_id": "recuCDVMy4SAjY", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "早上好\n一个月前我从亚马逊购买了一台 V50X 相机。\n它不再想打开。\n您能否告诉我如何将其退回给您，以便我能够得到能够正常工作的产品？\n我的相机没有在水下使用过。", "no": "2036", "date": 1739410164000, "retest": ""}}, {"record_id": "recuD1kN3AnfEt", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "嗨，我似乎无法打开相机。我们在雪地里（非常寒冷的天气）用过几次。哎呀，它打不开。最初充电时有蓝灯和红灯，然后当我充电后打开它时，AKASO 屏幕亮了——但马上就熄灭了。现在我无法让它真正打开或做任何事情。请提供建议。我们是 2024 年 12 月买的。谢谢，娜塔莉", "no": "2060", "date": 1739755979000, "retest": ""}}, {"record_id": "recuDiVv3B0DK8", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "早上好，\n\n我儿子的相机 V50 X - SN：FXC240429V200236 - IC：24369-V50X，FCC ID：2ASV5-V50X 无法再开机。电池已充电但无法开机。\n\n该怎么办？我们需要将其寄给您修理吗？它在保修期内，他一个半月前圣诞节收到了它。\n\n真挚地，\n\n吉列莫特先生", "no": "2119", "date": 1740015926000, "retest": ""}}, {"record_id": "recuDHmR2GHdUl", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "它再也无法开机，我取出了 SIM 卡和电池，它还是无法使用", "no": "2162", "date": 1740377078000, "retest": ""}}, {"record_id": "recuF60kLdjmyD", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "但现在我的相机停止工作了，完全报废了。我需要您的专业建议，我该怎么办。", "no": "2325", "date": 1741657251000, "retest": ""}}, {"record_id": "recuFhM20GKcHx", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的相机装上电池后无法开机。插入电源后可以正常使用。我尝试过单独给电池充电，也尝试过给相机内的电池充电。", "no": "2348", "date": 1741831159000, "retest": ""}}, {"record_id": "recuFhM8vWgGpv", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，您的相机可以通过两种方式充电，第一种是先将它们从相机中取出，然后放在电池座上进行充电，或者第二种是将它们留在相机中，然后使用提供的电缆进行充电，但这是行不通的，这意味着当我骑自行车出去时，我无法将其直接连接到外部电池上！！！虽然一开始这个选项运行得很好。提前致谢", "no": "2350", "date": 1741831184000, "retest": ""}}, {"record_id": "recuIp9GSgwDA1", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法启动，电池已在其他产品上试过。", "no": "2659", "date": 1744688630000, "retest": ""}}, {"record_id": "recuN9u5ZBRwv1", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "当我按住电源按钮3秒钟来开机或关机时，它似乎没有反应。", "no": "3084", "date": 1749037736000, "retest": ""}}, {"record_id": "recuRRiWCA5W9J", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "使用两三次后，相机现在无法正常工作了。无法开启。我已经按照故障排除步骤进行了操作。接下来我们该怎么做呢？", "no": "3482", "date": 1753349767000, "retest": ""}}, {"record_id": "recuSvvf05fFDR", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我尝试上传视频，但因文件太大被退回了。\n\n相机曾在配套的水下外壳中用于水下拍摄。\n\n当取出电池和存储卡，使用相机附带的数据线将其连接到正确的输出充电器时，相机无法启动。屏幕左侧的红灯亮着，但上方的蓝灯不亮。按下前面的模式按钮3秒钟也不起作用。\n\n希望这些信息能有所帮助。 ", "no": "3598", "date": 1753943755000, "retest": ""}}, {"record_id": "recuSBFDPUKfHe", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "您好，我在亚马逊上买了一台V50x相机。使用一次后，我想更换电池，之后相机就再也打不开了，无论是使用电池还是连接电源都不行。我试图查看这款相机是否可以重置，但似乎不行；将相机连接到电脑时，有一个红色指示灯亮起，但电脑无法识别相机。您能提供一些帮助吗？谢谢。 ", "no": "3615", "date": 1754034888000, "retest": ""}}, {"record_id": "recuTKcaiSBxoZ", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "无法开机；无法点亮（具体结合语境，这里“enciende”常见用于电器、灯等设备无法启动或点亮的情况） ", "no": "3770", "date": 1755076982000, "retest": ""}}, {"record_id": "recuUR31GMSzmX", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "这台GoPro自6月底以来使用了几次，现在无法正常工作，也无法开机了。请负责处理退货和换货事宜，谢谢。\n另外，我也没有收到存储卡，所以我用了我相机里原有的存储卡。没有收到SD存储卡，这正常吗？谢谢。 ", "no": "3937", "date": 1756094373000, "retest": ""}}, {"record_id": "recuWlXdEnH3ld", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "运动相机开机一会儿就关机了。", "no": "4225", "date": 17 ": "4K 30fps的视频质量很差，满是噪点。比糟糕的1080p还要差。我使用的是推荐速度的存储卡。我买这款相机是为了替换我的旧款1080p Acton相机，但画质反而更差了。我想我会把它退回去要求退款，并留下评论告知其他人我的经历。似乎很多关于这款相机的好评都是针对旧款的。像我这款的新款质量非常差。", "no": "5081", "date": 1765508923000, "retest": ""}}, {"record_id": "recv5GN0D5dBxX", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "视频质量很差", "no": "5112", "date": 1766020319000, "retest": ""}}, {"record_id": "recv6sUMkfl8wW", "fields": {"status": "", "level": "", "category": "17-图像品质", "severity": "产品问题", "content": "用这款相机搭配头盔支架拍摄滑雪镜头。已开启图像稳定功能，分辨率为1080p，视野设为中等。我们尝试了一些方法，但所有影片都很抖动，基本上无法使用。请问有什么建议吗？", "no": "5191", "date": 1766731369000, "retest": ""}}, {"record_id": "recupnmE9SAWTH", "fields": {"status": "", "level": "", "category": "20-客户体验或者其他", "severity": "用户体验问题", "content": "续航觉得太短，4K没法连续拍3小时", "no": "681", "date": 1727255641000, "retest": ""}}, {"record_id": "recv15HV2n5oiQ", "fields": {"status": "", "level": "", "category": "20-客户体验或者其他", "severity": "用户体验问题", "content": "你们寄来的替换腕部遥控器可以开关相机录制和/或拍照，所以那个问题解决了。但是当我把AKASO V50X安装在摩托车头盔上，用腕带激活相机录制视频时，腕部指示灯只闪烁一次就熄灭了。那么我怎么知道它是否在录制呢？腕带上没有视觉指示表明它正在录制吗？录制期间指示灯不会一直亮着。我看不到相机背面的小蓝灯，因为它安装在头盔上。难道腕带的灯在录制时不应该一直亮着来告诉我处于录制模式吗？它没有这样做。感谢您的帮助。", "no": "4761", "date": 1761807784000, "retest": ""}}, {"record_id": "recuxJOne5Z4RF", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "开机卡logo", "no": "1545", "date": 1734916391000, "retest": ""}}, {"record_id": "recuy3ArPZQK3s", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "我们刚买了一台 v50x 相机，用了一个小时，现在当我们打开它时，相机显示欢迎屏幕，似乎无法启动。我们取出电池和存储卡，然后将其连接到电脑，相机打开，但问题仍然存在，请参阅附图。\nimage0.jpeg", "no": "1622", "date": 1735208599000, "retest": ""}}, {"record_id": "recuIj7oAJSLMI", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "我的相机仍然无法使用。我尝试了你们工作人员提供的所有解决方案，但都不起作用。相机启动时，它停在“Akazo”屏幕上。\n我能保证换一台相机吗？请告诉我该怎么办……", "no": "2639", "date": 1744599425000, "retest": ""}}, {"record_id": "recuNSdzuzUDWK", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "我在 12 月买了这台相机，直到最近它一直都运行良好。我可以打开相机，相机会发出声音，屏幕上显示“Akaso v50x”，但我无法进行其他操作。要关闭相机，我必须取出电池。我已经尝试取出电池和存储卡，还试过不同的充电器。你能帮我解决这个问题吗？谢谢。", "no": "3165", "date": 1749698733000, "retest": ""}}, {"record_id": "recuXRUhvBtlHF", "fields": {"status": "待确认", "level": "S", "category": "19-开机卡LOGO", "severity": "产品问题", "content": "当我打开相机时，它在显示标志画面时卡顿。\n仍然停留在标志画面。", "no": "4460", "date": 1758855463000, "retest": ""}}, {"record_id": "reculnZBl4dE3f", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "遥控器无法工作", "no": "209", "date": 1723600395000, "retest": ""}}, {"record_id": "recuvXi0ajN7q5", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我想知道我是否可以为 v50x 买一个替换遥控器？其中一个按钮用了几次后就不再起作用了", "no": "1356", "date": 1733283279000, "retest": ""}}, {"record_id": "recuxaPxQpZwL5", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我正在想办法为我的相机买一个新的遥控器，我从来没有用过它，但我刚刚试着用它来录制我的狩猎视频，但它不起作用，我换了两次电池，它还是不起作用，所以请帮帮我，非常感谢你能提供的任何帮助。相机很棒，我从来没有遇到过问题，但只是遥控器", "no": "1491", "date": 1734399499000, "retest": ""}}, {"record_id": "recuyGC6stJ9jW", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我买了一个新的相机，也就是 v50X，但是遥控器不工作，我试图更换新电池，但仍然不工作。", "no": "1712", "date": 1735785271000, "retest": ""}}, {"record_id": "recuSvvePYhpSY", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "遥控器不工作了。", "no": "3595", "date": 1753943752000, "retest": ""}}, {"record_id": "recuZEOGDfWIbg", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "它不让你拍第二张照片，只能拍一张，你可以开始录制视频，但无法停止录制。你更换了电池，但问题依旧。", "no": "4645", "date": 1760494304000, "retest": ""}}, {"record_id": "recv6Pg6uAoA0Z", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我刚买了V50X（序列号-AX-220921-V2.0）。不幸的是遥控器无法使用。按下相机或视频按钮时指示灯会亮，但没有任何反应。我试图弄清楚如何将遥控器与相机连接，但找不到任何相关信息。问题出在哪里？我该怎么办？", "no": "5234", "date": 1767061531000, "retest": ""}}, {"record_id": "recuv6ln6z49mG", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "相机不再识别SD卡", "no": "1273", "date": 1732500937000, "retest": ""}}, {"record_id": "recuvuMwQkbhSw", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "无法读卡，试了几张卡也发送了我们的卡都无法读卡", "no": "1313", "date": 1732862041000, "retest": ""}}, {"record_id": "recuyqM8DtJdNp", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "你好，\n\n我需要一些关于我的 v50 x 的帮助，问题/问题详情：相机是从亚马逊购买的，包含微型 SD 卡。\n\n卡已插入，并通过选项/设置格式化，但相机继续读取卡错误\n\n请帮忙，这是送给我儿子的圣诞礼物，他非常想用它。\n\n谢谢", "no": "1672", "date": 1735551241000, "retest": ""}}, {"record_id": "recuzfZdmnAPoG", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "我附上了 SD 卡的图片和我在屏幕上看到的内容。相机只是保持该状态，没有做任何其他事情。\n我使用的是普通的 128GB SD 存储卡。\n请帮忙", "no": "1817", "date": 1736307951000, "retest": ""}}, {"record_id": "recuzgIPyMUgw7", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "你好，\n\n我在亚马逊上购买了 AKASO V50 X，还购买了建议的存储卡：“64GB Micro SD 卡 4K 超高清视频高级高速内存 Microsdxc 高达 100MB/S V30 UHS-I U3 A1 C10，由 Integral 提供”\n\n当我尝试使用相机时，它出现错误，说存储卡太慢。您能告诉我为什么它无法工作吗？它是 UHS-I U3 等级，这是所需的卡应该有的。\n\n提前谢谢，\n\nGary Thoresen", "no": "1824", "date": 1736318823000, "retest": ""}}, {"record_id": "recuQluXRgoQni", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "尊敬的阿克索（AKASO）支持团队：\n\n希望您一切安好。大约四个月前，我购买了一台AKASO V50 X相机。然而，从两个月前开始，我遇到了一个问题，导致这台设备无法使用。\n\n设备显示“卡错误！”的信息。起初，我以为这可能是我使用的存储卡出了问题，但这张卡是AKASO原装的。为了解决这个问题，我甚至买了一张新卡，但不幸的是，同样的问题仍然存在。我现在认为问题可能出在设备本身，而不是存储卡。\n\n自购买以来，我总共只使用了这台设备大约一个小时，所以它现在不能用了，我感到非常失望。\n\n因为我是用所有的零花钱买的这台相机，所以我真心希望您能帮我解决这个问题。期待您的回复。\n\n我已经在相机里和我的笔记本电脑上对原装SD卡进行了格式化。我在这两个地方都对SD卡进行了格式化，但情况没有任何改变。我也试过用一张新的SD卡，但同样的问题依旧存在。我认为问题不在于SD卡，因为两张卡都会出现同样的问题。\n\n另外，我检查过了，相机版本是正确的。这是新的SD卡。 ", "no": "3345", "date": 1751963658000, "retest": ""}}, {"record_id": "recuY4xHnpTr5U", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "我需要有人帮我解决（AKASO V50X）的问题，问题详情如下：\n1. 读取 SD 卡速度慢。", "no": "4495", "date": 1759042174000, "retest": ""}}, {"record_id": "recuZ63u8bRe23", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "该字段本身就是中文，无需翻译。若需翻译成英文，答案为：The memory card shows a card error.", "no": "4537", "date": 1759980660000, "retest": ""}}, {"record_id": "recv16dZ5i86Dy", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "这次是无法格式化microSD卡，很困扰。这张卡也是刚在亚马逊购买的“microSD卡 256GB UHS-I 超高速 微型存储卡 Full HD & 4K UHD SD转换适配器 简易设计包装”。该怎么办才好呢？", "no": "4778", "date": 1761815427000, "retest": ""}}, {"record_id": "recv1Kt0nYOo2I", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "用Akaso V50x相机录像时出现问题，我已经插入了内存卡，但相机似乎无法读取，我将内存卡取出后，显示没有内存卡。不过这并不妨碍我进行操作。", "no": "4809", "date": 1762410060000, "retest": ""}}, {"record_id": "recv3qP6AUrcTh", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "很抱歉一直打扰大家，但我今天第三次出去拍摄视频了。我拿到相机还不到两周。\n- 我把相机装在颈部支架上；没有使用应用程序\n- 设置是4k/30，H.264\n- 我外出了90分钟。在前60分钟里，我总共拍摄了20分钟的视频。天气情况：晴天，26摄氏度\n- 在最后的30分钟里，我大约拍摄了20分钟，但当我停下来查看时，看到一条消息：“SD卡速度太慢”，并且什么都没录上\n- 这张SD卡是一张128GB的Akaso卡，是和相机捆绑销售的。我第一天就在相机里格式化了它。这张卡现在用了28GB，是3天的使用量\n我在11月21日收到了Lexar SD卡\n- 我使用SD适配器在电脑上格式化了两张卡，然后在相机里格式化了它们\n- 我用Lexar卡成功更新了固件。相机里显示的版本和更新前一样\n- 我按照上述方法再次格式化了Lexar卡，只是为了确保安全\n- 11月22日，我带着相机出去，相机里装的是Akaso SD卡。录制20分钟后，我检查了相机。它显示“SD卡速度低！”的消息\n- 这次失败后我有时间想该怎么办。我拍了一张消息的照片，然后关掉相机再打开\n- 之后，我连续录制了大约一个小时，我想。我继续录制，但那天没有再失败\n- 11月23日，我又带着相机出去，这次用的是Lexar卡。20分钟后我检查相机，发现它自己关机了。只有一个大约2分钟的视频文件\n- 我再次打开相机开始录制。我停下来片刻，拍了一张相机屏幕的照片，以显示电池几乎满了\n- 我继续录制，这次，我只过了几分钟就检查了相机。它出现了“SD卡速度低！”的消息\n- 我拍了一张消息的照片，然后当天就停止了录制\n所以看来这台相机在录制视频方面有问题，因为Akaso卡和Lexar卡都多次出现这个问题。", "no": "4954", "date": 1763952066000, "retest": ""}}, {"record_id": "recv6JCr6Z47Bu", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "您好，\n\n我已严格按照您的指示操作：尝试从相机菜单格式化随相机提供的存储卡，但仍然收到“格式化失败”的错误提示。我已在电脑上测试过该存储卡，它能正常工作。我也尝试从电脑格式化该存储卡，但将其插入相机后问题依旧：仍然显示“存储卡错误”。我认为提供的存储卡符合相机的规格要求！\n\n我还购买了一张全新的128GB SanDisk SDXC存储卡（链接：https://www.amazon.fr/SanDisk-Cards-Extreme-MICROSDXC-Adapter/dp/B09X7BK27V），它满足所有要求的条件。我使用这张新卡重复了您告知的操作步骤，但遇到了相同的错误：相机仍然显示“存储卡错误”，也无法格式化这张卡。\n\n经过所有这些步骤后，我认为问题出在相机本身，而非存储卡。\n\n我还附上了格式化步骤（1至4）的照片、启动时的错误提示、两张micro-SD卡的照片以及相机的详细信息（“关于”菜单）。\n\n按照您的要求，相机型号为V50X，版本号为SN-AX-240822-V2.0，存储卡的照片已附上，我的名字是安妮·卡西（Anne CASSI），地址是“法国锡苏安市勒克莱尔将军街180号，邮编59830”。\n\n感谢您的支持。\n\n此致，\n\n安妮", "no": "5205", "date": 1766978196000, "retest": ""}}, {"record_id": "recv6P0p7yPWmC", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "我有这款相机好几年了，但最近它一直出问题。有时候它不能正确识别存储卡。开机时，它有时会显示“请格式化存储卡”，有时什么也不显示，但顶部的时长显示为00:00:00。不过有时它又能正常工作，毫无问题地将内容录制到存储卡中。", "no": "5227", "date": 1767057790000, "retest": ""}}, {"record_id": "recv7FNITZWLB1", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "我刚买了一台新的V50X来替换我那台过期的V50X（充电电路坏了）。我主要用这台相机记录我的自行车骑行，通常骑行时间约为1个半小时或更长。由于内置电池续航较短，我在自行车上安装了一个Anker PowerCore 5000mAh的移动充电器，为整个骑行过程提供持续供电。这在我用了三年的V50X上效果很好，在行车模式下以4K30fps拍摄，稳定性和陀螺仪均开启。当我在新的V50X上使用H.265进行完全相同的设置时，它在循环录制一个时段（5分钟）后就会停止，并弹出警告窗显示：“SD卡速度过低！”我原以为可能是我那旧的SanDisk Ultra 16GB A1 HCI microSD卡的问题，所以我购买了一张新的128GB SanDisk Extreme Pro卡。\n\n安装新卡后，我让相机在自行车静止的情况下运行了两个多小时。然而，一旦我骑车出去，警告再次出现，但只在5分钟后，而且如果重置，它会在每个5分钟的循环后继续停止。这种情况与使用旧的、速度较慢的卡时出现的情况相同，并且无论使用新的内置电池还是PowerCore都存在。这是怎么回事？\n\n在我上次的通信中，我提到在升级过程中，系统重新安装指南指出，当按下电源按钮时会出现“FW UPdata”字样。但它没有出现，版本也没变，但相机在录制（4K、稳定开启、陀螺仪开启、行车模式开启）两小时后不再显示“SD卡速度过低！”的消息而卡顿了。我假设通过固件更新问题已得到解决，除非有进一步情况。\n\n我这台相机版本有一个问题，我那台旧的也有。由于内置电池续航有限，我必须使用Anker 5000Ah移动电源来补充电池。它工作得很好，我只需把相机和移动电源安装在自行车上并连接好。如你所知，在行车模式下，当Anker插在家庭电源上充电时，它会切断对相机的供电。然后，当出去骑行时，我只需断开Anker与家庭充电线的连接，打开Anker即可。不出所料，相机启动并开始录制。太完美了！\n\n我的问题出在内置电池上。我假设需要安装内置电池并充满电才能使用我刚才描述的方法，但在这个过程中，内置电池从未被充电过。它需要用充电器单独直接充电，因为它会随着时间慢慢放电。当无论是充电还是使用Anker为相机供电时（无论相机开或关），内置电池难道不应该充满吗？我需要不断检查它的电量，尤其是随着它老化。是我漏掉了什么吗？", "no": "5304", "date": 1767837915000, "retest": ""}}, {"record_id": "recv9GwZahxavu", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "我在使用Akaso V50X相机时，很多SD卡都出现了问题（出现了著名的“SD卡速度慢”错误）。所以现在我想尝试通过升级固件来解决这个问题。能否请您发送我Akaso相机的最新固件，具体信息如下：- 相机版本：V50X-3881- 软件/固件版本：V50X-FX-2G 20211115-V40我已经阅读了贵网站上的说明，显然更新固件的唯一方法是将其物理上传到SD卡上。", "no": "5483", "date": 1769680967000, "retest": ""}}, {"record_id": "recvcRIfIKUSgy", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "我们遇到一个大问题。每次我儿子用相机录制视频后，在录制后的一小时内，所有视频都会消失，相机显示“无文件”。相机保存文件后，多次开关相机后文件会显示已保存。但在最初保存大约2-3小时后，所有视频就会消失。从未出现过错误消息。", "no": "5667", "date": 1772594590000, "retest": ""}}, {"record_id": "recuZj9Hdi1slR", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "相机无法连接到手机，即使对相机进行了重置，我仍然收到一条错误消息：“连接有点小问题，请重启相机”。\n已找到解决方案，但不太实用，需要将手机调至飞行模式？？？ ", "no": "4579", "date": 1760174231000, "retest": ""}}, {"record_id": "recvdJk3fYxZ5H", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "你激活了WiFi并且能够看到密码，但当你在手机上输入时显示密码错误。正在检查更新", "no": "5737", "date": 1773386744000, "retest": ""}}, {"record_id": "recut7Ny8xZ6zP", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "无法在我的 iPhone 上播放视频", "no": "1018", "date": 1730690163000, "retest": ""}}, {"record_id": "recut7SyG2N44f", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "虽然一开始一切都很顺利，但一夜之间，使用 akaso go 应用程序，我们无法再将照片传输到手机上。它说没有数据而不是显示相机媒体。\n\n提醒一下，我们在应用程序运行和停止运行之间没有更改任何设置（相同的 microSD 卡，没有更新）。", "no": "1019", "date": 1730691356000, "retest": ""}}, {"record_id": "date": 1757923524000, "retest": ""}}, {"record_id": "recv0ft4gd5HSM", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "相机的无线功能经常无法使用，或者需要摆弄很长时间才能正常工作。是的，我已经尝试过很多次重新安装应用程序或重置相机（通常除非取出电池，否则无法重置）。有时它工作正常，但很难预测什么时候会这样。有什么方法可以提高性能吗？到目前为止，对我来说最大的问题是找不到无线信号。这使得相机对于我需要做的事情来说完全没用。而且问题越来越严重。无法连接到无线网络，请稍后再试，或者确实连接上了，但一旦开始拍照，连接就会丢失。", "no": "4690", "date": 1761035875000, "retest": ""}}, {"record_id": "recv7jlQbsskjJ", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "试图查看手机上的照片时，应用程序一直显示数据失败", "no": "5269", "date": 1767506187000, "retest": ""}}, {"record_id": "recvc7YexabEPa", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "我的相机无法连接到我的新iPhone 17，但它在我的旧iPhone 14和iPad上能正常工作。我按照你推荐的所有步骤都做了。当我尝试连接Wi-Fi时，它显示密码错误。我输入的是相机上显示的密码1234567890。", "no": "5604", "date": 1771918686000, "retest": ""}}, {"record_id": "recveKj340qPNY", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "无法将我的新相机连接到Akaso Go，总是出现错误。是的，问题解决了，我不知道必须关闭我的LTE。", "no": "5789", "date": 1774317413000, "retest": ""}}, {"record_id": "recurw0mxP3K0C", "fields": {"status": "待确认", "level": "S", "category": "发热问题", "severity": "用户体验问题", "content": "录制一会相机发热", "no": "868", "date": 1729215579000, "retest": ""}}, {"record_id": "recuTV9zpNesRC", "fields": {"status": "待确认", "level": "S", "category": "发热问题", "severity": "产品问题", "content": "我们刚参加完血库露天音乐节，一直等着用这款V50X。之前简单测试了一下基本功能，但我注意到，即使设备开机短短一段时间，就出现了设备和电池严重过热的情况。\n\n通常我会说运动相机有点发热是正常的，但这台相机简直烫得能灼伤我的手指。\n\n抱歉，也许我得详细说明一下。设备开机但闲置时，其温度就高到能灼伤皮肤了。 ", "no": "3808", "date": 1755238905000, "retest": ""}}, {"record_id": "recukaUbExfjuf", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "没有充电器", "no": "31", "date": 1722490878000, "retest": ""}}, {"record_id": "recukg0UWEc1Lk", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "你好。我今天收到了订购的相机，但在包裹里没有看到存储卡", "no": "44", "date": 1722566364000, "retest": ""}}, {"record_id": "recukynHBTmkOQ", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "女士们，先生们\n\n7 月 16 日，我通过亚马逊订购了您的 V50x 相机（亚马逊订单号 302-1915266-6618735）作为我儿子的生日礼物。昨天，当我打开包装时，发现遥控器不见了。您能给我们寄一个新的遥控器吗？指定的所有其他部件均存在。\n\n如果您有任何疑问，可以随时通过电子邮件或电话与我联系。\n\n预先致谢并致以亲切的问候\n\n阿丽娜·赫塞尔", "no": "68", "date": 1722837769000, "retest": ""}}, {"record_id": "recunAp5paC917", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "缺少充电器", "no": "483", "date": 1725616050000, "retest": ""}}, {"record_id": "recut7nW8aooPl", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "据说它配有 64GB 卡，但实际上没有，图片上还显示有 2 块电池，但实际上也没有。印象不深", "no": "1002", "date": 1730684058000, "retest": ""}}, {"record_id": "recuurCAA8euUb", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我已订购并收到了 akaso v50x，所有东西都已到货，但我没有收到 microSD 卡。我支付了包含 64gb 存储卡的包裹费用。请发送此信息，因为没有它我就无法使用相机。", "no": "1208", "date": 1731899211000, "retest": ""}}, {"record_id": "recux5q7v1BoWi", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "您好，下午好，我在亚马逊 405-3292825-830996 下了订单。AKASO V50 X 4K WiFi 20Mp 运动相机。而且包裹密封得很好，不可能被人为操纵，我收到了所有配件，但缺少相机和潜水保护器。我们是这个品牌的粉丝，因为我们有 brave 8 和两台 brave 7，我们有一个儿子，我们想买 akaso v50x 开始，但包裹里既没有相机也没有保护器。我们更愿意直接联系他们，这样他们就能给我们一个解决方案，因为正如我所说，我们对这个品牌非常满意，我们不想给出差评，也不想在所有这些都是包装错误并且有解决方案时做出差评。我希望他们能尽快为我解决这个问题，因为这是一份圣诞礼物。谢谢，问候。", "no": "1465", "date": 1734319558000, "retest": ""}}, {"record_id": "recuzllWy3LeyA", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我兴奋地打开了盒子，但却很失望。盒子里没有电池充电器 x1。你能帮我吗？", "no": "1830", "date": 1736387249000, "retest": ""}}, {"record_id": "recuGlvaoZRcrB", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "您好，我们收到了相机，但是里面没有存储卡。亚马逊要求我们直接联系您。您能安排给我们发送一张 128GB 的存储卡吗？谢谢。真挚地", "no": "2451", "date": 1742802377000, "retest": ""}}, {"record_id": "recuJlvDGZY5M2", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "存储卡缺失；缺少存储卡", "no": "2784", "date": 1745550888000, "retest": ""}}, {"record_id": "recuVvVCYqqnsO", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "你好，\n我收到的包裹里少了一张本应包含在订单中的SD卡。我为此额外付了钱，对此我非常失望。\n能否给我补发一张SD卡呢，因为退回整个商品很不方便。\n非常感谢\n埃莉", "no": "4051", "date": 1756698439000, "retest": ""}}, {"record_id": "recuX87ygTxyPH", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我购买的商品中附带的物品有缺失，希望能补发缺失的部分。\n经确认，少了两件附带物品。\n缺失物品：・F 卡口 ・E 卡口", "no": "4350", "date": 1758178915000, "retest": ""}}, {"record_id": "recv4WAUg4VDEW", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我最近购买了一台AKASO V50 X运动相机。查看电子手册后，我发现包装盒中缺少了一件必备配件。根据“包装内含物品”清单，包装应包含一个快扣式支架（x1）——即配件图示第三行的第一项。我的包装中缺少了这个支架。", "no": "5069", "date": 1765337657000, "retest": ""}}, {"record_id": "recuJJv3KCA6E5", "fields": {"status": "", "level": "", "category": "漏件，其他问题", "severity": "配件问题", "content": "缺少充电底座", "no": "2837", "date": 1745905381000, "retest": ""}}, {"record_id": "recuIoQN2sVWr0", "fields": {"status": "", "level": "", "category": "外置麦适配", "severity": "配件问题", "content": "如何将 Hollyland 无线麦克风连接到 50vX", "no": "2653", "date": 1744684126000, "retest": ""}}, {"record_id": "recuk5loiKumJz", "fields": {"status": "", "level": "", "category": "七天无理由", "severity": "用户体验问题", "content": "七天无理由", "no": "12", "date": 1722408704000, "retest": ""}}, {"record_id": "recukySs39XfsZ", "fields": {"status": "", "level": "", "category": "七天无理由", "severity": "用户体验问题", "content": "七天无理由", "no": "85", "date": 1722845097000, "retest": ""}}, {"record_id": "recukySwNmlkds", "fields": {"status": "", "level": "", "category": "七天无理由", "severity": "用户体验问题", "content": "七天无理由", "no": "90", "date": 1722845115000, "retest": ""}}, {"record_id": "recukySwNmVpAE", "fields": {"status": "", "level": "
