<script>
// ── Snapshot persistence ──────────────────────────────
const SNAP_KEY = 'feishu_dash_snaps_v2';
function loadSnaps() { try { return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); } catch(e) { return []; } }
function saveSnaps(s) { localStorage.setItem(SNAP_KEY, JSON.stringify(s)); }
function upsertSnap(date, d) {
  const s = loadSnaps();
  const i = s.findIndex(x => x.date === date);
  if (i >= 0) s[i] = { date, ...d }; else s.push({ date, ...d });
  s.sort((a,b) => b.date.localeCompare(a.date));
  saveSnaps(s); return s;
}

// ── Data analysis ─────────────────────────────────────
function xv(v) {
  if (!v) return '';
  if (typeof v === 'string') return v;
  if (Array.isArray(v)) return v.map(x => typeof x==='object'?(x.text||x.name||''):x).join('');
  if (typeof v === 'object') return v.text||v.name||v.value||'';
  return String(v);
}

function analyze(records, fieldMap, doneVals, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  let total = records.length, done = 0, active = 0, top = 0;
  const statusMap={}, catMap={}, topList=[];

  for (const r of records) {
    const f = r.fields || {};
    const status   = xv(f[fieldMap.status]   || f.status   || '');
    const level    = xv(f[fieldMap.level]    || f.level    || '');
    const cat      = xv(f[fieldMap.category] || f.category || '');
    const content  = xv(f[fieldMap.content]  || f.content  || '');
    const severity = xv(f[fieldMap.severity] || f.severity || '');
    const retest   = xv(f[fieldMap.retest]   || f.retest   || '');
    const no_      = xv(f[fieldMap.no]       || f.no       || '');

    statusMap[status||'未填写'] = (statusMap[status||'未填写']||0)+1;
    if (cat) catMap[cat] = (catMap[cat]||0)+1;

    if (doneVals.includes(status)) done++; else active++;

    if (level === topLevel && !doneVals.includes(status)) {
      top++;
      topList.push({ no: no_, content: String(content).slice(0,50), status, cat, severity, retest: String(retest).slice(0,80) });
    }
  }
  return { total, done, active, top, statusMap, catSorted: Object.entries(catMap).sort((a,b)=>b[1]-a[1]), topList, date: today };
}

// ── Charts ────────────────────────────────────────────
let trendC, statusC, catC;
const BASE = {
  backgroundColor: 'transparent',
  textStyle: { color: '#8b949e' },
  tooltip: { backgroundColor:'#1c2128', borderColor:'#30363d', textStyle:{color:'#c9d1d9'} }
};
const STATUS_COLOR = {
  '待确认':'#58a6ff','开发中':'#3fb950','评估中':'#d29922','观测期':'#a371f7',
  '排期中':'#e3b341','待验收':'#ffa657','已完成':'#56d364','已关闭':'#8b949e','未填写':'#6e7681'
};

function initCharts() {
  trendC  = echarts.init(document.getElementById('trendChart'));
  statusC = echarts.init(document.getElementById('statusChart'));
  catC    = echarts.init(document.getElementById('categoryChart'));
  window.addEventListener('resize', ()=>{ trendC.resize(); statusC.resize(); catC.resize(); });
}

function renderTrend(snaps) {
  const dates   = snaps.map(s=>s.date).reverse();
  const totals  = snaps.map(s=>s.total).reverse();
  const dones   = snaps.map(s=>s.done).reverse();
  const actives = snaps.map(s=>s.active).reverse();
  const tops    = snaps.map(s=>s.top).reverse();
  trendC.setOption({ ...BASE,
    legend: { data:['总量','已解决','待处理','最高优先级待处理'], textStyle:{color:'#8b949e',fontSize:11}, itemWidth:20, itemHeight:3, top:4 },
    grid: { left:40, right:20, top:40, bottom:30 },
    xAxis: { type:'category', data:dates, axisLine:{lineStyle:{color:'#21262d'}}, axisTick:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    series: [
      { name:'总量',             data:totals,  type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#58a6ff' },
      { name:'已解决',           data:dones,   type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#3fb950' },
      { name:'待处理',           data:actives, type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#d29922' },
      { name:'最高优先级待处理', data:tops,    type:'line', smooth:true, symbol:'circle', symbolSize:5, lineStyle:{width:2}, color:'#f85149' }
    ]
  });
}

function renderStatus(statusMap) {
  const data = Object.entries(statusMap).map(([name,value])=>({ name, value, itemStyle:{color:STATUS_COLOR[name]||'#58a6ff'} }));
  statusC.setOption({ ...BASE,
    legend: { orient:'vertical', right:10, top:'center', data:data.map(d=>d.name), textStyle:{color:'#8b949e',fontSize:11}, itemWidth:10, itemHeight:10 },
    series: [{ type:'pie', radius:['48%','72%'], center:['38%','50%'], data, label:{show:false}, emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#e6edf3'}} }]
  });
}

function renderCategory(catSorted) {
  const cats   = catSorted.map(([k])=>k).reverse();
  const counts = catSorted.map(([,v])=>v).reverse();
  catC.setOption({ ...BASE,
    grid: { left:70, right:30, top:10, bottom:30 },
    xAxis: { type:'value', splitLine:{lineStyle:{color:'#21262d',type:'dashed'}}, axisLabel:{color:'#6e7681',fontSize:11} },
    yAxis: { type:'category', data:cats, axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#c9d1d9',fontSize:11} },
    series: [{ type:'bar', data:counts, barMaxWidth:18,
      itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#1f3a5f'},{offset:1,color:'#58a6ff'}]) },
      label: { show:true, position:'right', color:'#8b949e', fontSize:11 }
    }]
  });
}

// ── DOM updates ───────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function badgeStyle(label) {
  const map = {
    '待确认':'background:#1f3a5f;color:#58a6ff','评估中':'background:#3a2a0a;color:#d29922',
    '开发中':'background:#1a3a2a;color:#3fb950','观测期':'background:#2a1a3a;color:#a371f7',
    '排期中':'background:#2a2a0a;color:#e3b341','崩溃':'background:#3a0a0a;color:#f85149',
    '功能不可用':'background:#3a1a00;color:#ffa657','体验':'background:#0a2a1a;color:#56d364'
  };
  return map[label] || 'background:#21262d;color:#8b949e';
}

function updateKPIs(d) {
  const pct = n => d.total ? Math.round(n/d.total*100)+'%' : '—';
  document.getElementById('kpiTotal').textContent   = d.total;
  document.getElementById('kpiDone').textContent    = d.done;
  document.getElementById('kpiActive').textContent  = d.active;
  document.getElementById('kpiTop').textContent     = d.top;
  document.getElementById('kpiTotalSub').textContent  = `共 ${d.total} 条记录`;
  document.getElementById('kpiDoneSub').textContent   = `占比 ${pct(d.done)}`;
  document.getElementById('kpiActiveSub').textContent = `占比 ${pct(d.active)}`;
  document.getElementById('kpiTopSub').textContent    = `占全部 ${pct(d.top)}`;
}

function updateTopTable(list, topLevel) {
  document.getElementById('topTableTitle').textContent = `${topLevel} 级待处理问题`;
  document.getElementById('snapTopLabel').textContent  = `${topLevel} 级待处理`;
  const tbody = document.getElementById('topTableBody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-tip">暂无 ${topLevel} 级待处理问题 ✓</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(r => `<tr>
    <td><code style="color:#58a6ff;font-size:11px">#${escH(r.no)}</code></td>
    <td>${escH(r.content)}</td>
    <td><span class="badge" style="${badgeStyle(r.status)}">${escH(r.status)||'未填写'}</span></td>
    <td>${escH(r.cat)}</td>
    <td><span class="badge" style="${badgeStyle(r.severity)}">${escH(r.severity)||'—'}</span></td>
    <td style="color:#8b949e;font-size:11px">${escH(r.retest)||'<span style="color:#3d444d">—</span>'}</td>
  </tr>`).join('');
}

function updateSnapTable(snaps, topLevel) {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('snapBody').innerHTML = snaps.slice(0,15).map(s => `<tr class="${s.date===today?'today-row':''}">
    <td>${s.date}${s.date===today?' <span style="color:#58a6ff;font-size:10px">(今日)</span>':''}</td>
    <td class="num-blue">${s.total}</td>
    <td class="num-green">${s.done}</td>
    <td class="num-yellow">${s.active}</td>
    <td class="num-red">${s.top}</td>
  </tr>`).join('');
}

// ── Main render ───────────────────────────────────────
function renderAll(data, snaps, topLevel) {
  updateKPIs(data);
  renderStatus(data.statusMap);
  renderCategory(data.catSorted);
  renderTrend(snaps);
  updateTopTable(data.topList, topLevel);
  updateSnapTable(snaps, topLevel);
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN',{hour12:false});
}

// ── Boot ──────────────────────────────────────────────

kB5H", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "你提供的<|问题描述|>本身就是中文，若你是需要将其翻译成英文，以下是翻译结果：The screen cannot be touched, and restarting by removing the battery doesn't work either.", "no": "3623", "date": 1754036625000, "retest": ""}}, {"record_id": "recuSZtsG6GD7B", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "我有一台 Brave 7 LE，突然出现了黑屏的情况。主屏幕能开机，但无法显示内容。触摸屏功能正常，但我看不到触摸的是什么。当我切换到前置屏幕时，它显示正常，但当我切回主屏幕时，屏幕会出现白线。\n\n最新情况：你之前把相机存放起来了，最近再次使用时，主屏幕出现了交叉的白线。你可以切换到前置摄像头，这不会出现任何问题。只有主屏幕存在问题。你尝试过取出电池、SD 卡并给相机充电，但问题仍然存在。 ", "no": "3667", "date": 1754386619000, "retest": ""}}, {"record_id": "recuTgiSIX9njS", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "虽然已经接通电源，但屏幕一直是黑的，无法显示画面。由于在连接背投监视器、手机以及使用HDMI接口时画面能显示，所以我认为是屏幕本身的问题。请问可以退货或换货吗？ ", "no": "3695", "date": 1754635295000, "retest": ""}}, {"record_id": "recuVfhIrcuoC9", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "我叫沈依文。我于2024年10月2日在塔吉特（Target）购买了一台AKASO Brave 7 LE运动相机。直到今年六月初的这个夏天，我才有机会使用它。不幸的是，我发现这台运动相机的触摸屏完全失灵了。基本上，我无论触摸屏幕的任何位置，都没有任何反应。我想知道这种情况是否在你们的制造商保修范围内。\n\n我尝试了你们提到的步骤，但仍然无法解决问题。 ", "no": "4037", "date": 1756452505000, "retest": ""}}, {"record_id": "recv0vd7rKSeBI", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "我的Brave 7 LE的背面（主）屏幕经常显示全是雪花点或黑屏。请问能帮我解决这个问题吗？", "no": "4706", "date": 1761268496000, "retest": ""}}, {"record_id": "recv6rThIUztf8", "fields": {"status": "", "level": "", "category": "01-显示屏", "severity": "产品问题", "content": "当我打开相机时，触摸屏只显示雪花噪点。我可以切换到前置屏幕，前置屏幕看起来正常，我也可以连接到应用程序，应用程序似乎也没问题。我已经进行了出厂重置并格式化了SD卡。无论有没有SD卡，都会出现这种情况。有一次我让触摸屏恢复了工作（不确定怎么做到的），但一旦我关机再开机，它又变成雪花噪点了。", "no": "5183", "date": 1766716236000, "retest": ""}}, {"record_id": "recukF9XGqdr0E", "fields": {"status": "", "level": "", "category": "02-镜头", "severity": "产品问题", "content": "在拍摄的时候，画面的左侧变黑了，无法拍摄。\n只有左侧的视角变窄了。\n拍摄的视频左侧也变成  "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "15分钟的循环录像。\n14分钟左右声音就会消失。\n另外，下面的保存数据是从头开始录音的，再过14分钟左右就会变成静音。\n有治疗方法吗?\n14分钟录音，1分钟静音\n14分钟录音，1分钟静音\n的文件形成。", "no": "697", "date": 1727403678000, "retest": ""}}, {"record_id": "recusPZvAaF0Q9", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "它正在录制声音，我可以在电脑上播放，但相机上的声音低得可笑，几乎听不到声音。我该如何调高相机的音量\n\n我把音量设置为 3。我录制了一个短视频，然后大喊嘿嘿嘿。当我播放它时，它几乎可以听到。如果将音量设置为最大，它肯定应该比这更响亮", "no": "996", "date": 1730427039000, "retest": ""}}, {"record_id": "recutoQx0KWcGT", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "似乎麦克风与扬声器交叉了。关闭通知声音会切断声音输入。即使使用有线麦克风，也会拾取大量内部噪音。尝试了所有设置和配置。", "no": "1072", "date": 1730942071000, "retest": ""}}, {"record_id": "recuvv6FZkvN9N", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "最近，在使用相机后，我发现它没有录制音频。我确保在设置中选择了内置麦克风。我还检查了语音录制功能是否已打开。我甚至尝试将相机恢复出厂设置，但没有任何效果。我在三英尺的范围内测试了距离，但没有收到任何声音。", "no": "1314", "date": 1732866843000, "retest": ""}}, {"record_id": "recuwwf6elcgJb", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "这款相机的音频声音非常糟糕，背景中有很多白噪声，即使开启了风噪降低功能（开启或关闭该模式没有区别），相机上也有一些污垢，特别是卡在小地方/碎片和假牙里，我觉得它好像以前被使用过，然后重新包装后寄给我", "no": "1418", "date": 1733799759000, "retest": ""}}, {"record_id": "recux4YjJZh5xs", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "音频非常微弱，我已经更新了固件，将订购 USB 麦克风看看是否有帮助，问题是将 USB 放入相机水封未打开的环境中，希望它具有 BTooth 功能。", "no": "1463", "date": 1734312932000, "retest": ""}}, {"record_id": "recuxQLHIAfw1B", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "录制的视频几乎听不到声音，我该怎么办？", "no": "1577", "date": 1735019190000, "retest": ""}}, {"record_id": "recuz9LUY1ccs2", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "收音有沙沙的声音不清晰", "no": "1789", "date": 1736216123000, "retest": ""}}, {"record_id": "recuzOOb3X6zq3", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "从购买的时候就没怎么录制声音，根据贵公司的建议购买了外部麦克风也没有变化。几乎没有录到声音（会录到不必要的风噪）。", "no": "1863", "date": 1736822492000, "retest": ""}}, {"record_id": "recuAuuTKI0jWu", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "1/20买了AKASO BRAVE 7le。我在设置中打开了录音，外部和内部麦克风都设置了但还是无法录音。怎样才能录音呢？", "no": "1916", "date": 1737438503000, "retest": ""}}, {"record_id": "recuC0YaDNxzr5", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "即使打开录音设置也无法录音。", "no": "1960", "date": 1738834455000, "retest": ""}}, {"record_id": "recuCnI4Sh2QOp", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "录音音频水平有问题。\n视频记录声音的水平非常小，电脑的音量全开勉强能听到的水平。没有使用防水壳。\n画质很好，但是声音记录有问题不能用，是故障商品吗？", "no": "1994", "date": 1739170476000, "retest": ""}}, {"record_id": "recuCtFqXiAvGC", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "晚上好，Akaso，\n我通过亚马逊购买了 Brave 7 LE，并用它来录制徒步旅行和露营之旅，但内置麦克风和 Akaso 品牌外置麦克风的音质存在问题。无论我们做什么，音质都很糟糕，而且据我所知，它不支持蓝牙或其他品牌的麦克风。图像稳定功能也存在问题，即使它已激活并保持尽可能平滑，图像在多次录制中都非常抖动。任何故障排除或我们可以做的事情都将不胜感激，我们下个月初还有另一次旅行，在转向专业版之前，我们会再试一次该设备。\n谢谢", "no": "2004", "date": 1739258503000, "retest": ""}}, {"record_id": "recuD7BolyWSs3", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "2月4日在亚马逊买的，我在室内录制，声音调到最大也听不到。\n已经实施了所有的支持faq都没有效果，是故障吗？", "no": "2097", "date": 1739848594000, "retest": ""}}, {"record_id": "recuD7BolydK5o", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "这次送来的东西，试了几次，声音几乎听不到。是这个型号的缺陷吗？", "no": "2099", "date": 1739848594000, "retest": ""}}, {"record_id": "recuD7Boly3S0Q", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "录音的声音很小", "no": "2100", "date": 1739848594000, "retest": ""}}, {"record_id": "recuDMpYPspnhb", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "固定在车内拍摄的话会有很大的噪音。\n到现在为止使用了别的照相机，不过，固定器具等同样的环境没有产生噪音。\n认为是电气噪音，拔掉电池放电也一样。充电线也拔掉了。\n汽车启动时会进入噪音，停止时会消失。", "no": "2180", "date": 1740451704000, "retest": ""}}, {"record_id": "recuDYWODbpXOv", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "内置麦克风即使在小型封闭安静的房间内录音，也能产生非常安静的音频，并且本底噪声很高。使用 Akaso App 或电脑收听音频时，音频非常安静，本底噪声很高。\n\n有办法解决这个问题吗？\n\n请注意，我已多次重置相机，相机不在外壳内，因此应该可以正常工作，但实际上并非如此\n\n谢谢", "no": "2216", "date": 1740636846000, "retest": ""}}, {"record_id": "recuElk9nP22TK", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我刚刚从亚马逊购买了您的外置麦克风，与 Brave 7 LE 搭配使用。\n当我在电脑上播放录制的视频时，我似乎听到了嗡嗡声\n这是故障吗？因为我的其他相机和麦克风没有出现这种情况\n谢谢\n罗杰", "no": "2229", "date": 1740967486000, "retest": ""}}, {"record_id": "recuGlEEJhEVqS", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "12月到达，但自从使用时开始就没有声音记录。\n我明明没有放在防水壳里面。", "no": "2467", "date": 1742804639000, "retest": ""}}, {"record_id": "recuIYc86ghhSJ", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我们为儿子订了一台Akaso Brave 7 LE相机作为他的生日礼物。收到相机后，我购买了延长保修服务。这是亚马逊订单编号112 - 2031500 - 9878625。他用这台相机拍了很多视频，现在相机的声音功能失灵了。录制视频回放时，只有嗡嗡声。之前声音功能是正常的。这种情况在保修范围内吗？我们在不同的环境和设置下都试过了，结果都一样。", "no": "2711", "date": 1745206383000, "retest": ""}}, {"record_id": "recuJmi0b8H79e", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "用户体验问题", "content": "有噪音音质不好", "no": "2786", "date": 1745562413000, "retest": ""}}, {"record_id": "recuKnD0IlixLZ", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "用户体验问题", "content": "喇叭音质不好", "no": "2843", "date": 1746498326000, "retest": ""}}, {"record_id": "recuKFuX5pgevM", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我刚收到Akaso Brave 7 LE，但它不支持音频播放，该怎么办？只有一点点声音，我根本听不清。 ", "no": "2880", "date": 1746762384000, "retest": ""}}, {"record_id": "recuODNwuB3rdU", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "声音非常小，小到几乎听不见，这是标准情况吗？即便使用外部麦克风，声音听起来还是很遥远。 ", "no": "3229", "date": 1750401789000, "retest": ""}}, {"record_id": "recuSjbVgVAjkY", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "音响系统无法正常工作。我以前使用这台相机时是可以有声音的。 ", "no": "3518", "date": 1753761832000, "retest": ""}}, {"record_id": "recuUbKfh5FWbW", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "此<|问题描述|>本身就是中文，无需翻译。其内容为：花屏音画不同步（花屏尝试调节50HZ有所缓解，音画不同步问题用户未答复已申请退货）", "no": "3817", "date": 1755484065000, "retest": ""}}, {"record_id": "recuUScZWSsddh", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "就声音表现而言，我的Akaso Brave 7与我的Drift Ghost相比，实在是令人失望。我试过Akaso的领夹式麦克风，那简直糟糕透顶；还有你们寄给我的Akaso无线麦克风，情况也没好到哪儿去，而且你们甚至都没提供一个低成本的解决方案。我感觉自己的钱都白花了。\n\n我要怎么做才能让Brave 7录制出像样的音频呢？单独处理音频太麻烦了，而这并非我购买它的初衷。我对视频质量很满意，就是声音拖了后腿。我没法用它来为我的频道制作内容，不得不使用一台已经用了10年的Drift Ghost，虽然它效果好很多，但毕竟年头久了。\n\n因为我之前投诉过Brave 7LE，所以你们给我换了Brave 7。\n\n我买了你们的有线麦克风，质量很差。\n你们寄给我的无线麦克风，同样质量不佳。\n由于它采用的是USB - C接口，所以不能随便使用其他外部麦克风。 ", "no": "3947", "date": 1756111526000, "retest": ""}}, {"record_id": "recv0vS1LhyJou", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我用订单号503-0363948-3600615在亚马逊购买的相机完全录不进声音。如果有什么建议请告诉我。如果问题迟迟得不到解决的话，我希望能进行退换。本来想尽快使用的，但现在完全和预期不符，让我很困扰。", "no": "4714", "date": 1761278246000, "retest": ""}}, {"record_id": "recv16dYMDPtP0", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我购买的相机完全录不进声音。如果有什么建议的话请告诉我。如果问题迟迟得不到解决，我想申请换货。我本来急着要用，但现在完全出乎意料，让我很困扰。", "no": "4773", "date": 1761815427000, "retest": ""}}, {"record_id": "recv2uctlXRHlp", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我有一台AKASO EK7000 Pro，它的麦克风发出奇怪的机器声音。另外，我的Brave 7 Le的麦克风也有奇怪的静电噪音。我尝试了其他USB转AUX线缆，但没有用。我还有一台安装了AKASO有线麦克风的Brave Le，它的音频里有奇怪的机器声音，而且当你用外部声音录制时，能听到音频里有静电噪音。这是为什么？该怎么解决？", "no": "4876", "date": 1763085830000, "retest": ""}}, {"record_id": "recv3a1ETvEN2W", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我用普通模式录制，录音也开着，但从文件播放没有声音，下载到手机也没有声音。请问需要进行哪些设置？", "no": "4932", "date": 1763703860000, "retest": ""}}, {"record_id": "recv5CBSjmls4J", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "喇叭声音不正常，已经退货", "no": "5104", "date": 1765958496000, "retest": ""}}, {"record_id": "recv5IA7IhaYbH", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "当我在相机上回放视频时，听不到声音。通过WiFi在手机上播放时，我能听到声音。相机的麦克风在哪里？", "no": "5116", "date": 1766046733000, "retest": ""}}, {"record_id": "recv6Lbi6GhnGb", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我儿子用这个相机时不会把视频上传到其他设备。他就喜欢用相机录制然后直接回放。所以我们真希望相机的音质至少能过得去。今天他录东西的时候，声音太小了，根本听不清。我本以为至少能听清说的是什么。我实在怀疑这是不是个“次品”，因为从我们拿到它开始就这样了。它还会突然没声音，然后出现静电噪音，之后就完全听不到任何声音了。", "no": "5220", "date": 1767001278000, "retest": ""}}, {"record_id": "recv7BqsJteyVR", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我有一台从亚马逊购买的AKASO Brave 7运动相机。我非常喜欢它，不过，它录制的音频音量很低，而且音质模糊。请查看附件中的示例。能否给我一些建议？ ", "no": "5296", "date": 1767773266000, "retest": ""}}, {"record_id": "recv89sEGORHAU", "fields": {"status": "待确认", "level": "S", "category": "03-声音问题", "severity": "产品问题", "content": "我至今使用Brave 7 LE的不满之处在于麦克风问题。即使将内置麦克风的风声降噪功能设为无效（关闭），录音音量也小到几乎听不见。虽然有外接麦克风（我没有使用），但大多数关于外接麦克风的评测都说，噪音比风声还大，导致人声和周围想要录制的声音都被掩盖了，所以我觉得性价比不高。因此，我认为通过在固件（软件方面）中设置麦克风增益调节功能，就能解决麦克风灵敏度的问题。※目前，与其他公司的同类产品（机身本身具备防水性能的产品）相比，其麦克风灵敏度（录音音量）实在太差了。", "no": "5324", "date": 1768276182000, "retest": ""}}, {"record_id": "recvbzeGL03S15 te": 1755522436000, "retest": ""}}, {"record_id": "recuWyVNNE4tqp", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我写信是为了申请对我的AKASO相机进行维修服务。不幸的是，电池仓（即插入电池的地方）损坏了，我无法正常使用该设备。 ", "no": "4269", "date": 1757658943000, "retest": ""}}, {"record_id": "recuWVcu26osGJ", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我有一台 Brave 7 LE 相机，我刚发现相机正面的装饰条裂了。见附件中的照片。看起来这只是一个装饰件，不会影响防水功能。我不想尝试用胶水粘，想知道这个部件是否有备件。这台相机没有摔过或磕碰过，所以我不知道它是怎么坏的；相机其他地方没有任何痕迹或划痕，表明没有受到过任何撞击。我在 2024 年 7 月 15 日买了这台相机，这种情况是否在保修范围内呢？ ", "no": "4308", "date": 1757987997000, "retest": ""}}, {"record_id": "recuXNsLNTrF1t", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我们能把这个送去维修吗？显然，它在拧紧的时候断了。我的确又买了一个……图中展示的就是新的那个。\n\n它甚至都还没安装到任何东西上。他们只是把它拧紧，它就断了……然后它就一直放在这里好几个月都没用过。 ", "no": "4447", "date": 1758789801000, "retest": ""}}, {"record_id": "recuZESw0oBYMf", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我只在自行车头盔的保护壳中使用相机，并且没有发生过任何摔落。正常使用后，相机框架的部分部件碎裂，相机开机后很快就会关机。我希望能更换一个。", "no": "4649", "date": 1760495216000, "retest": ""}}, {"record_id": "recuZESw7EE3sV", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "电池盖卡住了。请看附件视频。谢谢！https://drive.google.com/file/d/1utFpff3cVUtWIiYMOer77bD-0-C8A7Db/view", "no": "4650", "date": 1760495217000, "retest": ""}}, {"record_id": "recv0wypKIqAPe", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我只用过一次，但电池的接合部分脱落了，导致无法启动。我认为这是初期不良，能否请您更换商品？为慎重起见，我会附上损坏部位的照片。\n这样看来，电池的接合部分在内部脱落了，我想可能是焊接不够牢固。\n请您考虑一下，麻烦了。", "no": "4725", "date": 1761288349000, "retest": ""}}, {"record_id": "recv1DQyP1DN08", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我的Brave 7 LE相机的micro-USB端口金属连接器缩进了相机机身内部，导致无法将micro USB线缆连接到该端口。", "no": "4803", "date": 1762312239000, "retest": ""}}, {"record_id": "recv4ifacEtOn9", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "希望你一切都好。大约一年前，我在亚马逊上购买了你们的运动相机。虽然当时没怎么用，但最近因为要去旅行，想好好拍vlog记录一切，就把它翻了出来。这时我发现电池槽完全不能用了，相机只有插着电源才能开机，感觉它就像个充电器一样。这让我很失望，因为我信任这个产品，攒了钱才买的，本来很期待在这次旅行中好好用它。我不是想抱怨，真的只是希望能得到一些帮助。如果你们团队能帮我免费检查并修理一下，我会非常感激，尤其是因为我还没能按它本该有的方式好好使用过它。我更希望能通过电子邮件直接沟通，而不是通过自动支持系统，这样事情就不会丢失或延误。我相信优秀的公司会好好照顾客户，真心希望你们能帮我解决这个问题。非常感谢你的时间和理解，也非常感谢你能提供的任何支持。\n\n非常感谢你的回复，也感谢你提出提供电池更换套装，我真的很感激你的帮助。但我想说明的是，我认为问题不在于电池本身。我对技术不太懂，可能说不出准确的术语，但问题似乎出在相机内部与电池接触并传输电力的部件上。相机插电源时工作完全正常，电池也能正常充电，但插入电池后，感觉电力无法通过那些内部连接器传输。我还附上了相机电池槽的照片，这样你就能清楚地看到我所说的情况。我已按要求在下方提供了我的个人信息。再次非常感谢你的时间和支持，我真的很感激你的帮助。", "no": "5025", "date": 1764741422000, "retest": ""}}, {"record_id": "recv5CYOfSKeDv", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "相机电池连接器脱落", "no": "5110", "date": 1765963960000, "retest": ""}}, {"record_id": "recv6L2JNwIYSO", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我想就电池连接器/插脚断裂的问题发起保修申请。有一天我正在使用我的Akaso Brave 7LE相机，它突然没电了，于是我更换了电池，但发现相机无法开机……我再次查看，注意到三个电池插脚中的一个已经断裂，导致相机无法使用。", "no": "5219", "date": 1766999240000, "retest": ""}}, {"record_id": "recv6P8K6JkTFI", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我想寻求帮助，因为一颗本应用于给相机安装配件的螺丝断在了孔里。", "no": "5229", "date": 1767059778000, "retest": ""}}, {"record_id": "recv9sU9KvtYQv", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "我在2025年2月购买了一台Brave 7 LE。上个月我更换电池时，有东西掉了出来，电池连接的一个端子坏了。这在保修范围内吗？如果在的话，我该如何处理？我已经没有原包装了。", "no": "5453", "date": 1769479621000, "retest": ""}}, {"record_id": "recvdl5cG1yTGl", "fields": {"status": "已关闭", "level": "S", "category": "04-结构装配", "severity": "产品问题", "content": "Brave 7 LE的USB端口盖坏了，这很奇怪，因为这个设备几乎没怎么用过。", "no": "5698", "date": 1773028573000, "retest": ""}}, {"record_id": "recvenWJ3zxbDv", "fields": {"status": "已关闭", "leve "no": "60", "date": 1722819965000, "retest": ""}}, {"record_id": "reculifx7DiioM", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "一个电池无法使用了。最初2个都可以使用，但现在有1个主机及充电器均无法识别。我想修理或更换电池。", "no": "203", "date": 1723515533000, "retest": ""}}, {"record_id": "recupafAZVN0uy", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "打开盒子，所有东西都密封得整整齐齐（顺便说一下，外观很棒）。我读到你应该在使用前给电池充电，所以我就充电了。我充电了几个小时，把电池放进相机后，显示 75%。充电器上显示已充满。这是两块电池的问题。现在我不知道该不该退货，或者我们该怎么做才能确保我的电池能真正充电到 100%。请帮忙\n\n我使用随附的 2 个电池充电器以及随附的 USB 电缆进行充电。\n它放在那里几个小时了，但还没有充满电。", "no": "658", "date": 1727061869000, "retest": ""}}, {"record_id": "recupxhzqN6z6V", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "电池鼓包", "no": "695", "date": 1727402195000, "retest": ""}}, {"record_id": "recurTj55ubErv", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "Brave 7 LE的电池标签坏了", "no": "896", "date": 1729559900000, "retest": ""}}, {"record_id": "recusPLhXVzblL", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "我的 akaso Brave 7 Le 中的两块电池中的一颗已经膨胀并且不再工作", "no": "990", "date": 1730423650000, "retest": ""}}, {"record_id": "recuD1woXyQ0c9", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "这是订单号和电池的图片。一张显示充电一整夜后的电池电量，另一张显示观看 1 分钟视频后的电池电量（红色）。", "no": "2065", "date": 1739758746000, "retest": ""}}, {"record_id": "recuEwWvDOsZBr", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "用户体验问题", "content": "续航太短", "no": "2253", "date": 1741139166000, "retest": ""}}, {"record_id": "recuFSHZXqLAMY", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "产品问题", "content": "电池耗电太快", "no": "2422", "date": 1742376922000, "retest": ""}}, {"record_id": "recuGlDfU2j1Bj", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "你好，电池不能充电", "no": "2453", "date": 1742804305000, "retest": ""}}, {"record_id": "recuHVwKd17RqG", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "两个电池充满电后，它们只能持续使用约一小时，然后就没电了，为什么？", "no": "2616", "date": 1744250834000, "retest": ""}}, {"record_id": "recuJxduqRDvTY", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "你好，我大约两个月前购买了我的 7LE 产品。说实话，在三月初我只用了 45 次。之后它就一直被放在架子上的盒子里。今天我把它拿出来给电池充电。我正打算开始更多地使用这个产品，我很喜欢它。你们的产品很棒。然而，其中一块电池充电似乎没问题，另一块却充不进去电。我按照你们在产品保养说明里说的做了很多尝试，但这块电池就是充不进去电。如果需要的话我可以提供购买凭证，我是在亚马逊上买的，我想我应该能找到收据。我们该怎么办呢？ ", "no": "2795", "date": 1745723880000, "retest": ""}}, {"record_id": "recuSeo2Hb3HsA", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "相机通过 USB 线连接时可以开机，但在不使用 USB 线、尝试用电池开机时，相机显示电量不足。我购买并尝试了多块电池，问题依旧。请问相机是哪里出了问题？", "no": "3506", "date": 1753690839000, "retest": ""}}, {"record_id": "recuSXWKXVI5bC", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "电池续航太短本身就是中文，若翻译为英文则是：The battery life is too short.", "no": "3651", "date": 1754364046000, "retest": ""}}, {"record_id": "recuT4VEzwcm2q", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "相机工作正常，今天你想换电池时，发现电池卡住了。电池上有一个小拉口，是用来方便取出电池的，但它坏了。直到你想取出电池时才注意到这个问题。用数据线给它充电让你觉得很不方便。\n\n我费了点劲，终于把电池取出来了。由于使用了镊子，电池现在有点破损。\n\n我可以顺利地安装并取出第二块电池。我附上了最终取出电池后的照片。 ", "no": "3675", "date": 1754467219000, "retest": ""}}, {"record_id": "recuUom3bcR1TM", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "随附的电池无法再完全充电。它最多只能达到其容量的20%。我想获得一块备用电池。", "no": "3873", "date": 1755670393000, "retest": ""}}, {"record_id": "recv6P6AcaPzYR", "fields": {"status": "", "level": "", "category": "06-电池", "severity": "配件问题", "content": "刚买了这台相机。它工作正常，但两块电池中有一块无法充电。两块电池上都找不到任何标识。其中一块电池的一侧有字母“M”，型号是PG 1350。充电时指示灯一直亮红灯……充了24小时也不行。相机无法开机。", "no": "5228", "date": 1767059263000, "retest": ""}}, {"record_id": "recuniYnPQDzGa", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "用户体验问题", "content": "我有Brave 7 LE，但是遥控器生锈了，不能用了。前几天，我在浮潜的时候用过。\n遥控器不可以这样使用吗?", "no": "445", "date": 1725358488000, "retest": ""}}, {"record_id": "recuz57atiozND", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "使用两天后，相机粘合剂就从头盔上脱落了。由于相机从头盔上脱落，我不再拥有它了！我喜欢这款相机，但将其固定在头盔上的粘合剂是垃圾！因此，由于这个原因，我无法推荐这款产品，因为它就在我骑行的高速公路上。", "no": "1761", "date": 1736147306000, "retest": ""}}, {"record_id": "recuElArsIcAm2", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我已经确认我拥有所有配件，除了需要的 A 型支架，它允许我连接到三脚架。目前，我请求加快 A 型支架的发货速度并将其发送给我。一旦我拥有所有零件，我就会决定是否退货。它昨天到达，并且仍在保修期内。", "no": "2240", "date": 1740971369000, "retest": ""}}, {"record_id": "recuFjBEVuTXF9", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "从盒子里取出相机并按照“如何操作”的说明操作时，防水支架卡住了。我需要更换支架。", "no": "2359", "date": 1741858239000, "retest": ""}}, {"record_id": "recuGZXHFDPjHP", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "2023年8月，我在亚马逊购买了Brave 7le。\n我没有用过遥控器，但是这次试了一下，无法使用。\n我以为简单地按下按钮就可以开始拍摄，但即使按下按钮也不会工作。", "no": "2520", "date": 1743400232000, "retest": ""}}, {"record_id": "recuKFuX5pqxdl", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "遥控器不能用了。", "no": "2879", "date": 1746762384000, "retest": ""}}, {"record_id": "recuLCGX4lLomF", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "下午好。昨天我第一次使用自行车支架。我骑着自行车的时候，发现它晃动得很厉害，而且不能正确固定。回到家后，我把它取下来，发现它已经断了。我需要换一个新的。", "no": "2939", "date": 1747637048000, "retest": ""}}, {"record_id": "recuSoH8bYu5Ib", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我超爱我的Akaso 7 LE，但不知道怎么回事，它的电池仓盖合不上了。\n我会在这封邮件里附上一张图片。\n你能帮我吗？\n完全合不上。在电池仓那个特定的部位，不可能是因为摔落或其他原因导致的。\n昨天我在关闭电池仓盖的时候，合上时会发出“咔哒”一声，然后掉出了一个黑色的东西。它很小，很难看清。从那之后就再也合不上了。 ", "no": "3563", "date": 1753843151000, "retest": ""}}, {"record_id": "recuTf4c5LPxOV", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我骑的是一辆经过改装的XR600r冒险摩托车。我的问题出在相机的车把支架上。这个支架搭配较轻的EK7000相机时使用情况良好。我进行过一些相当激烈的越野骑行，在我使用它的那段时间里，支架表现不错。我买了Brave 7 LE相机后，发现如果不把带有橡胶垫的支架拧到足以让塑料支架弯曲的程度，它就无法固定住较重的相机。这给支架带来了很大的压力，以至于我下次骑行时支架就断了。幸运的是，我把相机用绳子拴在了车把上。在我发现支架断裂之前，相机已经被颠得够呛了。我想知道有没有更好的支架能让我放心地用于Brave 7 LE相机。 ", "no": "3688", "date": 1754617018000, "retest": ""}}, {"record_id": "recuWy7ErjpE05", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我遇到了一个问题。我从你们这里购买了一台 AKASO Brave 7 LE 相机，使用两个月后，在我骑行时，车把/杆式支架突然断成了两截。幸运的是，我很快就发现了，相机没有掉在路上。 ", "no": "4259", "date": 1757646991000, "retest": ""}}, {"record_id": "recv0wypQSPLKX", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "这是10月7日收到的商品，10月15日在自行车把手上安装附件行驶时，把手装置用的配件损坏了。幸好没有掉落，相机也没有受损，但现在无法安装到自行车上了。希望能对该配件进行保修。", "no": "4727", "date": 1761288349000, "retest": ""}}, {"record_id": "recv26Qn3rJSHy", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "支架断了，夹子没有受到任何撞击。附上照片", "no": "4832", "date": 1762740708000, "retest": ""}}, {"record_id": "recv95q6rL4ujX", "fields": {"status": "", "level": "", "category": "09-配件", "severity": "配件问题", "content": "我为我的AKASO BRAVE 7 LE订购了一个AKASO外接麦克风，以便为我的视频录制更直接的音频。虽然麦克风能够插入并录制声音，但它也会在音频中拾取大量的静电/嗡嗡声。我已经确保麦克风已牢固插入，选择了外接麦克风设置，排除了任何可能造成干扰的物体，但遗憾的是视频音频中仍然有不需要的静电声。我认为我购买的AKASO外接麦克风可能有故障，但我希望能再收到一个来试用。关于这个问题的任何其他见解都将不胜感激。", "no": "5405", "date": 1769132601000, "retest": ""}}, {"record_id": "recuxJOne58CGz", "fields": {"status": "", "level": "", "category": "07-副屏", "severity": "产品问题", "content": "前屏幕不工作。我尝试重置相机并多次打开和关闭它。我按照说明操作，但前一个屏幕上的长按模式不起作用。", "no": "1551", "date": 1734916391000, "retest": ""}}, {"record_id": "recv3xv2l9hP7H", "fields": {"status": "", "level": "", "category": "07-副屏", "severity": "产品问题", "content": "换货，小屏有小黑点", "no": "4973", "date": 1764050717000, "retest": ""}}, {"record_id": "recv9KjHKmVAoF", "fields": {"status": "", "level": "", "category": "07-副屏", "severity": "产品问题", "content": "Brave7E型号的正面屏幕不显示了", "no": "5485", "date": 1769736905000, "retest": ""}}, {"record_id": "recuua5wVI9Ih8", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "水下外壳在使用时会产生冷凝水", "no": "1171", "date": 1731640134000, "retest": ""}}, {"record_id": "recuwBKG0biJ8O", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "经过两天的浮潜使用，防水壳出现了外部裂纹，分布在整个正面。请注意，外壳没有受到任何撞击，并且始终正确存放。", "no": "1435", "date": 1733881167000, "retest": ""}}, {"record_id": "recuxLf2tybP8q", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "女士们，先生们\n我把 Action Cam Brave 7 送到了我家。该产品的第一印象是积极的。\n不幸的是，如果你仔细观察，防水壳上有即使用布也无法去除的划痕。\n也许这些也是生产错误。\n我想请您为我提供一个没有划痕的替换外壳。", "no": "1557", "date": 1734937523000, "retest": ""}}, {"record_id": "recuRzhT3xwUC0", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "The waterproof case has scratches.", "no": "3447", "date": 1753083542000, "retest": ""}}, {"record_id": "recv3ygUWbzGZM", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "我在水中使用了我的Brave 7 LE，当我把它从同样是从Akaso购买的手柄上取下来时，水下外壳上的一个小塑料支架断了。", "no": "4979", "date": 1764062129000, "retest": ""}}, {"record_id": "recv785wpyH0vP", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "这个盒子不防水。我去潜水的时候，里面进了一点水。\n\n需要说明的是，防水壳没有损坏。它是刚拆封的，看起来完好无损。\n\n我只能说，第一次潜水后，我发现防水壳里面有几滴水。相机还能工作，我也能看我拍的视频，但我担心长期这样会损坏相机。而且，我当时的深度只有40到60英尺。\n\n仔细检查防水壳后，我发现白色的硅胶带似乎固定不住，很容易移动。也许这就是水可能渗进去的原因……？这是正常现象还是设计缺陷？不管怎样，作为一个防水壳，它的做工似乎不太好。我们该如何解决这个问题？我应该把它退回亚马逊然后买一个GoPro吗（我从2012年就有一个GoPro，它的防水壳从来没有出过问题，但我想升级一个更新款的相机）。", "no": "5261", "date": 1767339759000, "retest": ""}}, {"record_id": "recv9zMX9WeUtv", "fields": {"status": "", "level": "", "category": "08-防水壳", "severity": "配件问题", "content": "brave 7 le配有防水壳，但外壳有划痕，并且还刮花了相机屏幕。如你所见，外壳确实有很多划痕，这些划痕刮花了相机的前置屏幕，相机本身可能没问题，但我想要一个新的外壳。", "no": "5471", "date": 1769581337000, "retest": ""}}, {"record_id": "recungMAktqbLz", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "相机反复重启，有时会冻结。如何修复", "no": "432", "date": 1725326123000, "retest": ""}}, {"record_id": "recuqLMeM22SKd", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "用户体验问题", "content": "无法从徽标屏幕进入下一步。\n发生：\n从手中掉落，约 0.7 米高。", "no": "780", "date": 1728532505000, "retest": ""}}, {"record_id": "recuwqkBmkR5EM", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "Brave 7 LE 是与防水外壳和其他配件一起订购的，还有 Akaso SD 卡（128GB）。我曾尝试在潜水时使用它，但一旦进入水中，它就会冻结并报告存储卡故障。防水外壳中没有进水，相机完全干燥。这非常令人失望。\n\n我在相机放在防水外壳内时打开了它。拍了一张照片，然后进入水中，当我潜水到 10 米时，由于存储卡故障，它无法拍照。然后我尝试循环进入系统设置，但屏幕冻结然后变黑。在潜水的剩余时间里，它一直保持这种状态，直到我进入船中，然后拔出电池将其关闭。防水外壳中没有水。\n\n我已按照建议将相机插入墙上插座，固件已更新，因为我出门前已经这样做了。存储卡是相机附带的 akaso 卡。", "no": "1410", "date": 1733712413000, "retest": ""}}, {"record_id": "recuyHS8L3cVQi", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我的 brave 7 Le 一直卡死，我不得不取出电池才能让相机正常工作，而且触摸设置都不起作用。录制时出现过几次这种情况，使用 akaso 应用程序连接 Wi-Fi 下载时也会出现这种情况。这有点令人沮丧，因为我真的很喜欢使用相机！", "no": "1724", "date": 1735803869000, "retest": ""}}, {"record_id": "recuGlEEJhKaTN", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "进入这个画面的话一切按钮和触摸面板的操作变得无法操作（死机）…我想从应用程序保存照片，该怎么做？", "no": "2455", "date": 1742804639000, "retest": ""}}, {"record_id": "recuM07vpLpZnr", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "刚买没多久，电池续航时间却只有1个多小时，屏幕还出现了噪点，机身发热严重，不取下电池就无法操作，希望能换成能正常使用的产品。 ", "no": "2960", "date": 1747983232000, "retest": ""}}, {"record_id": "recuQkYfL5ATUS", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "你提供的<|问题描述|>本身就是中文，我推测你可能是需要翻译成英文，以下是翻译结果：\nAfter turning on the computer, it fails to boot into the system and always displays as shown in the picture.", "no": "3342", "date": 1751955861000, "retest": ""}}, {"record_id": "recuSBChyl3dCa", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "相机卡顿。\nSD卡和充电器都是随相机配备的（几周前才购买）。\n唯一解决卡顿的方法是取出电池。\n上述方法都试过了。没有符合规格的备用SD卡。 ", "no": "3614", "date": 1754034088000, "retest": ""}}, {"record_id": "recuTPVJc6X8YM", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "死机本身就是中文，若翻译为英文是“System crash” 。但按照任务要求是翻译为中文，答案就是 “死机”。", "no": "3782", "date": 1755161723000, "retest": ""}}, {"record_id": "recuVOEcgBQLgx", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我相机上的WiFi无法正常工作了。当我尝试通过按一次电源按钮或者按住圆形按钮并选择WiFi图标来开启配对模式时，相机就会死机。\n\n此外，相机开机后，不再有图像预览，屏幕全黑。\n\n另外，我可以查看设备上保存的照片，但当我去观看设备上保存的视频时，屏幕也是全黑的。\n\n而且，我无法拍摄新的视频或照片。屏幕依旧是全黑且死机的状态。 ", "no": "4134", "date": 1756975036000, "retest": ""}}, {"record_id": "recvf35V6KmuME", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "自动关机设定成3分钟后，我就把它关掉了……但结果还是过了3分钟左右电源就关闭了。", "no": "5806", "date": 1774595035000, "retest": ""}}, {"record_id": "recvfCOLRzNdaX", "fields": {"status": "", "level": "", "category": "18-死机", "severity": "产品问题", "content": "我的Akaso Brave 7 LE开机时卡在AKASO标志界面。我已经尝试取出电池和SD卡，并进行了硬重置，但它仍然在启动时冻结。我们使用这款相机4天了，没有出现任何问题。我于3月14日在亚马逊上以我父亲艾伦·赫斯金森的名义购买了该商品。请帮忙。贾里德·赫斯金森", "no": "5844", "date": 1775122896000, "retest": ""}}, {"record_id": "recuwI2cKPZmlr", "fields": {"status": "待确认", "level": "S", "category": "18-死机，12-开关机问题", "severity": "产品问题", "content": "今天拍照的时候，所有的按键都不反应了。\n显示器左下角的蓝色灯亮着，但显示器不显示。\n按任何按钮都没有反应，所以我拔掉电池以关闭电源。\n之后再次插入电池，按下开机按钮，开机了卡在logo页面没有前进，即使等了好几个小时也没有启动。\n怎样才能改善这种状态呢？\n拍摄的数据也消失了。", "no": "1449", "date": 1733974002000, "retest": ""}}, {"record_id": "recuyvbt00rYBP", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "配件问题", "content": "商品送到后，用充电器给电池充电，即使充电器变成蓝色显示，放入本体后也不会显示100%电量。另外，如果想用本体充电的话，就会一直亮红灯，充电也不会结束。我认为是电池或本体方面的故障。我希望交换。", "no": "1686", "date": 1735616383000, "retest": ""}}, {"record_id": "recuSjp9C9xt2o", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "配件问题", "content": "两块电池都无法充电了。", "no": "3524", "date": 1753764986000, "retest": ""}}, {"record_id": "recuTgiSIX7pij", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "两块电池都无法充电了。商品页面上关于该商品的介绍中提到“提供1年的安心保障，承诺对产品的缺陷和故障进行快速有效的处理”，所以请贵方处理一下。充电器和电池都没有问题。据说相机也是通过外接电缆供电来使用的。而且据说即使将充好电的电池插入相机也无法使用。 ", "no": "3693", "date": 1754635295000, "retest": ""}}, {"record_id": "recuTUkZqWtjmz", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "USB Type-B 无反应，无法充电。", "no": "3800", "date": 1755226850000, "retest": ""}}, {"record_id": "recuXSzCU17HKv", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "请介绍一下akaso brave 7 le。\n\n相机好像识别不了电池，不连接type - C就无法启动，给电池充电也没有反应，这是故障吗？还是说我的启动方式或者电池使用方法有问题呢？因为相机两面还贴着保护膜，所以也不清楚是不是坏了……我很发愁。最坏的情况，能用type - C充电吗？ ", "no": "4463", "date": 1758865317000, "retest": ""}}, {"record_id": "recv0UCF62YYn6", "fields": {"status": "待确认", "level": "S", "category": "充电问题", "severity": "产品问题", "content": "相机的充电接口有故障，有时无法充电。我已经尝试了不同的数据线等，并且在没有电池的情况下也试过，确定是接口坏了。请问该如何解决这个问题？", "no": "4742", "date": 1761643991000, "retest": ""}}, {"record_id": "recvdJ1v4TeAEE", "fields": {"status": "待确认", "level": "S", "category": "充电问题，06-电池", "severity": "产品问题", "content": "充电完成后明明没有使用，打开电源时电量却减少了很多。前一天晚上充的电，到当天上午就已经没电了。希望退货。麻烦您了。", "no": "5721", "date": 1773382322000, "retest": ""}}, {"record_id": "recuniYnPQmwKN", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "在2022年7月20日购买了AKASO Brave 7le。\n在外面拍摄动作的时候，“正在处理中，请稍等。”，不能拍摄视频了。\n到现在为止可以使用约2年，不过，上次和这次发生了同样的症状。\n上次发生的时候，拔出SD卡初始化(工厂出货时)就能动作了。\n这次从外面回来(过了5个小时左右)，确认了能工作。\n虽然可以作为回忆的记录使用，但是经常发生这样的故障的话很困扰。\n我觉得变得不稳定了。怎样做才能消除这个故障呢?", "no": "451", "date": 1725358488000, "retest": ""}}, {"record_id": "recuGqf23iRl7n", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "Brave 7 上的 Wifi 连接一直提示重启相机,已提供所有排障", "no": "2474", "date": 1742872414000, "retest": ""}}, {"record_id": "recuJyQ9rRFhFc", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "brave7le用于公司内部的视频拍摄，想问一下日期和时间的设定，所以给您发了邮件。\n\n使用说明书的方法进行了相机本体的日期和时间设定，但是在不知不觉中日期和时间设定被打乱的事情。\n\n时间设定被打乱的原因是什么呢？有没有不打乱日期和时间设定的方法呢？", "no": "2803", "date": 1745747870000, "retest": ""}}, {"record_id": "recuNXSU4ZTD5G", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "我使用的是 7LE，无论设定多少次日期，拍摄时日期都会变成 2024 年 1 月 1 日。相机本体显示的是今天的日期，是不是有什么设置呢？请多多关照。 ", "no": "3174", "date": 1749782465000, "retest": ""}}, {"record_id": "recuTUkZqWHAct", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "关于日期和时间，我已经设置成在视频左上角显示拍摄日期和时间了，但查看拍摄的视频时，发现显示的日期和时间完全不对。\n例如，2025年7月24日18点左右拍摄的视频，显示的却是2024年1月1日21点。\n\n我已经确认过相机的设置，日期和时间是正确的。\n无法按照拍摄顺序排列视频，使用起来很不方便。 ", "no": "3805", "date": 1755226850000, "retest": ""}}, {"record_id": "recuZbM8EL0eLL", "fields": {"status": "待确认", "level": "S", "category": "10-固件问题", "severity": "产品问题", "content": "勇敢者7（Brave 7）的快捷菜单无法下拉。\n虽然触摸屏上有一个白色和一个蓝色的锁定图标，但屏幕无法解锁以查看常规信息，比如卡片格式。\n我认为我可以通过WiFi连接对存储卡进行格式化，但仍然无法按照说明或视频中所示从顶部下拉快捷菜单。\n我看了视频，在我弄清楚如何连接WiFi之前，我无法对SD卡进行格式化。触摸屏被锁定，但固件是最新的。我从未使用过下拉快捷菜单。\n我只是希望能解锁屏幕，以便进入常规菜单选项。\n我能够触摸屏幕上的WiFi选项，并且它能正常工作。锁定图标会滑到右边，但随后白色图标又单独显示了。 ", "no": "4560", "date": 1760065182000, "retest": ""}}, {"record_id": "recvglNsf9qV9i", "fields": {"status": "", "level": "", "category": "10-固件问题", "severity": "产品问题", "content": "很遗憾，我的相机无法正常工作。问题是有些视频文件之间会丢失几秒钟的录制内容。我已经尝试了所有设置，但都没有解决问题。\n\n随信附上所需的视频，在其中可以清楚地看到我提到的“间隙”。此外，我还附上了相机固件和相机型号的截图。\n\n我使用的是相机自带的AKASO 64GB存储卡，但其他存储卡也出现了同样的问题。当然，所有存储卡在使用前都已通过相机进行格式化。\n\n这是普通的视频，而非循环录制。我还将视频质量设为中等，并将分辨率从4K降至2.7K，以排除相机过载的可能性（这本应不该发生）。\n\n我已经尝试使用多种程序来填补间隙，如Davinci Resolve、Luma Fusion、iMovie、AKASO应用程序，但都不够理想。在我最近提交的视频中，我已经通过iMovie对间隙进行了改善，但仍然很明显，无法令人接受。图像稳定器裁剪的视场角异常小，因此我几乎无法使用它，而没有EIS，画面又非常抖动。", "no": "5899", "date": 1775787516000, "retest": ""}}, {"record_id": "recuo3xZByIdnm", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "APP问题", "content": "用brave7le拍摄的视频会以惊人的速度播放。\n可能是设定的关系吧，看了说明书还是不明白，希望能简单易懂地告诉我。", "no": "545", "date": 1726046686000, "retest": ""}}, {"record_id": "recuoUb3pdPrSp", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "APP问题", "content": "这是第一次接触。\n前几天，我在亚马逊上买了brave 7le，第一次拍了视频，但是把拍好的视频下载到iPhone后，所有的视频中途都变成了慢动作。\n请告诉我应对方法。", "no": "626", "date": 1726824365000, "retest": ""}}, {"record_id": "recupfMkRXIwsX", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "APP问题", "content": "iPad的照片夹移动导致播放中途慢放的现象再次发生，希望您能告诉我相应的对策。", "no": "667", "date": 1727143553000, "retest": ""}}, {"record_id": "recuqNcV6mpFpa", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "APP问题", "content": "要求退款或换货 akaso brave 7 le 即使在正常模式下录制视频，也会在 40 至 60 秒后切换到慢动作模式。我尝试了各种方法，例如关闭屏幕保护程序，但症状没有改变。", "no": "782", "date": 1728553641000, "retest": ""}}, {"record_id": "recutSCFECzJZV", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "拍摄视频的时候即使连续拍摄，15分钟左右也会分割成其他几个文件，但是明明是连续文件却有2秒左右没有录制。\n我觉得这样的设计有问题\n如果是不良品的话能帮我更换的话就太好了。", "no": "1129", "date": 1731382058000, "retest": ""}}, {"record_id": "recuwI2cKPryEA", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "设置了“抖动”之后，拍摄的视频会变得非常的暗。", "no": "1451", "date": 1733974002000, "retest": ""}}, {"record_id": "recuzaBXNyMAru", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "按下相机的⏺️开关，显示数据传输速度很慢，不能录像。但是如果连接到手机，按下手机的录像按钮就可以录像了。", "no": "1795", "date": 1736228528000, "retest": ""}}, {"record_id": "recuEx6h1O9bQb", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "只要关闭一次相机电源，相机内的所有视频就会消失。", "no": "2261", "date": 1741141495000, "retest": ""}}, {"record_id": "recuKFuX5pMR6A", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "拍摄视频时文件会被分割，分割后的文件之间会出现未录制的时间。如何解决这个故障呢？", "no": "2882", "date": 1746762384000, "retest": ""}}, {"record_id": "recuVx98ULTCQd", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "我有 4 台你们的 Brave 7 LE 相机，我发现了一个我认为是 bug 的问题。所有相机都曾在某些时候出现过相同的情况。\n\n当录制时长超过 25 分钟时，相机会开始录制一个新文件。大约每 5 - 6 次出现这种情况时，相机就会复制一帧视频。我通过让它们拍摄一个高速时钟，然后逐帧查看生成的图像，追踪到了这个问题。一旦我知道要找什么，我就能在我用这些相机拍摄的各种视频中注意到同样的问题。\n\n我使用的是最新的固件 V1.3.D_T，以 1080P 30 帧每秒的模式拍摄。我开启了日期戳，使用自动曝光，但曝光补偿（EV）设置为 -1.0。这种情况的规律似乎是：\n- 第一个文件总是正常的。\n- 从第二个文件到第 N 个文件中，大约每 5 个文件就有 1 个会出现这种情况。\n- 当文件切换时（录制 25 分钟，即 45000 帧后），前 3 帧的时间间隔是正常的。第 4 帧会重复第 3 帧的内容。然后从第 5 帧开始又恢复正常。\n- 虽然从第 3 帧到第 4 帧的图像是 100% 相同的，但在我查看的每一个案例中，屏幕右下角的日期戳显示的秒数会从一个值变为另一个值。例如，第一帧的秒数可能以 “53” 结尾，而下一帧则以 “54” 结尾。\n\n我在文件的其他部分也查找过这个问题，到目前为止还没有发现。不过，在一个大视频中查找比较困难，所以在其他情况下也可能会出现这种问题。4 台相机都以相同的频率出现相同的问题，这就是为什么我怀疑这是某种固件 bug 导致那一帧被写入了两次。\n\n我刚刚意识到我可能遗漏了一个关键细节。相机还处于 H.265 模式。\n\n与出厂默认设置不同的所有设置如下：\n- H.265 模式\n- 1080P 30 帧每秒\n- 自动关机功能关闭\n- 日期戳开启\n- 曝光设置为 “自动”\n- 曝光补偿（EV）设置为 -1.0\n\n然后我开启 WiFi 模式，通过应用程序进行连接，断开连接后再关闭 WiFi 模式。这样做的唯一目的是从手机上设置相机时间。 ", "no": "4063", "date": 1756716436000, "retest": ""}}, {"record_id": "recuXLEbc8AJkX", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "视频大约15分钟后会自动停止录制，而设置的是无限录制时间。\n它似乎不会立即重新开始录制，时间上似乎有很大的间隔。 ", "no": "4437", "date": 1758762967000, "retest": ""}}, {"record_id": "recuXLMAfyF8Ye", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "下午好，我安装了更新，但车速达到 50 公里每小时后图像仍然会失真。有没有不会出现这个问题的型号呢？我需要把它安装在车把上，在西班牙把它安装在头盔上是被禁止的。我愿意购买另一个型号，但要能使图像稳定的。\n\n谢谢，祝好。\n\n相机菜单里没有调整、校准、图像失真或图像稳定的选项，我看到的只有防抖功能，我已经开启了，我给您发截图。 ", "no": "4438", "date": 1758764970000, "retest": ""}}, {"record_id": "recuXNktFJayBH", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "产品问题", "content": "为什么会出现图像错误？", "no": "4446", "date": 1758787825000, "retest": ""}}, {"record_id": "recv27PrxMoM7B", "fields": {"status": "待确认", "level": "S", "category": "录像及回放问题", "severity": "APP问题", "content": "我将三星A23 5G手机里的2段视频和2张照片（花朵）传输进去了。在内置存储的“prove video”文件夹中，我可以用Akaso go应用打开视频，并且视频能正常播放。但在三星的“相册”应用中，照片（花朵）显示正常，视频却无法查看，提示“不支持的视频编码”。我该怎么办？", "no": "4834", "date": 1762755263000, "retest": ""}}, {"record_id": "recvgOTq7TI4le", "fields": {"status": "待确认", "level": "", "category": "录像及回放问题", "severity": "产品问题", "content": "我为最近去牙买加的旅行买了相机，相机可以拍照但不能拍摄视频。屏幕上会快速出现错误信息。我买它是为了拍摄水下运动，结果却没能拍到任何视频。", "no": "5935", "date": 1776217453000, "retest": ""}}, {"record_id": "recupxpf8KeY8l", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "我买了外部麦克风，想装上使用，但是完全用不上。麦克风是无线BILIWAL。不能使用无线吗?", "no": "702", "date": 1727404023000, "retest": ""}}, {"record_id": "recuy9tqilpujV", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "配件问题", "content": "我买了它作为我的自行车头盔，但我只有防水外壳，无法录制任何声音。\n我似乎缺少另一个相机框架，可以在没有防水外壳的情况下使用它来连接，尽管我在盒子内容上看不到它。\n\n你能给我建议吗？", "no": "1653", "date": 1735295583000, "retest": ""}}, {"record_id": "recuzhsuaMZuhG", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "您好，我今天收到了相机，但包装已打开。\n请告诉我该怎么办。\n顶部有胶水，好像有人试图将其粘回去，但没有成功。\n目前我不确定这是否是好产品。\n在这种情况下，您会寄送替换品吗？\n谢谢\n请告诉我", "no": "1828", "date": 1736329703000, "retest": ""}}, {"record_id": "recuDMpYPsvaIo", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "相机掉落的时候摔碎了", "no": "2185", "date": 1740451704000, "retest": ""}}, {"record_id": "recuNXSU4ZvkRz", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "我于 2 月 4 日在亚马逊购买了商品。将内容转移到外置 SSD 时，有的内容可以正常转移，有的虽然能转移，但会出现如附图所示的显示状况，无法进行播放。\n\n将内容保存到电脑本体（视频文件）以及播放均无问题。\n\n①我在两台电脑上进行了测试，结果相同。\n②我也用其他的 SSD 和 HDD 进行了测试，情况一样。\n③无论是从电脑保存的内容，还是从 microSD 卡进行转移，结果都相同。\n\n我想了解一下内容的保存方法等相关信息。 ", "no": "3180", "date": 1749782465000, "retest": ""}}, {"record_id": "recuSjbVgVyQTc", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "产品问题", "content": "我已将动画设置为在左上角显示日期和时间，但日期和时间全部都有偏差，显示的完全是错误信息。", "no": "3516", "date": 1753761832000, "retest": ""}}, {"record_id": "recuZuasoN6h1E", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "我的提问已经是中文，若要求翻译为英文，则结果如下：\nMy camera lens glass is broken. I wonder if it can be replaced and how much it will cost.", "no": "4600", "date": 1760336955000, "retest": ""}}, {"record_id": "recvaSMnwlEaGA", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "我想用这个支架把我的Brave 7安装到公路自行车车把上的电脑支架上，但每次我把这个支架拧到Brave上时，Brave上的两个连接部件总是歪的，这意味着它在我的自行车上安装得是歪的。", "no": "5556", "date": 1770778083000, "retest": ""}}, {"record_id": "recvgnc6cTg0zH", "fields": {"status": "", "level": "", "category": "其他问题", "severity": "用户体验问题", "content": "摄影时不小心把屏幕弄出裂痕了，所以想请您修理一下。", "no": "5907", "date": 1775808167000, "retest": ""}}, {"record_id": "recumeQH9yVI7O", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "几个月前我买了一台 AKASO 7LE，昨天我尝试在水下最多 2 英尺处拍摄一段简短的视频，但它关闭了，现在无法工作，而且电池仓里确实进了一点水……有什么办法可以解决这个问题？", "no": "343", "date": 1724381417000, "retest": ""}}, {"record_id": "recumI3jf3ItEK", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "用户体验问题", "content": "第一次使用时从下侧盖渗水，完全不能使用了。因为使用时盖好了盖子，所以认为是残次品。因为有问题的产品会退货，所以希望更换正常的产品。请多关照。\n我看了贵公司的宣传文，依然宣传防水性能。我刚买的机身和下部电池盖上没有灰尘和污垢。因为想用所以买的，用了10分钟就出故障了。因为困扰正在商量，虽然收到了请使用防水壳的评语，但是从用户的角度来看不认为是合适的说明。", "no": "385", "date": 1724812937000, "retest": ""}}, {"record_id": "recuvYkqLipe6W", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "宣传说本体防水，我只是在河里使用了一瞬，就进水损坏了。", "no": "1363", "date": 1733298634000, "retest": ""}}, {"record_id": "recuy8upLHWeGL", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "用户体验问题", "content": "我在去年12月购买了一台名为BRAVE7 LE的相机，但是随着家里进水，相机也被淹了。镜头内侧和显示器内侧进水了。", "no": "1645", "date": 1735281043000, "retest": ""}}, {"record_id": "recuExv6FTOPIh", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "在Amazon购买的，上面写着IPX7。\n购买后1周内使用，在浅水中浸泡时会泛起气泡。内部好像进水了。虽然放入水中的时间很短，但之后就没法用了。", "no": "2268", "date": 1741147413000, "retest": ""}}, {"record_id": "recuN9vA7gTEDW", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "配件问题", "content": "希望这封信能让你一切安好。\n\n我写信是想请求协助解决我于2024年12月15日购买的AKASO Brave 7 LE相机的问题。不幸的是，上周末相机在游泳池中短暂使用后就停止工作了。尽管我严格遵循了所有使用指南，但似乎有水进入了设备，导致它无法正常运行。\n\n我居住在西班牙加那利群岛，希望能得到您关于如何进行保修索赔或可能的维修/更换的指导。请告知我您需要哪些文件以及接下来的步骤。\n\n感谢您的支持。期待您的回复。\n\n致以最诚挚的问候，\n豪尔赫·比利亚洛沃斯 ", "no": "3087", "date": 1749038090000, "retest": ""}}, {"record_id": "recuRPGraP3JSw", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "水进入了相机内部。", "no": "3473", "date": 1753325814000, "retest": ""}}, {"record_id": "recuSjbVgVGtri", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "前些日子，我在游泳池使用相机时，突然画面不显示了。相机可以正常开关电源，但屏幕完全漆黑，不过能显示电池电量等信息。相机的各个盖子当时都是关闭的，所以不太可能进水（实际上相机也没湿）。另外，我还担心电源按钮非常难按的问题。这台相机是今年4月才买的，我想应该还在保修期内。我还想继续使用这台相机，所以希望能对其进行修理或更换。请多多关照。（使用的相机型号：BRAVE7LE）", "no": "3512", "date": 1753761832000, "retest": ""}}, {"record_id": "recv3EeQqKmCAt", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "相机镜头和两个液晶屏起雾，视频输出模糊", "no": "4989", "date": 1764150293000, "retest": ""}}, {"record_id": "recv858uqf0vOc", "fields": {"status": "", "level": "", "category": "16-机身防水", "severity": "产品问题", "content": "相机仅在水面上使用过，尽管有迹象表明可以这样操作，但显然水进入了内部，现在它无法正常工作。请进行维修或更换。", "no": "5321", "date": 1768212270000, "retest": ""}}, {"record_id": "recukPhvxRPGhu", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "电池充满电后相机无法开机。它使用外部电源开机并运行。我尝试了不同的电池，但都充满电，所以问题不是电池问题，而是相机电池系统故障。我在为期一个月的旅行前于 6 月 3 日购买了相机，但只能使用几天", "no": "142", "date": 1723087490000, "retest": ""}}, {"record_id": "recumTEtBEw19h", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "Akaso Brave 7 LE 产品 #X004930A23。运动相机可以开机，但屏幕仍然黑屏。蜂鸣声表示电源已打开和按钮已输入，但屏幕上没有任何显示。按下电源按钮时，后屏幕会背光，但前屏幕永远不会打开。按下电源按钮时，底部蓝色指示灯会亮起和熄灭，但屏幕仍然不会打开。尝试了多次重新格式化多张卡，包括电池和电源。", "no": "411", "date": 1724984335000, "retest": ""}}, {"record_id": "recuoUb3pdoFQS", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "即使开机也没有反应。", "no": "627", "date": 1726824365000, "retest": ""}}, {"record_id": "recuyHV3gTg12p", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的相机根本无法开机，在尝试进行固件更新之前一直运行良好。如果无法开机，有没有办法进行硬重置？我在亚马逊上订购了它", "no": "1725", "date": 1735804563000, "retest": ""}}, {"record_id": "recuz5h4jtyD7D", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我仍然遇到 New Brave 7 LE 开机问题……我已为相机和充电器中的两块新电池充电。有一次，当相机通过 USB Micro USB 插头插入我的电脑时，相机确实开机了，有一次，当更换新电池后，相机也开机了。\n\n我今天上午尝试开机，但还是开不了机……取出电池再插上，还是开不了机……现在正在为相机中的电池充电……红灯亮了，但还是开不了机……???\n\n你能帮忙吗！！", "no": "1767", "date": 1736149666000, "retest": ""}}, {"record_id": "recuzaBUmal2VH", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "开机之后没有画面，一片漆黑", "no": "1792", "date": 1736228514000, "retest": ""}}, {"record_id": "recuzOOb3XqubT", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "刚买的时候没有问题。正式使用时装入SD卡，充满电的电池到本体是，按电源按钮3秒也不开机。我尝试了两个附带的电池，但它们都在相同的情况下无法打开电源。\n它尚未使用，也没有物理冲击。", "no": "1874", "date": 1736822492000, "retest": ""}}, {"record_id": "recuA7r1XeCFEV", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好！\n电池已充满电，只有当我连接 USB 摄像头时才会开机，开机后我断开电缆，电池就会保持开机状态并且电池充满电。\n\n要识别电池，您必须在连接 USB 的情况下打开它。", "no": "1897", "date": 1737097726000, "retest": ""}}, {"record_id": "recuD1woXyfi1i", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "是的，我确实将相机连接到了 5V2A 适配器，取出了电池和 SD 卡，并按下电源按钮 3 秒钟，但相机仍然没有开机。", "no": "2061", "date": 1739758746000, "retest": ""}}, {"record_id": "recuDMpYPsvlW7", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "2月21日购买的brave7LE，把存储卡和电池插入之后，长按电源按钮3秒也无法启动。", "no": "2177", "date": 1740451704000, "retest": ""}}, {"record_id": "recuFFmcJX9hV0", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机无法打开。尝试了通过消息传递提供的所有故障排除方法，但毫无作用。", "no": "2377", "date": 1742179636000, "retest": ""}}, {"record_id": "recuGl10y8hFFV", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "嘿，你好！我们为儿子买的相机效果很好，但只是停止工作。两块电池都已充电，但无法开机。我可以将直接替换邮件发送到关联地址吗？\n", "no": "2438", "date": 1742795190000, "retest": ""}}, {"record_id": "recuJyvFX3jiRA", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "今天（4月26日）从亚马逊收到了相机BRAVE 7le\n开封后充电，按照说明书，按了相机的电源键3秒以上，但是没有开机。我想可能是按的方法不对，就把它放进防水盒里，再试了一下那个按钮还是不行。\n我觉得可能是没有充电，我尝试了两个电池但都失败了。\n有什么方法可以重置本体的错误呢，还是初期不良呢？", "no": "2802", "date": 1745742990000, "retest": ""}}, {"record_id": "recuJDPtSNcWM8", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "按住电源按钮几秒钟后，设备无法开机。", "no": "2825", "date": 1745821592000, "retest": ""}}, {"record_id": "recuNdTM6w9Qb4", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "新款Brave 7LE相机使用电池时无法开机。新电池已充满电，新SD卡为雷克沙32GB的Micro SDHC UHS卡。\n我已经完成了所有可能的修正和检查，但没有效果。相机仅使用电池时无法开机。 ", "no": "3119", "date": 1749102962000, "retest": ""}}, {"record_id": "recuPR8v7zhWLB", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我于2024年9月22日在亚马逊购买了BRAVE7LE。使用了几次后，今天无法开机了。电池已经充好电了，即使长按电源按钮也无法开机。USB连接时，红色指示灯会亮起，但无法开机。这是故障吗？ ", "no": "3314", "date": 1751515014000, "retest": ""}}, {"record_id": "recuUdllZZbsnf", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我想换一台相机。我很喜欢这台相机，我觉得它性能很棒。我们度假的时候用了它7天，两周后我想重启它，结果它卡在了akaso界面。我给两块电池都充了一整晚的电，然后又试了试，看能不能解决问题，但大多数时候它根本没反应。有人让我找你们处理保修问题。我们该怎么解决这个问题呢？ ", "no": "3834", "date": 1755507689000, "retest": ""}}, {"record_id": "recuV2JDVir4yW", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我写信给你们是想反映我最近购买的Akaso Brave 7 LE相机出现的问题。购买当天我决定使用它，拍了几张照片后相机就关机了。再次开机时，它只显示“AKASO”字样和开机音效，然后就不断地反复开机、关机。\n\n非常感谢你们能尽快回复。我已经尝试了别人提醒我的所有重置方法，但都没有效果。我将发送序列号照片，以便重新安装系统或按照你们的建议进行处理。再次感谢。 ", "no": "3987", "date": 1756267068000, "retest": ""}}, {"record_id": "recuXdEIfzscgq", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好，我有一台阿卡萨（Akaso）Brave 7 LE 运动相机，除非连接充电器，否则它无法正常工作。我给电池充了电，但它仍然无法正常使用。我该怎么办呢？", "no": "4363", "date": 1758260698000, "retest": ""}}, {"record_id": "recuXdV3My5XJA", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "给电池充电后无法启动了。\n我怀疑是用快速充电给电池充电导致的，于是换了新电池试了一下，但还是无法启动。\n请告诉我解决办法。", "no": "4372", "date": 1758264596000, "retest": ""}}, {"record_id": "recv3a1BI7uQNn", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "关于购买的商品，昨天收到了，但既不能充电，甚至连电源都打不开。", "no": "4928", "date": 1763703848000, "retest": ""}}, {"record_id": "recv5ph6hhtYVq", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我最近购买了你们的AKASO Brave 7 LE运动相机，但是开箱后相机根本无法开机。我尝试了多种故障排除方法，但都没有效果，我甚至访问了你们的网站并尝试了那些建议。我还联系了一位我认识的、能帮我处理相机问题的人，但他说我的相机无法使用，必须更换。", "no": "5087", "date": 1765761450000, "retest": ""}}, {"record_id": "recv7BzfNCxVaY", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "在首次使用并给电池完全充电后，相机开启，SD 卡正确格式化，大多数功能运行正常（不过，模式按钮无法切换屏幕）。此后，按电源按钮相机无法关闭。尝试使用另一块充满电的电池后，相机仍然无法开启。我取出电池和 SD 卡，将相机直接连接到随附的 USB 电缆上。充电器指示灯闪烁红色，我让相机充电两小时。相机仍然无法开启。我还尝试使用不同的 USB 电缆，结果相同。", "no": "5297", "date": 1767775358000, "retest": ""}}, {"record_id": "recv7Lr4nPDMAz", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "当我尝试开机时，屏幕短暂亮起并显示红色指示灯，然后就熄灭了。我已经给电池充过电，但问题仍然存在。我认为主机本身可能也需要充电。", "no": "5308", "date": 1767921172000, "retest": ""}}, {"record_id": "recv8NUuGkeLPM", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我们在12月购买了这个作为圣诞礼物。它只用了几个星期，没有损坏。没有摔过也没有沾到水，本身没有任何损伤，但这周突然无法开机了。由于这个故障，我们希望能免费更换一个。", "no": "5385", "date": 1768873870000, "retest": ""}}, {"record_id": "recvcX8uZxhoIp", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "相机使用后损坏，我想退货或维修。外观无明显损坏，只有一些划痕，但相机无法开机。", "no": "5672", "date": 1772674726000, "retest": ""}}, {"record_id": "recvdlx7d9MENe", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我的Akaso Brave相机已经存放了大约6个月。我有4块电池，并且都充满了电。但是Akaso Brave 7 LE相机无法开机。无论使用哪块电池，或者直接用数据线连接相机都不行。相机之前是存放在我衣柜里的一个保护套中。", "no": "5699", "date": 1773035225000, "retest": ""}}, {"record_id": "recvdZyymilURo", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "你好，我的相机无法开机。通过应用程序连接WiFi后，相机就卡在WiFi界面了，我长按电源键10秒将其关闭。现在它无法开机，我尝试了几种不同的方法。", "no": "5742", "date": 1773626621000, "retest": ""}}, {"record_id": "recveKKmPvFfmM", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "这部相机是买来当礼物的。自从相机开封以来，它就无法充电或开机。我已经尝试了随相机附带的所有不同电池和不同充电器，但似乎都不起作用。\n\n问题在开封后立即出现。我尝试用电池充电器给电池充电，但将电池插入相机后却无法使用。然后我直接给装有电池的相机充电，这方法管用过一次。之后相机就完全无法充电或开机了。", "no": "5793", "date": 1774323924000, "retest": ""}}, {"record_id": "recvfCf7fgkKO4", "fields": {"status": "待确认", "level": "S", "category": "12-开关机问题", "severity": "产品问题", "content": "我无法让我的Brave 7 LE开机。收到的时候它是可以正常使用的。我已经尝试了不同的数据线和不同的电池。有点失望，因为我还没真正使用过它。还 法继续，帮帮我。", "no": "5939", "date": 1776244843000, "retest": ""}}, {"record_id": "recukJ1iuPytmh", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "遥控器不工作。", "no": "125", "date": 1722994968000, "retest": ""}}, {"record_id": "recuxgGCmD7L6j", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我从亚马逊买了相机。不幸的是，遥控器不起作用。\n\n我应该怎么办？全部寄回来吗？", "no": "1502", "date": 1734486029000, "retest": ""}}, {"record_id": "recuzOOb3X3gTs", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我叫古贺，去年11月买了一台BRAVE7 LE，遥控器坏了，无法使用", "no": "1865", "date": 1736822492000, "retest": ""}}, {"record_id": "recuGvZnGtqRF8", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "您好！我非常喜欢我的 brave 7 LE 相机。我喜欢用我的相机拍摄激动人心的汽车视频，遥控器非常有用。\n我的相机遥控器坏了。看起来像是电路板故障。我可以购买另一个遥控器吗？我找不到有售。\n谢谢，\nChase", "no": "2483", "date": 1742957341000, "retest": ""}}, {"record_id": "recuUjMpB5YQ9U", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我们的遥控器几乎没法用了，有时候能用，有时候又不行。有人建议买块新电池，因为遥控器还有灯在亮。考虑到使用不便，我们会退还 5 美元的购买费用。 ", "no": "3863", "date": 1755602794000, "retest": ""}}, {"record_id": "recuXRRlOFY6mO", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "遥控器无法正常使用。已用万用表检查，电池没问题。型号在附件的图片里。遥控器有两个按钮和两个指示灯，指示灯不亮。我认为它有故障，需要更换。我的 Brave 7 LE 对应的是哪本说明书呢？版本 1.9 的说明书里有我这款遥控器的介绍（在某页）。 ", "no": "4459", "date": 1758854765000, "retest": ""}}, {"record_id": "recv6Lf64xSUcj", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我给儿子买了Brave 7L，遥控器无法使用。我们更换了电池，但还发现电池座似乎与线路板分离了。相机工作正常。请问你们能寄一个新的遥控器吗，还是我们应该把整个包裹退回亚马逊？", "no": "5221", "date": 1767002186000, "retest": ""}}, {"record_id": "recv9pexlvn8Je", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我有一台Brave 7 LE运动相机。\n我的遥控器无法正常工作。\n它可以开始录制，但我无法停止录制。而且录制时指示灯也不闪烁蓝色？\n我有两个小的双按钮遥控器，两个都不能用。已经安装了新电池。\n我在滑雪时把相机安装在头盔支架上使用。我听不见提示音，所以不知道相机在做什么？\n这是固件问题吗？我安装了应用程序，它显示固件是最新的。这个应用程序非常卡顿，显示未连接但实际上是已连接的？\n现在遥控器偶尔可以用于拍照或录像。当它确实启动相机录制视频时，停止录制的唯一方法是按拍照按钮。", "no": "5450", "date": 1769425371000, "retest": ""}}, {"record_id": "recvcXEx8r79Zk", "fields": {"status": "", "level": "", "category": "07-遥控器", "severity": "配件问题", "content": "我们AKASO随附的遥控器无法正常工作了。有没有办法维修或更换？我们在魁北克滑雪旅行时使用它，第一天还能正常工作，但旅行的其余时间就坏了。不幸的是，我们现在把遥控器弄丢了，无法提供遥控器的故障情况。", "no": "5680", "date": 1772682360000, "retest": ""}}, {"record_id": "recumI3jf3oDwe", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "关于相机启动时的故障。\n作为前提插入了相同的SD卡的状态，如附件所示，启动了10次的情况下，其中，数次如附件一样显示“卡的格式”和“卡错误，请更换卡”。应。\n到现在为止，在上述显示的每次，正常读取SD卡之前，反复重新启动照相机的电源勉强使用。另外，显示“卡的格式”的时候，为了不让卡的数据消失，每次都按“否”来回避。\n只是，前几天，在操作照相机的时候，在电池余量还很充足的状态下，在SD卡读取的状态下，触摸画面操作的时候，画面变成了漆黑，再次启动照相机的时候数据全部消失的状况。不是删除数据，而是被格式化了。不过，总算进行了数据恢复的安排，吸取了数据。)\n以防万一，以为是SD卡方面有问题，前几天，手边的SD卡另外“AKASO microSDXC卡”新购买128 gb (https://www.amazon.co.jp/gp/product/b0cx8wg762/)”了,但这里也出现了同样的症状。\n另外，如果将同样的SD卡放入手边的其他厂商的运动相机中使用的话，完全没有出现这样的症状，所以考虑的可能不是SD卡，而是相机本身的问题。\n再次强调，对于开头所记载的同样的SD卡，如果有能读取卡的情况，“卡的格式”和“卡错误，请更换卡”的表示是相机的规格吗??或者有类似的情况发生吗?\n另外，特别是发生像前几天发生的数据消失的现象的话会很困扰，关于我们这边，如果没有办法的话，能不能请您告诉我能不能保证修理和更换。", "no": "386", "date": 1724812937000, "retest": ""}}, {"record_id": "recuqRwt1xrCHJ", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "电源键和菜单键的长按太硬，插入切换和菜单键一起的操作性相当差。\n不适合拍想拍的瞬间。\n在操作快停止的时候，误操作麦克风>外部设定，旅行视频的一半变成了没有声音。\n第一天SD卡出现错误导致数据飞走，精神上非常疲惫…。\n因为是第一次使用action cam，所以不知道，贵的产品在这方面的使用习惯会不会不一样呢?\n一边想这边的不习惯也是原因，一边即使摄影难也用iPhone努力的好。。", "no": "788", "date": 1728617405000, "retest": ""}}, {"record_id": "recurPtvVeuDmE", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "将SD卡（AKASO U3 64gb）用SD卡读卡器直接连接到个人电脑\n之后无法识别图像文件。\n（即使插入了SD卡，也会显示请插入文件）", "no": "887", "date": 1729503281000, "retest": ""}}, {"record_id": "recus6oSwu8qmV", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "放入了市面购买的卡片，不过有时会有请格式化相机的指示。\n有时即使放入卡片，也会显示“无卡片”。", "no": "935", "date": 1729753374000, "retest": ""}}, {"record_id": "recuxh89hiNefa", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "SD卡可以拍照，不能拍视频。显示速度较慢", "no": "1517", "date": 1734492591000, "retest": ""}}, {"record_id": "recuIAT4CLg1Me", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "客户使用的SD卡合格但是提示卡慢，更新固件也无法解决问题", "no": "2691", "date": 1744861986000, "retest": ""}}, {"record_id": "recuMF5avFq5sB", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "即使连接到电脑，也显示没有文件。然而，SD卡的容量已满，所以数据本身应该还留在SD卡中，但视频却无法显示。", "no": "3032", "date": 1748588505000, "retest": ""}}, {"record_id": "recuTJCQ49Ph0t", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "配件问题", "content": "尝试了两张不同的 SD 卡（PNY 和新的闪存卡），对它们都进行了格式化，但你的视频素材有一半损坏了。将寄一张免费的 SD 卡。 ", "no": "3760", "date": 1755068565000, "retest": ""}}, {"record_id": "recuXTjmEyPssj", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "我最近购买的相机有固件更新吗？我使用的是一张三星64GB的存储卡，其速度等级为U3，但我一直收到“存储卡忙碌”的错误提示。尽管我已经正确格式化了存储卡。是这张存储卡出问题了吗？", "no": "4476", "date": 1758876218000, "retest": ""}}, {"record_id": "recv6JLsez7zyy", "fields": {"status": "待确认", "level": "S", "category": "14-SD卡问题", "severity": "产品问题", "content": "我在黑色星期五促销期间通过澳大利亚亚马逊购买了一台Akaso Brave 7 LE运动相机，准备作为圣诞节礼物送给儿子，要寄到新西兰。不幸的是，使用一天后，存储卡插槽就出问题了。相机显示“存储卡损坏”。以下是我已尝试过的解决方法：将相机恢复出厂设置；检查固件是否为最新版本；清洁存储卡；检查兼容性——存储卡是兼容的，昨天还能正常使用；格式化存储卡——我无法在相机中进行格式化，所以按照网上的说明在电脑上格式化了。存储卡在电脑上能正常使用，也能被格式化。但当我把它放回相机时，相机仍然显示“存储卡损坏”。这让我觉得问题出在相机的存储卡读卡器上，而不是存储卡本身。请问你能给我一些建议吗？我儿子真的很喜欢这台相机，我们希望能让它恢复正常使用。", "no": "5209", "date": 1766980344000, "retest": ""}}, {"record_id": "recvgPnCcFnMoR", "fields": {"status": "", "level": "", "category": "14-SD卡问题", "severity": "产品问题", "content": "4天前在亚马逊购买的120MB最新SD卡，却因“数据传输速度慢”的错误无法录制。即使对存储卡进行格式化、降低分辨率也无法解决，现在正在旅行中，因此请尽快告知应对方法。另外，因为正在旅行中没有包装盒，所以商品ID等信息不明。", "no": "5937", "date": 1776224649000, "retest": ""}}, {"record_id": "recusPLi0nCZXV", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "他拥有的 iPhone 13 Pro 的 wifi 连接出现问题。它与 IPAD 配合使用正常，但与 iPhone 配合使用则不行。他甚至已经尝试使用手机应用程序升级相机固件，但问题仍然存在。在提供退款之前我们还能做些什么吗？", "no": "991", "date": 1730423650000, "retest": ""}}, {"record_id": "recuuE5EhTnEcw", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "Wi-Fi连接之后立即就断开了，完全无法使用", "no": "1240", "date": 1732083452000, "retest": ""}}, {"record_id": "recuvRosZ6NfLG", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "无法与智能手机连接\n故障了吗", "no": "1340", "date": 1733196162000, "retest": ""}}, {"record_id": "recuAuuTKIxhTJ", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "WiFi似乎不太能识别", "no": "1914", "date": 1737438503000, "retest": ""}}, {"record_id": "recuF0q7hBCM0F", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "用户体验问题", "content": "WIFI页面卡死", "no": "2307", "date": 1741574733000, "retest": ""}}, {"record_id": "recuMhpahMJUuP", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "产品问题", "content": "设备会随机断开连接，并且在不关闭设备的情况下无法重新连接。其次，一旦进入WiFi界面，我就无法退出该界面，也无法使用电源按钮关闭设备。我必须手动取出电池才能让设备关机。", "no": "2970", "date": 1748238639000, "retest": ""}}, {"record_id": "recuOyaLwEw5CL", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "无法连接WIFI", "no": "3218", "date": 1750318668000, "retest": ""}}, {"record_id": "recuXSzDaeSVxB", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "我用的是akaso 7LE和iPhone 15。我已经开启了Wi-Fi连接和蓝牙，但还是无法完成配对。请问该怎么办？ ", "no": "4466", "date": 1758865321000, "retest": ""}}, {"record_id": "recv89tUQ9TUJg", "fields": {"status": "", "level": "", "category": "13-WiFi问题", "severity": "APP问题", "content": "不管怎么都无法连接手机。我用的是Brave7 LE相机，启动相机并打开WiFi后，在手机的WiFi列表中选择了相机名称的那个选项。输入密码后显示“未连接到互联网”，打开AKASO Go也提示“连接有问题，请重启相机”，按照提示重启了，但没有任何变化。密码确实正确输入了1234567890。不过在意的是，以前连接成功过，我想大概是用了和现在所述相同的步骤，但不知道为什么现在不行了。", "no": "5331", "date": 1768276483000, "retest": ""}}, {"record_id": "recuvcA6koQxzX", "fields": {"status": "", "level": "", "category": "13-WiFi问题，18-死机", "severity": "产品问题", "content": "我的相机能顺利连接到我的 iPhone 14 maxpro，但它会随机断开连接，通常在 15 秒内就无法重新连接，即使关闭 Akaso Go 并重新启动它，甚至关闭手机上的 Wifi 再重新打开也是如此。手机会显示 brave7 的 SSID，但无法重新连接。在摄像头方面，我无法从 “wifi 就绪 ”屏幕退出，因为它完全被冻结了，而且无论我按多久电源按钮或其他按钮或组合按钮，摄像头都会被冻结，这就要求我从头盔上拆下摄像头，拧下连接配件，打开电池盖，取出电池并重新组装，15 秒后它又会冻结。不用说，这让人非常沮丧。\n\n我试过不同的 U3 类 SD 卡，情况都一样。作为参考，一张是三星 256GB Pro Plus U3 V30，另一张是千兆 64GB U3 V30，都是相机中的格式。我还试过只连接 Akaso Go 应用程序而不进行录制，但几秒钟后还是会断开连接，而且不会重新连接，这让我觉得这与卡无关。我还尝试了 4k 以下的较低分辨率视频，结果也一样，出现大量冻结现象。", "no": "1287", "date": 1732593105000, "retest": ""}}, {"record_id": "recuD7Bolybfi4", "fields": {"status": "", "level": "", "category": "13-WiFi问题，18-死机", "severity": "产品问题", "content": "下载过程中Wi-Fi连接断开，主机死机。\n试了几次，都是同样的现象。\n不取出电池的话就不会断电。", "no": "2093", "date": 1739848594000, "retest": ""}}, {"record_id": "recuHKGjbfnT7Y", "fields": {"status": "", "level": "", "category": "13-WiFi问题，18-死机", "severity": "APP问题", "content": "相机固定在WiFi连接屏幕上不会移动，点击任何按钮或是长按电源也不会关机。怎么办才好呢？", "no": "2584", "date": 1744090574000, "retest": ""}}, {"record_id": "recuHKGn44waWj", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "显示无法播放从BRAVE7LE通过WiFi下载到Android设备的视频。", "no": "2598", "date": 1744090589000, "retest": ""}}, {"record_id": "recuUY6bhSmIGJ", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "我无法将文件从 Brave 7 LE 相机传输到我的 iPhone，相机直接卡住了，只有取出电池才能关机。\n\n当我尝试将文件传输到 iPhone 时，Brave 7 LE 相机就死机了。我不得不取出电池，试图让它恢复正常。当我成功连接后，它又无法识别所有的照片和文件，然后再次死机。\n\n不仅视频会卡住，照片也会。\n\n不过，我已经降低了视频和影片的分辨率，看看是否会有帮助，下次使用后我会再试试看。\n\n我可以将相机与我的手机配对，但当我选择照片图标进行传输时，屏幕上会出现等待图标，然后就超时了，相机也卡住了。之后我需要从相机中取出电池才能解除卡顿。\n\n我使用的是配备最新 iOS 系统的 iPhone 16 Pro。但我的 iPad 也有同样的问题。\n\n等我买到 SD 卡读卡器后，我会尝试直接从 SD 卡下载文件，但我更希望能有其他解决方案。我有很多珍贵的照片不想丢失，所以任何格式化操作都要等我恢复照片之后再进行。 ", "no": "3977", "date": 1756198558000, "retest": ""}}, {"record_id": "recuV8iyeR2i9P", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "产品问题", "content": "相机无法连接到应用程序。应用程序一直在不停地尝试连接，而相机变得非常烫。", "no": "3996", "date": 1756349271000, "retest": ""}}, {"record_id": "recuVT5R1A6hry", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "无法访问相机中的照片\n我能看到实时视频画面。\n它能连接到实时视频，但无法访问照片。\n我很久以前就重置过了，还重新安装了所有东西。\n太让人沮丧了。\n我急需里面的照片。\n\n报告的问题：无法连接到应用程序\n最新情况：你原本能够连接到应用程序，但突然它卡在了加载界面。尝试删除应用程序并重新下载，关闭数据连接，但都没有用。 ", "no": "4172", "date": 1757040732000, "retest": ""}}, {"record_id": "recuVU3dbYcGxU", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "当我将我的 Brave7 le 连接到我的 iPhone 13 Pro Max 下载图片和视频时，WiFi 总是断连，还会让我的 Brave7 le 死机。我不得不取出电池或拔掉电源，然后再装回电池或插上电源重新开机。\n\n我已经在有这个问题的情况下传输了我所有的图片和视频。等我之后去潜水回来，我会尝试所建议的解决方案。到目前为止，客服服务非常出色。 ", "no": "4175", "date": 1757054879000, "retest": ""}}, {"record_id": "recuWi7rAP9rJT", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "早上好，我正在尝试将我的 Akazo 7 Brave 连接到您的 Wi-Fi 网络，以便下载我上次旅行时拍摄的照片和视频。问题是，当我连接到网络时，它立刻显示没有连接；当我在应用程序中连接我的设备时，由于没有连接，它不显示我最近拍摄的照片和视频。我该怎么办？谢谢。\n\n早上好，我昨天试过了，但我真的做不到。它完全没有连接，也不显示我上周拍摄的照片和视频。我的机型是 iPhone 14。\n\n感谢您的回复，但我从相机里看到的是最近拍摄的视频和照片，而不是上周拍摄的，这是为什么呢？也就是说，我所有的回忆和照片都没了！？我非常确定我在水下录制了视频并拍摄了照片，但从相机里根本看不到。为什么呢？ ", "no": "4224", "date": 1757410519000, "retest": ""}}, {"record_id": "recuX2eGztIk5b", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "刚刚安装了这款应用程序，我已经注册了，本应收到一封确认邮件，但我没收到……我也尝试重新发送了，还查看了垃圾收件箱，但仍然没有收到。 ", "no": "4334", "date": 1758091956000, "retest": ""}}, {"record_id": "recv3P0YXKL0g7", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "我的手机是Pixel 8a，系统版本是Android 16。按照指示：1. 手机设置→隐私→照片，找到“AKASO GO”并选择“所有照片”。但打开设置后显示的是附件1的界面，向下滚动则是附件2的界面，并未出现指示中的内容。2. 打开AKASO GO应用，点击右上角的“+”图标→添加“BRAVE 7 LE”→点击“实时预览”→会显示WiFi名称和密码。打开应用后显示的是界面3，点击“+”后显示的是界面4。另外，在界面3点击下方的设备后显示界面5，点击设备连接后显示界面6。请问这一过程是否算完成了？", "no": "4999", "date": 1764309529000, "retest": ""}}, {"record_id": "recv7imLFpY3M0", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "你好，我的Akaso Brave 7 Le突然无法在手机上播放了。前几天还好好的，我们现在正在度假，结果播放功能就出问题了。相机能连接到手机，我也能看到实时画面，但点击图片查看文件时，视频始终无法播放。视频肯定是录下来了，因为还在SD卡上，而且能在相机上播放，就是没法传到手机里。连接后会出现卡顿。我已经把SD卡取出来，还恢复了出厂设置，但都没用，手机也开关了好几次，所有常见的故障排除方法都试过了。出现这种情况后，相机也关不了机，必须手动取出电池才能关掉。我觉得相机可能坏了，希望能得到你的帮助，必要的话进行更换。这台相机刚用了一年多一点。此致", "no": "5262", "date": 1767491633000, "retest": ""}}, {"record_id": "recveKmjEs1sxQ", "fields": {"status": "待确认", "level": "S", "category": "11-APP问题", "severity": "APP问题", "content": "我在把相机里的视频导出来时遇到了麻烦。我用的是Brave 7 LE，每次尝试通过应用程序将视频下载到手机上时，都会显示下载失败。我的手机已经连接了相机的WiFi，并且允许应用访问照片。这非常令人沮丧，因为下载视频需要整整15分钟，最后却告诉我失败了。你能帮我解决这个问题吗？或者有没有其他更快的方法把这些视频传到手机或电脑上？", "no": "5792", "date": 1774318192000, "retest": ""}}, {"record_id": "recvgn77eGiyiX", "fields": {"status": "", "level": "", "category": "11-APP问题", "severity": "APP问题", "content": "我能连接到AKASOgo，但在加载视频时，加载图标一直在转圈，不管等多久都无法显示。我以为是视频数量太多的原因，就减少了视频数量，但还是加载不了。另外，在设置视频详细参数时也无法连接，会出现超时的情况。我不知道订单号，设备是BRAVE7LE。", "no": "5904", "date": 1775806980000, "retest": ""}}, {"record_id": "recuLlfzDdZqWt", "fields": {"status": "待确认", "level": "S", "category": "发热问题，06-电池", "severity": "产品问题", "content": "刚买没多久，电池续航时间却只有 1 个多小时。屏幕有噪点。机身发热，不取下电池就无法操作。希望能换成能正常使用的产品。 ", "no": "2923", "date": 1747379325000, "retest": ""}}, {"record_id": "recumwloL3y1WC", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "l 遥控器没有摄像头\n我也尝试通过聊天机器人聊天。但他们还没有回复。\n遥控器没有摄像头。请立即发送。", "no": "347", "date": 1724639932000, "retest": ""}}, {"record_id": "recuoTt5Udfv9G", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "缺SD卡", "no": "607", "date": 1726813888000, "retest": ""}}, {"record_id": "recutdNPm6bYwq", "fields": {"status": "", "level": "", "category": "漏件", "severity": "用户体验问题", "content": "我看YouTube上购买了7le的人的遥控器都有腕带。\n我的遥控器没有腕带，请加急发送。", "no": "1044", "date": 1730778888000, "retest": ""}}, {"record_id": "recuvLFglCbAYq", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我刚刚购买了 brave 7 le，很高兴开始使用它。我确实注意到包装信息中附带了一些配件，但我缺少一些。下面是系绳和自行车支架的盒子图片，但它们不在盒子里。我很感激您的帮助，感谢您抽出时间", "no": "1329", "date": 1733111507000, "retest": ""}}, {"record_id": "recuxQLHIANcq3", "fields": {"status": "", "level": "", "category": "漏件", "severity": "用户体验问题", "content": "没有包含SD卡（SD卡套装）", "no": "1575", "date": 1735019190000, "retest": ""}}, {"record_id": "recuy2skqjjqIj", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "不幸的是，我们找了好几次都没有找到SD卡。根据描述，应该包含它。非常感谢和亲切的问候范妮·卡达斯", "no": "1614", "date": 1735191888000, "retest": ""}}, {"record_id": "recuyqOkAxdfLs", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我今天收到了 caimerait，但是缺少 A 卡口，所以我无法使用任何配件或 caimerait 本身。", "no": "1676", "date": 1735551764000, "retest": ""}}, {"record_id": "recuzJ0uWabAdk", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "缺少双电池充电器和 1 块电池", "no": "1843", "date": 1736736770000, "retest": ""}}, {"record_id": "recuBT97mbpkFG", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "包装内没有遥控器", "no": "1937", "date": 1738718854000, "retest": ""}}, {"record_id": "recuCDVMBNMtO7", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "缺少A支架", "no": "2037", "date": 1739410164000, "retest": ""}}, {"record_id": "recuIAHgQiuWq3", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "最近收到了相机，发现它只配了一块电池。", "no": "2683", "date": 1744859173000, "retest": ""}}, {"record_id": "recuIHmwdA8Kw5", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "尊敬的女士们、先生们，我已经收到了相机。不过，根据报价，相机应该配有一张 128GB 的 micro SD 卡，但这张卡并没有随相机一起收到。请问您能否给我补发这张卡？非常感谢。", "no": "2703", "date": 1744957661000, "retest": ""}}, {"record_id": "recuJlm17yUMYg", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "缺少一块电池", "no": "2777", "date": 1745548595000, "retest": ""}}, {"record_id": "recuJxdu8NZTxv", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "我通过亚马逊订购了勇敢7 LE（可能是某产品型号），但它缺少遥控器。你能只寄那个配件过来吗，这样我们就不用把整个商品退回了。 ", "no": "2793", "date": 1745723878000, "retest": ""}}, {"record_id": "recuKtudNBCPj8", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "你好！\n遗憾的是，这批货物中没有存储卡。\n请立即将其寄给我。\n致以友好的问候\n安德烈·艾希霍恩", "no": "2858", "date": 1746584894000, "retest": ""}}, {"record_id": "recuNM0JBNSen1", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "你好，米什：\n这是我从亚马逊平台获取的订单详情副本。另外，我附上了两张照片：一张照片显示，我收到商品时，包装盒已被打开，没有密封；另一张照片显示，两块电池，一块没有密封，另一块没有包装袋，还有一部分，包装袋破了。此外，充电器的袋子也是打开的，而且没有给电池充电的 USB 线。\n\n如果你需要更多信息或更多照片，请告诉我。\n期待你的回复。 ", "no": "3161", "date": 1749607016000, "retest": ""}}, {"record_id": "recuNRS4NfhYD7", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "只是我缺块电池，除此之外，相机完美无缺。\n谢谢\n祝好。 ", "no": "3164", "date": 1749693610000, "retest": ""}}, {"record_id": "recuRbvP2YCtsk", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "相机收到了，一切都好，不过它宣传说会配备两块电池，但我只收到了一块。我把所有包装盒都翻了个遍，反复确认了好几遍，似乎只有随相机一起寄来的那一块电池。 ", "no": "3426", "date": 1752732232000, "retest": ""}}, {"record_id": "recv64EEzOToSR", "fields": {"status": "", "level": "", "category": "漏件", "severity": "配件问题", "content": "你几个月前购买了这台相机，但现在才打开包装，发现盒子里没有电池。其他东西似乎都在。装电池的盒子、充电线以及电池都不在物品清单的盒子里……", "no": "5124", "date": 1766372894000, "retest": ""}}, {"record_id": "
